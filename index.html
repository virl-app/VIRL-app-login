              Save Results
            </button>
            <button onClick={function(){ setShowLog(false); }}
              style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"9px 16px",background:"transparent",color:B.muted,border:"1px solid "+B.border,cursor:"pointer",borderRadius:99}}>
              Cancel
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function RemixCaption({text,onSelect,profile,userToken,onCreditsUsed}) {
  const [open,setOpen] = useState(false);
  const [loading,setLoading] = useState(false);
  const [variants,setVariants] = useState(null);
  const [error,setError] = useState("");

  function generate() {
    // Credit check handled server-side; prompt lives in api/_lib/prompts.js.
    setLoading(true); setVariants(null); setError("");
    callAPI("caption_remix", { text: text }, { token: userToken }).then(function(data) {
      const parsed = extractJSON(data.text);
      if (parsed&&parsed.shorter) {
        setVariants(parsed);
        // [COST 1] Forward Anthropic usage signal so cache-hit + output-size
        // trends are visible per generation type, not just for plans.
        try {
          var remixUsage = (data && data.usage) || {};
          logEvent(window.__virlUserId||null,"caption_remixed",{
            outputTokens:        remixUsage.outputTokens        || 0,
            cachedInputTokens:   remixUsage.cachedInputTokens   || 0,
            uncachedInputTokens: remixUsage.uncachedInputTokens || 0,
            truncated:           !!remixUsage.truncated,
            model:               remixUsage.model || null,
          });
        } catch(e){}
        if (onCreditsUsed) onCreditsUsed({cost: data.cost});
      }
      else { setError("Try again in a moment."); }
    }).catch(function(){ setError("Connection issue - try again."); }).finally(function(){ setLoading(false); });
  }

  function openAndGenerate() { setOpen(true); generate(); }

  if (!open) return (
    <button onClick={openAndGenerate}
      style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",marginTop:10,padding:"6px 14px",background:B.blueSoft,color:B.blue,border:"none",borderRadius:99,cursor:"pointer"}}>
      Remix this caption
    </button>
  );

  return (
    <div style={{marginTop:12,background:B.bg,borderRadius:12,padding:"14px 16px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,color:B.blue}}>3 variations - tap to use</div>
        <button onClick={function(){setOpen(false);}}
          style={{background:"none",border:"none",color:B.muted,cursor:"pointer",fontSize:16,padding:0}}>{"×"}</button>
      </div>
      {loading&&<Spinner text="Writing variations..."/>}
      <ErrBox msg={error}/>
      {variants&&Object.values(variants).map(function(v,i){return (
        <div key={i} style={{background:B.card,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer"}}
          onClick={function(){onSelect(v.text);setOpen(false);}}>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:B.blue,marginBottom:6}}>{v.label}</div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.sub,lineHeight:1.7}}>{v.text}</div>
        </div>
      );})}
    </div>
  );
}

function EditableCaption({caption,idx,topic,onSave,profile,userToken,onCreditsUsed}) {
  const [editing,setEditing] = useState(false);
  const [text,setText] = useState(caption.text);
  const [saved,setSaved] = useState(false);

  function handleSave() {
    // [LEARNING-CONSENT] Capture the diff between the originally
    // generated caption and the user's edited version. Fires the
    // contextual consent prompt on first call; only writes to the
    // events table if the user has already opted in. Per-surface
    // label ("caption") lets the prompt-side formatter render
    // distinct context vs. plan-card edits.
    if (typeof window !== "undefined" && typeof window.__virlCaptureEdit === "function") {
      try {
        window.__virlCaptureEdit("caption", { text: caption.text }, { text: text });
      } catch(e){}
    }
    onSave({
      title:    caption.label+": "+topic.slice(0,40),
      preview:  text.slice(0,100),
      text:     text,
    });
    setEditing(false); setSaved(true);
    setTimeout(function(){setSaved(false);},2000);
  }

  return (
    <div style={{background:idx%2===0?B.card:B.cardAlt,borderRadius:12,padding:"18px 20px",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,color:B.blue}}>{caption.label}</div>
        <div style={{display:"flex",gap:6}}>
          {!editing&&<CopyBtn text={text} label="Copy"/>}
          <button onClick={function(){setEditing(function(v){return !v;});}}
            style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",padding:"5px 12px",background:editing?B.ink:B.bg,color:editing?B.white:B.muted,border:"none",borderRadius:99,cursor:"pointer"}}>
            {editing?"Cancel":"Edit"}
          </button>
          <button onClick={handleSave}
            style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",padding:"5px 12px",background:saved?B.greenSoft:editing?B.blue:B.bg,color:saved?B.green:editing?B.white:B.blue,border:"none",borderRadius:99,cursor:"pointer"}}>
            {saved?"Saved":"Save"}
          </button>
        </div>
      </div>
      {editing?(
        <textarea value={text} onChange={function(e){setText(e.target.value);}}
          style={{width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:10,color:B.ink,fontSize:14,fontWeight:300,padding:"11px 14px",resize:"vertical",minHeight:100,lineHeight:1.8}}/>
      ):(
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.sub,lineHeight:1.8,whiteSpace:"pre-line"}}>{text}</div>
      )}
      {!editing&&<RemixCaption text={text} onSelect={function(t){setText(t);}} profile={profile} userToken={userToken} onCreditsUsed={onCreditsUsed}/>}
      {!editing && userToken && (
        <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid "+B.divider,display:"flex",justifyContent:"flex-end"}}>
          <RatingButtons sessionToken={userToken} generationType="caption" targetRef={"cap|"+(topic||"")+"|"+(caption.label||idx)} size="sm"/>
        </div>
      )}
    </div>
  );
}

// Editable hook block on a navy card surface — shared by the Captions
// result panel and the per-result Scan block. Both surfaces previously
// rendered the hook as a read-only Italiana headline with a Copy
// button; in practice users routinely want to tighten the hook before
// they post. Optional eyebrow + fontSize accommodate the two usage
// sites (Captions = bigger headline + "Your hook" eyebrow; Scan =
// smaller headline, no eyebrow, sits inline with other result fields).
function EditableHook({value, onSave, eyebrow, fontSize}) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value || "");
  const sz = fontSize || 24;
  function commit() {
    var trimmed = (draft || "").trim();
    // [LEARNING-CONSENT] Hook edits are heavily voice-bearing; capture
    // the diff so the prompt builder can mirror the user's hook-tuning
    // patterns in future generations. Trigger gates on the helper's own
    // consent checks; safe to call regardless of opt-in state.
    if (trimmed && trimmed !== (value || "") && typeof window !== "undefined" && typeof window.__virlCaptureEdit === "function") {
      try {
        window.__virlCaptureEdit("hook", { hook: value || "" }, { hook: trimmed });
      } catch(e){}
    }
    if (trimmed) onSave(trimmed);
    setEditing(false);
  }
  function cancel() { setDraft(value || ""); setEditing(false); }
  return (
    <div style={{background:B.navy,borderRadius:14,padding:"16px 20px",marginBottom:12}}>
      {eyebrow && !editing && (
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.sky,marginBottom:8}}>{eyebrow}</div>
      )}
      {editing ? (
        <div>
          <textarea value={draft}
            onChange={function(e){ setDraft(e.target.value); }}
            style={{width:"100%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.22)",borderRadius:10,color:B.white,fontFamily:"'Italiana',serif",fontSize:sz,lineHeight:1.3,padding:"10px 14px",resize:"vertical",minHeight:60,outline:"none",boxSizing:"border-box"}}/>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button onClick={commit}
              style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"8px 16px",background:B.white,color:B.navy,border:"none",borderRadius:99,cursor:"pointer"}}>
              Save
            </button>
            <button onClick={cancel}
              style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"8px 16px",background:"transparent",color:"rgba(255,255,255,0.7)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:99,cursor:"pointer"}}>
              Cancel
            </button>
          </div>
        </div>
      ) : (
        <div>
          <div style={{fontFamily:"'Italiana',serif",fontSize:sz,color:B.white,lineHeight:1.3,marginBottom:10}}>{'"'+(value||"")+'"'}</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <CopyBtn text={value||""} label="Copy hook"/>
            <button onClick={function(){ setDraft(value||""); setEditing(true); }}
              style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",padding:"5px 12px",background:"rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.9)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:99,cursor:"pointer"}}>
              Edit
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function CaptionGen({profile,onSaveCaption,userToken,onCreditsUsed,freshTrendsLeft,isPaid,daysUntilReset,onUpgrade}) {
  // [FRESH-TRENDS] Server returns usedFreshTrends in the caption response
  // when it consumed an inline Perplexity call. Captured here so the
  // post-action banner renders only on the generations that actually
  // benefited; resets on each new generation in the generate() handler.
  const [usedFreshTrends,setUsedFreshTrends] = useState(false);
  const [topic,setTopic] = useState("");
  const [platform,setPlatform] = useState("TikTok");
  const [tone,setTone] = useState("Warm & relatable");
  const [length,setLength] = useState("Medium");
  const [loading,setLoading] = useState(false);
  const [result,setResult] = useState(null);
  const [error,setError] = useState("");

  const LENGTHS = ["Short","Medium","Long"];

  // UI-only hints — the canonical platform/tone/length rules are in
  // api/_lib/prompts.js (server-side). These shorter strings just give the
  // user a feel for what each option means before they pick.
  const platformHints = {
    TikTok:    "Punchy, conversational. Hook in first line.",
    Instagram: "Aspirational but real. First line is the hook.",
    Facebook:  "Warm, community-focused. Conversational.",
    YouTube:   "Context-rich, keyword-friendly.",
    LinkedIn:  "Professional but human. Insight-led opening.",
    X:         "Ultra short. One punchy idea.",
    Pinterest: "Keyword-rich, searchable. Tutorial framing.",
  };
  const lengthHints = {
    Short:  "1-3 lines. Punchy, no fluff.",
    Medium: "4-6 lines. One idea with context and a CTA.",
    Long:   "7-10 lines. Story-driven, conversational.",
  };
  // One-line example caption per tone — UI-only, gives the user a feel
  // for what each option reads like before committing. The model never
  // sees these.
  const toneExamples = {
    "Warm & relatable": "Just made the most embarrassing meal of my life. Show me yours.",
    "Educational":      "The 7-second rule that doubled my completion rate, explained.",
    "Funny & playful":  "Plot twist: my morning routine is just panicking with extra steps.",
    "Inspirational":    "You don't need a perfect plan. You need to start the imperfect one.",
    "Bold & direct":    "Stop posting carousels nobody saves. Here's what to post instead.",
  };
  const platformCtx = platformHints[platform] || "";
  const toneExample = toneExamples[tone]      || "";

  function generate() {
    if (!topic.trim()) return;
    // Credit check + prompt construction handled server-side.
    setLoading(true); setResult(null); setError(""); setUsedFreshTrends(false);
    callAPI("caption", { topic: topic.trim(), platform: platform, tone: tone, length: length }, { token: userToken }).then(function(data) {
      const parsed = extractJSON(data.text);
      if (parsed&&parsed.hook&&parsed.captions) {
        setResult(parsed);
        setUsedFreshTrends(!!(data && data.usedFreshTrends));
        try {
          var uid = window.__virlUserId||null;
          // [COST 1] Forward Anthropic usage signal alongside the existing
          // platform/tone/length business dims.
          var capUsage = (data && data.usage) || {};
          logEvent(uid,"caption_generated",{
            platform:platform,
            tone:tone,
            length:length,
            outputTokens:        capUsage.outputTokens        || 0,
            cachedInputTokens:   capUsage.cachedInputTokens   || 0,
            uncachedInputTokens: capUsage.uncachedInputTokens || 0,
            truncated:           !!capUsage.truncated,
            model:               capUsage.model || null,
          });
        } catch(e){}
        if (onCreditsUsed) onCreditsUsed({cost: data.cost});
      }
      else { setError("Almost there - tap generate again for a second pass."); }
    }).catch(function(e){ setError(e.message); }).finally(function(){ setLoading(false); });
  }

  return (
    <div>
      <SherpaTip>{"Give VIRL a topic and it writes three caption options in your exact voice, tuned to how "+platform+" audiences actually read. Edit any option, then remix for 3 more variations instantly."}</SherpaTip>
      <div style={{background:B.card,borderRadius:16,boxShadow:"0 1px 3px rgba(0,0,0,0.05)",marginBottom:12,overflow:"hidden"}}>
        <div style={{padding:"22px 26px",borderBottom:"1px solid "+B.divider}}>
          <Label>What is your content about?</Label>
          <textarea value={topic} onChange={function(e){setTopic(e.target.value);}}
            placeholder="e.g. my morning workout, a recipe I made, a productivity tip, a day in my life..."
            style={{width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:10,color:B.ink,fontSize:14,fontWeight:300,fontStyle:"italic",padding:"11px 14px",resize:"vertical",minHeight:72,lineHeight:1.6}}/>
        </div>
        <div style={{padding:"22px 26px",borderBottom:"1px solid "+B.divider}}>
          <Label>Platform</Label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{PLATFORMS.map(function(p){return <Chip key={p} active={platform===p} onClick={function(){setPlatform(p);}}>{p}</Chip>;})}</div>
          {platformCtx&&<div style={{marginTop:10,fontFamily:"'Jost',sans-serif",fontSize:11,color:B.muted,fontStyle:"italic",lineHeight:1.5}}>{"Style note: "+platformCtx}</div>}
        </div>
        <div style={{padding:"22px 26px",borderBottom:"1px solid "+B.divider}}>
          <Label>Tone</Label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{TONES.map(function(t){return <Chip key={t} active={tone===t} onClick={function(){setTone(t);}}>{t}</Chip>;})}</div>
          {toneExample && (
            <div style={{marginTop:10,padding:"8px 12px",background:B.bg,border:"1px solid "+B.divider,borderRadius:8,fontFamily:"'Jost',sans-serif",fontSize:12,fontStyle:"italic",color:B.sub,lineHeight:1.5}}>
              <span style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.muted,marginRight:8,fontStyle:"normal"}}>Sounds like</span>
              {'"' + toneExample + '"'}
            </div>
          )}
        </div>
        <div style={{padding:"22px 26px"}}>
          <Label>Caption length</Label>
          <div style={{display:"flex",gap:8,marginBottom:8}}>{LENGTHS.map(function(l){return <Chip key={l} active={length===l} onClick={function(){setLength(l);}}>{l}</Chip>;})}</div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,fontStyle:"italic",color:B.muted}}>{lengthHints[length]}</div>
        </div>
      </div>
      <FreshTrendsChip
        kind="caption"
        remaining={freshTrendsLeft}
        isPaid={isPaid}
        daysUntilReset={daysUntilReset}
        onUpgrade={onUpgrade}/>
      <GenBtn onClick={generate} loading={loading} disabled={!topic.trim()}>
        {loading?"Writing captions...":"Generate captions & hook"}
      </GenBtn>
      <ErrBox msg={error}/>
      {loading&&!result&&<Spinner/>}
      {result && usedFreshTrends && !isPaid && (
        <FreshTrendsBanner kind="caption" daysUntilReset={daysUntilReset} onUpgrade={onUpgrade}/>
      )}
      {result&&(
        <div>
          <EditableHook
            eyebrow="Your hook - use as on-screen text"
            value={result.hook}
            onSave={function(next){ setResult(function(prev){ return prev ? Object.assign({}, prev, {hook: next}) : prev; }); }}/>
          {(result.captions||[]).map(function(cap,i){return (
            <EditableCaption key={i} caption={cap} idx={i} topic={topic} onSave={onSaveCaption} profile={profile} userToken={userToken} onCreditsUsed={onCreditsUsed}/>
          );})}
          <HashtagRow hashtags={result.hashtags}/>
          <button onClick={generate} disabled={loading}
            style={{width:"100%",fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",padding:"12px 18px",background:B.bg,color:B.muted,border:"1px solid "+B.border,cursor:"pointer",marginTop:4,borderRadius:14}}>
            Regenerate captions
          </button>
        </div>
      )}
    </div>
  );
}

// [VIRL-POSTS-TAB] Dedicated long-form writing surface. Drives the
// `long_post` (LinkedIn) and `blog_post` (blog) generation types
// from a topic + supporting points form instead of needing a plan
// card seed (which the in-plan "Write Full Post" action already
// covers). Reuses every voice signal — vault exemplars, fingerprint,
// recent edits, denylist — because long-form is the heaviest voice
// fidelity test VIRL has.
function PostWriter({profile,userToken,onCreditsUsed,isPaid,daysUntilReset,onUpgrade,onSavePost}) {
  // Mode selects which generation type fires. Output shape branches
  // accordingly; LinkedIn = hook/body/closing/hashtags, blog = title/
  // intro/sections/conclusion/meta_description.
  const [mode,setMode]            = useState("linkedin");
  const [topic,setTopic]          = useState("");
  const [points,setPoints]        = useState("");
  const [tone,setTone]            = useState("");
  const [guidance,setGuidance]    = useState("");
  const [length,setLength]        = useState("medium");
  const [loading,setLoading]      = useState(false);
  const [error,setError]          = useState("");
  const [post,setPost]            = useState(null);
  // [POST-EDIT/SAVE] Inline edit + save-to-vault, mirroring
  // LongFormPostGenerator. draftPost holds the in-progress edit (sections
  // stay an array for blog mode); savedToVault gates the button so repeated
  // taps don't create duplicate vault items.
  const [editing,setEditing]      = useState(false);
  const [draftPost,setDraftPost]  = useState(null);
  const [savedToVault,setSavedToVault] = useState(false);

  // Length labels differ across modes — blog goes much longer than
  // LinkedIn. UI-only copy; server enforces the actual word ranges
  // (api/_lib/prompts.js buildLongPost / buildBlogPost).
  var lengthOptions = mode === "blog"
    ? [
        {v:"short",  l:"Short (~750 words)"},
        {v:"medium", l:"Medium (~1300 words)"},
        {v:"long",   l:"Long (~2000+ words)"},
      ]
    : [
        {v:"short",  l:"Short (~350 words)"},
        {v:"medium", l:"Medium (~600 words)"},
        {v:"long",   l:"Long (~1200 words)"},
      ];

  function generate() {
    if (!topic.trim()) return;
    setLoading(true); setError(""); setPost(null);
    setEditing(false); setDraftPost(null); setSavedToVault(false);
    // Supporting points: textarea is one-per-line for the user; server
    // expects an array.
    var supportingPoints = (points || "")
      .split(/\n+/)
      .map(function(s){ return s.replace(/^[-•*]\s*/, "").trim(); })
      .filter(Boolean);
    var genType = mode === "blog" ? "blog_post" : "long_post";
    var params = {
      topic:            topic.trim(),
      supportingPoints: supportingPoints,
      tone:             (tone || "").trim() || null,
      guidance:         (guidance || "").trim() || null,
      length:           length,
    };
    callAPI(genType, params, { token: userToken }).then(function(data){
      if (!(data && data.text)) {
        setError("VIRL's still warming up — tap Try Again.");
        return;
      }
      // [LONG-POST-PARSE] Tolerant parser strips markdown fences /
      // preamble that Claude occasionally adds despite the prompt.
      var parsed = extractJSON(data.text);
      // Sanity-check the shape per mode so a wrong-type response
      // doesn't half-render in the UI.
      var ok = parsed && typeof parsed === "object" && (
        mode === "blog"
          ? (parsed.title && parsed.sections)
          : (parsed.hook && parsed.body)
      );
      if (!ok) {
        setError("VIRL drafted something but the format came back garbled. Tap Try Again.");
        return;
      }
      setPost(parsed);
      if (onCreditsUsed) onCreditsUsed({ cost: (data && data.cost) || 2 });
      try {
        var u = (data && data.usage) || {};
        logEvent(window.__virlUserId||null, mode === "blog" ? "blog_post_generated" : "long_post_generated", {
          source:              "posts_tab",
          length:              length,
          topicLen:            topic.length,
          supportingPointsLen: supportingPoints.length,
          outputTokens:        u.outputTokens        || 0,
          cachedInputTokens:   u.cachedInputTokens   || 0,
          uncachedInputTokens: u.uncachedInputTokens || 0,
          truncated:           !!u.truncated,
          model:               u.model || null,
        });
      } catch(e) {}
    }).catch(function(e){
      setError((e && e.message) || "Something went wrong. Try again.");
    }).finally(function(){ setLoading(false); });
  }

  // Assemble the full post into plain text. Shared by Copy and Save to
  // Vault so both always reflect the same (possibly edited) content.
  function assemblePostText(p) {
    if (!p) return "";
    if (mode === "blog") {
      var sections = (p.sections || []).map(function(s){
        return (s.heading ? s.heading + "\n\n" : "") + (s.body || "");
      }).join("\n\n");
      return (p.title || "") + "\n\n"
           + (p.subtitle ? p.subtitle + "\n\n" : "")
           + (p.intro || "") + "\n\n"
           + sections + "\n\n"
           + (p.conclusion || "");
    }
    var hashtagLine = (p.hashtags && p.hashtags.length)
      ? "\n\n" + p.hashtags.map(function(h){ return "#" + h.replace(/^#/, ""); }).join(" ")
      : "";
    return (p.hook || "") + "\n\n"
         + (p.body || "")
         + (p.closing ? "\n\n" + p.closing : "")
         + hashtagLine;
  }

  function copyPost() {
    if (!post) return;
    var text = assemblePostText(post);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).catch(function(){});
    }
  }

  // [POST-SAVE] Persist the current post to the Vault as a caption-type
  // item (same shape saveCaption expects). Gated on onSavePost so older
  // call sites that don't pass it simply hide the button.
  function handleSaveToVault() {
    if (!post || !onSavePost) return;
    var text   = assemblePostText(post);
    var isBlog = mode === "blog";
    var title  = isBlog
      ? (post.title || topic.trim() || "Blog post")
      : (topic.trim() || (post.hook || "").slice(0, 60) || "LinkedIn post");
    onSavePost({
      title:    title,
      preview:  (isBlog ? (post.subtitle || post.intro || "") : (post.hook || text)).slice(0, 160),
      text:     text,
      hook:     isBlog ? (post.subtitle || null) : (post.hook || null),
      hashtags: Array.isArray(post.hashtags) ? post.hashtags.slice() : [],
      platform: isBlog ? "Blog" : "LinkedIn",
    });
    setSavedToVault(true);
  }

  // [POST-EDIT] Inline edit, mirroring LongFormPostGenerator. Blog keeps
  // sections as an array so each heading/body stays independently editable.
  function startEdit() {
    if (!post) return;
    if (mode === "blog") {
      setDraftPost({
        title:            post.title || "",
        subtitle:         post.subtitle || "",
        intro:            post.intro || "",
        sections:         Array.isArray(post.sections) ? post.sections.map(function(s){ return { heading: s.heading || "", body: s.body || "" }; }) : [],
        conclusion:       post.conclusion || "",
        meta_description: post.meta_description || "",
        hashtags:         Array.isArray(post.hashtags) ? post.hashtags.join(" ") : "",
      });
    } else {
      setDraftPost({
        hook:     post.hook || "",
        body:     post.body || "",
        closing:  post.closing || "",
        hashtags: Array.isArray(post.hashtags) ? post.hashtags.join(" ") : "",
      });
    }
    setEditing(true);
  }
  function cancelEdit() { setDraftPost(null); setEditing(false); }
  function updateDraft(field, value) {
    setDraftPost(function(d){ return d ? Object.assign({}, d, { [field]: value }) : d; });
  }
  function updateDraftSection(i, field, value) {
    setDraftPost(function(d){
      if (!d || !Array.isArray(d.sections) || i < 0 || i >= d.sections.length) return d;
      var next = d.sections.slice();
      next[i] = Object.assign({}, next[i], { [field]: value });
      return Object.assign({}, d, { sections: next });
    });
  }
  function parsePostHashtags(str) {
    return (str || "").split(/[\s,]+/).map(function(t){ return t.replace(/^#/, "").trim(); }).filter(Boolean);
  }
  function saveEdit() {
    if (!draftPost) { setEditing(false); return; }
    var next;
    if (mode === "blog") {
      next = Object.assign({}, post, {
        title:            (draftPost.title || "").trim(),
        subtitle:         (draftPost.subtitle || "").trim(),
        intro:            (draftPost.intro || "").trim(),
        sections:         (draftPost.sections || []).map(function(s){ return { heading: (s.heading||"").trim(), body: (s.body||"").trim() }; }),
        conclusion:       (draftPost.conclusion || "").trim(),
        meta_description: (draftPost.meta_description || "").trim(),
        hashtags:         parsePostHashtags(draftPost.hashtags),
      });
    } else {
      next = Object.assign({}, post, {
        hook:     (draftPost.hook || "").trim(),
        body:     (draftPost.body || "").trim(),
        closing:  (draftPost.closing || "").trim(),
        hashtags: parsePostHashtags(draftPost.hashtags),
      });
    }
    // [LEARN-FROM-EDITS] Capture the voice diff (same surfaces the per-card
    // editor uses) so future generations learn the user's hand-edits.
    if (post && typeof window !== "undefined" && typeof window.__virlCaptureEdit === "function") {
      try {
        if (mode === "blog") {
          window.__virlCaptureEdit("blog_post",
            { intro: post.intro || "", conclusion: post.conclusion || "" },
            { intro: next.intro,        conclusion: next.conclusion });
        } else {
          window.__virlCaptureEdit("long_post",
            { hook: post.hook || "", body: post.body || "", closing: post.closing || "" },
            { hook: next.hook,        body: next.body,        closing: next.closing });
        }
      } catch(e){}
    }
    setPost(next);
    setDraftPost(null);
    setEditing(false);
    setSavedToVault(false); // the edited version is worth saving again
  }

  // Shared action row appended under both display blocks. Copy / Save to
  // Vault / Edit / Regenerate, with Save flipping to a "Saved ✓" badge.
  function renderActions(copyLabel) {
    return (
      <div style={{marginTop:18,display:"flex",gap:8,flexWrap:"wrap"}}>
        <button onClick={copyPost}
          style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"10px 18px",background:B.navy,color:B.white,border:"none",borderRadius:99,cursor:"pointer"}}>
          {copyLabel}
        </button>
        {onSavePost && !savedToVault && (
          <button onClick={handleSaveToVault}
            style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"10px 18px",background:B.blueSoft,color:B.blue,border:"none",borderRadius:99,cursor:"pointer"}}>
            {"Save to Vault"}
          </button>
        )}
        {onSavePost && savedToVault && (
          <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"10px 18px",color:B.green}}>
            {"Saved to Vault ✓"}
          </span>
        )}
        <button onClick={startEdit}
          style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"10px 18px",background:B.bg,color:B.sub,border:"1px solid "+B.border,borderRadius:99,cursor:"pointer"}}>
          {"Edit"}
        </button>
        <button onClick={generate} disabled={loading}
          style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"10px 18px",background:B.bg,color:B.sub,border:"1px solid "+B.border,borderRadius:99,cursor:loading?"default":"pointer"}}>
          {"Regenerate"}
        </button>
      </div>
    );
  }

  // Reusable edit-mode field. Single-line uses input; multiline uses textarea.
  function editField(label, value, onChange, opts) {
    opts = opts || {};
    return (
      <div style={{marginBottom:12}}>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:B.muted,marginBottom:6}}>{label}</div>
        <textarea value={value} onChange={function(e){ onChange(e.target.value); }}
          rows={opts.rows || 3}
          style={{width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:10,color:B.ink,fontSize:13,fontWeight:300,padding:"10px 12px",resize:"vertical",lineHeight:1.6,boxSizing:"border-box"}}/>
      </div>
    );
  }
  function renderEditActions() {
    return (
      <div style={{marginTop:6,display:"flex",gap:8,flexWrap:"wrap"}}>
        <button onClick={saveEdit}
          style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"10px 20px",background:B.navy,color:B.white,border:"none",borderRadius:99,cursor:"pointer"}}>
          {"Save changes"}
        </button>
        <button onClick={cancelEdit}
          style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"10px 16px",background:"transparent",color:B.muted,border:"1px solid "+B.border,borderRadius:99,cursor:"pointer"}}>
          {"Cancel"}
        </button>
      </div>
    );
  }

  return (
    <div>
      <SherpaTip>
        {mode === "blog"
          ? "Give VIRL a blog topic and 2-5 supporting points. It drafts a structured post with title, sections, and SEO summary — in your voice."
          : "Give VIRL a topic and your supporting points. It drafts a LinkedIn long-form post that hooks before the 'see more' fold and lands in your voice."}
      </SherpaTip>

      <div style={{background:B.card,borderRadius:16,boxShadow:"0 1px 3px rgba(0,0,0,0.05)",marginBottom:12,overflow:"hidden"}}>
        {/* Mode picker */}
        <div style={{padding:"22px 26px",borderBottom:"1px solid "+B.divider}}>
          <Label>What are you writing?</Label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <Chip active={mode==="linkedin"} onClick={function(){setMode("linkedin"); setPost(null); setError("");}}>{"LinkedIn long-form post"}</Chip>
            <Chip active={mode==="blog"}     onClick={function(){setMode("blog");     setPost(null); setError("");}}>{"Blog post"}</Chip>
          </div>
          <div style={{marginTop:10,fontFamily:"'Jost',sans-serif",fontSize:11,color:B.muted,fontStyle:"italic",lineHeight:1.5}}>
            {mode === "blog"
              ? "Structured for a blog / Substack / website. Title, sections with headings, SEO summary."
              : "Optimized for LinkedIn's see-more fold + plain-text formatting (no markdown)."}
          </div>
        </div>

        {/* Topic */}
        <div style={{padding:"22px 26px",borderBottom:"1px solid "+B.divider}}>
          <Label>{mode === "blog" ? "Blog topic" : "What is this post about?"}</Label>
          <textarea value={topic} onChange={function(e){setTopic(e.target.value);}}
            placeholder={mode === "blog"
              ? "e.g. The hidden cost of daily standups for early-stage teams"
              : "e.g. Why I stopped doing client work for free, and what changed"}
            style={{width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:10,color:B.ink,fontSize:14,fontWeight:300,fontStyle:"italic",padding:"11px 14px",resize:"vertical",minHeight:72,lineHeight:1.6}}/>
        </div>

        {/* Supporting points */}
        <div style={{padding:"22px 26px",borderBottom:"1px solid "+B.divider}}>
          <Label>Supporting points (optional, one per line)</Label>
          <textarea value={points} onChange={function(e){setPoints(e.target.value);}}
            placeholder={"e.g.\nWhat I tried first\nThe moment I realized it wasn't working\nWhat I do now instead"}
            style={{width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:10,color:B.ink,fontSize:14,fontWeight:300,padding:"11px 14px",resize:"vertical",minHeight:96,lineHeight:1.6}}/>
          <div style={{marginTop:8,fontFamily:"'Jost',sans-serif",fontSize:11,color:B.muted,fontStyle:"italic",lineHeight:1.5}}>
            Skip if you want VIRL to develop the argument on its own — but giving it 2-5 beats anchors the post in YOUR thinking.
          </div>
        </div>

        {/* Optional tone refinement */}
        <div style={{padding:"22px 26px",borderBottom:"1px solid "+B.divider}}>
          <Label>Tone for this post (optional)</Label>
          <input value={tone} onChange={function(e){setTone(e.target.value);}}
            placeholder="e.g. contrarian, story-led, data-driven, vulnerable…"
            style={{width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:10,color:B.ink,fontSize:14,fontWeight:300,padding:"11px 14px",lineHeight:1.6}}/>
          <div style={{marginTop:8,fontFamily:"'Jost',sans-serif",fontSize:11,color:B.muted,fontStyle:"italic",lineHeight:1.5}}>
            Defaults to your saved profile voice. Use this to nudge a specific post in a different direction.
          </div>
        </div>

        {/* [POST-GUIDANCE] Optional free-text guidance for this specific post */}
        <div style={{padding:"22px 26px",borderBottom:"1px solid "+B.divider}}>
          <Label>Specific guidance for this post (optional)</Label>
          <textarea value={guidance} onChange={function(e){setGuidance(e.target.value);}}
            maxLength={800}
            placeholder={mode === "blog"
              ? "e.g. Open with the client story, mention our new pricing, avoid jargon, end pointing to the booking page"
              : "e.g. Take a contrarian angle, reference the launch, speak to first-time founders, don't pitch"}
            style={{width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:10,color:B.ink,fontSize:14,fontWeight:300,padding:"11px 14px",resize:"vertical",minHeight:72,lineHeight:1.6}}/>
          <div style={{marginTop:8,fontFamily:"'Jost',sans-serif",fontSize:11,color:B.muted,fontStyle:"italic",lineHeight:1.5}}>
            Anything VIRL should do (or avoid) for this post — an angle, a detail to include, a CTA. VIRL follows it while keeping your voice.
          </div>
        </div>

        {/* Length */}
        <div style={{padding:"22px 26px"}}>
          <Label>Length</Label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {lengthOptions.map(function(opt){
              return <Chip key={opt.v} active={length===opt.v} onClick={function(){setLength(opt.v);}}>{opt.l}</Chip>;
            })}
          </div>
        </div>
      </div>

      <GenBtn onClick={generate} loading={loading} disabled={!topic.trim()}>
        {loading
          ? (mode === "blog" ? "Drafting your blog post..." : "Writing your post...")
          : (mode === "blog" ? "Write the blog post" : "Write the LinkedIn post")}
      </GenBtn>
      <ErrBox msg={error}/>
      {loading && !post && <Spinner/>}

      {/* Result rendering — branches per mode */}
      {post && !editing && mode === "linkedin" && (
        <div style={{background:B.card,borderRadius:16,padding:"22px 24px",boxShadow:"0 1px 3px rgba(0,0,0,0.05)",marginTop:14}}>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:600,color:B.ink,lineHeight:1.6,marginBottom:14,whiteSpace:"pre-wrap"}}>{post.hook}</div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.sub,lineHeight:1.75,whiteSpace:"pre-wrap"}}>{post.body}</div>
          {post.closing && <div style={{marginTop:16,fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:500,color:B.ink,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{post.closing}</div>}
          {post.hashtags && post.hashtags.length > 0 && (
            <div style={{marginTop:14,fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:500,color:B.blue}}>
              {post.hashtags.map(function(h){ return "#" + h.replace(/^#/, ""); }).join(" ")}
            </div>
          )}
          {post.compliance_note && (
            <div style={{marginTop:14,padding:"10px 14px",background:B.coralSoft,borderRadius:8,fontFamily:"'Jost',sans-serif",fontSize:11,color:B.coral,lineHeight:1.5}}>
              {"Suggested disclosure: " + post.compliance_note}
            </div>
          )}
          {renderActions("Copy")}
        </div>
      )}

      {/* Edit mode — LinkedIn */}
      {post && editing && draftPost && mode === "linkedin" && (
        <div style={{background:B.card,borderRadius:16,padding:"22px 24px",boxShadow:"0 1px 3px rgba(0,0,0,0.05)",marginTop:14}}>
          {editField("Hook",     draftPost.hook,     function(v){ updateDraft("hook", v); },     { rows: 2 })}
          {editField("Body",     draftPost.body,     function(v){ updateDraft("body", v); },     { rows: 10 })}
          {editField("Closing",  draftPost.closing,  function(v){ updateDraft("closing", v); },  { rows: 2 })}
          {editField("Hashtags (space-separated)", draftPost.hashtags, function(v){ updateDraft("hashtags", v); }, { rows: 2 })}
          {renderEditActions()}
        </div>
      )}

      {post && !editing && mode === "blog" && (
        <div style={{background:B.card,borderRadius:16,padding:"24px 26px",boxShadow:"0 1px 3px rgba(0,0,0,0.05)",marginTop:14}}>
          <div style={{fontFamily:"'Italiana',serif",fontSize:28,color:B.ink,lineHeight:1.2,marginBottom:8}}>{post.title}</div>
          {post.subtitle && <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,fontStyle:"italic",color:B.muted,lineHeight:1.55,marginBottom:18}}>{post.subtitle}</div>}
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.sub,lineHeight:1.8,whiteSpace:"pre-wrap",marginBottom:18}}>{post.intro}</div>
          {Array.isArray(post.sections) && post.sections.map(function(s, i){
            return (
              <div key={"sec-"+i} style={{marginBottom:18}}>
                {s.heading && <div style={{fontFamily:"'Italiana',serif",fontSize:20,color:B.navy,lineHeight:1.3,marginBottom:8}}>{s.heading}</div>}
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.sub,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{s.body}</div>
              </div>
            );
          })}
          {post.conclusion && <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:400,color:B.ink,lineHeight:1.75,whiteSpace:"pre-wrap",paddingTop:14,borderTop:"1px solid "+B.divider}}>{post.conclusion}</div>}
          {post.meta_description && (
            <div style={{marginTop:18,padding:"12px 14px",background:B.bg,borderRadius:10,border:"1px solid "+B.divider}}>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:B.muted,marginBottom:4}}>{"Meta description (SEO)"}</div>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.sub,lineHeight:1.55}}>{post.meta_description}</div>
            </div>
          )}
          {post.hashtags && post.hashtags.length > 0 && (
            <div style={{marginTop:14,fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:500,color:B.blue}}>
              {post.hashtags.map(function(h){ return "#" + h.replace(/^#/, ""); }).join(" ")}
            </div>
          )}
          {post.compliance_note && (
            <div style={{marginTop:14,padding:"10px 14px",background:B.coralSoft,borderRadius:8,fontFamily:"'Jost',sans-serif",fontSize:11,color:B.coral,lineHeight:1.5}}>
              {"Suggested disclosure: " + post.compliance_note}
            </div>
          )}
          {renderActions("Copy full post")}
        </div>
      )}

      {/* Edit mode — Blog */}
      {post && editing && draftPost && mode === "blog" && (
        <div style={{background:B.card,borderRadius:16,padding:"24px 26px",boxShadow:"0 1px 3px rgba(0,0,0,0.05)",marginTop:14}}>
          {editField("Title",    draftPost.title,    function(v){ updateDraft("title", v); },    { rows: 2 })}
          {editField("Subtitle", draftPost.subtitle, function(v){ updateDraft("subtitle", v); }, { rows: 2 })}
          {editField("Intro",    draftPost.intro,    function(v){ updateDraft("intro", v); },    { rows: 5 })}
          {Array.isArray(draftPost.sections) && draftPost.sections.map(function(s, i){
            return (
              <div key={"edit-sec-"+i} style={{padding:"12px 14px",background:B.bg,borderRadius:10,border:"1px solid "+B.border,marginBottom:12}}>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:B.muted,marginBottom:8}}>{"Section " + (i + 1)}</div>
                {editField("Heading", s.heading, function(v){ updateDraftSection(i, "heading", v); }, { rows: 1 })}
                {editField("Body",    s.body,    function(v){ updateDraftSection(i, "body", v); },    { rows: 6 })}
              </div>
            );
          })}
          {editField("Conclusion",          draftPost.conclusion,       function(v){ updateDraft("conclusion", v); },       { rows: 4 })}
          {editField("Meta description (SEO)", draftPost.meta_description, function(v){ updateDraft("meta_description", v); }, { rows: 2 })}
          {editField("Hashtags (space-separated)", draftPost.hashtags, function(v){ updateDraft("hashtags", v); }, { rows: 2 })}
          {renderEditActions()}
        </div>
      )}
    </div>
  );
}

function EditableScanCaption({captionText,platform,onSave,profile,userToken,onCreditsUsed}) {
  const [editing,setEditing] = useState(false);
  const [text,setText] = useState(captionText||"");
  const [saved,setSaved] = useState(false);

  function handleSave() {
    if (!text.trim()) return;
    // [LEARNING-CONSENT] Capture the scan-caption edit diff before
    // persisting. Surface label "scan_caption" so the prompt formatter
    // can render context-appropriate framing.
    if (typeof window !== "undefined" && typeof window.__virlCaptureEdit === "function") {
      try {
        window.__virlCaptureEdit("scan_caption", { text: captionText || "" }, { text: text });
      } catch(e){}
    }
    onSave({
      title:    platform+" caption",
      preview:  text.slice(0,100),
      text:     text,
      platform: platform,
    });
    setEditing(false); setSaved(true);
    setTimeout(function(){setSaved(false);},2000);
  }

  return (
    <div style={{background:B.bg,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,color:B.blue}}>Caption</div>
        <div style={{display:"flex",gap:6}}>
          {!editing&&<CopyBtn text={text} label="Copy"/>}
          <button onClick={function(){setEditing(function(v){return !v;});}}
            style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",padding:"5px 12px",background:editing?B.ink:B.card,color:editing?B.white:B.muted,border:"none",borderRadius:99,cursor:"pointer"}}>
            {editing?"Cancel":"Edit"}
          </button>
          <button onClick={handleSave}
            style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",padding:"5px 12px",background:saved?B.greenSoft:editing?B.blue:B.card,color:saved?B.green:editing?B.white:B.blue,border:"none",borderRadius:99,cursor:"pointer"}}>
            {saved?"Saved":"Save"}
          </button>
        </div>
      </div>
      {editing?(
        <textarea value={text} onChange={function(e){setText(e.target.value);}}
          style={{width:"100%",background:B.card,border:"1px solid "+B.border,borderRadius:10,color:B.ink,fontSize:14,fontWeight:300,padding:"11px 14px",resize:"vertical",minHeight:100,lineHeight:1.8}}/>
      ):(
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.sub,lineHeight:1.8,whiteSpace:"pre-line"}}>{text}</div>
      )}
      {!editing&&<RemixCaption text={text} onSelect={function(t){setText(t);}} profile={profile} userToken={userToken} onCreditsUsed={onCreditsUsed}/>}
      {!editing && userToken && (
        <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid "+B.divider,display:"flex",justifyContent:"flex-end"}}>
          <RatingButtons sessionToken={userToken} generationType="scan_result" targetRef={"scan|"+(platform||"")+"|"+(captionText||"").slice(0,40)} size="sm"/>
        </div>
      )}
    </div>
  );
}

function ShareScoreCard({score,platform,hook}) {
  const [busy,setBusy] = useState(false);
  const [done,setDone] = useState(false);

  function wrapText(ctx, text, maxWidth) {
    var words = String(text||"").split(/\s+/);
    var lines = [], line = "";
    for (var i=0; i<words.length; i++) {
      var test = line ? line+" "+words[i] : words[i];
      if (ctx.measureText(test).width > maxWidth && line) {
        lines.push(line); line = words[i];
      } else { line = test; }
    }
    if (line) lines.push(line);
    return lines;
  }

  async function downloadCard() {
    setBusy(true);
    try {
      // Pre-load the webfonts at the sizes we'll draw at — without this the
      // first click renders with a serif/sans fallback because the FontFace
      // hasn't been requested yet.
      try {
        await Promise.all([
          document.fonts.load("400 120px 'Italiana'"),
          document.fonts.load("400 360px 'Italiana'"),
          document.fonts.load("italic 400 56px 'Italiana'"),
          document.fonts.load("700 28px 'Jost'"),
          document.fonts.load("italic 300 32px 'Jost'"),
        ]);
      } catch(e) {}

      var W = 1080, H = 1920;
      var c = document.createElement("canvas");
      c.width = W; c.height = H;
      var ctx = c.getContext("2d");

      // Navy gradient background
      var grad = ctx.createLinearGradient(0,0,0,H);
      grad.addColorStop(0, "#1F3A8A");
      grad.addColorStop(1, "#0B1840");
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,W,H);

      ctx.textAlign = "center";

      // VIRL wordmark
      ctx.fillStyle = "#FFFFFF";
      ctx.font = "400 120px 'Italiana', serif";
      ctx.fillText("VIRL", W/2, 240);

      // Tagline
      ctx.font = "italic 300 32px 'Jost', sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.6)";
      ctx.fillText("Finally, a strategy that sounds like you.", W/2, 296);

      // Eyebrow
      ctx.font = "700 28px 'Jost', sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.fillText("VIRAL POTENTIAL", W/2, 600);

      // Score number — extract numeric portion, color by tier
      var raw = String(score||"");
      var m = raw.match(/(\d+\.?\d*)/);
      var scoreText = m ? m[1] : raw;
      var n = m ? parseFloat(m[1]) : 0;
      var sColor = n>=8 ? "#10B981" : n>=6 ? "#F59E0B" : "#94A3B8";
      ctx.font = "400 360px 'Italiana', serif";
      ctx.fillStyle = sColor;
      ctx.fillText(scoreText, W/2, 920);

      // "out of 10"
      ctx.font = "300 44px 'Jost', sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.fillText("out of 10", W/2, 1000);

      // Platform pill
      if (platform) {
        var pillText = "→ "+platform;
        ctx.font = "600 36px 'Jost', sans-serif";
        var pillW = ctx.measureText(pillText).width + 80;
        var pillH = 78;
        var pillX = W/2 - pillW/2;
        var pillY = 1080;
        var pr = pillH/2;
        ctx.fillStyle = "rgba(59,130,246,0.28)";
        ctx.beginPath();
        ctx.moveTo(pillX+pr, pillY);
        ctx.arcTo(pillX+pillW, pillY, pillX+pillW, pillY+pillH, pr);
        ctx.arcTo(pillX+pillW, pillY+pillH, pillX, pillY+pillH, pr);
        ctx.arcTo(pillX, pillY+pillH, pillX, pillY, pr);
        ctx.arcTo(pillX, pillY, pillX+pillW, pillY, pr);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#FFFFFF";
        ctx.textBaseline = "middle";
        ctx.fillText(pillText, W/2, pillY+pillH/2);
        ctx.textBaseline = "alphabetic";
      }

      // Divider
      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W/2-160, 1260);
      ctx.lineTo(W/2+160, 1260);
      ctx.stroke();

      // Hook quote (truncate to 4 lines for layout safety)
      if (hook) {
        ctx.font = "italic 400 56px 'Italiana', serif";
        ctx.fillStyle = "#FFFFFF";
        var lines = wrapText(ctx, "“"+hook+"”", W-200);
        if (lines.length > 4) {
          lines = lines.slice(0,4);
          lines[3] = lines[3].replace(/\s*”?\s*$/, "") + "…”";
        }
        var lineH = 78;
        var startY = 1380;
        for (var i=0; i<lines.length; i++) {
          ctx.fillText(lines[i], W/2, startY + i*lineH);
        }
      }

      // Footer
      ctx.font = "600 32px 'Jost', sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.fillText("Scored by VIRL", W/2, H-180);
      ctx.font = "400 28px 'Jost', sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.fillText("govirl.ai", W/2, H-130);

      await new Promise(function(resolve) {
        c.toBlob(function(blob) {
          if (!blob) { resolve(); return; }
          var url = URL.createObjectURL(blob);
          var a = document.createElement("a");
          a.href = url;
          var pSlug = String(platform||"score").toLowerCase().replace(/[^a-z0-9]/g,"-");
          var sSlug = scoreText.replace(/[^0-9]/g,"");
          a.download = "virl-score-"+pSlug+(sSlug?"-"+sSlug:"")+".png";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(function(){URL.revokeObjectURL(url);}, 200);
          resolve();
        }, "image/png");
      });

      setDone(true);
      setTimeout(function(){setDone(false);}, 2000);
    } finally {
      setBusy(false);
    }
  }

  return (
    <button onClick={downloadCard} disabled={busy}
      style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",marginTop:12,padding:"8px 16px",background:done?B.greenSoft:B.skySoft,color:done?B.green:B.sky,border:"none",borderRadius:99,cursor:busy?"default":"pointer",opacity:busy?0.6:1,transition:"all .2s"}}>
      {busy?"Building image...":done?"Downloaded!":"Download story card"}
    </button>
  );
}

function VIRLScan({profile,onSaveCaption,userToken,onCreditsUsed,freshTrendsLeft,isPaid,daysUntilReset,onUpgrade}) {
  var [files,setFiles]       = useState([]);
  var [results,setResults]   = useState([]);
  // [EDIT] Immutable per-result update — used by EditableHook's onSave
  // for each scan card so a user-revised hook persists in component
  // state without re-running the scan. Results are transient (live for
  // the session) so no Supabase persistence needed.
  function updateResultAt(idx, updates) {
    setResults(function(prev){
      if (!Array.isArray(prev) || idx < 0 || idx >= prev.length) return prev;
      var next = prev.slice();
      next[idx] = Object.assign({}, prev[idx], updates);
      return next;
    });
  }
  var [scanning,setScanning] = useState(false);
  var [current,setCurrent]   = useState(0);
  // [SCAN-DETAILS] Optional free-text the creator can add before scanning —
  // any context they want reflected in the caption/hook/analysis (who or
  // what's in the shot, the occasion, the message they want to share). Sent
  // to the scan builders as params.details; transient like the rest of the
  // scan state (cleared when they pick a different file).
  var [details,setDetails]   = useState("");
  // [FRESH-TRENDS] Banner state — true after a scan that consumed the
  // user's weekly fresh-trends allowance (or fired Perplexity inline
  // for a paid user). Reset on each new scan attempt below.
  var [usedFreshTrends,setUsedFreshTrends] = useState(false);
  var [total,setTotal]       = useState(0);
  var [error,setError]       = useState("");
  var [consented,setConsented] = useState(function(){
    try { return localStorage.getItem("virl_scan_consent")==="true"; } catch(e) { return false; }
  });
  var inputRef = useRef(null);

  function scoreColor(s) {
    var m = String(s).match(/(\d+\.?\d*)/);
    var n = m ? parseFloat(m[1]) : 0;
    return n>=8?B.green:n>=6?B.amber:B.muted;
  }

  function handleConsent() {
    try { localStorage.setItem("virl_scan_consent","true"); } catch(e) {}
    setConsented(true);
  }

  function handleFiles(e) {
    var selected = Array.from(e.target.files||[]).slice(0,1);
    setFiles(selected); setResults([]); setError("");
  }

  function scan() {
    if (!files.length) return;
    setScanning(true); setResults([]); setError(""); setUsedFreshTrends(false);
    setTotal(files.length); setCurrent(0);

    // Process files sequentially. Prompt + JSON schema live server-side now;
    // the client just names the generationType and supplies the image bytes.
    var processAll = function() {
      var out = [];
      var idx = 0;
      var totalCost = 0;
      // [FRESH-TRENDS] First call in the batch may fire an inline
      // Perplexity call (paid users always, free users once per week
      // per the scan counter). Snapshot is cached locally and passed
      // to every subsequent call in the batch via opts.trendsSnapshot
      // so the whole batch shares one trend signal — one freebie
      // covers the entire scan, not per-image.
      var batchSnapshot = null;
      var batchUsedFresh = false;
      // [COST 1] Aggregate Anthropic usage across the scan batch so the
      // single scan_completed event carries the same telemetry shape as
      // single-call generations. truncated is OR'd — one truncation in the
      // batch is enough to flag the run as worth investigating.
      var totalUsage = {
        outputTokens: 0,
        cachedInputTokens: 0,
        uncachedInputTokens: 0,
        truncated: false,
        model: null,
      };
      function accumulateUsage(u) {
        if (!u) return;
        totalUsage.outputTokens        += u.outputTokens        || 0;
        totalUsage.cachedInputTokens   += u.cachedInputTokens   || 0;
        totalUsage.uncachedInputTokens += u.uncachedInputTokens || 0;
        if (u.truncated) totalUsage.truncated = true;
        if (u.model) totalUsage.model = u.model;
      }

      function processNext() {
        if (idx >= files.length) {
          setResults(out);
          setScanning(false);
          setUsedFreshTrends(batchUsedFresh);
          try {
            var scores = out.filter(function(r){return !r.error&&r.score;})
              .map(function(r){ var m=String(r.score).match(/(\d+\.?\d*)/); return m?parseFloat(m[1]):0; });
            var avg = scores.length ? Math.round((scores.reduce(function(a,b){return a+b;},0)/scores.length)*10)/10 : null;
            logEvent(window.__virlUserId||null,"scan_completed",{
              file_count: out.length,
              avg_score:  avg,
              outputTokens:        totalUsage.outputTokens,
              cachedInputTokens:   totalUsage.cachedInputTokens,
              uncachedInputTokens: totalUsage.uncachedInputTokens,
              truncated:           totalUsage.truncated,
              model:               totalUsage.model,
            });
          } catch(e){}
          // Server deducts per call; sum what it actually charged for the
          // optimistic credit-counter tick.
          if (onCreditsUsed && totalCost) onCreditsUsed({cost: totalCost});
          return;
        }

        var file = files[idx];
        idx++;
        setCurrent(idx);

        var isVideo = file.type.startsWith("video/");

        if (isVideo) {
          extractVideoFrame(file, 1)
            .then(function(fd) {
              return callAPI("scan_video_frame", { details: details }, { token: userToken, imageBase64: fd.b64, imageType: "image/jpeg", trendsSnapshot: batchSnapshot })
                .then(function(data) {
                  totalCost += data.cost || 0;
                  accumulateUsage(data && data.usage);
                  if (data && data.trendsSnapshot && !batchSnapshot) batchSnapshot = data.trendsSnapshot;
                  if (data && data.usedFreshTrends) batchUsedFresh = true;
                  var parsed = extractJSON(data.text);
                  if (parsed && parsed.score) {
                    out.push(Object.assign({name:file.name,isVideo:true,duration:fd.dur}, parsed));
                  } else {
                    out.push({name:file.name,isVideo:true,error:"Analysis returned an unexpected format. Try again or use a screenshot."});
                  }
                })
                .catch(function(e) {
                  out.push({name:file.name,isVideo:true,error:"Could not analyze this video: "+(e.message||"unknown error")+". Try screenshotting your best frame."});
                });
            })
            .catch(function() {
              out.push({name:file.name,isVideo:true,error:"Could not read this video file. Try screenshotting your best moment and scanning that instead."});
            })
            .then(function() {
              processNext();
            });
        } else {
          var imageUrl = URL.createObjectURL(file);
          // [SCAN-FIX] decodeAndResizeImage handles HEIC conversion +
          // re-encodes to JPEG at <=1568px. Pass img.mediaType (always
          // "image/jpeg") rather than file.type so the server never
          // sees an unsupported mime. The catch block now surfaces
          // the helper's user-readable error directly — no need for
          // the old generic "try screenshotting" hint.
          decodeAndResizeImage(file)
            .then(function(img) {
              return callAPI("scan_image", { details: details }, { token: userToken, imageBase64: img.b64, imageType: img.mediaType, trendsSnapshot: batchSnapshot });
            })
            .then(function(data) {
              totalCost += data.cost || 0;
              accumulateUsage(data && data.usage);
              if (data && data.trendsSnapshot && !batchSnapshot) batchSnapshot = data.trendsSnapshot;
              if (data && data.usedFreshTrends) batchUsedFresh = true;
              var parsed = extractJSON(data.text);
              if (parsed && parsed.score) {
                out.push(Object.assign({name:file.name,url:imageUrl}, parsed));
              } else {
                out.push({name:file.name,url:imageUrl,error:"Analysis returned an unexpected format. Try again."});
              }
            })
            .catch(function(e) {
              out.push({name:file.name,url:imageUrl,error:(e && e.message) || "Could not analyze this image. Try saving it as JPEG."});
            })
            .then(function() {
              processNext();
            });
        }
      }

      processNext();
    };

    processAll();
  }

  if (!consented) return (
    <div style={{background:B.card,borderRadius:16,padding:"32px 28px",textAlign:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
      <div style={{fontFamily:"'Italiana',serif",fontSize:32,color:B.sky,marginBottom:12}}>{"📷"}</div>
      <div style={{fontFamily:"'Italiana',serif",fontSize:22,color:B.ink,marginBottom:12}}>Before you scan</div>
      <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.muted,lineHeight:1.75,marginBottom:24}}>
        When you upload a photo or video, it is sent to the Anthropic API for analysis and is not stored by VIRL beyond your session. By continuing you consent to this processing.
      </div>
      <button onClick={handleConsent}
        style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"14px 32px",background:B.blue,color:B.white,border:"none",borderRadius:99,cursor:"pointer",boxShadow:"0 4px 14px rgba(37,99,235,0.3)"}}>
        I understand - start scanning
      </button>
    </div>
  );

  return (
    <div>
      <SherpaTip>Drop a photo or video and VIRL scores it out of 10 for viral potential, recommends the best platform, and writes a ready-to-post caption you can edit and save to your Vault.</SherpaTip>
      <div style={{background:B.card,border:"2px dashed "+B.border,borderRadius:20,padding:"32px 24px",textAlign:"center",marginBottom:8,cursor:"pointer"}}
        onClick={function(){inputRef.current&&inputRef.current.click();}}>
        <div style={{fontFamily:"'Italiana',serif",fontSize:32,color:B.sky,marginBottom:8}}>{"📷"}</div>
        <div style={{fontFamily:"'Italiana',serif",fontSize:22,color:B.ink,marginBottom:6}}>Select a photo or video</div>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,fontStyle:"italic",color:B.muted,marginBottom:16}}>VIRL scores it for viral potential, recommends the best platform, and writes a ready-to-post caption.</div>
        <div style={{display:"inline-block",fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"12px 28px",background:B.blue,color:B.white,cursor:"pointer",borderRadius:99}}>
          Choose file
        </div>
        <input ref={inputRef} type="file" accept="image/*,video/*" onChange={handleFiles} style={{display:"none"}}/>
      </div>

      {files.length>0&&!scanning&&!results.length&&(
        <div style={{background:B.card,borderRadius:14,padding:"16px 20px",marginBottom:8}}>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:B.muted,marginBottom:12}}>
            Selected
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
            {files.map(function(f,idx){return (
              <div key={idx} style={{background:B.bg,borderRadius:99,padding:"5px 12px",fontFamily:"'Jost',sans-serif",fontSize:12,color:B.sub}}>
                {(f.type.startsWith("video/")?"🎬 ":"🖼 ")+f.name.slice(0,24)}
              </div>
            );})}
          </div>
          {/* [SCAN-DETAILS] Optional context box. Anything the creator types
               here is woven into the caption/hook/analysis server-side so the
               output reflects what's actually going on in the shot — names,
               the occasion, the message they want to land — rather than VIRL
               guessing from pixels alone. */}
          <div style={{marginBottom:16}}>
            <label htmlFor="virl-scan-details" style={{display:"block",fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:B.muted,marginBottom:8}}>
              Anything you want to share? <span style={{textTransform:"none",letterSpacing:0,fontWeight:300,fontStyle:"italic",color:B.muted}}>(optional)</span>
            </label>
            <textarea id="virl-scan-details" value={details}
              onChange={function(e){ setDetails(e.target.value); }}
              maxLength={600}
              placeholder="Details to support the post — who or what's in it, the occasion, the message or feeling you want to share, a product or location to name…"
              rows={3}
              style={{width:"100%",fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.ink,background:B.bg,border:"1px solid "+B.border,borderRadius:12,padding:"12px 14px",lineHeight:1.6,outline:"none",resize:"vertical",boxSizing:"border-box"}}/>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,fontStyle:"italic",color:B.muted,marginTop:6}}>
              VIRL uses this to shape the caption and won't claim anything the photo doesn't show.
            </div>
          </div>
          <FreshTrendsChip
            kind="scan"
            remaining={freshTrendsLeft}
            isPaid={isPaid}
            daysUntilReset={daysUntilReset}
            onUpgrade={onUpgrade}/>
          <GenBtn onClick={scan} loading={scanning}>Scan for viral potential</GenBtn>
        </div>
      )}
      {results.length > 0 && !scanning && usedFreshTrends && !isPaid && (
        <FreshTrendsBanner kind="scan" daysUntilReset={daysUntilReset} onUpgrade={onUpgrade}/>
      )}

      {scanning&&(
        <div style={{background:B.card,borderRadius:14,padding:"24px",textAlign:"center",marginBottom:8}}>
          <Spinner/>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.muted,marginTop:12}}>
            {"Analyzing "+(total>1?"file "+current+" of "+total:"your file")+" - about 30-60 seconds..."}
          </div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,marginTop:4,fontStyle:"italic"}}>
            Sit tight while VIRL checks the viral potential.
          </div>
        </div>
      )}

      <ErrBox msg={error}/>

      {results.length>0&&!scanning&&(
        <button onClick={function(){setFiles([]);setResults([]);setError("");}}
          style={{width:"100%",fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",padding:"12px 18px",background:B.bg,color:B.muted,border:"1px solid "+B.border,cursor:"pointer",marginBottom:8,borderRadius:14}}>
          Scan a different file
        </button>
      )}

      {results.map(function(r,idx){return (
        <div key={idx} className="su" style={{background:B.card,borderRadius:14,padding:"22px",marginBottom:8,animationDelay:(idx*0.08)+"s",borderLeft:"3px solid "+(r.error?B.border:B.blue)}}>
          {r.error?(
            <div>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:600,color:B.ink,marginBottom:6}}>{r.name}</div>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,color:B.muted,marginBottom:10}}>{r.error}</div>
              <div style={{background:B.navySoft,borderRadius:10,padding:"8px 12px",fontFamily:"'Jost',sans-serif",fontSize:12,color:B.navy}}>
                Tip: open in Photos, take a screenshot, then scan the screenshot instead.
              </div>
            </div>
          ):(
            <div>
              {r.isVideo&&(
                <div style={{background:B.navySoft,borderRadius:10,padding:"8px 12px",marginBottom:12,fontFamily:"'Jost',sans-serif",fontSize:12,color:B.navy}}>
                  {"🎬 Video analyzed from best frame"+(r.duration?" ("+Math.round(r.duration)+"s)":"")+(r.thumbnailNote?" - "+r.thumbnailNote:"")}
                </div>
              )}
              {r.url&&<img src={r.url} alt={r.name} style={{width:"100%",maxHeight:200,objectFit:"cover",marginBottom:14,borderRadius:10,display:"block"}}/>}
              {r.analysis&&<div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,fontStyle:"italic",color:B.muted,lineHeight:1.7,marginBottom:14,padding:"10px 14px",background:B.bg,borderRadius:10}}>{r.analysis}</div>}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.muted,marginBottom:4}}>Viral potential</div>
                  <div style={{fontFamily:"'Italiana',serif",fontSize:44,color:scoreColor(r.score),lineHeight:1}}>{r.score}</div>
                </div>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,padding:"6px 16px",background:B.navySoft,color:B.navy,borderRadius:99}}>{"→ "+r.platform}</div>
              </div>
              <EditableHook
                value={r.hook}
                fontSize={18}
                onSave={function(next){ updateResultAt(idx, {hook: next}); }}/>

      {!files.length&&!results.length&&(

    </div>
  );
}
