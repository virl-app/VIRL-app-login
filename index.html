      if (!res.ok) {
        const err = await res.json().catch(function(){return{};});
        console.error("Admin fetch failed:", res.status, err);
        setAdminLoading(false);
        return;
      }
      const {credits:creditsRaw, events:eventsRaw} = await res.json();
      const credits = Array.isArray(creditsRaw) ? creditsRaw : [];
      const events = Array.isArray(eventsRaw) ? eventsRaw : [];

      // Aggregate user stats
      const total = credits.length;
      const paid = credits.filter(function(r){return r.plan==="standard"||r.plan==="founding";}).length;
      const free = credits.filter(function(r){return r.plan==="free";}).length;
      const mrr = paid * 25;

      // Aggregate event stats
      const evArr = events; // already guarded above
      function countEv(name) { return evArr.filter(function(e){return e.event_name===name;}).length; }
      function uniqueUsers(name) { return new Set(evArr.filter(function(e){return e.event_name===name;}).map(function(e){return e.user_id;})).size; }

      const planEvents = evArr.filter(function(e){return e.event_name==="plan_generated";});

      const avgScore = scanEvents.length ? (scanEvents.reduce(function(sum,e){

        }

  // resetting, since plans rotate based on signup date, not the calendar
  // week. daysUntilReset is computed above from sbCredits.reset_at.
  var cycleEndingSoon = daysUntilReset != null && daysUntilReset <= 1;
  // [RESULTS-OVERHAUL] unloggedCards now includes last week's plan too,
  // not just this week's, so the batch-log modal covers everything that
  // still needs results. Sorted: current week first, then last week,
  // so the modal reads chronologically when the user opens it.
  var thisWeekUnlogged = (cards||[]).filter(function(c){
    if (!c || !c.title) return false;
    var id = c.title + c.day;
    return !results.some(function(r){ return r.id === id; });
  });
  var lastWeekUnlogged = (lastWeekPlan && Array.isArray(lastWeekPlan.cards) ? lastWeekPlan.cards : []).filter(function(c){
    if (!c || !c.title) return false;
    var id = c.title + c.day;
    return !results.some(function(r){ return r.id === id; });
  });
  var unloggedCards = thisWeekUnlogged.concat(lastWeekUnlogged);
  var showSundayNudge = cycleEndingSoon && cards && cards.length>0 && unloggedCards.length>0 && !sundayNudgeDismissed;

  // Auto-show upgrade modal when trial expires
  useEffect(function() {
    if (trialExpired && !isFoundingOrPro) {
      setUpgradeReason("trial");
      setShowUpgrade(true);
    }
  }, [trialExpired, isFoundingOrPro]);

  // [CHANGE 2b] Mark sessionStorage when the post-plan nudge becomes visible
  // so a page reload in the same session won't show it again.
  useEffect(function() {
    if (cards && !isFoundingOrPro && !trialExpired && !planNudgeDismissed) {
      try { sessionStorage.setItem("virl_plan_nudge_shown","1"); } catch(e) {}
    }
  }, [cards, isFoundingOrPro, trialExpired, planNudgeDismissed]);

  useEffect(function(){
    save({platforms,niche,goal,formats,followers,vault,results,profile});
  },[platforms,niche,goal,formats,followers,vault,results,profile]);

  // Persist vault + results to Supabase whenever they change. Gated on
  // userDataHydrated so the empty initial state of an incognito browser
  // can't overwrite a fresh user's remote data during the load window.
  useEffect(function() {
    if (!session || !userDataHydrated) return;
    saveUserDataToSupabase(session.user.id, vault, results);
    saveCachedUserData(session.user.id, vault, results);
  }, [vault, results, session, userDataHydrated]);

  const isAdmin = session&&session.user&&session.user.email==="laurenannedoty@gmail.com";
  const TABS = [
    {key:"profile", label:"My Profile"},
    {key:"plan",    label:"VIRL Plan"},
    {key:"caption", label:"VIRL Captions"},
    // [VIRL-POSTS-TAB] Dedicated surface for long-form text content
    // (LinkedIn long posts, blog posts). Sits between Captions and
    // Scan so the writing surfaces cluster together. Built on the
    // long_post + blog_post generation types — same prompt builders
    // the Plan tab's "Write Full Post" action uses, just driven by
    // a topic + supporting points instead of a plan card seed.
    {key:"posts",   label:"VIRL Posts"},
    {key:"scan",    label:"VIRL Scan"},
    // Algorithm tab removed — strategic insights moving inline. Keep
    // this commented for easy restoration:
    // {key:"algo",    label:"Algorithm"},
    {key:"vault",   label:"Vault ("+vault.length+")"},
    {key:"results", label:"Results"},
    // [PRICING 3] Founder Circle tab — only visible to members. Includes
    // Office Hours date, direct email to founder@govirl.ai, and the user's
    // Founder Position number.
    ...(isFounderCircle?[{key:"circle", label:"Founder Circle"}]:[]),
    ...(isAdmin?[{key:"admin", label:"Dashboard"}]:[]),
  ];

  // Vault patterns drive a small UI ("Based on your N saved posts...") and
  // are mirrored server-side from the user_data row to ground the plan
  // prompt — see api/_lib/prompts.js. The variable stays here for the UI
  // only; nothing in the prompt construction lives client-side anymore.
  var vaultPatterns = getVaultPatterns(vault);

  // Toggle a card index in/out of the replace-set (used by per-card
  // Keep/Replace pills when editMode is on). Uses a fresh Set instance
  // so React re-renders the affected cards.
  function toggleReplaceAt(i) {
    setReplaceSet(function (prev) {
      var next = new Set(prev);
      if (next.has(i)) next.delete(i); else next.add(i);
      return next;
    });
  }

  function enterEditMode() {
    setReplaceSet(new Set());
    setEditMode(true);
  }
  function cancelEditMode() {
    setEditMode(false);
    setReplaceSet(new Set());
  }

  // Per-card Regenerate. Reuses the partial-regen pipeline for a single
  // card index so the user can swap one post without entering Edit-plan
  // mode and hand-selecting it. The card shows the same streaming skeleton
  // (via partialReplacing) while its replacement arrives, and it costs the
  // same single plan_partial credit as the bulk flow.
  function regenerateCardAt(i) {
    if (typeof i !== "number") return;
    runPartialRegen([i]);
  }

  // Partial regeneration: rewrite only the cards the user marked for
  // replacement, keeping the rest (and the strategy) intact. Streams via
  // the same SSE pipeline as full plan generation; the parser is started
  // in partial mode so it only emits cards (no strategy/stats). As each
  // new card arrives we splice it into the cards array at the next
  // pending replacement index. When the user has selected ALL cards we
  // fall through to a full regen instead — same cost, plus the user gets
  // a fresh strategy and stats out of it.
  function runPartialRegen(explicitIndices) {
    if (!cards || !cards.length) return;
    // Source of indices to regenerate. The per-card Regenerate button
    // passes an explicit [idx]; the Edit-plan action bar calls with no
    // argument (or the click event) and falls back to the replace-set.
    // The Array.isArray guard is what lets onClick={runPartialRegen} keep
    // working — the click event isn't an array, so it routes to replaceSet.
    var indices = Array.isArray(explicitIndices)
      ? explicitIndices.filter(function (i) { return typeof i === "number" && i >= 0 && i < cards.length; })
      : Array.from(replaceSet);
    if (!indices.length) return;
    // A partial regen is already streaming — ignore re-entrant taps.
    if (partialLoading) return;

    // Selecting every card → just do a full regen; user gets strategy +
    // stats refreshed too, and the cost matches their intent.
    if (indices.length === cards.length) {
      cancelEditMode();
      generate();
      return;
    }

    if (!isFoundingOrPro && trialExpired) {
      setUpgradeReason("trial"); setShowUpgrade(true); return;
    }

    var sorted = indices.slice().sort(function (a, b) { return a - b; });
    // Set of indices being replaced this run — derived from `indices` (not
    // replaceSet) so the per-card Regenerate path, which never touches
    // replaceSet, still keeps the right cards as context.
    var replaceIdxSet = new Set(sorted);
    var replaceDayLabels = sorted.map(function (i) { return cards[i] && cards[i].day; }).filter(Boolean);
    // [REGEN-PLATFORM-FIX] Send each replaced slot's own platform/format so
    // the server keeps the regenerated card on the SAME channel/format as
    // the card it swaps out (and never drifts to an unselected platform like
    // LinkedIn). Same order as `sorted` so it lines up with the streamed
    // replacements.
    var replaceSlots = sorted.map(function (i) {
      var c = cards[i] || {};
      return { day: c.day || null, platform: c.platform || null, format: c.format || null };
    }).filter(function (s) { return s.day; });
    var keptCards = cards
      .map(function (c, i) { return { c: c, i: i }; })
      .filter(function (x) { return !replaceIdxSet.has(x.i) && x.c; })
      .map(function (x) {
        return {
          day:      x.c.day      || null,
          platform: x.c.platform || null,
          format:   x.c.format   || null,
          title:    x.c.title    || "",
        };
      });

    setPartialLoading(true);
    setPartialReplacing(new Set(sorted));
    setError("");
    refreshCredits();

    var parser = createStreamingPlanParser({ mode: "partial" });
    // Working copy of the cards array; we splice replacements in by
    // index order as they stream and snapshot via setCards so React
    // re-renders one card at a time.
    var working = cards.slice();
    var nextSlot = 0;

    consumePlanStream("plan_partial", {
      platforms:    platforms,
      niche:        niche,
      goal:         goal,
      formats:      formats,
      followers:    followers,
      context:      context || "",
      weekContext:  weekContext || "",
      strategy:     strategy || null,
      keptCards:    keptCards,
      replaceDayLabels: replaceDayLabels,
      replaceSlots: replaceSlots,
      // Skip plan_history's prior-week lookup — this is a same-week
      // edit, not a new week.
      currentWeekStart: weekStartISO(Date.now()),
    }, { token: userToken, trendsSnapshot: planTrendsSnapshot }, {
      onText: function (delta) {
        parser.push(delta, {
          onCard: function (card) {
            if (nextSlot >= sorted.length) return; // server emitted extra — ignore
            var targetIdx = sorted[nextSlot];
            working = working.slice();
            working[targetIdx] = card;
            setCards(working);
            // Reveal this slot's new card by removing it from the
            // replacing-set so the skeleton clears.
            setPartialReplacing(function (prev) {
              var next = new Set(prev);
              next.delete(targetIdx);
              return next;
            });
            nextSlot++;
          },
        });
      },
      onReset: function () {
        // Streaming retry kicked in (server hit max_tokens). Restart the
        // partial-merge state so the second pass's cards land in the
        // right slots from scratch.
        parser = createStreamingPlanParser({ mode: "partial" });
        working = cards.slice();
        nextSlot = 0;
        setPartialReplacing(new Set(sorted));
      },
    }).then(function (result) {
      var finalized = parser.finalize();
      var parsed = finalized.parsed;
      var parsedCards = (parsed && Array.isArray(parsed.cards)) ? parsed.cards : null;
      // Final reconciliation: if the streaming pass missed cards (or got
      // them in a different order), trust the finalized parse over the
      // progressive splice.
      if (parsedCards && parsedCards.length === sorted.length) {
        var finalWorking = cards.slice();
        for (var k = 0; k < sorted.length; k++) finalWorking[sorted[k]] = parsedCards[k];
        setCards(finalWorking);
        working = finalWorking;
      } else if (!parsedCards || parsedCards.length === 0) {
        // Stream finished with no usable cards (truncation past the retry,
        // or upstream error already shown via the error callback).
        // Roll back the skeletons so the user sees the original plan.
        setCards(cards);
        setError("VIRL got cut off mid-thought. Tap Regenerate selected to try again.");
        return;
      }

      // Persist the merged plan. plan_history upserts by week_start so
      // the same week's row is updated with the new card mix.
      var planExpiresAt = computePlanExpiry(sbCredits);
      try {
        var current = JSON.parse(localStorage.getItem(KEY) || "{}");
        current.plan = working;
        current.planStats = stats;
        current.planStrategy = strategy;
        current.planExpiresAt = planExpiresAt;
        localStorage.setItem(KEY, JSON.stringify(current));
      } catch (e) {}
      if (session) savePlanToSupabase(session.user.id, working, stats, planExpiresAt, strategy, planTrendsSnapshot, restDayTips);

      try {
        var meta = (result && result.meta) || {};
        var planUsage = meta.usage || {};
        logEvent(session && session.user && session.user.id, "plan_partial_regen", {
          weekStart:           weekStartISO(Date.now()),
          replacedCount:       sorted.length,
          totalCards:          cards.length,
          replacedDayLabels:   replaceDayLabels,
          outputTokens:        planUsage.outputTokens        || 0,
          cachedInputTokens:   planUsage.cachedInputTokens   || 0,
          uncachedInputTokens: planUsage.uncachedInputTokens || 0,
          truncated:           !!planUsage.truncated,
          retried:             !!planUsage.retried,
          model:               planUsage.model || null,
        });
      } catch (e) {}

      cancelEditMode();
      // [PREMIUM 10] Optimistic credit tick — server already deducted
      // CREDIT_COSTS.plan_partial (1). The refresh below reconciles.
      refreshCredits({ cost: 1 });
    }).catch(function (err) {
      setError((err && err.message) || "Couldn't regenerate the selected cards. Try again in a moment.");
      // Clear skeletons on failure so the user sees their unchanged plan.
      setCards(cards);
    }).then(function () {
      setPartialLoading(false);
      setPartialReplacing(new Set());
    });
  }

  // Re-frame the current week with a different strategic angle. Cards
  // stay; only thesis / optimizing_for / audience_read / success_metric /
  // the_bet rewrite. Non-streaming because the output is ~5 short fields.
  function regenerateStrategy() {
    if (!cards || !cards.length || !strategy) return;
    if (!isFoundingOrPro && trialExpired) {
      setUpgradeReason("trial"); setShowUpgrade(true); return;
    }
    setStrategyRegenLoading(true);
    setError("");
    // Send only the per-card summary the server needs — no hashtags,
    // descriptions, or format-specific bodies. The condensed shape
    // keeps the input small even on a 14-card plan.
    var condensedCards = (cards || []).map(function (c) {
      return {
        day:      c && c.day      ? c.day      : null,
        platform: c && c.platform ? c.platform : null,
        format:   c && c.format   ? c.format   : null,
        title:    c && c.title    ? c.title    : "",
      };
    });
    callAPI("plan_strategy", {
      cards:    condensedCards,
      strategy: strategy,
    }, { token: userToken, trendsSnapshot: planTrendsSnapshot }).then(function (data) {
      var parsed = extractJSON(data && data.text);
      var hasFields = parsed && (parsed.thesis || parsed.the_bet || parsed.optimizing_for || parsed.audience_read || parsed.success_metric);
      if (!hasFields) {
        setError("VIRL couldn't find a different angle this time. Try again in a moment.");
        return;
      }
      var nextStrategy = {
        thesis:         parsed.thesis         || strategy.thesis         || "",
        optimizing_for: parsed.optimizing_for || strategy.optimizing_for || "",
        audience_read:  parsed.audience_read  || strategy.audience_read  || "",
        success_metric: parsed.success_metric || strategy.success_metric || "",
        the_bet:        parsed.the_bet        || strategy.the_bet        || "",
      };
      setStrategy(nextStrategy);

      var planExpiresAt = computePlanExpiry(sbCredits);
      try {
        var current = JSON.parse(localStorage.getItem(KEY) || "{}");
        current.planStrategy = nextStrategy;
        current.planExpiresAt = planExpiresAt;
        localStorage.setItem(KEY, JSON.stringify(current));
      } catch (e) {}
      if (session) savePlanToSupabase(session.user.id, cards, stats, planExpiresAt, nextStrategy, planTrendsSnapshot, restDayTips);

      try {
        var usage = (data && data.usage) || {};
        logEvent(session && session.user && session.user.id, "plan_strategy_regen", {
          weekStart:           weekStartISO(Date.now()),
          outputTokens:        usage.outputTokens        || 0,
          cachedInputTokens:   usage.cachedInputTokens   || 0,
          uncachedInputTokens: usage.uncachedInputTokens || 0,
          truncated:           !!usage.truncated,
          model:               usage.model || null,
        });
      } catch (e) {}

      refreshCredits({ cost: (data && data.cost) || 1 });
    }).catch(function (err) {
      setError((err && err.message) || "Couldn't regenerate the strategy. Try again in a moment.");
    }).then(function () {
      setStrategyRegenLoading(false);
    });
  }

  function generate(opts) {
    opts = opts || {};
    if (!platforms.length||!formats.length) return;
    // Block generation if trial expired or out of credits
    if (!isFoundingOrPro && trialExpired) {
      setUpgradeReason("trial"); setShowUpgrade(true); return;
    }
    refreshCredits();
    // [PERF 3] Clear strategy too so a previous week's strategy banner
    // doesn't linger above the spinner while the new one is in flight.
    // Spinner is gated on (loading && !cards), so the first streamed card
    // hides it naturally; loading stays true until the stream completes
    // so the Generate button can't be double-clicked mid-stream.
    setLoading(true); setError(""); setCards(null); setStats(null); setStrategy(null); setRestDayTips(null);
    // [STREAM-RECOVERY] Hold the screen awake for the duration of the
    // generation so iOS can't auto-lock and kill the SSE. Released in
    // .finally() below. Re-requested on auto-retry too, because Wake
    // Lock is automatically released when the tab is hidden.
    var wakeLockSentinel = null;
    requestWakeLock().then(function(s){ wakeLockSentinel = s; });
    // [STREAM-RECOVERY] Set to true if .catch schedules an automatic
    // retry; .finally then skips setLoading(false) so the spinner stays
    // up while we wait for the user to return to the tab. The retry's
    // own generate() call will own the loading lifecycle from there.
    var retryScheduled = false;
    // [PLAN-JOB-RECOVERY] Mint a UUID for this generation so the server
    // can persist the result to plan_jobs. On stream interruption we
    // poll /api/plan-status with this id BEFORE falling back to a fresh
    // generation — if the server already finished, we render that
    // result instead of paying for a second Anthropic call.
    var planJobId = makePlanJobId();
    // [FRESH-TRENDS] Reset the per-plan snapshot + banner flag — they'll
    // be repopulated from the streaming meta event if this generation
    // consumed an inline Perplexity call.
    setPlanTrendsSnapshot(null); setPlanUsedFreshTrends(false);
    // Clear edit-mode state — selections were against the old cards
    // array, so they'd point at the wrong slots once the new plan
    // streams in.
    setEditMode(false); setReplaceSet(new Set()); setPartialReplacing(new Set());
    var appliedCost = 0;
    var parser = createStreamingPlanParser();
    var progressiveCards = [];

    // [PLAN-JOB-RECOVERY] Shared render-and-persist path. Streaming
    // success uses parser.finalize().parsed; recovery uses
    // JSON.parse(result_text). Both reach the same state-setting +
    // localStorage + Supabase + analytics fan-out.
    function applyFinalPlan(parsed, finalText, meta) {
      meta = meta || {};
      appliedCost = meta.cost || 0;
      var freshSnapshot = meta.trendsSnapshot || null;
      var usedFresh     = !!meta.usedFreshTrends;
      setPlanTrendsSnapshot(freshSnapshot);
      setPlanUsedFreshTrends(usedFresh);

      var data = { text: finalText, cost: meta.cost, usage: meta.usage };
      var parsedCards    = parsed && Array.isArray(parsed.cards) ? parsed.cards : null;
      var parsedStrategy = parsed && parsed.strategy && typeof parsed.strategy === "object" ? parsed.strategy : null;
      var parsedStats    = parsed && parsed.stats    && typeof parsed.stats    === "object" ? parsed.stats    : null;
      var parsedTips     = parsed && Array.isArray(parsed.restDayTips) ? parsed.restDayTips : null;
      if (!(parsedCards && parsedCards.length > 0)) {
        setCards(null); setStats(null); setStrategy(null); setRestDayTips(null);
        setError("VIRL got cut off mid-thought. Tap Generate again - it usually works on the second try. If this keeps happening, try fewer platforms or shorter answers.");
        return;
      }
      setCards(parsedCards);
      if (parsedStats)    setStats(parsedStats);
      if (parsedStrategy) setStrategy(parsedStrategy);
      setRestDayTips(parsedTips);
      try {
        var trimmed = (weekContext || "").trim().slice(0, 1200);
        if (trimmed) {
          localStorage.setItem("virl_last_week_context", trimmed);
          setLastWeekContext(trimmed);
        }
      } catch (e) {}
      try {
        var prevCount = parseInt(localStorage.getItem("virl_plans_completed") || "0", 10);
        var newCount  = (isNaN(prevCount) ? 0 : prevCount) + 1;
        localStorage.setItem("virl_plans_completed", String(newCount));
        if (session && (newCount === 3 || newCount === 7 || newCount === 15)) {
          if (localStorage.getItem("virl_referral_shown_" + newCount) !== "1") {
            setReferralMilestone(newCount);
          }
        }
        if (newCount === 1 && localStorage.getItem("virl_first_plan_celebrated") !== "1") {
          setShowFirstPlanCelebration(true);
        }
        if (newCount === 1 && localStorage.getItem("virl_first_plan_event_fired") !== "1") {
          try { localStorage.setItem("virl_first_plan_event_fired", "1"); } catch(e2) {}
          fireLoopsEvent("firstPlanGenerated", {
            firstName: (profile && profile.name) || "",
            planCount: 1,
          });
        }
        if (newCount === 5 && localStorage.getItem("virl_milestone_5_seen") !== "1") {
          setShowMilestone5(true);
        }
        if (newCount === 5 && localStorage.getItem("virl_milestone_5_fired") !== "1") {
          try { localStorage.setItem("virl_milestone_5_fired", "1"); } catch(e2) {}
          fireLoopsEvent("fivePlansMilestone", {
            firstName: (profile && profile.name) || "",
            planCount: 5,
          });
        }
        if (newCount === 10 && localStorage.getItem("virl_milestone_10_fired") !== "1") {
          try { localStorage.setItem("virl_milestone_10_fired", "1"); } catch(e2) {}
          fireLoopsEvent("tenPlansMilestone", {
            firstName: (profile && profile.name) || "",
            planCount: 10,
          });
        }
      } catch(e) {}
      var planExpiresAt = computePlanExpiry(sbCredits);
      try {
        var current = JSON.parse(localStorage.getItem(KEY)||"{}");
        current.plan = parsedCards;
        current.planStats = parsedStats;
        current.planStrategy = parsedStrategy;
        current.planExpiresAt = planExpiresAt;
        localStorage.setItem(KEY, JSON.stringify(current));
      } catch(e){}
      if (session) savePlanToSupabase(session.user.id, parsedCards, parsedStats, planExpiresAt, parsedStrategy, freshSnapshot, parsedTips);
      try {
        var weekStart = (function(){
          try { return new Date().toISOString().slice(0, 10); }
          catch(e){ return null; }
        })();
        var planUsage = (data && data.usage) || {};
        logEvent(session && session.user && session.user.id, "plan_generated", {
          weekStart: weekStart,
          platforms: platforms,
          niche:     niche,
          goal:      goal,
          formats:   formats,
          isRegen:   !!cards,
          cardCount: parsedCards.length,
          outputTokens:        planUsage.outputTokens        || 0,
          cachedInputTokens:   planUsage.cachedInputTokens   || 0,
          uncachedInputTokens: planUsage.uncachedInputTokens || 0,
          truncated:           !!planUsage.truncated,
          model:               planUsage.model || null,
        });
        if (remixSource) {
          logEvent(session && session.user && session.user.id, "plan_remixed_from_prior", {
            source:    remixSource.kind,
            sourceId:  remixSource.sourceId || null,
            platform:  remixSource.platform || null,
            weekStart: weekStart,
          });
          setRemixSource(null);
        }
      } catch(e){}
    }
    consumePlanStream("plan", {
      platforms:    platforms,
      niche:        niche,
      goal:         goal,
      formats:      formats,
      followers:    followers,
      context:      context || "",
      // [AUDIENCE 1] Week-of business context. Server-side prompt
      // builder appends a dedicated section so the LLM treats this as
      // a hard constraint, not generic flavour.
      weekContext:  weekContext || "",
      isRegen:      !!cards,
      // Same Monday-of-this-week key the client uses when upserting
      // plan_history. The server uses it to exclude this row from the
      // history it loads, so a same-week regenerate is treated as
      // "still week N" instead of bumping to week N+1.
      currentWeekStart: weekStartISO(Date.now()),
      // [HOLIDAY-PICKER] Observance ids the user opted in to via the
      // picker above the Generate button. Server resolves these to
      // dates against the same window the picker showed (via
      // clientNow.iso below). Empty array → no observance block in
      // the prompt at all.
      observances:      selectedObservances,
      // Anchor for date resolution: the server uses this to compute
      // which observance dates fall in the 7-day plan window, so the
      // dates it sees match what the picker rendered.
      clientNow:        { iso: new Date().toISOString() },
      // [PLAN-JOB-RECOVERY] UUID the server uses to persist the result
      // in plan_jobs. Mirrored back into params for /api/plan-status
      // polling from the .catch handler.
      planJobId:        planJobId,
    }, { token: userToken }, {
      onText: function (delta) {
        parser.push(delta, {
          onStrategy: function (s) { setStrategy(s); },
          onCard:     function (card) {
            progressiveCards.push(card);
            // New array reference so React re-renders the list.
            setCards(progressiveCards.slice());
          },
          onStats:    function (s) { setStats(s); },
        });
      },
      // Server hit max_tokens on the first attempt and is retrying with a
      // larger budget. Discard the partial plan rendered so far so the
      // retry stream renders against a clean slate.
      onReset: function () {
        parser = createStreamingPlanParser();
        progressiveCards = [];
        setCards(null); setStrategy(null); setStats(null); setRestDayTips(null);
      },
    }).then(function (result) {
      var meta = (result && result.meta) || {};
      // Final parse on the full accumulated buffer is the canonical source
      // of truth — overrides anything the streaming parser may have missed.
      // Any persistence / logging downstream uses these values, not the
      // progressive state, so the saved plan can never diverge from what
      // the model actually produced.
      var finalized = parser.finalize();
      applyFinalPlan(finalized.parsed, finalized.fullText, meta);
    }).then(function(){
      // Refresh credits from Supabase after successful generation. Pass the
      // cost so the displayed counter ticks down immediately rather than
      // waiting on the Supabase round-trip (which can be slow or stale-cached
      // in private/incognito browsers). The follow-up GET reconciles to the
      // canonical server value.
      refreshCredits({cost: appliedCost});
    }).catch(function(e){
      // [PERF 3] Mid-stream failure (network drop, upstream error). Wipe
      // anything that may have streamed in so the error toast isn't
      // sitting on top of a half-rendered plan.
      setCards(null); setStats(null); setStrategy(null); setRestDayTips(null);
      var isStreamErr = e && e.message && /stream interrupted/i.test(e.message);

      // [PLAN-JOB-RECOVERY] On stream interruption, FIRST check whether
      // the server already finished the call and persisted the result.
      // Mobile SSE drops are common when the tab backgrounds, but the
      // Vercel function usually keeps running and Anthropic still bills
      // the call — so polling plan-status BEFORE kicking off a fresh
      // generation can save the user a paid re-generation AND deliver
      // the exact plan that was in flight.
      //
      // Outcomes:
      //   - poll returns complete: render via applyFinalPlan, done
      //   - poll returns error:    surface the server-side error
      //   - poll returns null:     fall through to the auto-retry path
      //     below (server didn't finish, or the row was never written
      //     because the original handler died before INSERT)
      if (isStreamErr && !opts.isAutoRetry && planJobId && userToken) {
        retryScheduled = true; // keep spinner up while we poll
        pollPlanJob(planJobId, userToken).then(function(body){
          if (body && body.status === "complete" && body.result_text) {
            var parsed = null;
            try { parsed = JSON.parse(body.result_text); } catch(e2) {}
            if (parsed && Array.isArray(parsed.cards) && parsed.cards.length > 0) {
              // [PLAN-JOB-RECOVERY] meta shape mirrors what the streaming
              // path's onMeta would have surfaced. Field names align so
              // applyFinalPlan can't tell which source it came from.
              applyFinalPlan(parsed, body.result_text, {
                cost:             body.cost,
                usage:            body.usage,
                trendsSnapshot:   body.trends_snapshot,
                usedFreshTrends:  body.used_fresh_trends,
              });
              refreshCredits({ cost: appliedCost });
              setLoading(false);
              releaseWakeLock(wakeLockSentinel);
              return;
            }
          }
          if (body && body.status === "error") {
            setError("VIRL hit an error generating this plan: " + (body.error_msg || "unknown") + ". Tap Generate to try again.");
            setLoading(false);
            releaseWakeLock(wakeLockSentinel);
            return;
          }
          // Nothing recoverable — fall back to the auto-retry path.
          retryScheduled = false;
          scheduleAutoRetry();
        }).catch(function(){
          retryScheduled = false;
          scheduleAutoRetry();
        });
        return;
      }

      // [STREAM-RECOVERY] Dominant mobile failure path when recovery
      // polling didn't find anything to render: kick off one silent
      // auto-retry. If the tab is currently hidden, wait for the user
      // to come back; if visible, retry after a short delay. The
      // opts.isAutoRetry flag prevents an infinite loop — a second
      // failure surfaces normally as an error toast.
      if (isStreamErr && !opts.isAutoRetry) {
        retryScheduled = true;
        scheduleAutoRetry();
        return;
      }
      if (e.message&&e.message.includes("credits")) {
        setUpgradeReason("credits"); setShowUpgrade(true);
      } else {
        // [STREAM-RECOVERY] Friendlier copy for the case where the auto-
        // retry itself failed. The first failure is silent; users only see
        // this when even the retry didn't take.
        if (isStreamErr) {
          setError("Connection dropped twice — tap Generate to try once more, or check your signal.");
        } else {
          setError(e.message||"Something went wrong. Give it another shot.");
        }
      }

      // [STREAM-RECOVERY] Helper. Schedules the silent auto-retry per the
      // tab visibility state at the moment of failure.
      function scheduleAutoRetry() {
        retryScheduled = true;
        var fireRetry = function() {
          setError("");
          generate({ isAutoRetry: true });
        };
        if (typeof document !== "undefined" && document.hidden) {
          var fired = false;
          var fireOnce = function() {
            if (fired) return;
            fired = true;
            document.removeEventListener("visibilitychange", onVisible);
            clearTimeout(fallback);
            fireRetry();
          };
          var onVisible = function() { if (!document.hidden) fireOnce(); };
          document.addEventListener("visibilitychange", onVisible);
          var fallback = setTimeout(fireOnce, 180000);
          return;
        }
        setTimeout(fireRetry, 500);
      }
    })
    .finally(function(){
      // [STREAM-RECOVERY] Always release this call's Wake Lock (the
      // browser may have already revoked it when the tab hid; either
      // way release() is safe). Only skip clearing the loading state
      // when a retry is scheduled — the follow-up generate() call owns
      // the lifecycle from there and will set loading true → false
      // around its own attempt.
      releaseWakeLock(wakeLockSentinel);
      if (!retryScheduled) setLoading(false);
    });
  }

  function saveToVault(card) {
    const id = card.title+card.day;
    if (vault.some(function(v){return v.id===id;})) return;
    // [LEARNING-CONSENT] Trigger the vault learning consent prompt at
    // first save. The prompt no-ops if the user already opted in or
    // already dismissed on this device — see __virlMaybeShowConsent.
    if (typeof window !== "undefined" && typeof window.__virlMaybeShowConsent === "function") {
      try { window.__virlMaybeShowConsent("vault"); } catch(e){}
    }
    // [PREMIUM 10] Vault saves are first-class signal for the Sunday
    // Review — record cardId + title so we can join back to the
    // original generation. Truncated to keep the events table light.
    try {
      logEvent(session && session.user && session.user.id, "vault_saved", {
        type:     "plan",
        cardId:   id,
        title:    (card.title || "").slice(0, 120),
        platform: card.platform || null,
        format:   card.format   || null,
        day:      card.day      || null,
      });
    } catch(e){}
    // [TASK 10] Persist card.format alongside platform so getVaultPatterns()
    // can weight similar styles in future plan generations.
    // Capture the full card payload so the vault detail modal can render
    // description / insight / hashtags / saved script — not just the headline.
    setVault(function(v){
      return [{
        id,
        type:        "plan",
        title:       card.title,
        platform:    card.platform,
        format:      card.format||null,
        postTime:    card.postTime,
        day:         card.day||null,
        priority:    card.priority||null,
        description: card.description||null,
        // [VAULT-EXEMPLARS] Capture the card's hook alongside description
        // so this vault item can serve as a few-shot voice exemplar in
        // future plan / caption / script generations. Hook is the most
        // voice-bearing field for video and long-form formats; older saves
        // that pre-date this capture simply fall back to null and rely on
        // description alone as their voice signal.
        hook:        card.hook||null,
        // [PREMIUM 4] Vault save now stores insight; falls back to the
        // legacy `why` so a card generated under the old prompt still
        // gets its callout captured. Keep `why` mirrored too so older
        // app builds reading from Supabase still render the field.
        insight:     card.insight || card.why || null,
        why:         card.why || card.insight || null,
        trend:       card.trend||null,
        hashtags:    Array.isArray(card.hashtags) ? card.hashtags.slice() : [],
        savedScript: card.savedScript||null,
        savedAt:     fmtDate(),
        result:      null,
      }].concat(v);
    });
  }
  function saveCaption(cap) {
    // [LEARNING-CONSENT] Caption saves land in vault too — same consent
    // surface as saveToVault. The prompt fires once per user per device.
    if (typeof window !== "undefined" && typeof window.__virlMaybeShowConsent === "function") {
      try { window.__virlMaybeShowConsent("vault"); } catch(e){}
    }
    // [PREMIUM 10] Capture the saved hook + a 160-char caption preview
    // so the Sunday Review can answer "what kinds of captions did you
    // save this week?" without re-fetching from Supabase. Full text
    // still lives on the vault item itself.
    try {
      logEvent(session && session.user && session.user.id, "vault_saved", {
        type:     "caption",
        title:    (cap.title || "").slice(0, 120),
        hook:     (cap.hook  || "").slice(0, 200),
        preview:  (cap.text  || cap.preview || "").slice(0, 160),
        platform: cap.platform || null,
      });
    } catch(e){}
    // Capture the full caption (text + hook + hashtags) so the vault detail
    // modal can show what the user actually saved, not just the preview.
    setVault(function(v){return [{
      id:       "cap_"+Date.now(),
      type:     "caption",
      title:    cap.title,
      preview:  cap.preview,
      text:     cap.text     || cap.preview || null,
      hook:     cap.hook     || null,
      hashtags: Array.isArray(cap.hashtags) ? cap.hashtags.slice() : [],
      platform: cap.platform || null,
      savedAt:  fmtDate(),
    }].concat(v);});

  }
  function deleteFromVault(id) {
    setVault(function(v){return v.filter(function(x){return x.id!==id;});});
  }
  function logResult(card,result) {
    const id = card.title+card.day;
    // [LEARNING-CONSENT] First result log fires the results consent
    // prompt. Same once-per-device guard as the other surfaces.
    if (typeof window !== "undefined" && typeof window.__virlMaybeShowConsent === "function") {
      try { window.__virlMaybeShowConsent("results"); } catch(e){}
    }
    try { logEvent(session && session.user && session.user.id, "result_logged", { result: result, platform: card.platform || null }); } catch(e){}
    setVault(function(v){return v.map(function(x){return x.id===id?Object.assign({},x,{result}):x;});});
    setResults(function(r){
      const idx = r.findIndex(function(x){return x.id===id;});
      // [VAULT-EXEMPLARS] Capture voice-bearing fields on the result entry
      // (hook, description/caption text, format) so a logged result can
      // serve as a standalone few-shot exemplar in future generations,
      // even when the underlying card was never saved to vault. Forward-
      // only — entries logged before this change stay thin (id + result
      // metadata only); they still count as a "this id has a logged
      // result" signal when joined to vault, just can't stand alone.
      // loggedAt sorts results by recency in the exemplar selector.
      const entry = {
        id,
        title:       card.title,
        platform:    card.platform,
        postTime:    card.postTime,
        format:      card.format||null,
        hook:        card.hook||null,
        description: card.description||card.caption||null,
        result,
        loggedAt:    fmtDate(),
      };
      if (idx>=0) { const n=r.slice(); n[idx]=entry; return n; }
      return r.concat([entry]);
    });

  }

  // Attach a generated script to its plan card so it stays tagged across
  // refreshes and devices. Pass `null` to clear. Persists alongside the plan
  // (Supabase + localStorage) using the existing weekly expiry.
  function saveScriptForCard(cardIdx, script) {
    setCards(function(prev) {
      if (!prev || !Array.isArray(prev) || cardIdx < 0 || cardIdx >= prev.length) return prev;
      var next = prev.slice();
      next[cardIdx] = Object.assign({}, prev[cardIdx], { savedScript: script });
      var expiresAt;
      try {
        var current = JSON.parse(localStorage.getItem(KEY)||"{}");
        expiresAt = (current.planExpiresAt && Date.now() < current.planExpiresAt)
          ? current.planExpiresAt : computePlanExpiry(sbCredits);
        current.plan = next;
        current.planExpiresAt = expiresAt;
        localStorage.setItem(KEY, JSON.stringify(current));
      } catch(e) { expiresAt = computePlanExpiry(sbCredits); }
      if (session) savePlanToSupabase(session.user.id, next, stats, expiresAt, strategy, planTrendsSnapshot, restDayTips);
      return next;
    });
  }

  // [LINKEDIN-LONG-POST] Mirror of saveScriptForCard for the long-form
  // post artifact. Same immutable-update + localStorage + Supabase
  // persistence pattern; the persistence path simply writes the
  // savedLongPost field onto the card alongside savedScript. Both
  // can coexist on the same card if the user wants to generate
  // multiple expansions of an idea (unlikely in practice, but the
  // shape doesn't preclude it).
  function saveLongPostForCard(cardIdx, longPost) {
    setCards(function(prev) {
      if (!prev || !Array.isArray(prev) || cardIdx < 0 || cardIdx >= prev.length) return prev;
      var next = prev.slice();
      next[cardIdx] = Object.assign({}, prev[cardIdx], { savedLongPost: longPost });
      var expiresAt;
      try {
        var current = JSON.parse(localStorage.getItem(KEY)||"{}");
        expiresAt = (current.planExpiresAt && Date.now() < current.planExpiresAt)
          ? current.planExpiresAt : computePlanExpiry(sbCredits);
        current.plan = next;
        current.planExpiresAt = expiresAt;
        localStorage.setItem(KEY, JSON.stringify(current));
      } catch(e) { expiresAt = computePlanExpiry(sbCredits); }
      if (session) savePlanToSupabase(session.user.id, next, stats, expiresAt, strategy, planTrendsSnapshot, restDayTips);
      return next;
    });
  }
  // [LEARNING-CONSENT] Unified edit-diff capture for the learning loop.
  // Used by updateCardAt (plan cards) + by deep edit surfaces (caption,
  // hook, script, scan caption) via window.__virlCaptureEdit. Always
  // triggers the consent prompt on first call — that's the "first edit"
  // detection point. Only writes to the events table once the user has
  // affirmed learn_from_edits, so dismissing the prompt with "Not now"
  // keeps the diff data un-collected. surface labels the source for the
  // prompt-side formatter; "plan_card" stays on the legacy
  // plan_card_edited event name for back-compat, everything else fires
  // the new draft_edited event.
  function captureEditDiff(surface, oldValues, newValues) {
    if (typeof window !== "undefined" && typeof window.__virlMaybeShowConsent === "function") {
      window.__virlMaybeShowConsent("edits");
    }
    if (!profile || !profile.learnFromEdits) return;
    if (!session || !session.user || !session.user.id) return;
    const TRUNC = 500;
    function compact(v) {
      if (v == null) return "";
      if (Array.isArray(v) || typeof v === "object") {
        try { v = JSON.stringify(v); } catch(e) { return ""; }
      } else {
        v = String(v);
      }
      return v.length > TRUNC ? v.slice(0, TRUNC) : v;
    }
    const fields = Object.keys(newValues || {});
    const changes = fields.map(function(field){
      return {
        field:  field,
        before: compact((oldValues || {})[field]),
        after:  compact((newValues || {})[field]),
      };
    }).filter(function(c){ return c.after && c.before !== c.after; });
    if (!changes.length) return;
    const eventName = surface === "plan_card" ? "plan_card_edited" : "draft_edited";
    logEvent(session.user.id, eventName, {
      surface:  surface,
      changes:  changes,
    });
  }

  // Expose captureEditDiff for deep components that don't have access to
  // the App-level closures (EditableCaption, EditableHook, etc.). Mirrors
  // the existing window.__virlUserId / __virlUserToken pattern. Re-runs
  // on profile / session change so the closure sees the freshest consent
  // state when the helper actually fires.
  useEffect(function(){
    window.__virlCaptureEdit = captureEditDiff;
    return function(){ try { delete window.__virlCaptureEdit; } catch(e) {} };
  }, [profile, session]);

  // [EDIT] Apply an in-place edit to one plan card. Mirrors the
  // save/persist pattern from saveScriptForCard (immutable cards update +
  // localStorage + Supabase under the same plan expiry). Extra job: when
  // the title changes the buildCardId result changes too, which would
  // orphan the localStorage saved/posted flags, the vault entry's id,
  // and the results row's id. Migrating all three keeps "Saved" /
  // "Posted" / "Logged" state stuck to the card after an edit.
  function updateCardAt(cardIdx, updates) {
    setCards(function(prev){
      if (!prev || !Array.isArray(prev) || cardIdx < 0 || cardIdx >= prev.length) return prev;
      var oldCard = prev[cardIdx];
      var newCard = Object.assign({}, oldCard, updates);
      var oldId = buildCardId(oldCard);
      var newId = buildCardId(newCard);
      var idChanged = oldId !== newId;
      if (idChanged) {
        try {
          var savedAt  = localStorage.getItem("virl_saved_"  + oldId);
          var postedAt = localStorage.getItem("virl_posted_" + oldId);
          if (savedAt)  { localStorage.setItem("virl_saved_"  + newId, savedAt);  localStorage.removeItem("virl_saved_"  + oldId); }
          if (postedAt) { localStorage.setItem("virl_posted_" + newId, postedAt); localStorage.removeItem("virl_posted_" + oldId); }
        } catch(e){}
        setVault(function(v){
          return v.map(function(x){
            return x.id === oldId
              ? Object.assign({}, x, {
                  id:          newId,
                  title:       newCard.title,
                  description: newCard.description || null,
                  insight:     newCard.insight || newCard.why || null,
                  why:         newCard.why || newCard.insight || null,
                  hashtags:    Array.isArray(newCard.hashtags) ? newCard.hashtags.slice() : [],
                })
              : x;
          });
        });
        setResults(function(r){
          return r.map(function(x){
            return x.id === oldId ? Object.assign({}, x, { id: newId, title: newCard.title }) : x;
          });
        });
      }
      var next = prev.slice();
      next[cardIdx] = newCard;
      var expiresAt;
      try {
        var current = JSON.parse(localStorage.getItem(KEY)||"{}");
        expiresAt = (current.planExpiresAt && Date.now() < current.planExpiresAt)
          ? current.planExpiresAt : computePlanExpiry(sbCredits);
        current.plan = next;
        current.planExpiresAt = expiresAt;
        localStorage.setItem(KEY, JSON.stringify(current));
      } catch(e) { expiresAt = computePlanExpiry(sbCredits); }
      if (session) savePlanToSupabase(session.user.id, next, stats, expiresAt, strategy, planTrendsSnapshot, restDayTips);
      // [LEARNING-CONSENT] Refactored: edit-diff capture + consent
      // prompt trigger both flow through captureEditDiff. surface
      // "plan_card" fires the legacy plan_card_edited event name to
      // keep existing event rows in the events table compatible with
      // the server-side reader's IN filter.
      try { captureEditDiff("plan_card", oldCard, updates); } catch(e){}
      return next;
    });
  }
  function dismissExplainer() {
    setHasSeenExplainer(true);
    try { localStorage.setItem("virl_seen_explainer","1"); } catch(e) {}
  }

  const profileComplete = !!(profile.name&&profile.audience&&profile.voice);

  // [UX-01] Count of cards posted in the prior week that haven't been
  // logged yet. Recomputed on every render so localStorage edits
  // (Mark as posted / Log Results) are reflected without a manual
  // refresh signal. Cheap — single linear scan of localStorage keys.
  var postedLastWeekCount = countPostedLastWeekUnlogged(results);

  // [RESULTS-OVERHAUL] Priority-ordered single-slot banner for the top
  // of the Plan tab. Picks at most one banner to render so the page
  // never stacks "posted last week" + "milestone 5" + "cycle ending"
  // at once. Higher in the array = higher priority.
  var planTopBanner = (function(){
    if (postedLastWeekCount >= 2)        return "posted-last-week";
    if (showSundayNudge)                 return "cycle-end";
    if (showMilestone5)                  return "milestone-5";
    return null;
  })();

  // [UX-01] Vault remix handler — pulls the saved item's caption /
  // description into the Plan generator's context state and routes to
  // the Plan tab. Voice reference framing keeps the prompt instruction
  // explicit so the LLM treats it as style guidance, not source material.
  function handleVaultRemix(item) {
    if (!item) return;
    var voice = item.text || item.preview || item.description || item.title || "";
    voice = String(voice).slice(0, 600);
    var label = item.platform ? (item.platform + " " + (item.type==="caption"?"caption":"post")) : (item.type==="caption"?"caption":"post");
    var note  = "Voice reference (from saved " + label + '): "' + voice + '". Use a similar voice and rhythm for the new plan.';
    setContext(note);
    // [PREMIUM 10] Stamp the source so the next plan_generated event
    // can also fire plan_remixed_from_prior with this reference id.
    setRemixSource({ kind: "vault", sourceId: item.id, platform: item.platform || null });
    setTab("plan");
  }

  // [UX-01] Results "plan with insights" handler — pre-fills context
  // with a concrete reference to the prior week's top performer so
  // the next plan can lean into what worked.
  function handlePlanWithInsights(top) {
    if (!top) return;
    var v = (top.result && top.result.views) || 0;
    var l = (top.result && top.result.likes) || 0;
    var s = (top.result && top.result.saves) || 0;
    var note = "Last week's top performer: \"" + (top.title || "") + "\" (" + v + " views, " + l + " likes, " + s + " saves)"
             + (top.platform ? " on " + top.platform : "")
             + ". Lean into the same format and topic for next week.";
    setContext(note);
    // [PREMIUM 10] Stamp source so plan_generated also fires
    // plan_remixed_from_prior with this top-performer reference.
    setRemixSource({ kind: "results_top", sourceId: top.id, platform: top.platform || null });
    setTab("plan");
  }

  // ── Auth gate - show loading, then auth screen, then app ────────────────
  if (appError) return (
    <div style={{minHeight:"100vh",...brandHeroSurface,display:"flex",alignItems:"center",justifyContent:"center",padding:"40px 24px",fontFamily:"'Jost',sans-serif"}}>
      <div style={{textAlign:"center",maxWidth:360}}>
        <div style={{fontFamily:"'Italiana',serif",fontSize:48,color:B.white,letterSpacing:"0.1em",marginBottom:8,lineHeight:1}}>VIRL</div>
        <div style={{fontSize:15,fontWeight:600,color:B.white,marginBottom:8}}>Something went wrong.</div>
        <div style={{fontSize:13,fontWeight:300,color:"rgba(255,255,255,0.7)",marginBottom:8,lineHeight:1.6}}>{"Error: "+String(appError)}</div>
        <div style={{fontSize:13,fontWeight:300,color:"rgba(255,255,255,0.7)",marginBottom:24,lineHeight:1.6}}>Try clearing your browser data for this site, then reload.</div>
        <button onClick={function(){
          try{localStorage.clear();}catch(e){}
          window.location.reload();
        }}
          style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"14px 28px",background:B.white,color:B.navy,border:"none",borderRadius:99,cursor:"pointer",marginRight:8,boxShadow:"0 12px 28px rgba(15,23,42,0.18)"}}>
          Clear cache &amp; reload
        </button>
      </div>
    </div>
  );
  if (authLoading) return (
    <div style={{minHeight:"100vh",...brandHeroSurface,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"'Italiana',serif",fontSize:52,color:B.white,letterSpacing:"0.1em",marginBottom:12,lineHeight:1}}>VIRL</div>
        <svg style={{animation:"spin .75s linear infinite"}} width={20} height={20} viewBox="0 0 24 24" fill="none" stroke="rgba(147,197,253,0.9)" strokeWidth={2}>
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
      </div>
    </div>
  );

  if (!session) return (
    <GateScreen onAuth={function(s){setSession(s);}}/>
  );

  // [CX-FIX 1] User clicked their password-reset email link. Show the
  // set-new-password screen instead of the dashboard until they save a
  // new password. SetNewPasswordScreen calls onDone() which flips this
  // off and drops them into the normal dashboard.
  if (passwordRecoveryMode) return (
    <SetNewPasswordScreen onDone={function(){ setPasswordRecoveryMode(false); }}/>
  );

return (
    <div id="virl-shell" style={{minHeight:"100vh",background:B.bg,fontFamily:"'Jost',sans-serif",fontWeight:300,color:B.ink}}>

      {/* ── Belief modal ─────────────────────────────────────────────────── */}
      {/* [PREMIUM 6] Replaces the legacy first-paint "welcome to VIRL"
           modal. Triggers on the moment a user reaches the main app for
           the first time after completing profile setup, so it lands as
           a "before you start" pause rather than another setup task.
           Reuses the virl_welcomed flag so existing users who already
           saw the old modal don't get re-prompted. */}
      {showWelcome&&profileComplete&&(

                    {Object.keys(usageStats.by_generation_type).sort(function(a,b){

                    }).map(function(t){

                      return (
                        <div key={t} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid "+B.divider,fontFamily:"'Jost',sans-serif",fontSize:12}}>

                {/* Per-model split */}
                {usageStats.by_model && Object.keys(usageStats.by_model).length > 0 && (

                      return (

                        </div>

                    {usageStats.top_users.map(function(u, i){

                  var sentimentEmoji = f.sentiment === "happy" ? "😊"

                    </div>

            )}

            {adminData&&(
              <div>
                {/* ── KPI cards ── */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:20}}>
                  {[
                    {label:"Total users",   value:adminData.total,           color:B.navy},
                    {label:"Paid",          value:adminData.paid,             color:B.green},
                    {label:"Free trial",    value:adminData.free,             color:B.muted},
                    {label:"Est. MRR",      value:"$"+adminData.mrr,          color:B.blue},
                  ].map(function(kpi,i){return (
                    <div key={i} style={{background:B.card,borderRadius:14,padding:"18px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
                      <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.muted,marginBottom:6}}>{kpi.label}</div>
                      <div style={{fontFamily:"'Italiana',serif",fontSize:36,color:kpi.color,lineHeight:1}}>{kpi.value}</div>
                    </div>
                  );})}
                </div>

                {/* ── Conversion rate ── */}
                <div style={{background:B.navySoft,borderRadius:14,padding:"16px 18px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:600,color:B.navy}}>Trial to paid conversion</div>
                  <div style={{fontFamily:"'Italiana',serif",fontSize:28,color:B.navy}}>
                    {adminData.total>0?Math.round((adminData.paid/adminData.total)*100)+"%":"—"}
                  </div>
                </div>

                {/* [PRICING 7] Founder Circle roster — who holds each
                    position, when they signed up, current status. Sorted

                    the no-take-backs rule), greyed out so it reads as

                {(function(){
                  var fcMembers = (adminData.credits || [])
                    .filter(function(c){ return c.founding_tier === "founder_circle"; })
                    .sort(function(a,b){ return (a.founding_position||999) - (b.founding_position||999); });
                  var filledCount    = fcMembers.length;
                  var activeCount    = fcMembers.filter(function(c){ return c.plan !== "cancelled"; }).length;
                  var cancelledCount = filledCount - activeCount;
                  return (
                    <div style={{marginBottom:20}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>

                          {cancelledCount > 0 ? " (" + cancelledCount + " cancelled)" : ""}

                      </div>
                      {filledCount === 0 ? (
                        <div style={{
                          background:B.bg,borderRadius:14,padding:"32px 24px",

                            fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,
                            letterSpacing:"0.12em",textTransform:"uppercase",color:B.muted

                            <div style={{textAlign:"right"}}>Status</div>

                            var joined = m.subscription_started_at
                              ? new Date(m.subscription_started_at).toLocaleDateString("en-US", {

                              : "—";

                                display:"grid",gridTemplateColumns:"50px 1fr 130px 90px",
                                gap:8,padding:"12px 16px",borderTop:"1px solid "+B.divider,
                                alignItems:"center",opacity:isCancelled?0.55:1
                              }}>
                                <div style={{fontFamily:"'Italiana',serif",fontSize:18,color:B.navy}}>
                                  #{m.founding_position || "?"}
                                </div>
                                <div style={{minWidth:0}}>
                                  <div style={{
                                    fontFamily:"'Jost',sans-serif",fontSize:12,
                                    fontWeight:600,color:B.ink,
                                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"

                                    {m.name || "—"}

                                  <div style={{
                                    fontFamily:"'Jost',sans-serif",fontSize:11,

                                  textAlign:"right",fontFamily:"'Jost',sans-serif",
                                  fontSize:10,fontWeight:700,letterSpacing:"0.06em",

                                  color:isCancelled?B.coral:B.green
                                }}>
                                  {isCancelled?"Cancelled":"Active"}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })()}

                {/* [PRICING 8] Launch monitoring — what to watch in the
                    first 30 days. Three panels: projected fill rate for
                    the Founder Circle, recent signups by tier, and a
                    quick link to Stripe's webhook delivery log (which is
                    canonical for webhook health — building a tracker
                    here would just duplicate it). All computed from the
                    same adminData.credits array we already load. */}
                {(function(){
                  var allMembers = (adminData.credits || []);
                  var now        = Date.now();
                  var WEEK_MS    = 7 * 86400000;
                  var weekAgoMs  = now - WEEK_MS;

                  // Filter to credits rows with a subscription_started_at
                  // in the last 7 days. founding_tier discriminates.
                  var recentSignups = allMembers
                    .filter(function(c){
                      if (!c.subscription_started_at) return false;
                      var t = Date.parse(c.subscription_started_at);
                      return !isNaN(t) && t >= weekAgoMs;
                    })
                    .sort(function(a,b){
                      return Date.parse(b.subscription_started_at) - Date.parse(a.subscription_started_at);
                    });

                  var fcSignupsThisWeek = recentSignups.filter(function(c){
                    return c.founding_tier === "founder_circle";
                  }).length;

                  var fcFilledCount = allMembers.filter(function(c){
                    return c.founding_tier === "founder_circle";
                  }).length;
                  var fcSlotsLeft = Math.max(0, 50 - fcFilledCount);

                  // Projection: at the trailing-7-day FC signup rate,
                  // how many days until fill? Cap displayed days at
                  // "180+" so a quiet week doesn't render "1,247 days."
                  var projectionLabel;
                  if (fcSlotsLeft === 0) {
                    projectionLabel = "Founder Circle is full";
                  } else if (fcSignupsThisWeek === 0) {
                    projectionLabel = "No Founder Circle signups in last 7 days";
                  } else {
                    var daysPerSlot = 7 / fcSignupsThisWeek;
                    var projectedDays = Math.ceil(fcSlotsLeft * daysPerSlot);
                    projectionLabel = projectedDays > 180
                      ? "180+ days at current rate"
                      : "~" + projectedDays + " day" + (projectedDays === 1 ? "" : "s") + " at current rate";
