// [TASK 1] Returns true/false so the UI can reflect sync state (Syncing/Synced/Failed).
async function saveProfileToSupabase(profile, userId) {
  try {
    const { error } = await supabaseClient.from("profiles").upsert({
      id: userId,
      name: profile.name||null,
      audience: profile.audience||null,
      voice: profile.voice||null,
      my_platforms: profile.myPlatforms||[],
      vibes: profile.vibes||[],
      sample_caption: profile.sampleCaption||null,
      topics: profile.topics||null,
      purpose: profile.purpose||null,
      off_limits: profile.offLimits||null,
      inspiration: profile.inspiration||null,
      journey: profile.journey||null,
      known_for: profile.knownFor||null,
      pillars: profile.pillars||[],
      emoji_pref: profile.emojiPref||"Sometimes",
      handles: profile.handles||{},
      platform_audiences: profile.platformAudiences||{},
      post_freq: profile.postFreq||null,
      content_length: profile.contentLength||null,
      worked_well: profile.workedWell||null,
      // [INTEL 1] Personal-fact columns. NULL on empty so we can later
      // distinguish "user has not yet been prompted" from "explicitly cleared".
      personal_facts: profile.personalFacts||null,
      never_assume: profile.neverAssume||null,
      love_to_reference: profile.loveToReference||null,
      // [INTEL 2] Per-platform format preferences. Empty object on missing
      // matches the column's JSONB default of '{}' so old rows and new rows
      // always upsert as the same shape.
      platform_formats: profile.platformFormats||{},
      // [LEARN-FROM-EDITS] Opt-in flag controlling whether plan-card edit
      // diffs get captured + fed into future plan prompts. Boolean column,
      // defaults to FALSE on the server side. NOT a privacy nightmare — it
      // only takes effect once the user explicitly turns it on in the
      // Profile tab; off-by-default means existing users see no behavior
      // change until they opt in.
      learn_from_edits: !!profile.learnFromEdits,
      // [LEARNING-CONSENT] Three sibling opt-in flags added by migration 010.
      // Like learn_from_edits, all default FALSE on the server. The client
      // upserts whatever the user has chosen in Profile → Personalization &
      // Privacy (or via the contextual consent prompts that fire at the
      // first relevant action).
      learn_from_vault:         !!profile.learnFromVault,
      learn_from_results:       !!profile.learnFromResults,
      learn_from_public_posts:  !!profile.learnFromPublicPosts,
      // [VOICE-REFERENCE] Optional additional caption samples. Stored as a
      // text[] so PostgREST round-trips it without JSON parsing on the
      // client. Filter out empty entries before write — UI rows can be
      // mid-edit with whitespace-only values that shouldn't persist.
      voice_samples: Array.isArray(profile.voiceSamples)
        ? profile.voiceSamples.map(function(s){ return String(s||"").trim(); }).filter(Boolean)
        : [],
      // [BUSINESS-WEBSITE] Optional business / brand URL. Trim before
      // write so a stray trailing space doesn't break URL matching
      // downstream; empty string normalizes to NULL on the server.
      business_website: (profile.businessWebsite || "").trim() || null,
      // [PROFILE-SALES-FIELDS] Five optional service-business fields.
      // All trim → null on empty so a partially-filled section doesn't
      // persist "" placeholders. Migration 016 must run before these
      // columns exist; until then the upsert errors with "column not
      // found" (same surface the diagnostic banner from PR #159 shows).
      offerings:            (profile.offerings            || "").trim() || null,
      service_area:         (profile.serviceArea          || "").trim() || null,
      ideal_client_problem: (profile.idealClientProblem   || "").trim() || null,
      primary_cta:          (profile.primaryCta           || "").trim() || null,
      common_objections:    (profile.commonObjections     || "").trim() || null,
    });
    if (error) {
      // Surface the full Supabase error to the console so a schema
      // mismatch (missing column, RLS denial) is visible in devtools.
      // The UI status indicator only knows ok/fail — the message lives here.
      console.error("[VIRL] Profile save failed:", error);
      return { ok: false, error: error.message || String(error) };
    }
    // [HANDLE-RESEARCH-PREWARM] Kick off Perplexity research now so the
    // first plan generation doesn't pay the ~3s round-trip. Fire-and-
    // forget — the server uses fetchHandleResearch's cache so a
    // duplicate fire is a zero-cost no-op, and any failure on this side
    // is invisible to the user (the next plan gen just runs without
    // the research block). Only fires when handles are present.
    //
    // [LEARNING-CONSENT] Trigger the public-posts consent prompt when
    // handles are saved. The fetch itself is gated server-side on the
    // learn_from_public_posts flag — so saving handles before consent
    // doesn't fire any third-party call, but the prompt gives the user
    // a chance to opt in right at the moment the value would land.
    var hasHandles = profile.handles && typeof profile.handles === "object"
      && Object.keys(profile.handles).some(function(k){ return profile.handles[k]; });
    if (hasHandles && typeof window !== "undefined") {
      if (typeof window.__virlMaybeShowConsent === "function") {
        try { window.__virlMaybeShowConsent("public_posts"); } catch(e){}
      }
      var token = window.__virlUserToken || null;
      if (token) {
        fetch("/api/profile-research-prewarm", {
          method:  "POST",
          headers: {
            "Content-Type":  "application/json",
            "Authorization": "Bearer " + token,
          },
        }).catch(function(){ /* never block the save flow on prewarm */ });
      }
    }
    return { ok: true };
  } catch(e) {
    console.error("[VIRL] Profile save threw:", e);
    return { ok: false, error: e.message || String(e) };
  }
}

    return {
      name: data.name||"",
      audience: data.audience||"",
      voice: data.voice||"",
      myPlatforms: data.my_platforms||[],
      vibes: data.vibes||[],
      sampleCaption: data.sample_caption||"",
      topics: data.topics||"",
      purpose: data.purpose||"",
      offLimits: data.off_limits||"",
      inspiration: data.inspiration||"",
      journey: data.journey||"",
      knownFor: data.known_for||"",
      pillars: data.pillars||[],
      emojiPref: data.emoji_pref||"Sometimes",
      handles: data.handles||{},
      platformAudiences: data.platform_audiences||{},
      postFreq: data.post_freq||"",
      contentLength: data.content_length||"",
      workedWell: data.worked_well||"",
      // [INTEL 1] Personal-fact columns. Existing rows pre-migration return
      // null for these and fall through the || "" so the textareas render empty.
      personalFacts: data.personal_facts||"",
      neverAssume: data.never_assume||"",
      loveToReference: data.love_to_reference||"",
      // [INTEL 2] Per-platform format preferences. Defaults to {} so old
      // rows hydrate the chip selectors as fully unselected.
      platformFormats: data.platform_formats||{},
      // [LEARN-FROM-EDITS] Opt-in flag. Falls back to false on existing
      // rows that don't yet have the column populated.
      learnFromEdits: !!data.learn_from_edits,
      // [LEARNING-CONSENT] Three sibling opt-in flags (migration 010).
      // Default false everywhere — both for pre-migration rows (column

      learnFromVault:        !!data.learn_from_vault,
      learnFromResults:      !!data.learn_from_results,
      learnFromPublicPosts:  !!data.learn_from_public_posts,
      // [VOICE-REFERENCE] Optional additional voice samples. Empty array on
      // pre-migration rows so the UI editor renders no extra slots.
      voiceSamples: Array.isArray(data.voice_samples) ? data.voice_samples : [],
      // [BUSINESS-WEBSITE] Optional URL. Empty string on pre-migration

      businessWebsite: data.business_website || "",
      // [PROFILE-SALES-FIELDS] Five service-business fields. All fall
      // back to "" for pre-migration-016 rows so the inputs render
      // empty without showing "null" text.
      offerings:           data.offerings            || "",
      serviceArea:         data.service_area         || "",
      idealClientProblem:  data.ideal_client_problem || "",
      primaryCta:          data.primary_cta          || "",
      commonObjections:    data.common_objections    || ""
    };
  } catch(e) { return {}; }
}

async function loadCreditsFromSupabase(userId, accessToken) {
  // Primary: direct PostgREST fetch with the user's JWT. Works for almost
  // everyone — the RLS policy on credits permits a user to read their
  // own row.
  try {
    const headers = {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + (accessToken || SUPABASE_ANON_KEY),
      "Content-Type": "application/json",
      // Some browsers (notably private/incognito modes) aggressively cache
      // GETs to the Supabase REST API, so a refetch right after a server-side
      // credit deduction can return the stale pre-deduction row. Force a
      // network round-trip every time.
      "Cache-Control": "no-cache",
      "Pragma": "no-cache",
    };
    const res = await fetch(
      SUPABASE_URL + "/rest/v1/credits?select=credits,plan,reset_at,fresh_trends_plan_remaining,fresh_trends_scan_remaining,fresh_trends_caption_remaining,founding_tier,founding_position&user_id=eq." + userId + "&limit=1&_=" + Date.now(),
      { headers, cache: "no-store" }
    );
    if (res.ok) {
      const rows = await res.json();
      if (Array.isArray(rows) && rows.length > 0) return rows[0];
      // 200 OK but no rows — diagnostic so a legitimately-missing row
      // doesn't get conflated with an RLS / token failure further down.
      console.warn("[credits] primary fetch returned 0 rows for user", userId);
    } else {
      const bodyText = await res.text().catch(function(){ return ""; });
      console.warn("[credits] primary fetch failed:", res.status, bodyText);
    }
  } catch(e) {
    console.warn("[credits] primary fetch threw:", e && e.message);
  }
  // [CX-FIX 6] Fallback: server-side fetch via service key. Bypasses
  // whatever's wrong on the RLS / token path so a user whose row exists
  // (verified server-side) sees their HUD load instead of "—" forever.
  // Lauren's admin account had this exact failure mode for months before
  // this fallback existed.
  try {
    const r = await fetch("/api/me-credits", {
      headers: { Authorization: "Bearer " + (accessToken || "") },
      cache: "no-store",
    });
    if (!r.ok) {
      console.warn("[credits] fallback /api/me-credits failed:", r.status);
      return null;
    }
    const data = await r.json();
    if (data && data.credits) {
      console.info("[credits] loaded via server fallback (primary path failed for this user)");
      return data.credits;
    }
    return null;
  } catch(e) {
    console.warn("[credits] fallback threw:", e && e.message);
    return null;
  }
}

// Plans table: one row per user. Cards + stats persist for the week so a
// refresh on any device lands the user back on their current plan rather
// than the empty profile screen. Helpers fail open — if the table isn't
// provisioned yet, the app silently falls back to localStorage-only.
// ISO date for the Monday of the calendar week containing `d`. Used as the
// week_start key for plan_history rows so re-generations within the same
// week update one row instead of creating duplicates.
function weekStartISO(d) {
  const date = new Date(d || Date.now());
  const day = date.getDay() || 7; // Sunday=7
  date.setHours(0,0,0,0);
  date.setDate(date.getDate() - (day - 1));
  return date.toISOString().slice(0, 10);
}

async function loadPlanFromSupabase(userId) {
  try {
    const { data, error } = await supabaseClient
      .from("plans").select("cards,stats,strategy,expires_at,trends_snapshot,rest_day_tips").eq("user_id", userId).maybeSingle();
    if (error || !data) return null;
    return data;
  } catch(e) { return null; }
}
async function savePlanToSupabase(userId, cards, stats, expiresAt, strategy, trendsSnapshot, restDayTips) {
  // Dual-write: current `plans` row (one per user, replaced on regenerate)
  // PLUS a `plan_history` row keyed by (user_id, week_start) so past weeks
  // accumulate. The history row is what the server reads on the next plan
  // generation to build narratively week-over-week. trends_snapshot caches
  // the Perplexity result used to generate this plan so plan_partial /
  // plan_strategy regens can re-use it without re-charging the user's
  // weekly fresh-trends allowance.
  let ok = true;
  try {
    const { error } = await supabaseClient.from("plans").upsert({
      user_id:        userId,
      cards:          cards,
      stats:          stats    || null,
      strategy:       strategy || null,
      trends_snapshot: trendsSnapshot || null,
      // [REST-DAY-LLM] Personalized tips that ride with the plan.
      // Persisted so a refresh / cross-device sign-in surfaces them
      // instead of falling back to the static client-side catalog.
      // null when the LLM omitted the field (e.g., 7 cards = no rest
      // days) — the client treats null and [] interchangeably.
      rest_day_tips:   Array.isArray(restDayTips) ? restDayTips : null,
      expires_at:     new Date(expiresAt).toISOString(),
      updated_at:     new Date().toISOString(),
    });
    if (error) { console.error("Plan save error:", error.message); ok = false; }
  } catch(e) { ok = false; }
  // History upsert — fail-open so the UI flow still works if plan_history
  // hasn't been provisioned yet.
  try {
    const ws = weekStartISO(Date.now());
    await supabaseClient.from("plan_history").upsert({
      user_id:    userId,
      week_start: ws,
      cards:      cards,
      stats:      stats    || null,
      strategy:   strategy || null,
    }, { onConflict: "user_id,week_start" });
  } catch(e) { /* non-fatal */ }
  return ok;
}
async function deletePlanFromSupabase(userId) {
  try { await supabaseClient.from("plans").delete().eq("user_id", userId); } catch(e) {}
}

// user_data table: one row per user with persistent vault + results jsonb.
// Distinct from plans (which expires weekly) — vault and results survive
// the Monday reset and stay tied to the account for the lifetime of the
// membership. Helpers fail open: if the table isn't provisioned yet, the
// app silently falls back to localStorage-only.
async function loadUserDataFromSupabase(userId) {
  // [VAULT-PERSISTENCE] Distinguish "no row" from "read error" so the
  // caller can choose: a missing row is an expected state for new users
  // (caller migrates local data up), but a read failure means we don't
  // know what's on the server — proceeding to mark "hydrated" and let
  // auto-save run would risk overwriting unread server data with empty
  // local state. Three attempts with backoff so a transient network blip
  // during sign-in doesn't leave the user stuck behind a closed gate.
  // Return shape:
  //   { ok: true, row: {vault,results} | null }  — successful read; row null = no row exists
  //   { ok: false }                              — all retries failed; caller should NOT mark hydrated
  const delaysMs = [0, 500, 2000];
  for (let attempt = 0; attempt < delaysMs.length; attempt++) {
    if (delaysMs[attempt] > 0) {
      await new Promise(function(r){ setTimeout(r, delaysMs[attempt]); });
    }
    try {
      const { data, error } = await supabaseClient
        .from("user_data").select("vault,results").eq("user_id", userId).maybeSingle();
      if (!error) return { ok: true, row: data || null };
      console.warn("User-data load error (attempt " + (attempt+1) + "/" + delaysMs.length + "):", error.message);
    } catch(e) {
      console.warn("User-data load threw (attempt " + (attempt+1) + "/" + delaysMs.length + "):", e.message || e);
    }
  }
  return { ok: false };
}
async function saveUserDataToSupabase(userId, vault, results) {
  // [VAULT-PERSISTENCE] Retry transient failures so a flaky network or
  // brief Supabase 5xx can't silently lose the next vault save. Three
  // attempts with backoff (immediate, +500ms, +2000ms). If the LAST attempt
  // also fails, return false and console.error — the auto-save effect
  // re-runs on the next state change so the user's next interaction will
  // try again with the freshest data. The old single-attempt behavior was
  // the root of the "vault keeps emptying" bug: a silent save failure left
  // local state ahead of the server, and the next session re-hydrate
  // overwrote the unsaved local items with the stale server payload.
  const delaysMs = [0, 500, 2000];
  for (let attempt = 0; attempt < delaysMs.length; attempt++) {
    if (delaysMs[attempt] > 0) {
      await new Promise(function(r){ setTimeout(r, delaysMs[attempt]); });
    }
    try {
      const { error } = await supabaseClient.from("user_data").upsert({
        user_id:    userId,
        vault:      vault   || [],
        results:    results || [],
        updated_at: new Date().toISOString(),
      });
      if (!error) return true;
      console.error("User-data save error (attempt " + (attempt+1) + "/" + delaysMs.length + "):", error.message);
    } catch(e) {
      console.error("User-data save threw (attempt " + (attempt+1) + "/" + delaysMs.length + "):", e.message || e);
    }
  }
  return false;
}
function cachedUserDataKey(userId) { return "virl_user_data_" + userId; }

    var raw = localStorage.getItem(cachedUserDataKey(userId));

}
function saveCachedUserData(userId, vault, results) {
  try { localStorage.setItem(cachedUserDataKey(userId), JSON.stringify({vault:vault||[], results:results||[]})); } catch(e) {}
}

// Expand "Day N - Abbr" day labels into editorial-friendly full day
// names ("Day 1 - Mon" → "Monday"). Day 1 is always today (the plan
// generator builds labels relative to the generation date). Returns
// the original string if it can't parse, so legacy/malformed labels
// degrade gracefully.
function parseDayName(dayLabel) {
  if (!dayLabel || typeof dayLabel !== "string") return "";
  const parts = dayLabel.split(" - ");
  const abbr  = (parts[1] || parts[0] || "").trim();
  const map   = { Sun:"Sunday", Mon:"Monday", Tue:"Tuesday", Wed:"Wednesday", Thu:"Thursday", Fri:"Friday", Sat:"Saturday" };
  return map[abbr] || abbr || dayLabel;
}
function isTodayDayLabel(dayLabel) {

// [PRICING 3] Founder Circle Office Hours — last Friday of every month at
// 8:00 AM CT. First call: Friday, June 26, 2026. Returns a label like
// "Friday, June 26 at 8:00 AM CT" for the Founder Circle tab.
function getNextFounderOfficeHoursLabel() {
  function lastFridayOf(year, m) {
    var d = new Date(year, m + 1, 0); // last day of month m
    var back = (d.getDay() + 2) % 7;  // Fri=5: (5+2)%7=0; Thu=4: 6 days back; etc.
    d.setDate(d.getDate() - back);
    return d;
  }
  var now = new Date();
  var candidate = lastFridayOf(now.getFullYear(), now.getMonth());
  // 1-day cushion so the day-of indicator stays visible until midnight
  // local. Past that, advance to next month's last Friday.
  if (now.getTime() > candidate.getTime() + 86400000) {
    candidate = lastFridayOf(now.getFullYear(), now.getMonth() + 1);
  }
  return candidate.toLocaleDateString("en-US", {
    weekday: "long",
    month:   "long",
    day:     "numeric",
  }) + " at 8:00 AM CT";
}

// Derive all 7 day labels from the cards array. The server includes
// the full weekday name in card.day (e.g. "Day 4 - Thursday"); when some
// days have cards and others don't, we extrapolate the weekday sequence
// from any card we have. Returns 7 labels in order; an empty array if we
// can't derive (no cards or unparseable day field).
const WEEKDAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
function deriveAllDayLabels(cards) {
  if (!Array.isArray(cards) || !cards.length) return [];
  // Build a map of day number → full label from the cards we have.
  const dayMap = {};
  for (const card of cards) {
    if (!card || typeof card.day !== "string") continue;
    const m = card.day.match(/^Day\s+(\d+)\s*-\s*(\w+)/i);
    if (!m) continue;
    dayMap[parseInt(m[1], 10)] = { weekday: m[2], full: card.day };
  }
  const seedNums = Object.keys(dayMap).map(n => parseInt(n, 10));
  if (!seedNums.length) return [];
  // Anchor on the lowest known day number → derive forward + backward.
  const seedNum  = Math.min(...seedNums);
  const seedWd   = dayMap[seedNum].weekday;
  // [HOTFIX] Cards from the server use SHORT weekday names ("Mon", "Wed",
  // etc. — see api/_lib/prompts.js's WEEKDAYS array). The earlier version
  // of this function looked the seed weekday up in the LONG-name table
  // (WEEKDAY_NAMES), which never matched, so seedWdIx came back as -1
  // and the whole function returned []. With zero day labels, the day-
  // section renderer in the plan view mapped over an empty array and
  // showed no cards at all even when state had them. The fix matches
  // on the first 3 chars (case-insensitive), accepting either form,
  // and synthesizes missing days using the SAME format the seed card
  // used so the bucket keys ({byDay[dayLabel]}) align.
  const SHORT_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const seedKey = seedWd.slice(0, 3).toLowerCase();
  const seedWdIx = SHORT_NAMES.findIndex(w => w.toLowerCase() === seedKey);
  if (seedWdIx < 0) return [];
  // Preserve the source format: if the seed weekday is ≤3 chars we treat
  // it as short ("Mon"), otherwise long ("Monday"). Both formats are
  // supported in case the prompt format ever changes again.
  const useShort = seedWd.length <= 3;
  const NAMES = useShort ? SHORT_NAMES : WEEKDAY_NAMES;
  const out = [];
  for (let n = 1; n <= 7; n++) {
    if (dayMap[n]) { out.push(dayMap[n].full); continue; }
    const wdIx = (seedWdIx + (n - seedNum) % 7 + 7) % 7;
    out.push("Day " + n + " - " + NAMES[wdIx]);
  }
  return out;
}

function resolveHolidayDate(entry, year) {
  if (entry.fixed) return new Date(Date.UTC(year, entry.fixed.month - 1, entry.fixed.day));
  if (entry.nth) {
    var cfg = entry.nth;
    var first = new Date(Date.UTC(year, cfg.month - 1, 1));
    var daysUntil = (cfg.weekday - first.getUTCDay() + 7) % 7;
    daysUntil += (cfg.nth - 1) * 7;
    var d = new Date(Date.UTC(year, cfg.month - 1, 1 + daysUntil));
    if (cfg.offset) d.setUTCDate(d.getUTCDate() + cfg.offset);
    return d;
  }
  if (entry.last) {
    var cfg2 = entry.last;
    var firstNext = new Date(Date.UTC(year, cfg2.month, 1));
    var lastDay   = new Date(firstNext.getTime() - 86400000);
    var back      = (lastDay.getUTCDay() - cfg2.weekday + 7) % 7;
    return new Date(lastDay.getTime() - back * 86400000);
  }
  return null;
}

function resolveHolidayRange(entry, year) {
  if (!entry.range) return null;
  var r = entry.range;
  var start = new Date(Date.UTC(year, r.startMonth - 1, r.startDay || 1));
  var end   = r.endDay
    ? new Date(Date.UTC(year, r.endMonth - 1, r.endDay))
    : new Date(Date.UTC(year, r.endMonth, 1) - 86400000);
  return { start: start, end: end };
}

// [HOLIDAY-PICKER] Returns { singleDay: [...], ongoing: [...] } observances
// overlapping the [fromDate, fromDate + dayRange] window. Single-day entries
// sorted by date; ongoing entries sorted by start. Empty arrays when nothing
// falls in the window (the picker hides itself in that case).
function getUpcomingHolidays(fromDate, dayRange) {
  var from = fromDate instanceof Date ? fromDate : new Date();
  var range = Math.max(1, Math.min(60, parseInt(dayRange, 10) || 7));
  var to = new Date(from.getTime() + range * 86400000);
  var fromY = from.getUTCFullYear();
  var toY   = to.getUTCFullYear();
  var WEEKDAYS_LOCAL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var MONTHS_LOCAL   = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var singleDay = [];
  var ongoing   = [];
  HOLIDAY_OBSERVANCES.forEach(function(entry){
    if (entry.fixed || entry.nth || entry.last) {
      for (var y = fromY; y <= toY; y++) {
        var d = resolveHolidayDate(entry, y);
        if (!d) continue;
        if (d.getTime() >= from.getTime() && d.getTime() <= to.getTime()) {
          singleDay.push({
            id:        entry.id,
            name:      entry.name,
            dateLabel: WEEKDAYS_LOCAL[d.getUTCDay()] + ", " + MONTHS_LOCAL[d.getUTCMonth()] + " " + d.getUTCDate(),
            ts:        d.getTime(),
          });
        }
      }
      return;
    }
    if (entry.range) {
      for (var y2 = fromY; y2 <= toY; y2++) {
        var r = resolveHolidayRange(entry, y2);
        if (!r) continue;
        if (r.end.getTime() < from.getTime() || r.start.getTime() > to.getTime()) continue;
        ongoing.push({
          id:        entry.id,
          name:      entry.name,
          dateLabel: "ongoing through " + MONTHS_LOCAL[r.end.getUTCMonth()] + " " + r.end.getUTCDate(),
          ts:        r.start.getTime(),
        });
      }
    }
  });
  singleDay.sort(function(a,b){ return a.ts - b.ts; });
  ongoing.sort(function(a,b){   return a.ts - b.ts; });
  return { singleDay: singleDay, ongoing: ongoing };
}

// Pick a rest-day tip deterministically based on the user's goal + the
// day index (1-7). Deterministic = same plan shows the same tip on the
// same day across renders — no flicker on re-renders, no swap on
// refresh. Falls back to the default catalog when the goal isn't
// recognized or isn't set.
function pickRestDayTip(goal, dayNumber) {
  var catalog = (goal && REST_DAY_TIPS[goal]) || REST_DAY_TIPS_DEFAULT;
  var idx = ((parseInt(dayNumber, 10) || 1) - 1) % catalog.length;
  return catalog[idx];
}

// ─────────────────────────────────────────────────────────────────────────────
// [STREAM-RECOVERY] Two small primitives that together make plan
// generation survive the dominant mobile failure mode: device sleep /
// tab background while the SSE stream is mid-flight.
//
// 1. requestWakeLock — asks the browser to keep the screen awake during
//    generation. When the user sets the phone down, iOS would otherwise
//    auto-lock in 30-60s and kill the HTTP connection, returning the
//    user to "Stream interrupted - tap Generate again." With the Wake
//    Lock held, the screen stays on for the ~20-40s a plan takes.
//
//    Browser support: iOS Safari 16.4+, Chrome 84+, modern Edge / Firefox.
//    Older browsers silently no-op — no benefit, no harm.
//
// 2. The wake lock sentinel is released as soon as generate() finishes
//    (success or failure) so the user doesn't carry a wake lock around
//    after the plan lands. The browser also releases it automatically
//    when the tab is backgrounded; explicit release is just cleaner.
//
// The auto-retry-on-visibility logic lives inside the generate()
// function itself — it needs access to React state setters there, so
// it can't hoist to module scope cleanly.
// ─────────────────────────────────────────────────────────────────────────────
async function requestWakeLock() {
  try {
    if (typeof navigator === "undefined" || !("wakeLock" in navigator)) return null;
    var sentinel = await navigator.wakeLock.request("screen");
    return sentinel;
  } catch (e) {
    // Permission denied / no user gesture / unsupported. Silently no-op.
    return null;
  }
}
function releaseWakeLock(sentinel) {
  if (!sentinel || typeof sentinel.release !== "function") return;
  try { sentinel.release(); } catch (e) {}
}

// ─────────────────────────────────────────────────────────────────────────────
// [PLAN-JOB-RECOVERY] Client side of the streaming-plan recovery flow.
// Companion to api/plan-status.js. When the SSE drops mid-stream, the
// server's Anthropic call usually still completes (Vercel keeps the
// function alive after client disconnect, up to maxDuration) and writes
// the result to plan_jobs. This file gives generate() a way to:
//   1. Mint a UUID v4 (planJobId) per generation, so the server has a
//      stable key to write the row under and the client has a handle
//      to poll with.
//   2. Poll /api/plan-status until the job lands in complete or error.
//
// Used by the plan generate flow's .catch handler: on "Stream
// interrupted," we poll BEFORE kicking off a fresh re-generation —
// if the server already finished the call, we render that result
// instead of paying for a new one.
// ─────────────────────────────────────────────────────────────────────────────
function makePlanJobId() {
  try {
    if (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function") {
      return crypto.randomUUID();
    }
  } catch (e) {}
  // Manual v4 fallback. Math.random isn't cryptographically secure, but
  // collision probability across a single user's generations is fine —
  // server only writes the row if the format passes its UUID regex, and
  // a malformed id just disables recovery for that one call.
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c) {
    var r = (Math.random() * 16) | 0;
    var v = c === "x" ? r : (r & 0x3) | 0x8;
    return v.toString(16);
  });
}

// Poll /api/plan-status until it returns complete / error / missing or
// we hit the cap. Returns the response body when the job lands in
// complete or error; null on missing, network failure across all polls,
// or timeout.
//
// Schedule: tight up-front (1s, 2s, 3s, 4s, 5s — covers the common
// "stream dropped right before completion" case), tapering longer to
// keep the call count down on slow Anthropic responses. Total wall-
// clock budget ~75 seconds. Beyond that the user is better served by
// the auto-retry path kicking off a fresh generation.
async function pollPlanJob(planJobId, token) {
  if (!planJobId || !token) return null;
  var delays = [1000, 2000, 3000, 4000, 5000, 5000, 5000, 5000, 5000, 5000, 8000, 8000, 8000, 10000];
  for (var i = 0; i < delays.length; i++) {
    await new Promise(function(resolve){ setTimeout(resolve, delays[i]); });
    try {
      var r = await fetch("/api/plan-status?id=" + encodeURIComponent(planJobId), {
        headers: { Authorization: "Bearer " + token, "Accept": "application/json" },
      });
      if (r.status === 404) return null; // never persisted; nothing to recover
      if (!r.ok) continue;
      var body = await r.json().catch(function(){ return null; });
      if (!body) continue;
      if (body.status === "complete" || body.status === "error") return body;
      // status === "running" — keep waiting.
    } catch (e) {
      // Transient network failure (e.g. tab just came back online from
      // a backgrounded state). Keep trying.
    }
  }
  return null;
}

// ─────────────────────────────────────────────────────────────────────────────
// [VOICE-FINGERPRINT] Client-side mirror of api/_lib/voice-drift.js's
// computeVoiceFingerprint. Same featurize logic, same categorical
// thresholds — so the "Your voice fingerprint" panel in the profile shows
// the user the exact same numbers the server is feeding the LLM. If the two
// computations diverge, users will see a different fingerprint than the one
// the model receives; keep them in lock-step on any change.
//
// Pure JS, no deps. Runs every render of the profile panel — featurize on
// a 200-word reference is fractions of a millisecond, no need to memoize
// at this scale.
// ─────────────────────────────────────────────────────────────────────────────

var VF_CONTRACTION_RE = /\b\w+'(s|re|ve|m|d|ll|t)\b/gi;
var VF_EMDASH_RE      = /—/g;
var VF_EMOJI_RE       = /\p{Extended_Pictographic}/gu;
var VF_ALLCAPS_RE     = /\b[A-Z]{2,}\b/g;

function vfTokenize(text) {
  return text.toLowerCase().match(/[a-z]+(?:'[a-z]+)?/g) || [];
}
function vfSentenceCount(text) {
  var parts = text.split(/[.!?]+(?:\s+|$)/).filter(function(s){ return s.trim().length > 0; });
  return Math.max(1, parts.length);
}
function vfFeaturize(text) {
  if (!text || typeof text !== "string") return null;
  var words = vfTokenize(text);
  var wc = words.length;
  if (wc < 20) return null;
  var sents = vfSentenceCount(text);
  function per100(n) { return (n * 100) / wc; }
  return {
    wordCount:    wc,
    avgSentLen:   +(wc / sents).toFixed(2),
    avgWordLen:   +(words.reduce(function(s,w){return s + w.length;}, 0) / wc).toFixed(2),
    contractRate: +per100((text.match(VF_CONTRACTION_RE) || []).length).toFixed(2),
    exclamRate:   +per100((text.match(/!/g) || []).length).toFixed(2),
    questionRate: +per100((text.match(/\?/g) || []).length).toFixed(2),
    emdashRate:   +per100((text.match(VF_EMDASH_RE) || []).length).toFixed(2),
    emojiRate:    +per100((text.match(VF_EMOJI_RE) || []).length).toFixed(2),
    allcapsRate:  +per100((text.match(VF_ALLCAPS_RE) || []).length).toFixed(2),
  };
}
// Buckets must match FINGERPRINT_BUCKETS in voice-drift.js exactly.
var VF_BUCKETS = {
  contractRate: { heavy: 4,    averse: 1   },
  exclamRate:   { heavy: 2,    averse: 0.5 },
  questionRate: { heavy: 2,    averse: 0.5 },
  emdashRate:   { heavy: 0.5,  averse: 0   },
  emojiRate:    { heavy: 2,    averse: 0.3 },
  allcapsRate:  { heavy: 1,    averse: 0.2 },
};
function vfBucket(rate, cuts) {
  if (rate >= cuts.heavy)  return "heavy";
  if (rate <= cuts.averse) return "averse";
  return "typical";
}
function computeVoiceFingerprintClient(text) {
  var f = vfFeaturize(text);
  if (!f) return null;
  return {
    wordCount:    f.wordCount,
    avgSentLen:   f.avgSentLen,
    avgWordLen:   f.avgWordLen,
    contractRate: f.contractRate,
    exclamRate:   f.exclamRate,
    questionRate: f.questionRate,
    emdashRate:   f.emdashRate,
    emojiRate:    f.emojiRate,
    allcapsRate:  f.allcapsRate,
    labels: {
      contractions: vfBucket(f.contractRate, VF_BUCKETS.contractRate),
      exclamations: vfBucket(f.exclamRate,   VF_BUCKETS.exclamRate),
      questions:    vfBucket(f.questionRate, VF_BUCKETS.questionRate),
      emdashes:     vfBucket(f.emdashRate,   VF_BUCKETS.emdashRate),
      emojis:       vfBucket(f.emojiRate,    VF_BUCKETS.emojiRate),
      allcaps:      vfBucket(f.allcapsRate,  VF_BUCKETS.allcapsRate),
      sentenceLen:  f.avgSentLen <= 10 ? "short"
                  : f.avgSentLen >= 22 ? "long"
                  : "medium",
    },
  };
}

// Algorithm playbook is now stored in Supabase (`playbook` table) so it's
// editable without a code deploy and so server-side prompt builders can
// inject the same data into every Anthropic call. The Algo tab below
// fetches it on mount via loadPlaybook(); see api/_lib/playbook.js for the
// server-side counterpart used during prompt construction.
async function loadPlaybook() {
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/playbook?select=*", {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + SUPABASE_ANON_KEY },
    });
    if (!res.ok) return {};
    const rows = await res.json();
    const byPlatform = {};
    for (const r of rows) if (r && r.platform) byPlatform[r.platform] = r;
    return byPlatform;
  } catch (e) { return {}; }
}

// Latest trends per platform. Read is public (the trends table is
// transparent — users see what VIRL is conditioning on every week).
async function loadLatestTrends() {
  try {
    // Pull the last ~30 days, then group by platform → most-recent wins.
    const since = new Date(Date.now() - 30 * 86400000).toISOString();
    const url = SUPABASE_URL + "/rest/v1/trends"
      + "?select=platform,summary,items,sources,fetched_at"
      + "&fetched_at=gte." + encodeURIComponent(since)
      + "&order=fetched_at.desc";
    const res = await fetch(url, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + SUPABASE_ANON_KEY },
    });
    if (!res.ok) return {};
    const rows = await res.json();
    const byPlatform = {};
    for (const r of rows) if (r && r.platform && !byPlatform[r.platform]) byPlatform[r.platform] = r;
    return byPlatform;
  } catch (e) { return {}; }
}

// Pending playbook drafts — admin-only fetch. Routes through a service-role
// admin endpoint that verifies the bearer token belongs to the admin email,
// so neither the table nor the data ever exposes to non-admin users.
async function loadPendingPlaybookDrafts(accessToken) {
  if (!accessToken) return [];
  try {
    const res = await fetch("/api/admin/playbook-drafts", {
      headers: { Authorization: "Bearer " + accessToken },
    });
    if (!res.ok) return [];
    const body = await res.json();
    return Array.isArray(body.drafts) ? body.drafts : [];
  } catch (e) { return []; }
}

// Thumbs-up / thumbs-down rating buttons mounted on every generated item
// (plan card, caption option, scan result, script). Sends to /api/rate;
// click toggles between up / down / cleared. Visual state is local —
// we don't fetch existing ratings on mount (most items are short-lived
// per session anyway). The unique-constraint on (user_id, type, ref) in
// Supabase means a second click on the same target just flips the row.
function RatingButtons({sessionToken, generationType, targetRef, size}) {
  const [rating,setRating]   = useState(null);    // "up" | "down" | null
  const [working,setWorking] = useState(false);
  const compact = size === "sm";
  const btnPad  = compact ? "5px 10px" : "7px 12px";
  const btnSize = compact ? 13 : 15;
  const labelSz = compact ? 9  : 10;

  function send(next) {
    if (working || !sessionToken || !targetRef) return;
    setWorking(true);
    const previous = rating;
    setRating(next); // optimistic
    fetch("/api/rate", {
      method:  "POST",
      headers: { "Content-Type":"application/json", "Authorization":"Bearer "+sessionToken },
      body:    JSON.stringify({ generation_type: generationType, target_ref: targetRef, rating: next }),
    })
      .then(function(r){ if (!r.ok) setRating(previous); })
      .catch(function(){ setRating(previous); })
      .finally(function(){ setWorking(false); });
  }

  function onUp()   { send(rating === "up"   ? null : "up");   }
  function onDown() { send(rating === "down" ? null : "down"); }

  return (
    <div style={{display:"inline-flex",alignItems:"center",gap:6}}>
      <button onClick={onUp} disabled={working} aria-label="Thumbs up"
        style={{
          fontFamily:"'Jost',sans-serif",fontSize:btnSize,padding:btnPad,
          background:rating==="up"?B.greenSoft:B.bg,
          color:rating==="up"?B.green:B.muted,
          border:"1px solid "+(rating==="up"?B.green:B.border),
          borderRadius:99,cursor:working?"default":"pointer",lineHeight:1,
        }}>
        {"👍"}
      </button>
      <button onClick={onDown} disabled={working} aria-label="Thumbs down"
        style={{
          fontFamily:"'Jost',sans-serif",fontSize:btnSize,padding:btnPad,
          background:rating==="down"?B.coralSoft:B.bg,
          color:rating==="down"?B.coral:B.muted,
          border:"1px solid "+(rating==="down"?B.coral:B.border),
          borderRadius:99,cursor:working?"default":"pointer",lineHeight:1,
        }}>
        {"👎"}
      </button>
      {rating && (
        <span style={{fontFamily:"'Jost',sans-serif",fontSize:labelSz,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",color:rating==="up"?B.green:B.coral,marginLeft:4}}>
          {rating==="up" ? "Thanks" : "Got it"}
        </span>
      )}
    </div>
  );
}

function FeedbackWidget({sessionToken, activeContext, calendlyUrl}) {
  const [open,setOpen]           = useState(false);
  const [sentiment,setSentiment] = useState(null);
  const [message,setMessage]     = useState("");
  const [submitting,setSubmitting] = useState(false);
  const [thanks,setThanks]       = useState(false);
  const [error,setError]         = useState("");

  function reset() {
    setSentiment(null); setMessage(""); setSubmitting(false); setError(""); setThanks(false);
  }
  function close() { setOpen(false); setTimeout(reset, 200); }

  function submit() {
    if (!message.trim() || submitting) return;
    setSubmitting(true); setError("");
    fetch("/api/feedback", {
      method: "POST",
      headers: {
        "Content-Type":  "application/json",
        "Authorization": "Bearer " + sessionToken,
      },
      body: JSON.stringify({
        sentiment: sentiment,
        message:   message.trim(),
        context:   activeContext || null,
      }),
    }).then(function(r){ return r.json().then(function(j){ return {ok:r.ok, body:j}; }); })
      .then(function(res){
        if (res.ok) {
          setThanks(true);
          setTimeout(close, 2500);
        } else {
          setError((res.body && res.body.error) || "Could not send feedback.");
          setSubmitting(false);
        }
      })
      .catch(function(e){ setError(e.message); setSubmitting(false); });
  }

  // Bottom-right pill. Stays out of the way but always visible.

                  {[

                  ].map(function(s){
                    var active = sentiment === s.key;

                      <button key={s.key} onClick={function(){ setSentiment(active ? null : s.key); }}

                      </button>
                    );

                <textarea value={message} onChange={function(e){ setMessage(e.target.value); }}

                    width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:12,
                    padding:"12px 14px",fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.ink,
                    resize:"vertical",lineHeight:1.6,marginBottom:14,
                  }}/>

                {error && <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:B.coral,marginBottom:12}}>{error}</div>}

                <button onClick={submit} disabled={!message.trim() || submitting}

function PendingPlaybookDraft({draft, token, onResolved}) {
  const [working,setWorking] = useState("");
  const [error,setError]     = useState("");

  function decide(action) {
    if (working) return;
    setWorking(action); setError("");
    fetch("/api/admin/playbook-draft-review", {

function PlaybookEditor({platform, entry, token, onSaved}) {
  const initial = entry || {platform: platform};
  const toForm = function(e){
    return PLAYBOOK_FIELDS.reduce(function(acc, f){
      var v = e[f.key];
      if (f.kind === "list" && Array.isArray(v)) acc[f.key] = v.join(", ");
      else if (v === null || v === undefined) acc[f.key] = "";
      else acc[f.key] = String(v);
      return acc;
    }, {});
  };
  const [form, setForm] = useState(toForm(initial));
  const [saving, setSaving] = useState(false);
  const [status, setStatus] = useState("");

  function update(k, v) { setForm(Object.assign({}, form, {[k]: v})); }

  function save() {
    if (saving) return;
    setSaving(true); setStatus("");
    var payload = {platform: platform};
    for (var i = 0; i < PLAYBOOK_FIELDS.length; i++) {
      var f = PLAYBOOK_FIELDS[i];

        if (res.ok) { setStatus("Saved."); if (onSaved) onSaved(); }
        else { setStatus("Error: " + (res.body && res.body.error || "save failed")); }
      })
      .catch(function(e){ setStatus("Error: " + e.message); })
      .finally(function(){ setSaving(false); });

    <div style={{background:B.card,borderRadius:14,marginBottom:12,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>

                : <input value={form[f.key]||""} onChange={function(e){update(f.key, e.target.value);}} style={commonStyle}/>}

          <button onClick={save} disabled={saving}
            style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"9px 18px",background:saving?B.muted:B.navy,color:B.white,border:"none",borderRadius:99,cursor:saving?"default":"pointer"}}>
            {saving ? "Saving…" : "Save"}

          {status && <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:status.indexOf("Error") === 0 ? B.coral : B.green}}>{status}</div>}
        </div>
      </div>
    </div>
  );
}

function extractJSON(text) {
  if (!text) return null;
  // Try fenced code block first
  const fence = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) { try { return JSON.parse(fence[1].trim()); } catch(e) {} }
  // Pick the outer shape by whichever structural char appears first. The
  // previous order ran the array regex before the object regex, which
  // greedily returned a nested array whenever the response was an object
  // containing an array field — Scan's {score, hashtags:[...]} shape hit
  // this and surfaced as "Analysis returned an unexpected format" in the UI.
  const firstObj = text.indexOf("{");
  const firstArr = text.indexOf("[");
  const outerIsObj = firstObj >= 0 && (firstArr < 0 || firstObj < firstArr);
  if (outerIsObj) {
    const lastBrace = text.lastIndexOf("}");
    if (lastBrace > firstObj) {
      try { return JSON.parse(text.substring(firstObj, lastBrace + 1)); } catch(e) {}
    }
  } else if (firstArr >= 0) {
    const lastBracket = text.lastIndexOf("]");
    if (lastBracket > firstArr) {
      try { return JSON.parse(text.substring(firstArr, lastBracket + 1)); } catch(e) {}
    }
  }
  // Recovery: response may have been truncated mid-array.
  // Try to find the last complete object inside an opening [
  var openIdx = text.indexOf("[");
  if (openIdx >= 0) {
    var depth = 0, lastValidEnd = -1, inString = false, escape = false;
    for (var i = openIdx; i < text.length; i++) {
      var ch = text[i];
      if (escape) { escape = false; continue; }
      if (ch === "\\") { escape = true; continue; }
      if (ch === '"' && !escape) { inString = !inString; continue; }
      if (inString) continue;
      if (ch === "{") depth++;
      else if (ch === "}") {
        depth--;
        if (depth === 0) lastValidEnd = i;
      }
    }
    if (lastValidEnd > openIdx) {
      var candidate = text.substring(openIdx, lastValidEnd + 1) + "]";
      try { return JSON.parse(candidate); } catch(e) {}
    }
  }
  return null;
}

// [TASK 1] Wipe all per-user localStorage on sign-out so the next user signing
// in on the same browser doesn't inherit profile/credits/onboarding flags.
function clearLocalUserData() {
  try {
    const toRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.indexOf("virl_") === 0) toRemove.push(k);
    }
    toRemove.forEach(function(k){ localStorage.removeItem(k); });
  } catch(e) {}
}

// Resolves when the current plan should expire. Aligned with the user's
// per-user credit reset cadence (sbCredits.reset_at), so plan + credits
// tick together — the plan ends when fresh credits arrive. Falls back to
// "now + 7 days" if the credits row hasn't loaded yet, which still gives
// a per-user rolling 7-day window. Note: getNextMonday() (below) is kept
// only for legacy callers; new code should use computePlanExpiry.
function computePlanExpiry(sbCredits) {
  if (sbCredits && sbCredits.reset_at) {
    var ms = Date.parse(sbCredits.reset_at);
    if (!Number.isNaN(ms) && ms > Date.now()) return ms;
  }
  return Date.now() + 7 * 86400000;
}

function getNextMonday() {
  const d = new Date();
  const diff = d.getDay()===0 ? 1 : 8-d.getDay();
  d.setDate(d.getDate()+diff);
  d.setHours(0,0,0,0);
  return d.getTime();
}


function fileToBase64(file) {
  return new Promise(function(res,rej) {
    const r = new FileReader();
    r.onload = function() { res(r.result.split(",")[1]); };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// [SCAN-FIX] Decode an image file, resize to Anthropic's recommended
// max dimension (1568px on the longest side), and re-encode as JPEG
// before sending to the vision API. Solves three real-world failure
// modes that were eating scans:
//   1. HEIC/HEIF iPhone photos — Anthropic only accepts JPEG/PNG/GIF/
//      WebP. Routing through canvas converts HEIC to JPEG on browsers
//      that can decode it (Safari always; Chrome/Firefox sometimes).
//   2. 8-15MB phone photos — Vercel functions cap at 4.5MB and
//      Anthropic caps at 5MB per image. Resizing brings them down to
//      ~200-500KB.
//   3. Unusual mime types (image/avif, image/jp2, etc.) — canvas
//      re-encode normalises everything to image/jpeg.
// Throws with a user-readable message if decode fails (HEIC on
// non-Safari, corrupt file, unsupported format).
async function decodeAndResizeImage(file) {
  if (!file || !file.type || !file.type.indexOf || file.type.indexOf("image/") !== 0) {
    throw new Error("Not an image file.");
  }
  var dataUrl = await new Promise(function(resolve, reject){
    var r = new FileReader();
    r.onload  = function(){ resolve(r.result); };
    r.onerror = function(){ reject(new Error("Could not read this file.")); };
    r.readAsDataURL(file);
  });
  var img = await new Promise(function(resolve, reject){
    var i = new Image();
    i.onload  = function(){ resolve(i); };
    i.onerror = function(){
      var isHeic = file.type === "image/heic" || file.type === "image/heif"
        || /\.(heic|heif)$/i.test(file.name || "");
      reject(new Error(isHeic
        ? "HEIC photos aren't supported here. Save as JPEG from your photos app and try again."
        : "Could not decode this image. Try saving it as JPEG."));
    };
    i.src = dataUrl;
  });
  var MAX_DIM = 1568;
  var w = img.naturalWidth  || img.width  || 0;
  var h = img.naturalHeight || img.height || 0;
  if (!w || !h) throw new Error("Image has zero dimensions.");
  if (w > MAX_DIM || h > MAX_DIM) {
    var scale = Math.min(MAX_DIM / w, MAX_DIM / h);
    w = Math.max(1, Math.round(w * scale));
    h = Math.max(1, Math.round(h * scale));
  }
  var canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  var ctx = canvas.getContext("2d");
  if (!ctx) throw new Error("Image preview not supported in this browser.");
  ctx.drawImage(img, 0, 0, w, h);
  var blob = await new Promise(function(resolve, reject){
    canvas.toBlob(function(b){
      if (b) resolve(b);
      else reject(new Error("Could not encode the image."));
    }, "image/jpeg", 0.85);
  });
  var b64 = await new Promise(function(resolve, reject){
    var fr = new FileReader();
    fr.onload  = function(){ resolve(String(fr.result).split(",")[1]); };
    fr.onerror = function(){ reject(new Error("Could not encode the image.")); };
    fr.readAsDataURL(blob);
  });
  return { b64: b64, mediaType: "image/jpeg" };
}

function extractVideoFrame(file, atSeconds) {
  return new Promise(function(res,rej) {
    const url = URL.createObjectURL(file);
    const vid = document.createElement("video");
    vid.preload = "metadata";
    vid.muted = true;
    vid.onloadedmetadata = function() {
      vid.currentTime = Math.min(atSeconds||1, vid.duration*0.3);
    };
    vid.onseeked = function() {
      // [SCAN-FIX] Resize the captured frame to Anthropic's 1568px
      // longest-side guideline. A 4K video frame is 3840x2160 raw,
      // which encodes to a 1-3MB JPEG and risks tipping over the
      // 4.5MB Vercel function payload cap.
      var MAX_DIM = 1568;
      var vw = vid.videoWidth  || 0;
      var vh = vid.videoHeight || 0;
      var w = vw, h = vh;
      if (w > MAX_DIM || h > MAX_DIM) {
        var scale = Math.min(MAX_DIM / w, MAX_DIM / h);
        w = Math.max(1, Math.round(w * scale));
        h = Math.max(1, Math.round(h * scale));
      }
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      c.getContext("2d").drawImage(vid, 0, 0, w, h);
      c.toBlob(function(blob) {
        const fr = new FileReader();
        fr.onload = function() { res({b64:fr.result.split(",")[1], dur:vid.duration}); };
        fr.onerror = rej;
        fr.readAsDataURL(blob);
      }, "image/jpeg", 0.85);
      URL.revokeObjectURL(url);
    };
    vid.onerror = function() { rej(new Error("Could not load video")); };
    vid.src = url;
  });
}

// [PERF 3] Walk index `start` in `s` (which must point at '{') forward,
// counting brace depth with quote/escape awareness, and return the index of
// the matching closing brace. Returns -1 if the object isn't complete yet,
// which is how the streaming plan parser knows to wait for more data.
function matchObjectEnd(s, start) {
  var depth = 0, inStr = false, escape = false;
  for (var i = start; i < s.length; i++) {
    var ch = s[i];
    if (escape) { escape = false; continue; }
    if (ch === "\\") { escape = true; continue; }
    if (ch === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (ch === "{") depth++;
    else if (ch === "}") { depth--; if (depth === 0) return i; }
  }
  return -1;
}

// [PERF 3] Streaming JSON parser for the plan response shape
// `{ strategy: {...}, cards: [{...},...], stats: {...} }`. Hand-rolled
// brace-counting works fine here because the shape is fixed and small. As
// chunks arrive, push them; callbacks fire exactly once for strategy and
// stats, and once per fully-formed card object. The order of fields in the
// response is whatever the model picks, but the schema example puts strategy
// first, cards next, stats last — that's what we render against.
function createStreamingPlanParser(opts) {
  opts = opts || {};
  // "full"    — emits strategy + cards + stats (default; matches buildPlan output)
  // "partial" — emits only cards (matches buildPlanPartial output: {"cards":[...]})
  var mode = opts.mode === "partial" ? "partial" : "full";
  var buf = "";
  var strategyEmitted = false;
  var statsEmitted    = false;
  var cardsStart      = -1; // index of '[' for the cards array, or -1
  var cardsScan       = -1; // next scan position inside cards[]
  var cardsClosed     = false;
  return {
    push: function (chunk, callbacks) {
      buf += chunk;
      // strategy (skipped in partial mode — server does not emit it)
      if (mode === "full" && !strategyEmitted) {
        var sm = buf.match(/"strategy"\s*:\s*\{/);
        if (sm) {
          var sStart = sm.index + sm[0].length - 1;
          var sEnd   = matchObjectEnd(buf, sStart);
          if (sEnd >= 0) {
            try {
              var obj = JSON.parse(buf.substring(sStart, sEnd + 1));
              if (callbacks.onStrategy) callbacks.onStrategy(obj);
              strategyEmitted = true;
            } catch (e) { /* incomplete despite balanced braces — wait */ }
          }
        }
      }
      // cards array — find the opening once, then scan forward for objects.
      if (cardsStart < 0) {
        var cm = buf.match(/"cards"\s*:\s*\[/);
        if (cm) {
          cardsStart = cm.index + cm[0].length - 1; // points at '['
          cardsScan  = cardsStart + 1;
        }
      }
      if (cardsStart >= 0 && !cardsClosed) {
        while (cardsScan < buf.length) {
          var ch = buf[cardsScan];
          if (ch === " " || ch === "\n" || ch === "\t" || ch === "\r" || ch === ",") { cardsScan++; continue; }
          if (ch === "]") { cardsClosed = true; cardsScan++; break; }
          if (ch !== "{") { break; }
          var end = matchObjectEnd(buf, cardsScan);
          if (end < 0) break; // wait for more
          try {
            var card = JSON.parse(buf.substring(cardsScan, end + 1));
            if (callbacks.onCard) callbacks.onCard(card);
          } catch (e) { /* skip malformed object */ }
          cardsScan = end + 1;
        }
      }
      // stats (skipped in partial mode — server does not emit it)
      if (mode === "full" && !statsEmitted) {
        var tm = buf.match(/"stats"\s*:\s*\{/);
        if (tm) {
          var tStart = tm.index + tm[0].length - 1;
          var tEnd   = matchObjectEnd(buf, tStart);
          if (tEnd >= 0) {
            try {
              var stats = JSON.parse(buf.substring(tStart, tEnd + 1));
              if (callbacks.onStats) callbacks.onStats(stats);
              statsEmitted = true;
            } catch (e) { /* wait */ }
          }
        }
      }
    },
    // After the stream ends, fall back to extractJSON on the whole buffer
    // to catch anything the streaming pass missed (e.g. cards that arrived
    // in a different order, or a final stats object emitted before cards).
    finalize: function () {
      return { fullText: buf, parsed: extractJSON(buf) };
    },
  };
}

// [DATE-FIX] Snapshot of the browser's local now, sent on every /api/chat
// call. The server runs in UTC; using server-side getUTCDay() to label plan
// days caused "Friday" plans when a US-evening user generated on Thursday.
// Sending the user's actual local date + weekday lets the server label days
// correctly across timezones, and lets the prompt inject the real current
// year so models stop referencing 2024 in 2026.
function buildClientNow() {
  var d = new Date();
  var iso = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  return { iso: iso, weekday: d.getDay(), year: d.getFullYear() };
}

// [COMPLIANCE 1] Read the user's last-selected niche from localStorage so
// every /api/chat call can carry it server-side. Plan / plan_partial
// already include `niche` in their params; caption / script / caption_remix
// / scan_image / scan_video_frame do not, but the server's compliance
// loader needs the niche to pick the right per-niche guardrail block.
// Doing this in the wire layer (vs. wiring `niche` through every component
// as a prop) keeps the gen-type call sites untouched. Returns null when
// nothing is stored — the server treats that as out-of-scope and skips
// the compliance block entirely.
function storedNiche() {
  try {
    var raw = localStorage.getItem(KEY);
    if (!raw) return null;
    var parsed = JSON.parse(raw);
    return (parsed && parsed.niche) || null;
  } catch (e) {
    return null;
  }
}

// [PERF 3] SSE-stream consumer for the plan endpoint. Reads the chunked
// response, parses out our wire events ("text", "meta", "error", "reset"),
// and fires callbacks. Wire format (see api/chat.js handleStreamingPlan):
//   event: text\n data: {"delta":"..."}\n\n
//   event: meta\n data: {"cost":N,"usage":{...}}\n\n
//   event: error\n data: {"error":"..."}\n\n
//   event: reset\n data: {}\n\n   (server retrying after max_tokens truncation)
// Resolves with { meta } once the upstream stream completes; rejects on
// transport errors or upstream `error` events.
async function consumePlanStream(generationType, params, opts, callbacks) {
  opts = opts || {};
  // [DATE-FIX] Merge browser-local date into params so buildPlan can label
  // days against the user's local weekday instead of UTC.
  // [COMPLIANCE 1] Also fall back to the stored niche when callers don't
  // pass one explicitly — keeps the server's compliance loader from
  // missing real-estate / wellness creators on regen flows.
  var mergedParams = Object.assign({}, params || {}, { clientNow: buildClientNow() });
  if (!mergedParams.niche) {
    var n = storedNiche();
    if (n) mergedParams.niche = n;
  }
  var body = { generationType: generationType, params: mergedParams };
  // plan_partial reuses the parent plan's Perplexity snapshot so the
  // single-card regen sees the same trend signal as the cards it's joining.
  if (opts.trendsSnapshot) body.trendsSnapshot = opts.trendsSnapshot;
  var headers = { "Content-Type": "application/json", "Accept": "text/event-stream" };
  if (opts.token) headers["Authorization"] = "Bearer " + opts.token;
  var res;
  try {
    res = await fetch("/api/chat", { method: "POST", headers: headers, body: JSON.stringify(body) });
  } catch (e) { throw new Error("Connection issue - check your internet and try again."); }
  if (res.status === 402) {
    var data402 = await res.json().catch(function(){ return {}; });
    throw new Error(data402.error || "Not enough credits this week.");
  }
  if (res.status === 401) throw new Error("Session expired - please sign out and sign in again.");
  if (res.status === 429) {
    var data429 = await res.json().catch(function(){ return {}; });
    throw new Error(data429.error || "Slow down - too many requests. Try again in a moment.");
  }
  if (!res.ok) {
    var dataErr = await res.json().catch(function(){ return {}; });
    throw new Error(dataErr.error || ("Server error " + res.status));
  }
  if (!res.body || !res.body.getReader) {
    throw new Error("Streaming not supported in this browser - please update or try a different one.");
  }

  var reader  = res.body.getReader();
  var decoder = new TextDecoder("utf-8");
  var sseBuf  = "";
  var meta    = null;
  var upstreamErr = null;

  function processEvent(rawEvent) {
    var lines = rawEvent.split("\n");
    var eventName = "message";
    var dataStr = "";
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (line.indexOf("event:") === 0) eventName = line.slice(6).trim();
      else if (line.indexOf("data:") === 0) dataStr += line.slice(5).replace(/^ /, "");
    }
    if (!dataStr) return;
    var payload;
    try { payload = JSON.parse(dataStr); } catch (e) { return; }
    if (eventName === "text" && callbacks.onText) callbacks.onText(payload.delta || "");
    else if (eventName === "meta") meta = payload;
    else if (eventName === "error") upstreamErr = payload.error || "AI error";
    // Server retries on max_tokens truncation. Caller resets its progressive
    // parser + UI so subsequent text deltas are treated as a fresh response.
    else if (eventName === "reset" && callbacks.onReset) callbacks.onReset();
  }

  while (true) {
    var step;
    try { step = await reader.read(); }
    catch (e) { throw new Error("Stream interrupted - tap Generate again."); }
    if (step.done) break;
    sseBuf += decoder.decode(step.value, { stream: true });
    var idx;
    while ((idx = sseBuf.indexOf("\n\n")) >= 0) {
      var raw = sseBuf.slice(0, idx);
      sseBuf = sseBuf.slice(idx + 2);
      if (raw.trim()) processEvent(raw);
    }
  }
  if (sseBuf.trim()) processEvent(sseBuf);

  if (upstreamErr) throw new Error(upstreamErr);
  return { meta: meta };
}

// Calls the unified /api/chat endpoint. Server owns prompt construction,
// model selection, max-token limits, and credit cost — the client only
// names the generation type and supplies its parameters.
//
// Returns { text, cost } — `cost` is what the server actually deducted, so
// callers use it for optimistic credit-counter ticks instead of duplicating
// the cost table client-side.
async function callAPI(generationType, params, opts) {
  opts = opts || {};
  // [DATE-FIX] See buildClientNow — used by every generation type so the
  // model gets the user's actual current year + weekday.
  // [COMPLIANCE 1] Inject the user's last-selected niche from localStorage
  // so non-plan gen types (caption / script / caption_remix / scan_image /
  // scan_video_frame) reach the server with the niche signal the
  // compliance loader keys off. Explicit params.niche still wins so
  // callers can override per request.
  const mergedParams = Object.assign({}, params || {}, { clientNow: buildClientNow() });
  if (!mergedParams.niche) {
    const n = storedNiche();
    if (n) mergedParams.niche = n;
  }
  const body = { generationType, params: mergedParams };
  if (opts.imageBase64) { body.imageBase64 = opts.imageBase64; body.imageType = opts.imageType; }
  // Caller may pass the parent plan's Perplexity snapshot on regen flows
  // (plan_strategy / future regen types) so the server reuses it instead
  // of firing a duplicate inline call and re-charging the user's freebie.
  if (opts.trendsSnapshot) body.trendsSnapshot = opts.trendsSnapshot;
  const headers = { "Content-Type": "application/json" };
  if (opts.token) headers["Authorization"] = "Bearer " + opts.token;
  let res;
  try {
    res = await fetch("/api/chat", { method: "POST", headers, body: JSON.stringify(body) });
  } catch(e) { throw new Error("Connection issue - check your internet and try again."); }
  let data;
  try {
    data = await res.json();
  } catch(e) {
    throw new Error("Server error "+res.status+" - check your API configuration and try again.");
  }
  if (res.status===402) throw new Error(data.error||"Not enough credits this week.");
  if (res.status===401) throw new Error("Session expired - please sign out and sign in again.");
  if (res.status===400) throw new Error(data.error||"Bad request.");
  if (res.status===429) throw new Error(data.error||"Slow down — too many requests. Try again in a moment.");
  if (res.status===500) throw new Error(data.error||"Server error - check your Vercel function logs.");
  if (!res.ok) throw new Error(data.error || "Server error "+res.status+" - please try again.");
  if (!data.text) throw new Error("Empty response from AI - please try again.");
  return data;
}

// [UX-01] Per-card status indicator helpers. Saved + posted state is
// mirrored to localStorage with timestamp values so the dot / checkmark
// indicators can render instantly without round-tripping to Supabase,
// and so the "posted last week" banner can count cards across plan
// regenerations. Keys are intentionally per-card so they survive
// localStorage cache wipes scoped at the user-data level.
function buildCardId(card) {
  if (!card) return "";
  return (card.title || "") + (card.day || "");
}
function setCardSaved(cardId) {
  if (!cardId) return;
  try { localStorage.setItem("virl_saved_" + cardId, String(Date.now())); } catch (e) {}
}
function isCardSaved(cardId) {
  if (!cardId) return false;
  try { return !!localStorage.getItem("virl_saved_" + cardId); } catch (e) { return false; }
}
function setCardPosted(cardId) {
  if (!cardId) return;
  try { localStorage.setItem("virl_posted_" + cardId, String(Date.now())); } catch (e) {}
}
function clearCardPosted(cardId) {
  if (!cardId) return;
  try { localStorage.removeItem("virl_posted_" + cardId); } catch (e) {}
}
function isCardPosted(cardId) {
  if (!cardId) return false;
  try { return !!localStorage.getItem("virl_posted_" + cardId); } catch (e) { return false; }
}
// [UX-01] Returns count of cards posted between 7 and 14 days ago that
// don't yet have results logged. Used by the Plan-tab banner.
function countPostedLastWeekUnlogged(results) {
  var now = Date.now();
  var weekMs = 7 * 86400000;
  var loggedIds = {};
  if (Array.isArray(results)) {
    for (var i = 0; i < results.length; i++) {
      var r = results[i];
      if (r && r.id) loggedIds[r.id] = true;
    }
  }
  var count = 0;
  try {
    for (var k = 0; k < localStorage.length; k++) {
      var key = localStorage.key(k);
      if (!key || key.indexOf("virl_posted_") !== 0) continue;
      var raw = localStorage.getItem(key);
      var ts  = raw ? parseInt(raw, 10) : 0;
      if (!Number.isFinite(ts) || ts <= 0) continue;
      var age = now - ts;
      if (age < weekMs || age >= 2 * weekMs) continue;
      var id = key.slice("virl_posted_".length);
      if (loggedIds[id]) continue;
      count++;
    }
  } catch (e) { return 0; }
  return count;
}

// [PREMIUM 3] Loops event helper. Fire-and-forget — never blocks the
// caller, never throws. Built initially for the tenPlansMilestone
// celebration; PREMIUM 7 will reuse this for the rest of the
// lifecycle email triggers (welcome, profile-incomplete, trial-end,
// etc). Auth header is required so the proxy can verify the caller
// owns the user_id it sends to Loops.
async function fireLoopsEvent(eventName, properties) {
  if (typeof window === "undefined") return;
  var token = window.__virlUserToken || null;
  if (!token) return;
  try {
    await fetch("/api/loops-event", {
      method:  "POST",
      headers: {
        "Content-Type":  "application/json",
        "Authorization": "Bearer " + token,
      },
      body: JSON.stringify({
        eventName:  eventName,
        properties: properties || {},
      }),
    });
  } catch (e) { /* non-critical — never block UI on lifecycle events */ }
}

async function logEvent(userId, eventName, properties, token) {
  // Fall back to the globals the App-level useEffect mirrors from the
  // active session. Lets event-firing components stay simple — they don't
  // need to thread userId / token through props just to record telemetry.
  var uid = userId || (typeof window !== "undefined" ? window.__virlUserId    : null);
  var tok = token  || (typeof window !== "undefined" ? window.__virlUserToken : null);
  if (!uid) return;
  try {
    await fetch(SUPABASE_URL+"/rest/v1/events", {
      method: "POST",
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        // RLS on `events` checks auth.uid() === user_id, so the user's
        // bearer token is required — anon key alone gets rejected.
        "Authorization": "Bearer "+(tok||SUPABASE_ANON_KEY),
        "Content-Type": "application/json",
        "Prefer": "return=minimal",
      },
      body: JSON.stringify({
        user_id: uid,
        event_name: eventName,
        properties: properties||{},
      }),
    });
  } catch(e) { /* non-critical — never block UI on analytics */ }
}

// [TASK 10] Extract platform/format patterns from the Vault so VIRL can weight
// similar styles in future plans. Only counts plan-type saves (captions have
// no platform/format metadata). Format is optional on legacy items, so the
// helper falls back to platform when format data isn't available.
function getVaultPatterns(vault) {
  if (!vault || !vault.length) return {count:0, topPlatform:null, topFormat:null};
  var planItems = vault.filter(function(v){ return v.type === "plan"; });
  if (!planItems.length) return {count:0, topPlatform:null, topFormat:null};
  var platformCounts = {};
  var formatCounts = {};
  planItems.forEach(function(v) {
    if (v.platform) platformCounts[v.platform] = (platformCounts[v.platform]||0) + 1;
    if (v.format)   formatCounts[v.format]     = (formatCounts[v.format]||0)     + 1;
  });
  function top(counts) {
    var best = null, max = 0;
    Object.keys(counts).forEach(function(k){ if (counts[k] > max) { max = counts[k]; best = k; } });
    return best;
  }
  return {count:planItems.length, topPlatform:top(platformCounts), topFormat:top(formatCounts)};
}

function CopyBtn({text,label}) {

  const [copied,setCopied] = useState(false);
  function doCopy() {
    navigator.clipboard&&navigator.clipboard.writeText(text).then(function() {

  return (

}

// Strip a leading "#" if the model returned hashtags with the prefix already
// — otherwise we render "##fitness". Belt-and-braces: the prompt also tells
// the model not to include the "#", but we don't trust upstream to comply.
const cleanHashtag = (h) => String(h || "").replace(/^#+/, "").trim();
const HashtagRow = ({hashtags}) => {
  if (!hashtags||!hashtags.length) return null;
  const cleaned = hashtags.map(cleanHashtag).filter(Boolean);
  if (!cleaned.length) return null;
  const text = cleaned.map(function(h){return "#"+h;}).join(" ");
  return (
    <div style={{background:B.skySoft,borderRadius:12,padding:"14px 18px",marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>

      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {cleaned.map(function(h){return (
          <span key={h} style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:500,color:B.blue,padding:"4px 12px",background:B.card,borderRadius:99}}>{"#"+h}</span>
        );})}

};

function SharePlanCard({card}) {
  const [copied,setCopied] = useState(false);
  function sharePost() {
    const tags = (card.hashtags&&card.hashtags.length)
      ? "\n\n"+card.hashtags.map(cleanHashtag).filter(Boolean).map(function(h){return "#"+h;}).join(" ") : "";
    const text = "\ud83d\udcc5 "+card.day+" - "+card.platform
      +"\n\n\ud83d\udccc "+card.title
      +"\n\n"+card.description
      +"\n\n\ud83d\udd50 Post at: "+card.postTime
      +"\n\u2756 Trend: "+card.trend
      +tags+"\n\nStrategy by VIRL \u00b7 govirl.ai";

      setCopied(true); setTimeout(function(){setCopied(false);},2000);
