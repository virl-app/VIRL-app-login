function extractJSON(text) {
if (!text) return null;
const fence = text.match(/`(?:json)?\s*([\s\S]*?)`/);
if (fence) { try { return JSON.parse(fence[1].trim()); } catch(e) {} }
const arr = text.match(/[[\s\S]*]/);
if (arr) { try { return JSON.parse(arr[0]); } catch(e) {} }
const obj = text.match(/{[\s\S]*}/);
if (obj) { try { return JSON.parse(obj[0]); } catch(e) {} }
return null;
}

function getNextMonday() {
const d = new Date();
const diff = d.getDay()===0 ? 1 : 8-d.getDay();
d.setDate(d.getDate()+diff);
d.setHours(0,0,0,0);
return d.getTime();
}

function getCredits() {
try {
const stored = JSON.parse(localStorage.getItem(CREDIT_KEY)||”{}”);
if (!stored.resetAt || Date.now() > stored.resetAt) {
const fresh = {credits:WEEKLY_CREDITS, resetAt:getNextMonday()};
localStorage.setItem(CREDIT_KEY, JSON.stringify(fresh));
return fresh;
}
return stored;
} catch(e) { return {credits:WEEKLY_CREDITS, resetAt:getNextMonday()}; }
}

function spendCredits(amount) {
try {
const state = getCredits();
if (state.credits < amount) return false;
state.credits = Math.max(0, state.credits - amount);
localStorage.setItem(CREDIT_KEY, JSON.stringify(state));
return true;
} catch(e) { return true; }
}

function daysUntilReset() {
const state = getCredits();
return Math.max(1, Math.ceil((state.resetAt - Date.now()) / 86400000));
}

function fileToBase64(file) {
return new Promise(function(res,rej) {
const r = new FileReader();
r.onload = function() { res(r.result.split(”,”)[1]); };
r.onerror = rej;
r.readAsDataURL(file);
});
}

function extractVideoFrame(file, atSeconds) {
return new Promise(function(res,rej) {
const url = URL.createObjectURL(file);
const vid = document.createElement(“video”);
vid.preload = “metadata”;
vid.muted = true;
vid.onloadedmetadata = function() {
vid.currentTime = Math.min(atSeconds||1, vid.duration*0.3);
};
vid.onseeked = function() {
const c = document.createElement(“canvas”);
c.width = vid.videoWidth; c.height = vid.videoHeight;
c.getContext(“2d”).drawImage(vid,0,0);
c.toBlob(function(blob) {
const fr = new FileReader();
fr.onload = function() { res({b64:fr.result.split(”,”)[1], dur:vid.duration}); };
fr.onerror = rej;
fr.readAsDataURL(blob);
}, “image/jpeg”, 0.85);
URL.revokeObjectURL(url);
};
vid.onerror = function() { rej(new Error(“Could not load video”)); };
vid.src = url;
});
}

async function callAPI(prompt, maxTokens, imageBase64, imageType, cost, token) {
const body = { prompt, maxTokens };
if (imageBase64) { body.imageBase64 = imageBase64; body.imageType = imageType; }
if (cost) body.cost = cost;
if (token) body.token = token;
let res;
try {
res = await fetch(”/api/chat”, {method:“POST”,headers:{“Content-Type”:“application/json”},body:JSON.stringify(body)});
} catch(e) { throw new Error(“Connection issue - check your internet and try again.”); }
let data;
try {
data = await res.json();
} catch(e) {
// Server returned non-JSON (e.g. HTML error page) - surface the real status
throw new Error(“Server error “+res.status+” - check your API configuration and try again.”);
}
if (res.status===402) throw new Error(data.error||“Not enough credits this week.”);
if (res.status===401) throw new Error(“Session expired - please sign out and sign in again.”);
if (res.status===500) throw new Error(data.error||“Server error - check your Vercel function logs.”);
if (!res.ok) throw new Error(data.error || “Server error “+res.status+” - please try again.”);
if (!data.text) throw new Error(“Empty response from AI - please try again.”);
return data.text;
}

function VIRLScan({profile,onSaveCaption}) {
const [files,setFiles] = useState([]);
const [results,setResults] = useState([]);

const [error,setError] = useState(””);
const [consented,setConsented] = useState(function(){
try { return localStorage.getItem(“virl_scan_consent”)===“true”; } catch(e) { return false; }
});
const inputRef = useRef(null);

function scoreColor(s) {
const m = String(s).match(/(\d+.?\d*)/);
const n = m ? parseFloat(m[1]) : 0;
return n>=8?B.green:n>=6?B.amber:B.muted;
}

function handleConsent() {
try { localStorage.setItem(“virl_scan_consent”,“true”); } catch(e) {}
setConsented(true);
}

function handleFiles(e) {
setFiles(Array.from(e.target.files||[]).slice(0,5));
setResults([]); setError(””);
}

function scan() {
if (!files.length) return;
const cost = files.length * CREDIT_COSTS.scan;
// Credit check handled server-side
setScanning(true); setResults([]); setError(””); setCurrent(0);
const voiceCtx = profile.voice?“The creator’s voice is: “+profile.voice+”.” :””;
const out = [];
var i = 0;
function next() {
if (i>=files.length) { setResults(out); setScanning(false); return; }
var file = files[i]; i++; setCurrent(i);
var isVideo = file.type.startsWith(“video/”);
if (isVideo) {
extractVideoFrame(file,1).then(function(fd) {
var prompt = “You are VIRL, an AI content strategist. “+voiceCtx+” Analyze this video frame for social media viral potential. Reply ONLY with JSON: {"score":"X.X out of 10","platform":"best platform","hook":"scroll-stopping opening line under 10 words","caption":"full ready-to-post caption with emojis","hashtags":["tag1","tag2","tag3","tag4","tag5"],"tip":"one tip to maximize this post","analysis":"2 sentences on why this will perform","thumbnailNote":"one sentence on why this frame works as a thumbnail"}”;
return callAPI(prompt,700,fd.b64,“image/jpeg”).then(function(text) {
var parsed = extractJSON(text);
if (parsed) { out.push(Object.assign({name:file.name,isVideo:true,duration:fd.dur},parsed)); }
else { out.push({name:file.name,isVideo:true,error:“Could not analyze this video. Try a screenshot of your best moment instead.”}); }
next();
});
}).catch(function() {
out.push({name:file.name,isVideo:true,error:“Could not extract a frame from this video. Try screenshotting your best moment and scanning that instead.”});
next();
});
} else {
fileToBase64(file).then(function(b64) {
var prompt = “You are VIRL, an AI content strategist. “+voiceCtx+” Analyze this image for viral potential. Reply ONLY with JSON: {"score":"X.X out of 10","platform":"best platform","hook":"scroll-stopping opening line under 10 words","caption":"full ready-to-post caption with emojis","hashtags":["tag1","tag2","tag3","tag4","tag5"],"tip":"one tip to maximize this post","analysis":"2 sentences on why this will perform"}”;
return callAPI(prompt,700,b64,file.type);
}).then(function(text) {
var parsed = extractJSON(text);
if (parsed) { out.push(Object.assign({name:file.name,url:URL.createObjectURL(file)},parsed)); }
else { out.push({name:file.name,error:“Could not analyze. Try screenshotting it first to reduce file size.”}); }
next();
}).catch(function(e) {
out.push({name:file.name,error:e.message+” - Try screenshotting first.”}); next();
});
}
}
next();
}

function GateScreen({onAuth}) {

const [password,setPassword] = useState(””);

const [authError,setAuthError] = useState(””);
function handleEmailAuth() {
if (!email.trim()||!password.trim()) return;
setAuthLoading(true); setAuthError(””);
var p = mode===“signup”
? supabaseClient.auth.signUp({email:email.trim(),password:password.trim()})
: supabaseClient.auth.signInWithPassword({email:email.trim(),password:password.trim()});
p.then(function(result) {
setAuthLoading(false);
if (result.error) { setAuthError(result.error.message); return; }
if (mode===“signup”) {
setAuthError(“Check your email to confirm your account, then sign in.”);
setMode(“login”); setPassword(””);
} else {
onAuth(result.data.session);
}
}).catch(function(e){ setAuthLoading(false); setAuthError(e.message); });
}
