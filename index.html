        <div style={{width:18,height:18,border:"2px solid "+(learnFromEdits?B.blue:B.border),borderRadius:4,background:learnFromEdits?B.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2,transition:"all .15s"}}>
          {learnFromEdits&&<span style={{color:B.white,fontSize:12,lineHeight:1}}>{"✓"}</span>}
        </div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:600,color:learnFromEdits?B.navy:B.ink,marginBottom:4,lineHeight:1.4}}>
            Learn from my edits
          </div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.muted,lineHeight:1.6}}>
            Capture the changes you make to drafts (plan cards, captions, hooks, scripts) as voice examples.
          </div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"flex-start",gap:12,padding:"14px 16px",background:learnFromVault?B.navySoft:B.bg,border:"1px solid "+(learnFromVault?B.blue:B.border),borderRadius:12,cursor:"pointer",transition:"all .2s",marginBottom:10}}
        onClick={function(){ setLearnFromVault(function(v){ return !v; }); }}>
        <div style={{width:18,height:18,border:"2px solid "+(learnFromVault?B.blue:B.border),borderRadius:4,background:learnFromVault?B.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2,transition:"all .15s"}}>
          {learnFromVault&&<span style={{color:B.white,fontSize:12,lineHeight:1}}>{"✓"}</span>}
        </div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:600,color:learnFromVault?B.navy:B.ink,marginBottom:4,lineHeight:1.4}}>
            Learn from my saved posts
          </div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.muted,lineHeight:1.6}}>
            Use items you save to vault as voice references in future plans, captions, and scripts.
          </div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"flex-start",gap:12,padding:"14px 16px",background:learnFromResults?B.navySoft:B.bg,border:"1px solid "+(learnFromResults?B.blue:B.border),borderRadius:12,cursor:"pointer",transition:"all .2s",marginBottom:10}}
        onClick={function(){ setLearnFromResults(function(v){ return !v; }); }}>
        <div style={{width:18,height:18,border:"2px solid "+(learnFromResults?B.blue:B.border),borderRadius:4,background:learnFromResults?B.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2,transition:"all .15s"}}>
          {learnFromResults&&<span style={{color:B.white,fontSize:12,lineHeight:1}}>{"✓"}</span>}
        </div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:600,color:learnFromResults?B.navy:B.ink,marginBottom:4,lineHeight:1.4}}>
            Learn from my logged results
          </div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.muted,lineHeight:1.6}}>
            Lean harder on content patterns that have performed well for you in real engagement data.
          </div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"flex-start",gap:12,padding:"14px 16px",background:learnFromPublicPosts?B.navySoft:B.bg,border:"1px solid "+(learnFromPublicPosts?B.blue:B.border),borderRadius:12,cursor:"pointer",transition:"all .2s",marginBottom:10}}
        onClick={function(){ setLearnFromPublicPosts(function(v){ return !v; }); }}>
        <div style={{width:18,height:18,border:"2px solid "+(learnFromPublicPosts?B.blue:B.border),borderRadius:4,background:learnFromPublicPosts?B.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2,transition:"all .15s"}}>
          {learnFromPublicPosts&&<span style={{color:B.white,fontSize:12,lineHeight:1}}>{"✓"}</span>}
        </div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:600,color:learnFromPublicPosts?B.navy:B.ink,marginBottom:4,lineHeight:1.4}}>
            Research my public posts
          </div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.muted,lineHeight:1.6}}>
            Pull style cues from public posts on the handles you provided. Done via Perplexity (third-party). Only your public content.
          </div>
        </div>
      </div>
      <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,lineHeight:1.55,marginTop:12,paddingTop:14,borderTop:"1px solid "+B.divider}}>
        Turning any toggle off is forward-looking — it stops future use of that source but doesn't delete data already collected. To wipe everything VIRL has learned, use <strong style={{color:B.navy}}>Delete account</strong> in Settings.
      </div>
    </div>
  );

  return (
    <div>
      {/* [TASK 6] Tier-based completeness meter — replaces the section-count
          progress bar so the user sees exactly what each field unlocks. */}
      <div style={{background:B.card,borderRadius:14,padding:"16px 20px",marginBottom:16,boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:600,color:B.ink}}>Profile completeness</div>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:tierInfo.color,border:"1px solid "+tierInfo.color,padding:"2px 9px",borderRadius:99,lineHeight:1.4,whiteSpace:"nowrap"}}>{tierInfo.label}</div>
          </div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:B.muted,flexShrink:0}}>{tierInfo.percent+"%"}</div>
        </div>
        <div style={{background:B.bg,borderRadius:99,height:6,overflow:"hidden"}}>
          <div style={{width:tierInfo.percent+"%",height:"100%",background:tierInfo.color,borderRadius:99,transition:"width .4s ease, background .4s ease"}}/>
        </div>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:eliteDone?B.green:B.muted,marginTop:10,lineHeight:1.55}}>
          {tierInfo.copy}
        </div>
      </div>

      {/* [PROFILE-WIZARD][PR-A2] Section 01 — You & your voice.
          Identity + positioning fields. knownFor moved here from
          the former "strategy" section so the answer to "what do
          you want to be known for" lives next to the voice that
          delivers it. Where-do-you-post stays here because the
          per-platform configuration in section 04 depends on it. */}
      <div id="profile-section-voice" style={{background:B.card,borderRadius:16,boxShadow:"0 1px 3px rgba(0,0,0,0.05)",marginBottom:12,overflow:"hidden"}}>
        <SectionHeader idx={0} expanded={expandedIdx===0} filled={sectionFilled("voice")}/>
        {expandedIdx === 0 && 0 <= maxUnlocked && (
          <div style={{padding:"4px 24px 22px"}}>
            <div id="vp-name" style={{marginBottom:18}}>
              <Label>Your first name <TierBadge tier="basic"/></Label>
              <input value={name} onChange={function(e){setName(e.target.value);}} placeholder="What should VIRL call you?" style={inputStyle}/>
            </div>
            <div id="vp-voice" style={{marginBottom:18}}>
              <Label>Describe your voice in your own words <span style={{color:B.coral,fontSize:10,fontWeight:600,letterSpacing:0,textTransform:"none"}}>most important field</span> <TierBadge tier="dialed"/></Label>
              <textarea value={voice} onChange={function(e){setVoice(e.target.value);}}
                placeholder="e.g. Real, a little funny, never preachy. I talk to my audience like they are my group chat."
                style={Object.assign({},textareaStyle,{minHeight:88})}/>
            </div>
            <div id="vp-audience" style={{marginBottom:18}}>
              <Label>Who is your ideal audience or client? <TierBadge tier="basic"/></Label>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,marginBottom:6,lineHeight:1.55}}>
                Get specific — demographic + what they're after. For service businesses, describe your ideal client too. Section 02 has space to go deeper on the problem they have when they find you.
              </div>
              <textarea value={audience} onChange={function(e){setAudience(e.target.value);}}
                placeholder="e.g. Millennial moms 28-38 who want real talk about parenting and home life — OR — First-time homebuyers in their late 20s priced out of their dream neighborhood"
                style={Object.assign({},textareaStyle,{minHeight:72})}/>
            </div>
            <div id="vp-knownFor" style={{marginBottom:18}}>
              <Label>One thing you want to be known for <TierBadge tier="dialed"/></Label>
              <input value={knownFor} onChange={function(e){setKnownFor(e.target.value);}} placeholder="e.g. makes busy moms feel like they have their life together" style={Object.assign({},inputStyle,{fontStyle:"italic"})}/>
            </div>
            <div style={{marginBottom:4}}>
              <Label>Where do you post?</Label>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{PLATFORMS.map(function(p){return <Chip key={p} active={myPlatforms.includes(p)} onClick={function(){setMyPlatforms(tog(myPlatforms,p));}}>{p}</Chip>;})}</div>
            </div>
            <SectionFooter idx={0}/>
          </div>
        )}
      </div>

      {/* [PROFILE-WIZARD][PR-B] Section 02 — Your business.
          Service-business depth: offerings, service area, ideal-
          client problem, primary CTA, common objections. Every field
          is optional — personal-brand creators leave them blank and
          profile completeness isn't affected. Each field VIRL has
          is one more signal it uses to generate content that
          actually converts. */}
      <div id="profile-section-business" style={{background:B.card,borderRadius:16,boxShadow:"0 1px 3px rgba(0,0,0,0.05)",marginBottom:12,overflow:"hidden"}}>
        <SectionHeader idx={1} expanded={expandedIdx===1} filled={sectionFilled("business")}/>
        {expandedIdx === 1 && 1 <= maxUnlocked && (
          <div style={{padding:"4px 24px 22px"}}>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.muted,lineHeight:1.65,marginBottom:18,padding:"10px 14px",background:B.navySoft,borderRadius:10,border:"1px solid "+B.border}}>
              These fields unlock content that actually converts — for real estate agents, dental practices, coaches, fitness pros, small businesses. Every one is optional. Skip the whole section if you're a personal brand only.
            </div>

            <div id="vp-businessWebsite" style={{marginBottom:18}}>
              <Label>Your business or brand website</Label>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,lineHeight:1.55,marginBottom:6}}>
                VIRL uses this as the canonical link destination in CTAs. If you've opted into "Research my public posts" under Personalization & Privacy, VIRL also reads your site for voice + offerings.
              </div>
              <input value={businessWebsite} onChange={function(e){setBusinessWebsite(e.target.value);}} placeholder="https://yourbusiness.com" style={Object.assign({},inputStyle,{fontStyle:"italic"})}/>
            </div>

            <div id="vp-offerings" style={{marginBottom:18}}>
              <Label>What do you offer?</Label>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,lineHeight:1.55,marginBottom:6}}>
                List your real services, packages, or products by name. VIRL will reference these instead of inventing offerings.
              </div>
              <textarea value={offerings} onChange={function(e){setOfferings(e.target.value);}}
                placeholder="e.g. Listing presentations, buyer consultations, market analyses, off-market property tours"
                style={Object.assign({},textareaStyle,{minHeight:66})}/>
            </div>

            <div id="vp-serviceArea" style={{marginBottom:18}}>
              <Label>Service area</Label>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,lineHeight:1.55,marginBottom:6}}>
                If your business is local, name the city/region/markets you serve. VIRL will keep content grounded there and won't reference other markets.
              </div>
              <input value={serviceArea} onChange={function(e){setServiceArea(e.target.value);}}
                placeholder="e.g. Phoenix metro + Scottsdale, AZ"
                style={Object.assign({},inputStyle,{fontStyle:"italic"})}/>
            </div>

            <div id="vp-idealClientProblem" style={{marginBottom:18}}>
              <Label>Ideal client + their problem</Label>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,lineHeight:1.55,marginBottom:6}}>
                Sharper version of "Who is your audience" — what's the specific pain that brings them to you? Content can then speak directly to that pain.
              </div>
              <textarea value={idealClientProblem} onChange={function(e){setIdealClientProblem(e.target.value);}}
                placeholder="e.g. First-time homebuyers in their late 20s who feel priced out of their dream neighborhood and don't know whether to keep waiting or stretch their budget"
                style={Object.assign({},textareaStyle,{minHeight:72})}/>
            </div>

            <div id="vp-primaryCta" style={{marginBottom:18}}>
              <Label>Primary call-to-action</Label>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,lineHeight:1.55,marginBottom:6}}>
                How do you close posts? VIRL will use this CTA pattern when it fits the post's intent. Adapt wording per post; same action.
              </div>
              <input value={primaryCta} onChange={function(e){setPrimaryCta(e.target.value);}}
                placeholder="e.g. DM 'GUIDE' for the first-time buyer roadmap — OR — Book a 15-min discovery call (link in bio)"
                style={Object.assign({},inputStyle,{fontStyle:"italic"})}/>
            </div>

            <div id="vp-commonObjections" style={{marginBottom:4}}>
              <Label>Common objections you hear</Label>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,lineHeight:1.55,marginBottom:6}}>
                The hesitations or pushback you get from prospects most. VIRL will resolve these head-on in generated content — turning each into a hook, story, or counter-frame.
              </div>
              <textarea value={commonObjections} onChange={function(e){setCommonObjections(e.target.value);}}
                placeholder="e.g. 'Rates are too high right now', 'I don't want to commit', 'I should wait for prices to drop'"
                style={Object.assign({},textareaStyle,{minHeight:66})}/>
            </div>

            <SectionFooter idx={1}/>
          </div>
        )}
      </div>

      {/* [PROFILE-WIZARD][PR-A2] Section 03 — Your content.
          Pillars + topics + posting cadence + content length + emoji
          preference. Pulls pillars and topics out of the former
          "strategy" section; pulls cadence, length, and emoji out
          of the former "style" section so all "what + how often"
          decisions live together. */}
      <div id="profile-section-content" style={{background:B.card,borderRadius:16,boxShadow:"0 1px 3px rgba(0,0,0,0.05)",marginBottom:12,overflow:"hidden"}}>
        <SectionHeader idx={2} expanded={expandedIdx===2} filled={sectionFilled("content")}/>
        {expandedIdx === 2 && 2 <= maxUnlocked && (
          <div style={{padding:"4px 24px 22px"}}>
            <div style={{marginBottom:18}}>
              <Label>Your content pillars</Label>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{PILLARS.map(function(p){return <Chip key={p} active={pillars.includes(p)} onClick={function(){setPillars(tog(pillars,p));}}>{p}</Chip>;})}</div>
            </div>
            <div style={{marginBottom:18}}>
              <Label>Topics you love to create about</Label>
              <textarea value={topics} onChange={function(e){setTopics(e.target.value);}} placeholder="e.g. morning routines, productivity hacks, meal prep, workouts, tutorials, personal growth" style={Object.assign({},textareaStyle,{minHeight:66})}/>
            </div>
            <div style={{marginBottom:18}}>
              <Label>How often do you post?</Label>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{POST_FREQ.map(function(f){return <Chip key={f} active={postFreq===f} onClick={function(){setPostFreq(postFreq===f?"":f);}}>{f}</Chip>;})}</div>
            </div>
            <div style={{marginBottom:18}}>
              <Label>Preferred content length</Label>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{CONTENT_LENGTH.map(function(l){return <Chip key={l} active={contentLength===l} onClick={function(){setContentLength(contentLength===l?"":l);}}>{l}</Chip>;})}</div>
            </div>
            <div style={{marginBottom:4}}>
              <Label>Emoji usage</Label>
              <div style={{display:"flex",gap:8}}>{EMOJI_PREFS.map(function(e){return <Chip key={e} active={emojiPref===e} onClick={function(){setEmojiPref(e);}}>{e}</Chip>;})}</div>
            </div>
            <SectionFooter idx={2}/>
          </div>
        )}
      </div>

      {/* [PROFILE-WIZARD][PR-A2] Section 04 — Your platforms in detail. */}
      <div id="profile-section-platforms" style={{background:B.card,borderRadius:16,boxShadow:"0 1px 3px rgba(0,0,0,0.05)",marginBottom:12,overflow:"hidden"}}>
        <SectionHeader idx={3} expanded={expandedIdx===3} filled={sectionFilled("platforms")}/>
        {expandedIdx === 3 && 3 <= maxUnlocked && (
          <div style={{padding:"4px 24px 22px"}}>
            {myPlatforms.length === 0 ? (
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.muted,lineHeight:1.65,marginBottom:14}}>
                Pick the platforms you post on in section <strong style={{color:B.navy}}>01 — You & your voice</strong>, then come back here to set up each platform's handle, audience, and preferred formats.
              </div>
            ) : (
              myPlatforms.map(function(p){
                var formats = getFormatsForPlatform(p);
                var selectedFormats = platformFormats[p] || [];
                return (
                  <div key={p} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid "+B.divider}}>
                    <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:B.navy,marginBottom:8}}>{p}</div>
                    <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,marginBottom:6,lineHeight:1.5}}>How do you primarily post here? Pick one or two.</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                      {formats.map(function(f){return <Chip key={f.value} active={selectedFormats.includes(f.value)} onClick={function(){toggleFormat(p,f.value);}}>{f.label}</Chip>;})}
                    </div>
                    <input value={(handles[p]||"")} onChange={function(e){
                      var h=Object.assign({},handles); h[p]=e.target.value; setHandles(h);
                    }} placeholder={"@your"+p.toLowerCase()+"handle"}
                    style={Object.assign({},inputStyle,{marginBottom:8,fontSize:13})}/>
                    <textarea value={(platformAudiences[p]||"")} onChange={function(e){
                      var a=Object.assign({},platformAudiences); a[p]=e.target.value; setPlatformAudiences(a);
                    }} placeholder={({
                      TikTok:"e.g. Gen Z women 18-24 interested in fashion, thrift flips, and self-expression",
                      Instagram:"e.g. Millennial moms 28-38 who want real talk about parenting and home life",
                      Facebook:"e.g. Local community members 35-55 interested in neighborhood events and small business news",
                      YouTube:"e.g. Aspiring entrepreneurs 25-40 who want in-depth tutorials and behind-the-scenes business content",
                      LinkedIn:"e.g. Marketing professionals and founders who want data-driven growth strategies",
                      X:"e.g. Tech-savvy early adopters and startup founders who follow industry news and hot takes",
                      Pinterest:"e.g. Home decor enthusiasts 25-45 planning renovations and looking for DIY inspiration"
                    })[p]||("Who is your "+p+" audience? Age, interests, what they are looking for")}
                    style={Object.assign({},textareaStyle,{minHeight:56,fontSize:13})}/>
                  </div>
                );
              })
            )}
            <SectionFooter idx={3}/>
          </div>
        )}
      </div>

      {/* [PROFILE-WIZARD][PR-A2] Section 05 — Your strategy.
          Strategic posture fields: when you show up purpose, vibes,
          journey stage, what's worked well. Pulled out of the former
          "style" + "strategy" sections so this reads as "how do you
          approach content overall" rather than "what's your tone." */}
      <div id="profile-section-strategy" style={{background:B.card,borderRadius:16,boxShadow:"0 1px 3px rgba(0,0,0,0.05)",marginBottom:12,overflow:"hidden"}}>
        <SectionHeader idx={4} expanded={expandedIdx===4} filled={sectionFilled("strategy")}/>
        {expandedIdx === 4 && 4 <= maxUnlocked && (
          <div style={{padding:"4px 24px 22px"}}>
            <div style={{marginBottom:18}}>
              <Label>When you show up, you are...</Label>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{PURPOSES.map(function(p){return <Chip key={p} active={purpose===p} onClick={function(){setPurpose(purpose===p?"":p);}}>{p}</Chip>;})}</div>
            </div>
            <div id="vp-vibes" style={{marginBottom:18}}>
              <Label>Your content vibe <TierBadge tier="dialed"/></Label>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{VIBES.map(function(v){return <Chip key={v} active={vibes.includes(v)} onClick={function(){setVibes(tog(vibes,v));}}>{v}</Chip>;})}</div>
            </div>
            <div style={{marginBottom:18}}>
              <Label>Where are you in your creator journey?</Label>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{JOURNEYS.map(function(j){return <Chip key={j} active={journey===j} onClick={function(){setJourney(journey===j?"":j);}}>{j}</Chip>;})}</div>
            </div>
            <div style={{marginBottom:4}}>
              <Label>What has worked well for you before?</Label>
              <textarea value={workedWell} onChange={function(e){setWorkedWell(e.target.value);}}
                placeholder="e.g. tutorial videos, behind-the-scenes content, hot takes, personal stories..."
                style={Object.assign({},textareaStyle,{minHeight:66})}/>
            </div>
            <SectionFooter idx={4}/>
          </div>
        )}
      </div>

      {/* [PROFILE-WIZARD][PR-A2] Section 06 — Voice references.
          Concrete material VIRL uses as voice ground-truth: a sample
          caption, additional voice samples, a creator the user
          admires, and the auto-derived stylometric fingerprint.
          offLimits moved to section 07 — Personal context, where it
          sits with the other "never reference these" type fields. */}
      <div id="profile-section-references" style={{background:B.card,borderRadius:16,boxShadow:"0 1px 3px rgba(0,0,0,0.05)",marginBottom:12,overflow:"hidden"}}>
        <SectionHeader idx={5} expanded={expandedIdx===5} filled={sectionFilled("references")}/>
        {expandedIdx === 5 && 5 <= maxUnlocked && (
          <div style={{padding:"4px 24px 22px"}}>
            <div id="vp-inspiration" style={{marginBottom:18}}>
              <Label>A creator whose style you admire <TierBadge tier="elite"/></Label>
              <input value={inspiration} onChange={function(e){setInspiration(e.target.value);}} placeholder="e.g. @aliabdaal - explains complex ideas in plain language" style={Object.assign({},inputStyle,{fontStyle:"italic"})}/>
            </div>
            <div id="vp-sampleCaption" style={{marginBottom:14}}>
              <Label>Paste a caption you love <TierBadge tier="elite"/></Label>
              <textarea value={sampleCaption} onChange={function(e){setSample(e.target.value);}} placeholder="Paste a caption from one of your posts that felt totally like you..." style={Object.assign({},textareaStyle,{minHeight:88})}/>
            </div>
            {/* [VOICE-REFERENCE] Additional caption samples — optional. */}
            <div id="vp-voiceSamples" style={{marginBottom:20}}>
              <Label>More voice samples (optional)</Label>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.muted,lineHeight:1.6,marginBottom:10}}>
                Each one gives VIRL another reference for how you sound. The more captions you add, the closer your generations land.
              </div>
              {voiceSamples.map(function(sample, idx){
                return (
                  <div key={"vs-"+idx} style={{position:"relative",marginBottom:10}}>
                    <textarea
                      value={sample}
                      onChange={function(e){
                        var v = e.target.value;
                        setVoiceSamples(function(prev){

            {/* [VOICE-FINGERPRINT] Live stylometric readout of the user's

            {(function(){
              var combined = [sampleCaption || ""].concat(voiceSamples || []).filter(function(s){ return s && s.trim(); }).join("\n\n");
              var fp = computeVoiceFingerprintClient(combined);
              var panelStyle = {marginBottom:20,padding:"16px 18px",background:B.navySoft,borderRadius:12,border:"1px solid "+B.border};
              var headerStyle = {fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:B.navy,marginBottom:6};
              var subStyle = {fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.muted,lineHeight:1.5,marginBottom:fp?14:0};
              if (!fp) {
                return (
                  <div style={panelStyle}>
                    <div style={headerStyle}>Your voice fingerprint</div>
                    <div style={subStyle}>Add a caption or two above and VIRL will surface the stylometric pattern it learned from your words — the register the model anchors every generation to.</div>
                  </div>
                );
              }
              function bucketLabel(axis, val, rate, unit) {
                var copy = {
                  contractions: { heavy: "Heavy contractions",     typical: "Natural contractions",     averse: "Spells words out"      },
                  sentenceLen:  { short: "Short, punchy sentences", medium: "Mixed sentence lengths",   long:   "Long, flowing sentences" },
                  emdashes:     { heavy: "Em-dashes are part of your voice", typical: "Em-dashes occasional", averse: "Em-dash averse" },
                  exclamations: { heavy: "High exclamation energy",  typical: "Balanced exclamations",   averse: "Rarely exclaims"        },
                  emojis:       { heavy: "Heavy emoji use",          typical: "Moderate emoji use",      averse: "Rarely uses emojis"     },
                  questions:    { heavy: "Asks lots of questions",   typical: "Occasional questions",    averse: "Rarely asks questions" },
                  allcaps:      { heavy: "Uses ALL CAPS for emphasis", typical: "Occasional caps",       averse: "Rarely uses caps"       },
                };
                var labelText = (copy[axis] && copy[axis][val]) || val;
                var detail = (typeof rate === "number") ? (" — " + rate + " " + unit) : "";
                return labelText + detail;
              }
              var rows = [
                { axis:"contractions", val:fp.labels.contractions, rate:fp.contractRate, unit:"per 100 words" },
                { axis:"sentenceLen",  val:fp.labels.sentenceLen,  rate:fp.avgSentLen,   unit:"words avg"     },
                { axis:"emdashes",     val:fp.labels.emdashes,     rate:fp.emdashRate,   unit:"per 100 words" },
                { axis:"exclamations", val:fp.labels.exclamations, rate:fp.exclamRate,   unit:"per 100 words" },
                { axis:"emojis",       val:fp.labels.emojis,       rate:fp.emojiRate,    unit:"per 100 words" },
                { axis:"questions",    val:fp.labels.questions,    rate:fp.questionRate, unit:"per 100 words" },
                { axis:"allcaps",      val:fp.labels.allcaps,      rate:fp.allcapsRate,  unit:"per 100 words" },
              ];
              return (
                <div style={panelStyle}>
                  <div style={headerStyle}>Your voice fingerprint</div>
                  <div style={subStyle}>This is the stylometric pattern VIRL pulls from your reference captions and feeds into every generation. If something looks off, add another sample above and watch it shift.</div>
                  <ul style={{listStyle:"none",margin:0,padding:0}}>
                    {rows.map(function(r){

                        </li>
                      );
                    })}
                  </ul>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,marginTop:10,fontStyle:"italic"}}>
                    Built from {fp.wordCount} words of your reference text.
                  </div>
                </div>
              );
            })()}

          </div>

          <div id="vp-voiceSamples" style={{marginBottom:20}}>

          {/* [VOICE-FINGERPRINT] Read-only panel that shows the user the
