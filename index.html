              what VIRL learned and either nod ("yes that's me") or add
              more samples until the readout feels right.

              Recomputes on every keystroke — featurize on a few hundred
              words is sub-millisecond, no memoization needed at this scale.
              When the combined reference text is below 20 words, the
              fingerprint is null and we render a "needs more text" hint
              instead of fake numbers. */}
          {(function(){
            var combined = [sampleCaption || ""].concat(voiceSamples || []).filter(function(s){ return s && s.trim(); }).join("\n\n");
            var fp = computeVoiceFingerprintClient(combined);
            var panelStyle = {marginBottom:20,padding:"16px 18px",background:B.navySoft,borderRadius:12,border:"1px solid "+B.border};
            var headerStyle = {fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:B.navy,marginBottom:6};
            var subStyle = {fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.muted,lineHeight:1.5,marginBottom:fp?14:0};
            if (!fp) {
              return (
                <div style={panelStyle}>
                  <div style={headerStyle}>Your voice fingerprint</div>
                  <div style={subStyle}>Add a caption or two above and VIRL will surface the stylometric pattern it learned from your words — the register the model anchors every generation to.</div>
                </div>
              );
            }
            // Each row: a category label + the bucket reading + the raw rate. Numbers
            // are intentionally visible so the user can sanity-check ("yeah I do use
            // contractions a lot") rather than trusting an opaque label.
            function bucketLabel(axis, val, rate, unit) {
              var copy = {
                contractions: { heavy: "Heavy contractions",     typical: "Natural contractions",     averse: "Spells words out"      },
                sentenceLen:  { short: "Short, punchy sentences", medium: "Mixed sentence lengths",   long:   "Long, flowing sentences" },
                emdashes:     { heavy: "Em-dashes are part of your voice", typical: "Em-dashes occasional", averse: "Em-dash averse" },
                exclamations: { heavy: "High exclamation energy",  typical: "Balanced exclamations",   averse: "Rarely exclaims"        },
                emojis:       { heavy: "Heavy emoji use",          typical: "Moderate emoji use",      averse: "Rarely uses emojis"     },
                questions:    { heavy: "Asks lots of questions",   typical: "Occasional questions",    averse: "Rarely asks questions" },
                allcaps:      { heavy: "Uses ALL CAPS for emphasis", typical: "Occasional caps",       averse: "Rarely uses caps"       },
              };
              var labelText = (copy[axis] && copy[axis][val]) || val;
              var detail = (typeof rate === "number") ? (" — " + rate + " " + unit) : "";
              return labelText + detail;
            }
            var rows = [
              { axis:"contractions", val:fp.labels.contractions, rate:fp.contractRate, unit:"per 100 words" },
              { axis:"sentenceLen",  val:fp.labels.sentenceLen,  rate:fp.avgSentLen,   unit:"words avg"     },
              { axis:"emdashes",     val:fp.labels.emdashes,     rate:fp.emdashRate,   unit:"per 100 words" },
              { axis:"exclamations", val:fp.labels.exclamations, rate:fp.exclamRate,   unit:"per 100 words" },
              { axis:"emojis",       val:fp.labels.emojis,       rate:fp.emojiRate,    unit:"per 100 words" },
              { axis:"questions",    val:fp.labels.questions,    rate:fp.questionRate, unit:"per 100 words" },
              { axis:"allcaps",      val:fp.labels.allcaps,      rate:fp.allcapsRate,  unit:"per 100 words" },
            ];
            return (
              <div style={panelStyle}>
                <div style={headerStyle}>Your voice fingerprint</div>
                <div style={subStyle}>This is the stylometric pattern VIRL pulls from your reference captions and feeds into every generation. If something looks off, add another sample above and watch it shift.</div>
                <ul style={{listStyle:"none",margin:0,padding:0}}>
                  {rows.map(function(r){
                    return (
                      <li key={r.axis} style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:400,color:B.ink,padding:"6px 0",borderTop:"1px solid "+B.divider,display:"flex",alignItems:"center",gap:8}}>
                        <span style={{width:8,height:8,borderRadius:"50%",background:r.val==="heavy"?B.navy:r.val==="averse"?B.coral:B.muted,flexShrink:0}}></span>
                        <span>{bucketLabel(r.axis, r.val, r.rate, r.unit)}</span>
                      </li>
                    );
                  })}
                </ul>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,marginTop:10,fontStyle:"italic"}}>
                  Built from {fp.wordCount} words of your reference text.
                </div>
              </div>
            );
          })()}

          {/* [LEARNING-CONSENT] The Personalization & Privacy section
              used to live inline here, nested inside Phase 2 (so users
              only saw it after expanding "Make VIRL even sharper"). It
              now sits in its own always-visible card rendered just above
              the Phase 2 expand — see the standalone block right before
              the Phase 2 conditional. Toggle state still flows through
              the same useState hooks at the top of this component. */}

          {saved && (
            <div style={{background:B.green,borderRadius:12,padding:"14px 20px",marginBottom:12,display:"flex",alignItems:"center",gap:12,animation:"slideUp .3s ease"}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:"rgba(255,255,255,0.25)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{color:B.white,fontSize:14,fontWeight:700}}>{"✓"}</span>
              </div>
              <div>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:700,color:B.white,marginBottom:2}}>Profile saved</div>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:"rgba(255,255,255,0.8)"}}>Every VIRL output will now be built around your voice.</div>
              </div>
            </div>
          )}
          <button onClick={handleSave}
            style={{
              width:"100%",
              background:saved?B.green:B.navy,
              color:B.white,border:"none",fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"18px 24px",cursor:"pointer",borderRadius:14,transition:"all .3s",
              boxShadow:saved?"0 4px 12px rgba(16,185,129,0.3)":"0 4px 12px rgba(31,58,138,0.25)"
            }}>
            {saved?"Profile saved":"Save my profile"}
          </button>

          {/* Make VIRL sharper — permanent secondary that scrolls to the
              next field needed for the next tier. Hidden once everything's
              filled out (Elite), since there's nothing left to sharpen. */}
          {sharperHint && (
            <button onClick={jumpToNextSharperField}
              style={{
                width:"100%",
                background:"transparent",
                color:B.navy,
                border:"1px solid "+B.navy,
                fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",
                padding:"14px 24px",cursor:"pointer",borderRadius:14,marginTop:10,transition:"all .15s",
              }}>
              {"Make VIRL sharper → "}<span style={{fontWeight:400,opacity:0.75,letterSpacing:0,textTransform:"none"}}>{sharperHint.label}</span>
            </button>
          )}
        </div>
      )}

      {/* [DEAD-CODE-MARKER] privacyCard now renders unconditionally
          below the wizard (above this dead block). showPhase2 is
          never set to true under the wizard model — kept here as a
          no-op for the planned PR-A2 cleanup. */}
      {/* {showPhase2 && privacyCard} */}

      {/* [TASK 1] Sync indicator — signals Supabase round-trip so users know their data is safe across devices. */}
      {syncState==="syncing"&&(
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:400,color:B.muted,textAlign:"center",marginBottom:8}}>
          Syncing to your account…
        </div>
      )}
      {syncState==="synced"&&(
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:500,color:B.green,textAlign:"center",marginBottom:8}}>
          {"Synced ✓ — safe across your devices"}
        </div>
      )}
      {syncState==="failed"&&(
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:500,color:B.coral,textAlign:"center",marginBottom:8,lineHeight:1.5}}>
          {"Saved locally, but couldn't sync to your account."}
          {syncError && (
            <div style={{
              marginTop:8,padding:"8px 12px",
              background:B.coralSoft,borderRadius:8,
              fontFamily:"monospace",fontSize:11,color:B.ink,
              textAlign:"left",wordBreak:"break-word",
            }}>
              {syncError}
            </div>
          )}
          <div style={{marginTop:6,color:B.muted,fontSize:10}}>
            {"Try again in a minute, or send the message above to support."}
          </div>
        </div>
      )}
      {eliteDone && (
        <div style={{background:B.navy,borderRadius:12,padding:"18px 20px",marginTop:4}}>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.sky,marginBottom:8}}>How VIRL uses your profile</div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:"rgba(255,255,255,0.7)",lineHeight:1.75}}>
            Every plan, caption, script, and scan is shaped by everything you have shared here. Your voice, platforms, purpose, off-limits, and north star all feed into every output.
          </div>
        </div>
      )}
    </div>
  );
}

// Centered modal showing the full saved item — description, why, hashtags,
// post time, optionally a saved script for plan items, full caption text
// for caption items. Items saved before the full-payload migration may not
// have every field; the modal only renders fields that are present.
function VaultItemModal({item, onClose}) {
  useEffect(function(){
    function onKey(e){ if (e.key === "Escape") onClose(); }
    window.addEventListener("keydown", onKey);
    return function(){ window.removeEventListener("keydown", onKey); };
  }, [onClose]);

  const tags = Array.isArray(item.hashtags) ? item.hashtags.map(cleanHashtag).filter(Boolean) : [];

  return (
    <div onClick={onClose}
      style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.85)",zIndex:600,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"20px 16px",overflowY:"auto"}}>
      <div onClick={function(e){ e.stopPropagation(); }}
        style={{background:B.white,width:"100%",maxWidth:680,borderRadius:20,overflow:"hidden",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.4)"}}>
        <div style={{background:B.navy,padding:"18px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:1}}>
          <div style={{minWidth:0,paddingRight:12}}>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.sky,marginBottom:4}}>
              {(item.type==="plan"?"Saved post":"Saved caption")+" · "+(item.savedAt||"")}
            </div>
            <div style={{fontFamily:"'Italiana',serif",fontSize:20,color:B.white,lineHeight:1.2}}>{item.title}</div>
          </div>
          <button onClick={onClose}
            style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.15em",textTransform:"uppercase",padding:"7px 14px",background:"rgba(255,255,255,0.1)",color:B.white,border:"none",borderRadius:99,cursor:"pointer",flexShrink:0}}>
            Close
          </button>
        </div>
        <div style={{padding:"22px 24px"}}>
          {/* Plan-card detail */}
          {item.type==="plan" && (
            <div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
                {item.day      && <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.navySoft,color:B.navy,borderRadius:99}}>{item.day}</span>}
                {item.platform && <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.blueSoft,color:B.blue,borderRadius:99}}>{"📱 "+item.platform}</span>}
                {item.postTime && <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.divider,color:B.muted,borderRadius:99}}>{"🕐 "+item.postTime}</span>}
                {item.format   && <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.divider,color:B.muted,borderRadius:99}}>{item.format}</span>}
              </div>
              {item.description && (
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,fontStyle:"italic",color:B.sub,lineHeight:1.7,marginBottom:14}}>
                  {item.description}
                </div>
              )}
              {/* [PREMIUM 4] Renders the new `insight` field. Falls
                   back to the legacy `why` so items saved pre-PREMIUM-4
                   don't lose their callout. */}
              {(item.insight || item.why) && (
                <div style={{background:B.navySoft,borderRadius:10,padding:"10px 14px",marginBottom:14,borderLeft:"3px solid "+B.blue}}>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.1em",color:B.blue,textTransform:"uppercase",marginBottom:4}}>Why this works</div>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.sub,lineHeight:1.6}}>{item.insight || item.why}</div>
                </div>
              )}
              {item.trend && (
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,color:B.muted,fontStyle:"italic",marginBottom:14}}>{"Trend angle: " + item.trend}</div>
              )}
              {tags.length > 0 && <HashtagRow hashtags={tags}/>}
              {item.savedScript && (
                <div style={{marginTop:12,paddingTop:14,borderTop:"1px solid "+B.divider}}>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.muted,marginBottom:8}}>Saved script</div>
                  {item.savedScript.hook && (
                    <div style={{background:B.navy,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
                      <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.sky,marginBottom:6}}>Hook</div>
                      <div style={{fontFamily:"'Italiana',serif",fontSize:18,color:B.white,lineHeight:1.3}}>{'"'+item.savedScript.hook+'"'}</div>
                    </div>
                  )}
                  {Array.isArray(item.savedScript.sections) && item.savedScript.sections.map(function(s,i){return (
                    <div key={i} style={{marginBottom:8,background:B.bg,borderRadius:10,padding:"10px 12px"}}>
                      <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,color:B.muted,marginBottom:4}}>{"Section "+(i+1)+(s.title?" — "+s.title:"")}</div>
                      <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.ink,lineHeight:1.7}}>{s.script}</div>
                    </div>
                  );})}
                  {item.savedScript.cta && (
                    <div style={{background:B.blueSoft,borderRadius:10,padding:"10px 14px"}}>
                      <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.blue,marginBottom:4}}>CTA</div>
                      <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.sub}}>{item.savedScript.cta}</div>
                    </div>
                  )}
                </div>
              )}
              {!item.description && !item.insight && !item.why && tags.length === 0 && !item.savedScript && (
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,color:B.muted,fontStyle:"italic"}}>This card was saved before VIRL captured full details. Re-save from the plan tab to get the full view.</div>
              )}
            </div>
          )}
          {/* Caption detail */}
          {item.type==="caption" && (
            <div>
              {item.platform && <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.blueSoft,color:B.blue,borderRadius:99,display:"inline-block",marginBottom:14}}>{"📱 "+item.platform}</div>}
              {item.hook && (
                <div style={{background:B.navy,borderRadius:12,padding:"14px 16px",marginBottom:14}}>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.sky,marginBottom:6}}>Hook</div>
                  <div style={{fontFamily:"'Italiana',serif",fontSize:18,color:B.white,lineHeight:1.3}}>{'"'+item.hook+'"'}</div>
                </div>
              )}
              <div style={{background:B.bg,borderRadius:12,padding:"14px 16px",marginBottom:tags.length?14:0}}>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.muted,marginBottom:8}}>Caption</div>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.ink,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{item.text || item.preview || "(no caption text saved)"}</div>
              </div>
              {tags.length > 0 && <HashtagRow hashtags={tags}/>}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// [UX-01] Vault now exposes a "Remix this" action per item that pre-
// fills the Plan generator's context with the saved post or caption as
// a voice reference and navigates to the Plan tab. onRemix is wired
// from App; a missing handler hides the button so the component still
// renders standalone.
function Vault({vault,onDelete,onRemix}) {
  const [openItem, setOpenItem] = useState(null);
  if (!vault.length) return (
    /* [PREMIUM 1] Vault empty state. Premium voice: thoughtful host
       welcoming a guest, not a system reporting "no data found". */
    <div style={{textAlign:"center",padding:"60px 20px"}}>
      <div style={{fontFamily:"'Italiana',serif",fontSize:24,color:B.ink,marginBottom:8}}>Save what resonates with you.</div>
      <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.muted,maxWidth:380,margin:"0 auto",lineHeight:1.65}}>Tap Save on any caption or post you love – VIRL learns from what you keep, and your future plans get sharper.</div>
    </div>
  );
  return (
    <div>
      {vault.map(function(item,i){
        // [UX-01] Click handlers — stopPropagation on inner buttons so
        // the row's "open detail modal" tap target stays exclusive to
        // the card body itself.
        function handleRowClick() { setOpenItem(item); }
        function handleDelete(e)  { e.stopPropagation(); if (onDelete) onDelete(item.id); }
        function handleRemix(e)   { e.stopPropagation(); if (onRemix)  onRemix(item); }
        return (
          <div key={item.id} className="su" onClick={handleRowClick}
            style={{background:B.card,borderRadius:12,boxShadow:"0 1px 2px rgba(0,0,0,0.04)",padding:"18px 20px",marginBottom:8,animationDelay:(i*0.04)+"s",borderLeft:"3px solid "+B.navy,cursor:"pointer",transition:"background .15s"}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:8,gap:10}}>
              <div style={{minWidth:0,flex:1}}>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.muted,marginBottom:4}}>
                  {(item.type==="plan"?"Saved Post":"Caption")+" · "+item.savedAt+" · tap to view"}
                </div>
                <div style={{fontFamily:"'Italiana',serif",fontSize:19,color:B.ink}}>{item.title}</div>
              </div>
              <button onClick={handleDelete}
                style={{fontFamily:"'Jost',sans-serif",fontSize:9,letterSpacing:"0.1em",textTransform:"uppercase",padding:"5px 10px",background:"none",border:"1px solid "+B.border,color:B.muted,cursor:"pointer",borderRadius:99,flexShrink:0}}>
                Remove
              </button>
            </div>
            {item.type==="plan"&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>
                <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:B.muted,padding:"3px 10px",borderRadius:99,background:B.bg}}>{"📱 "+item.platform}</span>
                <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:B.blue,padding:"3px 10px",borderRadius:99,background:B.blueSoft}}>{"🕐 "+item.postTime}</span>
              </div>
            )}
            {item.preview&&<div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,fontStyle:"italic",color:B.muted,marginTop:8,lineHeight:1.6}}>{item.preview+"..."}</div>}
            {/* [UX-01] Remix this — pre-fills the Plan generator with
                 this item's voice and jumps to the Plan tab. Hidden if
                 no onRemix handler was wired (defensive). */}
            {onRemix && (
              <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid "+B.divider,display:"flex",justifyContent:"flex-end"}}>
                <button onClick={handleRemix}
                  style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"7px 14px",background:B.blueSoft,color:B.blue,border:"none",borderRadius:99,cursor:"pointer"}}>
                  Remix this
                </button>
              </div>
            )}
          </div>
        );
      })}
      {openItem && <VaultItemModal item={openItem} onClose={function(){ setOpenItem(null); }}/>}
    </div>
  );
}

// [UX-01] Results now exposes a "Plan next week with these insights"
// CTA that pre-fills the Plan generator's context with a note
// referencing the prior week's top performer and routes to the Plan
// tab. onPlanWithInsights is supplied by App; missing handler hides
// the button so the component renders standalone.
function Results({results,onPlanWithInsights}) {
  if (!results.length) return (
    /* [PREMIUM 1] Results empty state. Premium voice. */
    <div style={{textAlign:"center",padding:"60px 20px"}}>
      <div style={{fontFamily:"'Italiana',serif",fontSize:24,color:B.ink,marginBottom:8}}>Track what's working.</div>
      <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.muted,maxWidth:380,margin:"0 auto",lineHeight:1.65}}>VIRL pays attention to your wins so you can post smarter, not more.</div>
    </div>
  );
  var tv = results.reduce(function(a,r){return a+(parseInt((r.result&&r.result.views))||0);},0);
  var tl = results.reduce(function(a,r){return a+(parseInt((r.result&&r.result.likes))||0);},0);
  var ts = results.reduce(function(a,r){return a+(parseInt((r.result&&r.result.saves))||0);},0);
  var eng = tv>0?((tl+ts)/tv*100).toFixed(1):"0.0";
  var sorted = results.slice().sort(function(a,b){return (parseInt((b.result&&b.result.views))||0)-(parseInt((a.result&&a.result.views))||0);});
  // [UX-01] Top performer = highest-views row. Used as the source for
  // the insights pre-fill so the Plan generator gets a concrete signal.
  var topPerformer = sorted.length ? sorted[0] : null;
  function handlePlanWithInsights() {
    if (onPlanWithInsights && topPerformer) onPlanWithInsights(topPerformer);
  }
  return (
    <div>
      <SherpaTip>These are your real numbers. Log results after every post and VIRL will show you which platforms, formats, and topics are actually working for your specific audience.</SherpaTip>
      {/* [UX-01] Plan-next-week CTA — only mounted once we have a top
           performer to reference. */}
      {onPlanWithInsights && topPerformer && (
        <div style={{background:B.navy,borderRadius:14,padding:"16px 20px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
          <div style={{minWidth:0,flex:1}}>
            <div style={{fontFamily:"'Italiana',serif",fontSize:18,color:B.white,lineHeight:1.2,marginBottom:4}}>Carry this momentum into next week.</div>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:"rgba(255,255,255,0.75)",lineHeight:1.55,overflow:"hidden",textOverflow:"ellipsis"}}>
              {"Top post: " + topPerformer.title}
            </div>
          </div>
          <button onClick={handlePlanWithInsights}
            style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"10px 18px",background:B.white,color:B.navy,border:"none",borderRadius:99,cursor:"pointer",flexShrink:0}}>
            Plan next week with these insights
          </button>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:16}}>
        {[["Views",tv.toLocaleString(),B.navy],["Likes",tl.toLocaleString(),B.blue],["Saves",ts.toLocaleString(),B.navy],["Engagement",eng+"%",B.blue]].map(function(item,i){return (
          <div key={item[0]} style={{padding:16,background:i%2===0?B.navySoft:B.card,borderRadius:12}}>
            <div style={{fontFamily:"'Italiana',serif",fontSize:24,color:item[2],lineHeight:1,marginBottom:4}}>{item[1]}</div>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.muted}}>{item[0]}</div>
          </div>
        );})}
      </div>
      {sorted.map(function(r,i){return (
        <div key={r.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:i%2===0?B.card:B.bg,borderRadius:12,marginBottom:4,borderLeft:"3px solid "+(i===0?B.navy:B.border)}}>
          <div style={{fontFamily:"'Italiana',serif",fontSize:18,color:i===0?B.navy:B.muted,width:22,flexShrink:0}}>{"#"+(i+1)}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:"'Italiana',serif",fontSize:16,color:B.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.title}</div>
          </div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:500,color:B.muted,flexShrink:0}}>
            {"👁 "+(r.result&&r.result.views||0)+" · ❤ "+(r.result&&r.result.likes||0)+" · 🔖 "+(r.result&&r.result.saves||0)}
          </div>
        </div>
      );})}
    </div>
  );
}

function GateScreen({onAuth}) {
  const [mode,setMode]       = useState(function(){
    try {
      var p = new URLSearchParams(window.location.search);
      return p.get("signup")==="true" ? "signup" : "login";
    } catch(e) { return "login"; }
  });
  const [email,setEmail]     = useState("");
  const [password,setPassword] = useState("");
  // Collected at signup so we know who's joining (especially Founder Circle)
  // and can personalize email. Stamped onto user_metadata + seeded into
  // profiles.name so the in-app profile starts pre-filled.
  const [firstName,setFirstName] = useState("");
  const [lastName,setLastName]   = useState("");
  const [authLoading,setAuthLoading] = useState(false);
  const [authError,setAuthError] = useState("");
  const [ageConfirmed,setAgeConfirmed] = useState(false);
  // Required: Terms + Privacy acceptance. Required before signup can
  // proceed. Stamped onto auth.users.user_metadata so the consent
  // record is durable.
  const [tosAccepted,setTosAccepted] = useState(false);
  // Optional: marketing opt-in. Defaults unchecked (opt-out is the
  // GDPR-safe default). Drives email_preferences.marketing_opt_out
  // for this user — checked = opted IN, unchecked = opted OUT.
  const [marketingOptIn,setMarketingOptIn] = useState(false);
  // Bumped whenever the ToS / Privacy materially change. Stored alongside
  // tos_accepted_at so we can re-prompt if needed in the future.
  const TOS_VERSION = "2026-04";
  const [emailSent,setEmailSent] = useState(false);
  const [resetMode,setResetMode] = useState(false);
  const [resetSent,setResetSent] = useState(false);
  // [AUTO-SIGNIN] Brief celebratory state shown between a successful
  // signup and the auto-route into the app. Lives ~1.5s before onAuth
  // fires. Mutually exclusive with emailSent — only one shows.
  const [signupSuccess,setSignupSuccess] = useState(false);

  // Read UTM / referrer once so we can stamp acquisition source onto
  // user_metadata at signup. sessionStorage so a user who lands via a
  // campaign link, navigates around, then signs up still gets credited
  // to the original source. Capped sizes are deliberate — defense
  // against someone passing a giant string in the query.
  const attribution = useMemo(function(){
    try {
      var qs = new URLSearchParams(window.location.search || "");
      var picked = {
        utm_source:   (qs.get("utm_source")   || "").slice(0, 60),
        utm_medium:   (qs.get("utm_medium")   || "").slice(0, 60),
        utm_campaign: (qs.get("utm_campaign") || "").slice(0, 60),
        ref:          (qs.get("ref")          || "").slice(0, 60),
        referrer:     (document.referrer       || "").slice(0, 200),
      };
      var hasNew = picked.utm_source || picked.utm_medium || picked.utm_campaign || picked.ref || picked.referrer;
      var stored = sessionStorage.getItem("virl_attr");
      if (!stored && hasNew) {
        sessionStorage.setItem("virl_attr", JSON.stringify(picked));
        return picked;
      }
      return stored ? JSON.parse(stored) : picked;
    } catch (e) { return {}; }
  }, []);

  function handlePasswordReset() {
    if (!email.trim()) { setAuthError("Enter your email address first."); return; }
    setAuthLoading(true); setAuthError("");
    supabaseClient.auth.resetPasswordForEmail(email.trim(), {
      redirectTo: "https://app.govirl.ai"
    }).then(function(result) {
      setAuthLoading(false);
      if (result.error) { setAuthError(result.error.message); return; }
      setResetSent(true);
    }).catch(function(e){ setAuthLoading(false); setAuthError(e.message); });
  }

  function handleEmailAuth() {
    if (!email.trim()||!password.trim()) return;
    if (mode==="signup") {
      if (!firstName.trim() || !lastName.trim()) {
        setAuthError("Please enter your first and last name.");
        return;
      }
      // Single combined message when either or both required boxes are
      // unchecked — cleaner than firing one error, having the user fix
      // it, then firing the second on the next submit. Marketing
      // opt-in stays optional and is not part of this gate.
      if (!ageConfirmed && !tosAccepted) {
        setAuthError("Please check the age confirmation and Terms boxes above to create your account.");
        return;
      }
      if (!ageConfirmed) { setAuthError("Please confirm you are 18 or older to create an account."); return; }
      if (!tosAccepted)  { setAuthError("Please accept the Terms of Service and Privacy Policy to continue."); return; }
    }
    setAuthLoading(true); setAuthError("");
    var p = mode==="signup"
      ? supabaseClient.auth.signUp({
          email: email.trim(),
          password: password.trim(),
          options: {
            data: {
              first_name:      firstName.trim(),
              last_name:       lastName.trim(),
              tos_accepted_at: new Date().toISOString(),
              tos_version:     TOS_VERSION,
              marketing_opt_in: !!marketingOptIn,
              age_confirmed:   true,
              utm_source:      attribution.utm_source   || null,
              utm_medium:      attribution.utm_medium   || null,
              utm_campaign:    attribution.utm_campaign || null,
              ref:             attribution.ref          || null,
              referrer:        attribution.referrer     || null,
            },
          },
        })
      : supabaseClient.auth.signInWithPassword({email:email.trim(),password:password.trim()});
    p.then(function(result) {
      setAuthLoading(false);
      if (result.error) { setAuthError(result.error.message); return; }
      if (mode==="signup") {
        // Mirror the marketing choice into email_preferences so the cron
        // + opt-out endpoint both see the right value. Fire-and-forget —
        // never blocks the auto-signin flow below.
        if (result.data && result.data.user && result.data.user.id) {
          supabaseClient.from("email_preferences").upsert({
            user_id:           result.data.user.id,
            marketing_opt_out: !marketingOptIn,
            updated_at:        new Date().toISOString(),
          }).then(function(){}).catch(function(){});
          // Seed profiles.name from the signup fields so the in-app profile
          // starts pre-filled. Fire-and-forget — never blocks auto-signin.
          supabaseClient.from("profiles").upsert({
            id:   result.data.user.id,
            name: (firstName.trim() + " " + lastName.trim()).trim(),
          }).then(function(){}).catch(function(){});
        }
        // [AUTO-SIGNIN] When Supabase Auth has email confirmation off,
        // signUp returns a session directly — show a brief "welcome"
        // moment then mount the app. When it doesn't, fall back to a
        // signInWithPassword with the same credentials we just used (the
        // session may simply not be attached to the signUp response).
        // Only if BOTH return no session do we surface the legacy "check
        // your email" screen, so users with email-confirmation enabled
        // still have a graceful path.
        function routeIntoApp(session) {
          // [FC ACCOUNT-FIRST] Stash the marketing intent so the app can route
          // this brand-new user once they land: intent=founder → straight into
          // Stripe Founder Circle checkout; intent=trial → the one-screen FC
          // offer. App clears the key after acting, so it only fires for this
          // signup. Organic signups (no intent param) keep today's onboarding.
          try {
            var qs = new URLSearchParams(window.location.search || "");
            var intent = qs.get("intent");
            if (intent === "founder" || intent === "trial") {
              var plan = qs.get("plan") === "monthly" ? "monthly" : "annual";
              sessionStorage.setItem("virl_signup_fc_intent", JSON.stringify({ intent: intent, plan: plan }));
            }
          } catch(e) {}
          setSignupSuccess(true);
          setTimeout(function(){ onAuth(session); }, 1500);
        }
        if (result.data && result.data.session) {
          routeIntoApp(result.data.session);
          return;
        }
        supabaseClient.auth
          .signInWithPassword({email: email.trim(), password: password.trim()})
          .then(function(r){
            if (r.error || !r.data || !r.data.session) {
              setEmailSent(true);
              return;
            }
            routeIntoApp(r.data.session);
          })
          .catch(function(){ setEmailSent(true); });
      } else {
        onAuth(result.data.session);
      }
    }).catch(function(e){ setAuthLoading(false); setAuthError(e.message); });
  }

  // [AUTO-SIGNIN] Bridge screen between a successful signup and the app
  // mounting. The timeout in handleEmailAuth flips the session ~1.5s
  // after this renders, at which point the parent unmounts GateScreen.
  if (signupSuccess) return (
    <div style={{minHeight:"100vh",...brandHeroSurface,fontFamily:"'Jost',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px",textAlign:"center"}}>
      <div style={brandLogoOnDark}>VIRL</div>
      <div style={brandTaglineOnDark}>Finally, a strategy that sounds like you.</div>
      <div style={{width:"100%",maxWidth:380,background:B.white,borderRadius:24,padding:"44px 36px",boxShadow:"0 4px 32px rgba(0,0,0,0.08)"}}>
        <div style={{width:56,height:56,borderRadius:"50%",background:B.navySoft,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px"}}>
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke={B.navy} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div style={{fontFamily:"'Italiana',serif",fontSize:28,color:B.navy,marginBottom:8}}>You're in.</div>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:500,color:B.ink,marginBottom:6}}>Account ready.</div>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.muted,lineHeight:1.7,marginBottom:22}}>
          Taking you to the app...
        </div>
        <div style={{height:4,width:"100%",background:B.navySoft,borderRadius:99,overflow:"hidden"}}>
          <div className="signup-bar" style={{height:"100%",background:B.navy,borderRadius:99}}/>
        </div>
      </div>
    </div>
  );

  if (emailSent) return (
    <div style={{minHeight:"100vh",...brandHeroSurface,fontFamily:"'Jost',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px",textAlign:"center"}}>
      <div style={brandLogoOnDark}>VIRL</div>
      <div style={brandTaglineOnDark}>Finally, a strategy that sounds like you.</div>
      <div style={{width:"100%",maxWidth:380,background:B.white,borderRadius:24,padding:"44px 36px",boxShadow:"0 4px 32px rgba(0,0,0,0.08)"}}>
        <div style={{width:56,height:56,borderRadius:"50%",background:B.navySoft,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px"}}>
          <div style={{fontSize:26}}>{"✉"}</div>
        </div>
        <div style={{fontFamily:"'Italiana',serif",fontSize:26,color:B.navy,marginBottom:10}}>Check your email</div>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.muted,lineHeight:1.75,marginBottom:28}}>
          {"We sent a confirmation link to "}
          <span style={{fontWeight:600,color:B.navy}}>{email}</span>
          {". Click the link in that email to activate your account, then come back here to sign in."}
        </div>
        <button onClick={function(){setEmailSent(false);setMode("login");setPassword("");}}
          style={{width:"100%",background:B.navy,color:B.white,border:"none",fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"16px 24px",cursor:"pointer",borderRadius:14,boxShadow:"0 4px 14px rgba(31,58,138,0.3)"}}>
          Back to sign in
        </button>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,marginTop:16,lineHeight:1.6}}>
          {"Didn't get it? Check your spam folder or "}
          <button onClick={function(){setEmailSent(false);setPassword("");}}
            style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,color:B.blue,background:"none",border:"none",cursor:"pointer",padding:0,textDecoration:"underline"}}>
            try again
          </button>
          {"."}
        </div>
      </div>
    </div>
  );

  if (resetSent) return (
    <div style={{minHeight:"100vh",...brandHeroSurface,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px",textAlign:"center"}}>
      <div style={brandLogoOnDark}>VIRL</div>
      <div style={brandTaglineOnDark}>Finally, a strategy that sounds like you.</div>
      <div style={{width:"100%",maxWidth:380,background:B.white,borderRadius:24,padding:"44px 36px",boxShadow:"0 4px 32px rgba(0,0,0,0.08)"}}>
        <div style={{width:56,height:56,borderRadius:"50%",background:B.navySoft,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px"}}>
          <div style={{fontSize:26}}>{"🔑"}</div>
        </div>
        <div style={{fontFamily:"'Italiana',serif",fontSize:26,color:B.navy,marginBottom:10}}>Check your email</div>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.muted,lineHeight:1.75,marginBottom:28}}>
          {"We sent a password reset link to "}
          <span style={{fontWeight:600,color:B.navy}}>{email}</span>
          {". Click the link to set a new password, then sign in here."}
        </div>
        <button onClick={function(){setResetSent(false);setResetMode(false);setMode("login");}}
          style={{width:"100%",background:B.navy,color:B.white,border:"none",fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"16px 24px",cursor:"pointer",borderRadius:14,boxShadow:"0 4px 14px rgba(31,58,138,0.3)"}}>
          Back to sign in
        </button>
      </div>
    </div>
  );

  if (resetMode) return (
    <div style={{minHeight:"100vh",...brandHeroSurface,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px"}}>
      <div style={brandLogoOnDark}>VIRL</div>
      <div style={{...brandTaglineOnDark,marginBottom:40}}>Finally, a strategy that sounds like you.</div>
      <div style={{width:"100%",maxWidth:340,background:B.white,borderRadius:24,padding:"36px 28px",boxShadow:"0 4px 24px rgba(0,0,0,0.08)"}}>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.3em",textTransform:"uppercase",color:B.muted,marginBottom:16,textAlign:"center"}}>Reset your password</div>
        <input value={email} onChange={function(e){setEmail(e.target.value);setAuthError("");}}
          placeholder="Email address" type="email"
          style={{width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:12,color:B.ink,fontFamily:"'Jost',sans-serif",fontSize:15,padding:"13px 16px",marginBottom:12,outline:"none"}}/>
        {authError&&<div style={{fontFamily:"'Jost',sans-serif",fontSize:12,color:B.coral,textAlign:"center",marginBottom:10,lineHeight:1.5}}>{authError}</div>}
        <button onClick={handlePasswordReset} disabled={authLoading||!email.trim()}
          style={{width:"100%",background:authLoading?B.muted:B.navy,color:B.white,border:"none",fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"16px 24px",cursor:"pointer",borderRadius:14,marginBottom:12,boxShadow:authLoading?"none":"0 4px 14px rgba(31,58,138,0.3)",transition:"all .2s"}}>
          {authLoading?"Sending...":"Send reset link"}
        </button>
        <div style={{textAlign:"center"}}>
          <button onClick={function(){setResetMode(false);setAuthError("");}}
            style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:600,color:B.blue,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>
            Back to sign in
          </button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",...brandHeroSurface,fontFamily:"'Jost',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px"}}>
      <div style={brandLogoOnDark}>VIRL</div>
      <div style={{...brandTaglineOnDark,marginBottom:40}}>Finally, a strategy that sounds like you.</div>

      <div style={{width:"100%",maxWidth:340,background:B.card,borderRadius:24,padding:"36px 28px",boxShadow:"0 20px 50px rgba(15,23,42,0.25)"}}>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.3em",textTransform:"uppercase",color:B.muted,marginBottom:16,textAlign:"center"}}>
            {mode==="signup"?"Create your account":"Sign in to VIRL"}
          </div>
          {mode==="signup"&&(
            <div style={{display:"flex",gap:10,marginBottom:10}}>
              <input value={firstName} onChange={function(e){setFirstName(e.target.value);setAuthError("");}}
                onKeyDown={function(e){if(e.key==="Enter")handleEmailAuth();}}
                placeholder="First name" type="text" autoComplete="given-name"
                style={{flex:1,minWidth:0,background:B.bg,border:"1px solid "+B.border,borderRadius:12,color:B.ink,fontFamily:"'Jost',sans-serif",fontSize:15,padding:"13px 16px",outline:"none"}}/>
              <input value={lastName} onChange={function(e){setLastName(e.target.value);setAuthError("");}}
                onKeyDown={function(e){if(e.key==="Enter")handleEmailAuth();}}
                placeholder="Last name" type="text" autoComplete="family-name"
                style={{flex:1,minWidth:0,background:B.bg,border:"1px solid "+B.border,borderRadius:12,color:B.ink,fontFamily:"'Jost',sans-serif",fontSize:15,padding:"13px 16px",outline:"none"}}/>
            </div>
          )}
          <input value={email} onChange={function(e){setEmail(e.target.value);setAuthError("");}}
            onKeyDown={function(e){if(e.key==="Enter")handleEmailAuth();}}
            placeholder="Email address" type="email"
            style={{width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:12,color:B.ink,fontFamily:"'Jost',sans-serif",fontSize:15,padding:"13px 16px",marginBottom:10,outline:"none"}}/>
          <input value={password} onChange={function(e){setPassword(e.target.value);setAuthError("");}}
            onKeyDown={function(e){if(e.key==="Enter")handleEmailAuth();}}
            placeholder="Password" type="password"
            style={{width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:12,color:B.ink,fontFamily:"'Jost',sans-serif",fontSize:15,padding:"13px 16px",marginBottom:12,outline:"none"}}/>
          {mode==="login"&&(
            <div style={{textAlign:"right",marginBottom:10,marginTop:-4}}>
              <button onClick={function(){setResetMode(true);setAuthError("");}}
                style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:500,color:B.muted,background:"none",border:"none",cursor:"pointer",textDecoration:"underline",textUnderlineOffset:"2px"}}>
                Forgot password?
              </button>
            </div>
          )}
          {mode==="signup"&&(
            <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10,padding:"10px 14px",background:ageConfirmed?B.navySoft:B.bg,border:"1px solid "+(ageConfirmed?B.blue:B.border),borderRadius:10,cursor:"pointer",transition:"all .2s"}}
              onClick={function(){setAgeConfirmed(function(v){return !v;});}}>
              <div style={{width:18,height:18,border:"2px solid "+(ageConfirmed?B.blue:B.border),borderRadius:4,background:ageConfirmed?B.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,transition:"all .15s"}}>
                {ageConfirmed&&<span style={{color:B.white,fontSize:12,lineHeight:1}}>{"✓"}</span>}
              </div>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:ageConfirmed?B.navy:B.muted,lineHeight:1.5}}>
                {"I confirm that I am 18 years of age or older."}
              </div>
            </div>
          )}
          {mode==="signup"&&(
            <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10,padding:"10px 14px",background:tosAccepted?B.navySoft:B.bg,border:"1px solid "+(tosAccepted?B.blue:B.border),borderRadius:10,cursor:"pointer",transition:"all .2s"}}
              onClick={function(){setTosAccepted(function(v){return !v;});}}>
              <div style={{width:18,height:18,border:"2px solid "+(tosAccepted?B.blue:B.border),borderRadius:4,background:tosAccepted?B.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,transition:"all .15s"}}>
                {tosAccepted&&<span style={{color:B.white,fontSize:12,lineHeight:1}}>{"✓"}</span>}
              </div>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:tosAccepted?B.navy:B.muted,lineHeight:1.55}}>
                {"I agree to VIRL's "}
                <a href="https://app.termly.io/policy-viewer/policy.html?policyUUID=45628bcc-78b6-4904-9408-c872a26558cf" target="_blank" rel="noreferrer"
                  onClick={function(e){ e.stopPropagation(); }}
                  style={{color:B.blue,textDecoration:"none",fontWeight:500}}>Terms of Service</a>
                {" and "}
                <a href="https://app.termly.io/policy-viewer/policy.html?policyUUID=bc2fc2c6-2e38-40d0-9d73-de9941f510d0" target="_blank" rel="noreferrer"
                  onClick={function(e){ e.stopPropagation(); }}
                  style={{color:B.blue,textDecoration:"none",fontWeight:500}}>Privacy Policy</a>
                {"."}
              </div>
            </div>
          )}
          {mode==="signup"&&(
            <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:14,padding:"10px 14px",background:marketingOptIn?B.navySoft:B.bg,border:"1px solid "+(marketingOptIn?B.blue:B.border),borderRadius:10,cursor:"pointer",transition:"all .2s"}}
              onClick={function(){setMarketingOptIn(function(v){return !v;});}}>
              <div style={{width:18,height:18,border:"2px solid "+(marketingOptIn?B.blue:B.border),borderRadius:4,background:marketingOptIn?B.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,transition:"all .15s"}}>
                {marketingOptIn&&<span style={{color:B.white,fontSize:12,lineHeight:1}}>{"✓"}</span>}
              </div>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:marketingOptIn?B.navy:B.muted,lineHeight:1.55}}>
                {"Send me product updates and content tips. "}
                <span style={{color:B.muted,opacity:0.8}}>Optional. You can unsubscribe anytime.</span>
              </div>
            </div>
          )}
          {/* Error display sits directly above the submit button so it
               renders in the user's line of sight at the moment of the
               tap — instead of flashing into the gap above the
               checkboxes, far from the action they just took. Covers
               server errors (bad credentials), inline validation
               errors (missing required checkboxes), and the
               "Check your email" confirmation tint in signup. */}
          {authError&&<div style={{fontFamily:"'Jost',sans-serif",fontSize:12,color:mode==="signup"&&authError.includes("Check your email")?B.blue:B.coral,textAlign:"center",marginBottom:12,lineHeight:1.5,padding:"10px 12px",background:mode==="signup"&&authError.includes("Check your email")?B.navySoft:B.coralSoft,borderRadius:10,border:"1px solid "+(mode==="signup"&&authError.includes("Check your email")?"rgba(31,58,138,0.15)":"rgba(244,63,94,0.2)")}}>{authError}</div>}
          {/* Submit button is only disabled while a request is in flight
               or before email + password are filled — the age + ToS
               checkbox gate is enforced inside handleEmailAuth (it sets
               an inline error above instead of a silent disable). This
               keeps the form feeling inviting and ensures the optional
               marketing checkbox stays visible rather than being hidden
               behind a "your form is broken" disabled state. */}
          <button onClick={handleEmailAuth} disabled={authLoading||!email.trim()||!password.trim()}
            style={{width:"100%",background:authLoading?B.muted:B.navy,color:B.white,border:"none",fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"16px 24px",cursor:(authLoading||!email.trim()||!password.trim())?"not-allowed":"pointer",borderRadius:14,marginBottom:12,boxShadow:authLoading?"none":"0 4px 14px rgba(31,58,138,0.3)",opacity:(authLoading||!email.trim()||!password.trim())?0.55:1,transition:"all .2s"}}>
            {authLoading?"Signing in...":(mode==="signup"?"Create account":"Sign in")}
          </button>
          <div style={{borderTop:"1px solid "+B.divider,paddingTop:16,textAlign:"center"}}>
            {mode==="login"?(
              <button onClick={function(){setMode("signup");setAuthError("");}}

                {"Don't have an account? Create one"}

                style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:600,color:B.blue,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>
                Already have an account? Sign in
              </button>
            )}
          </div>
      </div>
    </div>
  );
}

// ErrorBoundary removed — static class methods not supported in Babel standalone
// Error handling done via try/catch inside App

// [CX-FIX 1] Shown when the user is in PASSWORD_RECOVERY mode after clicking
// the "Forgot password?" email link. Without this screen, Supabase silently
// signs them in via the recovery session and they have no way to actually
// change their password — the entire forgot-password flow was a dead end.
//
// On submit:
//   1. supabase.auth.updateUser({ password }) — applies the new password
//   2. Fires /api/email/password-changed so the email-of-record gets a
//      "your password was just changed" notification (security best
//      practice; Supabase doesn't do this on its own)
//   3. Clears recoveryMode so the next render drops the user into the
//      normal dashboard
function SetNewPasswordScreen({ onDone }) {
  const [password,setPassword]   = useState("");
  const [confirm,setConfirm]     = useState("");
  const [busy,setBusy]           = useState(false);
  const [err,setErr]             = useState("");
  const [done,setDone]           = useState(false);

  function handleSave() {
    if (password.length < 8) { setErr("Password must be at least 8 characters."); return; }
    if (password !== confirm) { setErr("Passwords don't match."); return; }
    setBusy(true); setErr("");
    supabaseClient.auth.updateUser({ password: password })
      .then(function(result) {
        if (result.error) { setBusy(false); setErr(result.error.message); return; }
        // Fire-and-forget the confirmation email. Failure to send doesn't
        // block the password change itself — the password is already saved.
        try {
          supabaseClient.auth.getSession().then(function(r) {
            var token = r && r.data && r.data.session && r.data.session.access_token;
            if (!token) return;
            fetch("/api/email/password-changed", {
              method: "POST",
              headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
            }).catch(function(){});
          });
        } catch(e) {}
        setBusy(false);
        setDone(true);
        // Small delay so the user reads the "saved" confirmation before
        // landing on the dashboard.
        setTimeout(function(){ onDone(); }, 1200);
      })
      .catch(function(e){ setBusy(false); setErr(e.message || "Could not update password."); });
  }

  return (
    <div style={{
      minHeight:"100vh",background:B.navy,display:"flex",alignItems:"center",
      justifyContent:"center",padding:24,fontFamily:"'Jost',sans-serif"
    }}>
      <div style={{
        width:"100%",maxWidth:420,background:B.white,borderRadius:16,
        padding:"32px 28px",boxShadow:"0 12px 40px rgba(0,0,0,0.25)"
      }}>
        <div style={{
          fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,
          letterSpacing:"0.3em",textTransform:"uppercase",
          color:B.muted,marginBottom:16,textAlign:"center"
        }}>
          Set a new password
        </div>
        <div style={{
          fontFamily:"'Italiana',serif",fontSize:24,color:B.ink,
          lineHeight:1.2,marginBottom:8,textAlign:"center"
        }}>
          Pick something you'll remember.
        </div>
        <div style={{
          fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,
          color:B.sub,lineHeight:1.5,marginBottom:24,textAlign:"center"
        }}>
          You're almost in. Set a new password to finish.
        </div>
        {done ? (
          <div style={{
            fontFamily:"'Jost',sans-serif",fontSize:13,color:B.green,
            textAlign:"center",padding:"24px 0"
          }}>
            Password saved. Taking you in&hellip;
          </div>
        ) : (
          <React.Fragment>
            <input type="password" value={password} placeholder="New password"
              onChange={function(e){setPassword(e.target.value);setErr("");}}
              style={{
                width:"100%",fontFamily:"'Jost',sans-serif",fontSize:14,
                padding:"12px 14px",border:"1px solid "+B.border,
                borderRadius:10,marginBottom:12,boxSizing:"border-box"
              }}/>
            <input type="password" value={confirm} placeholder="Confirm new password"
              onChange={function(e){setConfirm(e.target.value);setErr("");}}
              style={{
                width:"100%",fontFamily:"'Jost',sans-serif",fontSize:14,
                padding:"12px 14px",border:"1px solid "+B.border,
                borderRadius:10,marginBottom:16,boxSizing:"border-box"
              }}/>
            {err && (
              <div style={{
                fontFamily:"'Jost',sans-serif",fontSize:12,color:B.coral,
                marginBottom:12,textAlign:"center"
              }}>{err}</div>
            )}
            <button onClick={handleSave} disabled={busy||!password||!confirm}
              style={{
                width:"100%",fontFamily:"'Jost',sans-serif",fontSize:12,
                fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",
                padding:"12px 20px",background:busy?B.muted:B.navy,
                color:B.white,border:"none",borderRadius:99,
                cursor:busy?"default":"pointer"
              }}>
              {busy?"Saving...":"Save new password"}
            </button>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

function SundayLogModal({unloggedCards, onLog, onClose}) {
  const [values,setValues] = useState({});

  function cardId(c) { return c.title + c.day; }
  function updateField(id, field, value) {
    setValues(function(v){
      var row = Object.assign({}, v[id] || {});
      row[field] = value;
      var next = Object.assign({}, v);
      next[id] = row;
      return next;
    });

  function saveAll() {

            <div style={{fontFamily:"'Italiana',serif",fontSize:26,color:B.navy,lineHeight:1.15}}>Log this week's results.</div>
          </div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.muted,lineHeight:1.6,textAlign:"center",marginTop:6}}>

function App() {

// ── Supabase session state ──────────────────────────────────────────────
  const [session,setSession]         = useState(null);
  const [authLoading,setAuthLoading] = useState(true);
  const [appError,setAppError]       = useState(null);
  // [VAULT-PERSISTENCE] Tracks the userId we have already hydrated
  // user_data for. Supabase silently refreshes the auth token every ~hour,
  // which changes the `session` reference and would otherwise re-fire the
  // [session]-keyed hydration useEffect, racing in-flight saves and
  // overwriting unsaved local state with server data. The ref makes
  // hydration once-per-userId; subsequent token refreshes for the same
  // user skip the fetch entirely. Reset to null on SIGNED_OUT so a
  // different user signing in on the same browser triggers a fresh
  // hydration.
  const hydratedUserIdRef = useRef(null);
  // [TAB-PERSIST FIX] Mirrors hydratedUserIdRef but for the plan-load +
  // tab-auto-jump block in the session-mount useEffect below. Same root
  // cause as the vault data-loss bug: the useEffect is keyed on
  // [session], which re-fires every silent Supabase token refresh
  // (~hourly). Without this gate the plan loader re-runs and the
  // setTab(...) auto-jump inside its .then() yanks the user back to
  // the Plan tab even when they've navigated elsewhere mid-session.
  // Reset to null on SIGNED_OUT so a different user signing in on the
  // same browser gets the auto-jump treatment cleanly.
  const planLoadedUserIdRef = useRef(null);
  // [LEARNING-CONSENT] Pending consent prompt — null when no prompt is
  // active, or one of "edits" / "vault" / "results" / "public_posts" when
  // a deep component has fired window.__virlMaybeShowConsent for that
  // surface. Exactly one prompt visible at a time (later triggers no-op
  // until the current one is dismissed or accepted).
  const [pendingConsent, setPendingConsent] = useState(null);
  // [CX-FIX 1] Password recovery: when a user clicks the reset link in
  // their email, Supabase signs them in via a recovery session AND fires
  // a PASSWORD_RECOVERY event. Without this flag the app would just drop
  // them into the dashboard with no way to actually set a new password —
  // the entire forgot-password flow was a dead end until we noticed.
  const [passwordRecoveryMode,setPasswordRecoveryMode] = useState(false);

  useEffect(function() {
    // Check for existing session on load (handles OAuth redirects too)
    supabaseClient.auth.getSession().then(function(result) {
      setSession(result.data.session);
      setAuthLoading(false);
    });
    // Listen for auth state changes
    var listener = supabaseClient.auth.onAuthStateChange(function(event, s) {
      setSession(s);
      // [CX-FIX 1] User just clicked their reset email link — flip into
      // recovery mode so the app renders the SetNewPassword screen
      // instead of the normal dashboard. Cleared once the password is
      // saved (see SetNewPasswordScreen).
      if (event === "PASSWORD_RECOVERY") {
        setPasswordRecoveryMode(true);
      }
      // [TASK 1] Clear cached profile on sign-out so the next user on this browser starts clean.
      // [STABILITY] Also call clearLocalUserData() so virl_* milestone /
      // celebration flags get wiped consistently with the explicit
      // signOut button. Without this, a Supabase-emitted SIGNED_OUT
      // (token revocation, server-side session expiry, password change
      // elsewhere) left stale virl_milestone_*_fired / virl_signup_event_fired
      // flags around — if a different user signed in on the same browser,
      // their welcome / milestone events could be silently suppressed
      // by the previous user's flags. The seed useEffect re-syncs
      // counter-style flags from the server but doesn't touch boolean
      // "has X fired" flags, so this cleanup is the protective layer.
      if (event === "SIGNED_OUT") {
        try {
          var current = JSON.parse(localStorage.getItem(KEY) || "{}");
          delete current.profile;
          localStorage.setItem(KEY, JSON.stringify(current));
        } catch(e) {}
        try { sessionStorage.removeItem("virl_active_tab"); } catch(e) {}
        clearLocalUserData();
        setProfile({});
        setVault([]);
        setResults([]);
        setUserDataHydrated(false);
        // [VAULT-PERSISTENCE] Drop the hydration marker so the next sign-in
        // (same user OR different user on this browser) re-pulls server data
        // instead of treating the previous session's hydration as still valid.
        hydratedUserIdRef.current = null;
        // [TAB-PERSIST FIX] Same rationale — reset so the next sign-in
        // re-runs the plan load + auto-jump-to-plan-tab logic exactly once
        // for that user.
        planLoadedUserIdRef.current = null;
      }
    });
    return function() { listener.data.subscription.unsubscribe(); };
  }, []);

  // Mirror the signed-in user's id + access token onto window globals so
  // logEvent() (and any other "fire-and-forget" telemetry called from
  // deeply-nested components) can find them without prop-drilling. Cleared
  // on sign-out so a logged-out session doesn't accidentally inherit the
  // previous user's identity. This was previously missing — every logEvent
  // call was silently no-oping because window.__virlUserId was never set.
  useEffect(function(){
    if (session && session.user && session.user.id) {
      window.__virlUserId    = session.user.id;
      window.__virlUserToken = session.access_token || null;
    } else {
      window.__virlUserId    = null;
      window.__virlUserToken = null;
    }
  }, [session]);

  // [LEARNING-CONSENT] Expose the consent-prompt trigger to deeply-nested
  // components (EditableCaption, EditableHook, etc.) via window. The kind
  // argument is one of "edits" | "vault" | "results" | "public_posts".
  // No-ops cleanly when: no session, already consented, already shown
  // (per-user, per-device, via localStorage), or another prompt is already
  // active. Re-runs on every change to session / consent state so the
  // closure references the freshest profile values.
  useEffect(function(){
    window.__virlMaybeShowConsent = function(kind) {
      try {
        if (!session || !session.user || !session.user.id) return;
        const cfg = CONSENT_PROMPTS[kind];
        if (!cfg) return;
        // Already consented — nothing to ask.
        if (profile && profile[cfg.camel]) return;
        // Already shown on this device — respect the user's prior dismissal.
        const storageKey = cfg.storageKey + session.user.id;
        try { if (localStorage.getItem(storageKey) === "1") return; } catch(e) {}
        // One prompt at a time — later triggers wait their turn.
        if (pendingConsent) return;
        setPendingConsent(kind);
      } catch(e) { /* never block the calling action on a prompt failure */ }
    };
    return function() { try { delete window.__virlMaybeShowConsent; } catch(e) {} };
  }, [session, profile, pendingConsent]);

  // [LEARNING-CONSENT] Handle Yes / Not now from the active prompt. "Yes"
  // flips the matching profile flag (and persists via the existing
  // saveProfileToSupabase path); both branches mark the prompt as shown
  // in localStorage so it never re-fires for the same user on this device.
  function dismissConsent(accepted) {
    if (!pendingConsent) return;

      nextProfile[cfg.camel] = true;

  // cleared data) re-trigger the first-plan celebration overlay, the
  // generic-AI-vs-VIRL comparison card, and various Loops events that
  // should only fire once per user ever.
  //
  // Idempotent: runs once per session.user.id flip. If the server returns
  // zero counts (genuinely new user) we don't touch the flags — letting
  // the existing localStorage logic do its thing for first-ever generations.
  useEffect(function(){
    if (!session || !session.user || !session.user.id) return;
    var token = session.access_token;

      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(stats){

          var scanCount    = parseInt(stats.scanCount    || 0, 10) || 0;

        deletePlanFromSupabase(userId);
        setCards(null);
        setStats(null);
        setStrategy(null);
        setRestDayTips(null);
        try {
          var stale = load() || {};
          delete stale.plan; delete stale.planStats; delete stale.planStrategy; delete stale.planExpiresAt;
          save(stale);
        } catch(e) {}
      }
      });
    }

    // [VAULT-PERSISTENCE] Skip the entire user_data hydration block when we
    // have already hydrated for this userId. The useEffect's [session] dep
    // also fires on every silent token refresh (~hourly); without this gate
    // each refresh re-pulls from Supabase and the resolved load races
    // in-flight saves, overwriting unsaved local additions with stale
    // server state. Local state is the source of truth post-hydration;
    // auto-save keeps the server in sync.
    if (hydratedUserIdRef.current === userId) {
      // Make sure the gated auto-save effect stays unblocked across the
      // session-ref churn — userDataHydrated was set true on the original
      // hydration and should already be true here. This is defensive: a
      // future code path that ever calls setUserDataHydrated(false)
      // without resetting the ref would otherwise lock saves forever.
      setUserDataHydrated(true);
      return;
    }

    // Hydrate vault + results from the user_data table (or migrate any
    // local-only data up if the remote row is missing). Paint the local
    // cache first for instant display, then reconcile with the network.
    var cachedUserData = loadCachedUserData(userId);
    if (cachedUserData) {
      if (Array.isArray(cachedUserData.vault))   setVault(cachedUserData.vault);
      if (Array.isArray(cachedUserData.results)) setResults(cachedUserData.results);
    }
    loadUserDataFromSupabase(userId).then(function(result) {
      // [VAULT-PERSISTENCE] Read failure: do NOT mark hydrated and do NOT
      // set hydratedUserIdRef. The auto-save effect's gate stays closed
      // (so any local saves can't overwrite unread server data with empty
      // payloads). Next token refresh / session change re-fires this
      // useEffect, sees the ref still null, and re-attempts the load.
      if (!result.ok) {
        console.warn("[vault] user_data load failed after retries — auto-save gate stays closed until next session change");
        return;
      }
      var row = result.row;
      if (row && (Array.isArray(row.vault) || Array.isArray(row.results))) {
        // Server is authoritative for any item present on both sides (so a
        // newer edit pushed from another device wins over a stale cached
        // copy). Local-only items — additions made during the load window,
        // before the cache had been refreshed — get prepended so they
        // aren't lost. Items without an id can't be reliably matched and
        // are dropped on the local side to avoid duplicates. setVault /
        // setResults are functional so the merge uses React's current
        // state value, not whatever was captured at .then()-creation time.
        var nextVault   = Array.isArray(row.vault)   ? row.vault   : [];
        var nextResults = Array.isArray(row.results) ? row.results : [];
        function mergeArrays(localArr, serverArr) {
          var serverIds = {};
          for (var i = 0; i < serverArr.length; i++) {
            var sItem = serverArr[i];
            if (sItem && sItem.id != null) serverIds["id:" + sItem.id] = true;
          }
          var localOnly = [];
          for (var j = 0; j < localArr.length; j++) {
            var lItem = localArr[j];
            if (lItem && lItem.id != null && !serverIds["id:" + lItem.id]) {
              localOnly.push(lItem);
            }
          }
          return localOnly.concat(serverArr);
        }
        setVault(function(currentLocal){
          return mergeArrays(currentLocal || [], nextVault);
        });
        setResults(function(currentLocal){
          return mergeArrays(currentLocal || [], nextResults);
        });
        // The auto-save effect (gated on userDataHydrated) is about to fire
        // on the vault/results dep change anyway and will persist the merged
        // state to both Supabase and the local cache. No manual cache write
        // needed here.
      } else {
        // No remote row yet — migrate any local-only data up so existing
        // users don't lose what's already saved in their browser.
        var localData    = load() || {};
        var localVault   = Array.isArray(localData.vault)   ? localData.vault   : [];
        var localResults = Array.isArray(localData.results) ? localData.results : [];
        if (localVault.length || localResults.length) {
          saveUserDataToSupabase(userId, localVault, localResults);
          saveCachedUserData(userId, localVault, localResults);
        }
      }
      hydratedUserIdRef.current = userId;
      setUserDataHydrated(true);
    });

  function refreshCredits(opts) {
    // Optimistically tick the displayed Supabase credits down by `cost` so
    // the UI reflects the spend immediately. Without this, the user has to
    // wait for the Supabase GET round-trip to repaint — and in private/
    // incognito browsers a stale-cache or read-replica lag means the GET
    // sometimes returns the pre-deduction row, leaving the counter frozen.
    // The follow-up GET below still runs and reconciles to the canonical
    // server value.
    var cost = opts && typeof opts.cost === "number" ? opts.cost : 0;
    if (cost > 0) {
      setSbCredits(function(prev) {
        if (!prev) return prev;
        if (prev.plan === "founding" || prev.plan === "pro") return prev;
        var next = Object.assign({}, prev, { credits: Math.max(0, (prev.credits||0) - cost) });
        if (session) saveCachedSbCredits(session.user.id, next);
        return next;
      });
    }
    if (session) {
      loadCreditsFromSupabase(session.user.id, session.access_token).then(function(row) {
        if (row) {
          setSbCredits(row);
          saveCachedSbCredits(session.user.id, row);
        }
      });
    }
  }

  // Supabase is the only authoritative source for credits. While the row is
  // loading (e.g. first paint in incognito with no cache), `creditsLoaded`
  // is false and the UI shows a skeleton dash — never a misleading number.
  var creditsLoaded = sbCredits != null;
  var sbPlan = sbCredits ? sbCredits.plan : "free";
  var credits = sbCredits ? sbCredits.credits : 0;
  // Days until the user's per-user weekly reset. Computed from the
  // sbCredits.reset_at field (set server-side by the lazy reset in
  // /api/chat). Fallback: 7. Floor-rounded so a sub-day window still
  // shows "1 day" rather than "0 days".
  var daysUntilReset = (function(){
    if (!sbCredits || !sbCredits.reset_at) return 7;
    var ms = Date.parse(sbCredits.reset_at);
    if (Number.isNaN(ms)) return 7;
    var diff = ms - Date.now();
    if (diff <= 0) return 1; // reset is overdue; will fire on next call
    return Math.max(1, Math.ceil(diff / 86400000));

  // legacy plan='founding' rows were migrated to founding_tier='founder_circle'
  // with positions assigned by signup order — see migrations/001.
  var foundingTier     = sbCredits && sbCredits.founding_tier ? sbCredits.founding_tier : "standard";
  var foundingPosition = sbCredits && sbCredits.founding_position ? sbCredits.founding_position : null;
  var isFounderCircle  = foundingTier === "founder_circle";
  var isFoundingOrPro = sbPlan==="founding" || sbPlan==="pro";
  // [PRICING credit-model] Only the Pro tier has truly unlimited credits.
  // Founder Circle now meters at 150/week like Standard — the HUD shows the

  // and the friendly credit-counter (which Pro doesn't need).
  var isUnlimitedCredits = sbPlan==="pro";

  var isPaid = isFoundingOrPro || sbPlan === "standard";
  // [FRESH-TRENDS] Per-gen-type weekly counters from the same credits

  var freshTrendsPlanLeft    = sbCredits && sbCredits.fresh_trends_plan_remaining    != null ? sbCredits.fresh_trends_plan_remaining    : 1;
  var freshTrendsScanLeft    = sbCredits && sbCredits.fresh_trends_scan_remaining    != null ? sbCredits.fresh_trends_scan_remaining    : 1;
  var freshTrendsCaptionLeft = sbCredits && sbCredits.fresh_trends_caption_remaining != null ? sbCredits.fresh_trends_caption_remaining : 1;

  // [STRIPE-FIX] Surface the server's error message when checkout fails
  // instead of swallowing it into a generic "Something went wrong".
  // Hides real Stripe / config issues during testing — without this
  // fix, a missing annual price ID looks identical to a network blip.
  // [PRICING 3] Tier defaults to "founder_circle" if FC spots remain,
  // "standard" otherwise. Caller can override (e.g. the Standard CTA
  // in the upgrade modal explicitly passes "standard").
  async function handleCheckout(planType, tierOverride) {
    if (!session) return;
    setShowUpgrade(false);
    var tier = tierOverride
      || (foundingAvailable ? "founder_circle" : "standard");
    try {
      // [SECURITY] Send the Supabase session token so the server can
      // derive userId + email from the verified user record. The body
      // no longer carries userId/email — the server ignores them and
      // trusts only the token.
      var res = await fetch("/api/create-checkout", {
        method: "POST",
        headers: {
          "Content-Type":  "application/json",
          "Authorization": "Bearer " + session.access_token,
        },
        body: JSON.stringify({
          planType: planType||"monthly",
          tier: tier,
        }),
      });
      var data = {};
      try { data = await res.json(); } catch(e) {}
      if (data.url) {
        window.location.href = data.url;
        return;

      // server, not a generic failure — refresh the count + transparently
      // retry on Standard so the user lands on a working checkout instead
      // of staring at an error.
      if (data.error === "founder_circle_full") {
        setFoundingCount(FOUNDING_CAP);
        if (tier === "founder_circle") {
          return handleCheckout(planType, "standard");

      }
      var msg = data.message || data.error || ("Checkout failed (" + res.status + "). Please try again.");

  // [FC ACCOUNT-FIRST] Route a brand-new signup that arrived from a Founder
  // Circle marketing CTA (intent stashed by GateScreen.routeIntoApp):
  //   intent=founder → straight into Stripe FC checkout
  //   intent=trial   → pop the upgrade modal as a one-screen FC offer
  // Abandoning Stripe (cancel_url) or dismissing the modal lands them in the
  // app on the free trial — no FC spot is consumed, since the founding_position
  // is only claimed by the webhook on checkout.session.completed. Runs once:
  // the sessionStorage key is cleared the moment we act.
  useEffect(function(){
    if (!session || !session.user) return;
    var raw;
    try { raw = sessionStorage.getItem("virl_signup_fc_intent"); } catch(e) { return; }
    if (!raw) return;
    try { sessionStorage.removeItem("virl_signup_fc_intent"); } catch(e) {}
    // Already on a paid plan somehow — never push another checkout at them.
    if (isFoundingOrPro) return;
    var parsed = null;
    try { parsed = JSON.parse(raw); } catch(e) { return; }
    if (!parsed || !parsed.intent) return;
    var plan = parsed.plan === "monthly" ? "monthly" : "annual";

    if (parsed.intent === "founder" && foundingAvailable !== false) {

      handleCheckout(plan, "founder_circle");

      setShowUpgrade(true);
    }
  }, [session]);

      const res = await fetch("/api/admin-stats", {
        headers: {
          "Authorization": "Bearer "+(session ? session.access_token : ""),
