  return (
    <div style={{background:idx%2===0?B.card:B.cardAlt,borderRadius:12,padding:"18px 20px",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,color:B.blue}}>{caption.label}</div>
        <div style={{display:"flex",gap:6}}>
          {!editing&&<CopyBtn text={text} label="Copy"/>}
          <button onClick={function(){setEditing(function(v){return !v;});}}
            style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",padding:"5px 12px",background:editing?B.ink:B.bg,color:editing?B.white:B.muted,border:"none",borderRadius:99,cursor:"pointer"}}>
            {editing?"Cancel":"Edit"}
          </button>
          <button onClick={handleSave}
            style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",padding:"5px 12px",background:saved?B.greenSoft:editing?B.blue:B.bg,color:saved?B.green:editing?B.white:B.blue,border:"none",borderRadius:99,cursor:"pointer"}}>
            {saved?"Saved":"Save"}
          </button>
        </div>
      </div>
      {editing?(
        <textarea value={text} onChange={function(e){setText(e.target.value);}}
          style={{width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:10,color:B.ink,fontSize:14,fontWeight:300,padding:"11px 14px",resize:"vertical",minHeight:100,lineHeight:1.8}}/>
      ):(
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.sub,lineHeight:1.8,whiteSpace:"pre-line"}}>{text}</div>
      )}
      {!editing&&<RemixCaption text={text} onSelect={function(t){setText(t);}} profile={profile} userToken={userToken} onCreditsUsed={onCreditsUsed}/>}
      {!editing && userToken && (
        <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid "+B.divider,display:"flex",justifyContent:"flex-end"}}>
          <RatingButtons sessionToken={userToken} generationType="caption" targetRef={"cap|"+(topic||"")+"|"+(caption.label||idx)} size="sm"/>
        </div>
      )}
    </div>
  );
}

function CaptionGen({profile,onSaveCaption,userToken,onCreditsUsed}) {
  const [topic,setTopic] = useState("");
  const [platform,setPlatform] = useState("TikTok");
  const [tone,setTone] = useState("Warm & relatable");
  const [length,setLength] = useState("Medium");
  const [loading,setLoading] = useState(false);
  const [result,setResult] = useState(null);
  const [error,setError] = useState("");

  const LENGTHS = ["Short","Medium","Long"];

  // UI-only hints — the canonical platform/tone/length rules are in
  // api/_lib/prompts.js (server-side). These shorter strings just give the
  // user a feel for what each option means before they pick.
  const platformHints = {
    TikTok:    "Punchy, conversational. Hook in first line.",
    Instagram: "Aspirational but real. First line is the hook.",
    Facebook:  "Warm, community-focused. Conversational.",
    YouTube:   "Context-rich, keyword-friendly.",
    LinkedIn:  "Professional but human. Insight-led opening.",
    X:         "Ultra short. One punchy idea.",
    Pinterest: "Keyword-rich, searchable. Tutorial framing.",
  };
  const lengthHints = {
    Short:  "1-3 lines. Punchy, no fluff.",
    Medium: "4-6 lines. One idea with context and a CTA.",
    Long:   "7-10 lines. Story-driven, conversational.",
  };
  // One-line example caption per tone — UI-only, gives the user a feel
  // for what each option reads like before committing. The model never
  // sees these.
  const toneExamples = {
    "Warm & relatable": "Just made the most embarrassing meal of my life. Show me yours.",
    "Educational":      "The 7-second rule that doubled my completion rate, explained.",
    "Funny & playful":  "Plot twist: my morning routine is just panicking with extra steps.",
    "Inspirational":    "You don't need a perfect plan. You need to start the imperfect one.",
    "Bold & direct":    "Stop posting carousels nobody saves. Here's what to post instead.",
  };
  const platformCtx = platformHints[platform] || "";
  const toneExample = toneExamples[tone]      || "";

  function generate() {
    if (!topic.trim()) return;
    // Credit check + prompt construction handled server-side.
    setLoading(true); setResult(null); setError("");
    callAPI("caption", { topic: topic.trim(), platform: platform, tone: tone, length: length }, { token: userToken }).then(function(data) {
      const parsed = extractJSON(data.text);
      if (parsed&&parsed.hook&&parsed.captions) {
        setResult(parsed);
        try {
          var uid = window.__virlUserId||null;
          // [COST 1] Forward Anthropic usage signal alongside the existing
          // platform/tone/length business dims.
          var capUsage = (data && data.usage) || {};
          logEvent(uid,"caption_generated",{
            platform:platform,
            tone:tone,
            length:length,
            outputTokens:        capUsage.outputTokens        || 0,
            cachedInputTokens:   capUsage.cachedInputTokens   || 0,
            uncachedInputTokens: capUsage.uncachedInputTokens || 0,
            truncated:           !!capUsage.truncated,
            model:               capUsage.model || null,
          });
        } catch(e){}
        if (onCreditsUsed) onCreditsUsed({cost: data.cost});
      }
      else { setError("Almost there - tap generate again for a second pass."); }
    }).catch(function(e){ setError(e.message); }).finally(function(){ setLoading(false); });
  }

  return (
    <div>
      <SherpaTip>{"Give VIRL a topic and it writes three caption options in your exact voice, tuned to how "+platform+" audiences actually read. Edit any option, then remix for 3 more variations instantly."}</SherpaTip>
      <div style={{background:B.card,borderRadius:16,boxShadow:"0 1px 3px rgba(0,0,0,0.05)",marginBottom:12,overflow:"hidden"}}>
        <div style={{padding:"22px 26px",borderBottom:"1px solid "+B.divider}}>
          <Label>What is your content about?</Label>
          <textarea value={topic} onChange={function(e){setTopic(e.target.value);}}
            placeholder="e.g. my morning workout, a recipe I made, a productivity tip, a day in my life..."
            style={{width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:10,color:B.ink,fontSize:14,fontWeight:300,fontStyle:"italic",padding:"11px 14px",resize:"vertical",minHeight:72,lineHeight:1.6}}/>
        </div>
        <div style={{padding:"22px 26px",borderBottom:"1px solid "+B.divider}}>
          <Label>Platform</Label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{PLATFORMS.map(function(p){return <Chip key={p} active={platform===p} onClick={function(){setPlatform(p);}}>{p}</Chip>;})}</div>
          {platformCtx&&<div style={{marginTop:10,fontFamily:"'Jost',sans-serif",fontSize:11,color:B.muted,fontStyle:"italic",lineHeight:1.5}}>{"Style note: "+platformCtx}</div>}
        </div>
        <div style={{padding:"22px 26px",borderBottom:"1px solid "+B.divider}}>
          <Label>Tone</Label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{TONES.map(function(t){return <Chip key={t} active={tone===t} onClick={function(){setTone(t);}}>{t}</Chip>;})}</div>
          {toneExample && (
            <div style={{marginTop:10,padding:"8px 12px",background:B.bg,border:"1px solid "+B.divider,borderRadius:8,fontFamily:"'Jost',sans-serif",fontSize:12,fontStyle:"italic",color:B.sub,lineHeight:1.5}}>
              <span style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.muted,marginRight:8,fontStyle:"normal"}}>Sounds like</span>
              {'"' + toneExample + '"'}
            </div>
          )}
        </div>
        <div style={{padding:"22px 26px"}}>
          <Label>Caption length</Label>
          <div style={{display:"flex",gap:8,marginBottom:8}}>{LENGTHS.map(function(l){return <Chip key={l} active={length===l} onClick={function(){setLength(l);}}>{l}</Chip>;})}</div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,fontStyle:"italic",color:B.muted}}>{lengthHints[length]}</div>
        </div>
      </div>
      <GenBtn onClick={generate} loading={loading} disabled={!topic.trim()}>
        {loading?"Writing captions...":"Generate captions & hook"}
      </GenBtn>
      <ErrBox msg={error}/>
      {loading&&!result&&<Spinner/>}
      {result&&(
        <div>
          <div style={{background:B.navy,borderRadius:14,padding:"18px 20px",marginBottom:8}}>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.sky,marginBottom:8}}>Your hook - use as on-screen text</div>
            <div style={{fontFamily:"'Italiana',serif",fontSize:24,color:B.white,marginBottom:12}}>{'"'+result.hook+'"'}</div>
            <CopyBtn text={result.hook} label="Copy hook"/>
          </div>
          {(result.captions||[]).map(function(cap,i){return (
            <EditableCaption key={i} caption={cap} idx={i} topic={topic} onSave={onSaveCaption} profile={profile} userToken={userToken} onCreditsUsed={onCreditsUsed}/>
          );})}
          <HashtagRow hashtags={result.hashtags}/>
          <button onClick={generate} disabled={loading}
            style={{width:"100%",fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",padding:"12px 18px",background:B.bg,color:B.muted,border:"1px solid "+B.border,cursor:"pointer",marginTop:4,borderRadius:14}}>
            Regenerate captions
          </button>
        </div>
      )}
    </div>
  );
}

function EditableScanCaption({captionText,platform,onSave,profile,userToken,onCreditsUsed}) {
  const [editing,setEditing] = useState(false);
  const [text,setText] = useState(captionText||"");
  const [saved,setSaved] = useState(false);

  function handleSave() {
    if (!text.trim()) return;
    onSave({
      title:    platform+" caption",
      preview:  text.slice(0,100),
      text:     text,
      platform: platform,
    });
    setEditing(false); setSaved(true);
    setTimeout(function(){setSaved(false);},2000);
  }

  return (
    <div style={{background:B.bg,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,color:B.blue}}>Caption</div>
        <div style={{display:"flex",gap:6}}>
          {!editing&&<CopyBtn text={text} label="Copy"/>}
          <button onClick={function(){setEditing(function(v){return !v;});}}
            style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",padding:"5px 12px",background:editing?B.ink:B.card,color:editing?B.white:B.muted,border:"none",borderRadius:99,cursor:"pointer"}}>
            {editing?"Cancel":"Edit"}
          </button>
          <button onClick={handleSave}
            style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",padding:"5px 12px",background:saved?B.greenSoft:editing?B.blue:B.card,color:saved?B.green:editing?B.white:B.blue,border:"none",borderRadius:99,cursor:"pointer"}}>
            {saved?"Saved":"Save"}
          </button>
        </div>
      </div>
      {editing?(
        <textarea value={text} onChange={function(e){setText(e.target.value);}}
          style={{width:"100%",background:B.card,border:"1px solid "+B.border,borderRadius:10,color:B.ink,fontSize:14,fontWeight:300,padding:"11px 14px",resize:"vertical",minHeight:100,lineHeight:1.8}}/>
      ):(
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.sub,lineHeight:1.8,whiteSpace:"pre-line"}}>{text}</div>
      )}
      {!editing&&<RemixCaption text={text} onSelect={function(t){setText(t);}} profile={profile} userToken={userToken} onCreditsUsed={onCreditsUsed}/>}
      {!editing && userToken && (
        <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid "+B.divider,display:"flex",justifyContent:"flex-end"}}>
          <RatingButtons sessionToken={userToken} generationType="scan_result" targetRef={"scan|"+(platform||"")+"|"+(captionText||"").slice(0,40)} size="sm"/>
        </div>
      )}
    </div>
  );
}

function ShareScoreCard({score,platform,hook}) {
  const [busy,setBusy] = useState(false);
  const [done,setDone] = useState(false);

  function wrapText(ctx, text, maxWidth) {
    var words = String(text||"").split(/\s+/);
    var lines = [], line = "";
    for (var i=0; i<words.length; i++) {
      var test = line ? line+" "+words[i] : words[i];
      if (ctx.measureText(test).width > maxWidth && line) {
        lines.push(line); line = words[i];
      } else { line = test; }
    }
    if (line) lines.push(line);
    return lines;
  }

  async function downloadCard() {
    setBusy(true);
    try {
      // Pre-load the webfonts at the sizes we'll draw at — without this the
      // first click renders with a serif/sans fallback because the FontFace
      // hasn't been requested yet.
      try {
        await Promise.all([
          document.fonts.load("400 120px 'Italiana'"),
          document.fonts.load("400 360px 'Italiana'"),
          document.fonts.load("italic 400 56px 'Italiana'"),
          document.fonts.load("700 28px 'Jost'"),
          document.fonts.load("italic 300 32px 'Jost'"),
        ]);
      } catch(e) {}

      var W = 1080, H = 1920;
      var c = document.createElement("canvas");
      c.width = W; c.height = H;
      var ctx = c.getContext("2d");

      // Navy gradient background
      var grad = ctx.createLinearGradient(0,0,0,H);
      grad.addColorStop(0, "#1F3A8A");
      grad.addColorStop(1, "#0B1840");
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,W,H);

      ctx.textAlign = "center";

      // VIRL wordmark
      ctx.fillStyle = "#FFFFFF";
      ctx.font = "400 120px 'Italiana', serif";
      ctx.fillText("VIRL", W/2, 240);

      // Tagline
      ctx.font = "italic 300 32px 'Jost', sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.6)";
      ctx.fillText("Finally, a strategy that sounds like you.", W/2, 296);

      // Eyebrow
      ctx.font = "700 28px 'Jost', sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.fillText("VIRAL POTENTIAL", W/2, 600);

      // Score number — extract numeric portion, color by tier
      var raw = String(score||"");
      var m = raw.match(/(\d+\.?\d*)/);
      var scoreText = m ? m[1] : raw;
      var n = m ? parseFloat(m[1]) : 0;
      var sColor = n>=8 ? "#10B981" : n>=6 ? "#F59E0B" : "#94A3B8";
      ctx.font = "400 360px 'Italiana', serif";
      ctx.fillStyle = sColor;
      ctx.fillText(scoreText, W/2, 920);

      // "out of 10"
      ctx.font = "300 44px 'Jost', sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.fillText("out of 10", W/2, 1000);

      // Platform pill
      if (platform) {
        var pillText = "→ "+platform;
        ctx.font = "600 36px 'Jost', sans-serif";
        var pillW = ctx.measureText(pillText).width + 80;
        var pillH = 78;
        var pillX = W/2 - pillW/2;
        var pillY = 1080;
        var pr = pillH/2;
        ctx.fillStyle = "rgba(59,130,246,0.28)";
        ctx.beginPath();
        ctx.moveTo(pillX+pr, pillY);
        ctx.arcTo(pillX+pillW, pillY, pillX+pillW, pillY+pillH, pr);
        ctx.arcTo(pillX+pillW, pillY+pillH, pillX, pillY+pillH, pr);
        ctx.arcTo(pillX, pillY+pillH, pillX, pillY, pr);
        ctx.arcTo(pillX, pillY, pillX+pillW, pillY, pr);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#FFFFFF";
        ctx.textBaseline = "middle";
        ctx.fillText(pillText, W/2, pillY+pillH/2);
        ctx.textBaseline = "alphabetic";
      }

      // Divider
      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W/2-160, 1260);
      ctx.lineTo(W/2+160, 1260);
      ctx.stroke();

      // Hook quote (truncate to 4 lines for layout safety)
      if (hook) {
        ctx.font = "italic 400 56px 'Italiana', serif";
        ctx.fillStyle = "#FFFFFF";
        var lines = wrapText(ctx, "“"+hook+"”", W-200);
        if (lines.length > 4) {
          lines = lines.slice(0,4);
          lines[3] = lines[3].replace(/\s*”?\s*$/, "") + "…”";
        }
        var lineH = 78;
        var startY = 1380;
        for (var i=0; i<lines.length; i++) {
          ctx.fillText(lines[i], W/2, startY + i*lineH);
        }
      }

      // Footer
      ctx.font = "600 32px 'Jost', sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.fillText("Scored by VIRL", W/2, H-180);
      ctx.font = "400 28px 'Jost', sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.fillText("govirl.ai", W/2, H-130);

      await new Promise(function(resolve) {
        c.toBlob(function(blob) {
          if (!blob) { resolve(); return; }
          var url = URL.createObjectURL(blob);
          var a = document.createElement("a");
          a.href = url;
          var pSlug = String(platform||"score").toLowerCase().replace(/[^a-z0-9]/g,"-");
          var sSlug = scoreText.replace(/[^0-9]/g,"");
          a.download = "virl-score-"+pSlug+(sSlug?"-"+sSlug:"")+".png";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(function(){URL.revokeObjectURL(url);}, 200);
          resolve();
        }, "image/png");
      });

      setDone(true);
      setTimeout(function(){setDone(false);}, 2000);
    } finally {
      setBusy(false);
    }
  }

  return (
    <button onClick={downloadCard} disabled={busy}
      style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",marginTop:12,padding:"8px 16px",background:done?B.greenSoft:B.skySoft,color:done?B.green:B.sky,border:"none",borderRadius:99,cursor:busy?"default":"pointer",opacity:busy?0.6:1,transition:"all .2s"}}>
      {busy?"Building image...":done?"Downloaded!":"Download story card"}
    </button>
  );
}

function VIRLScan({profile,onSaveCaption,userToken,onCreditsUsed}) {
  var [files,setFiles]       = useState([]);
  var [results,setResults]   = useState([]);
  var [scanning,setScanning] = useState(false);
  var [current,setCurrent]   = useState(0);
  var [total,setTotal]       = useState(0);
  var [error,setError]       = useState("");
  var [consented,setConsented] = useState(function(){
    try { return localStorage.getItem("virl_scan_consent")==="true"; } catch(e) { return false; }
  });
  var inputRef = useRef(null);

  function scoreColor(s) {
    var m = String(s).match(/(\d+\.?\d*)/);
    var n = m ? parseFloat(m[1]) : 0;
    return n>=8?B.green:n>=6?B.amber:B.muted;
  }

  function handleConsent() {
    try { localStorage.setItem("virl_scan_consent","true"); } catch(e) {}
    setConsented(true);
  }

  function handleFiles(e) {
    var selected = Array.from(e.target.files||[]).slice(0,1);
    setFiles(selected); setResults([]); setError("");
  }

  function scan() {
    if (!files.length) return;
    setScanning(true); setResults([]); setError("");
    setTotal(files.length); setCurrent(0);

    // Process files sequentially. Prompt + JSON schema live server-side now;
    // the client just names the generationType and supplies the image bytes.
    var processAll = function() {
      var out = [];
      var idx = 0;
      var totalCost = 0;
      // [COST 1] Aggregate Anthropic usage across the scan batch so the
      // single scan_completed event carries the same telemetry shape as
      // single-call generations. truncated is OR'd — one truncation in the
      // batch is enough to flag the run as worth investigating.
      var totalUsage = {
        outputTokens: 0,
        cachedInputTokens: 0,
        uncachedInputTokens: 0,
        truncated: false,
        model: null,
      };
      function accumulateUsage(u) {
        if (!u) return;
        totalUsage.outputTokens        += u.outputTokens        || 0;
        totalUsage.cachedInputTokens   += u.cachedInputTokens   || 0;
        totalUsage.uncachedInputTokens += u.uncachedInputTokens || 0;
        if (u.truncated) totalUsage.truncated = true;
        if (u.model) totalUsage.model = u.model;
      }

      function processNext() {
        if (idx >= files.length) {
          setResults(out);
          setScanning(false);
          try {
            var scores = out.filter(function(r){return !r.error&&r.score;})
              .map(function(r){ var m=String(r.score).match(/(\d+\.?\d*)/); return m?parseFloat(m[1]):0; });
            var avg = scores.length ? Math.round((scores.reduce(function(a,b){return a+b;},0)/scores.length)*10)/10 : null;
            logEvent(window.__virlUserId||null,"scan_completed",{
              file_count: out.length,
              avg_score:  avg,
              outputTokens:        totalUsage.outputTokens,
              cachedInputTokens:   totalUsage.cachedInputTokens,
              uncachedInputTokens: totalUsage.uncachedInputTokens,
              truncated:           totalUsage.truncated,
              model:               totalUsage.model,
            });
          } catch(e){}
          // Server deducts per call; sum what it actually charged for the
          // optimistic credit-counter tick.
          if (onCreditsUsed && totalCost) onCreditsUsed({cost: totalCost});
          return;
        }

        var file = files[idx];
        idx++;
        setCurrent(idx);

        var isVideo = file.type.startsWith("video/");

        if (isVideo) {
          extractVideoFrame(file, 1)
            .then(function(fd) {
              return callAPI("scan_video_frame", {}, { token: userToken, imageBase64: fd.b64, imageType: "image/jpeg" })
                .then(function(data) {
                  totalCost += data.cost || 0;
                  accumulateUsage(data && data.usage);
                  var parsed = extractJSON(data.text);
                  if (parsed && parsed.score) {
                    out.push(Object.assign({name:file.name,isVideo:true,duration:fd.dur}, parsed));
                  } else {
                    out.push({name:file.name,isVideo:true,error:"Analysis returned an unexpected format. Try again or use a screenshot."});
                  }
                })
                .catch(function(e) {
                  out.push({name:file.name,isVideo:true,error:"Could not analyze this video: "+(e.message||"unknown error")+". Try screenshotting your best frame."});
                });
            })
            .catch(function() {
              out.push({name:file.name,isVideo:true,error:"Could not read this video file. Try screenshotting your best moment and scanning that instead."});
            })
            .then(function() {
              processNext();
            });
        } else {
          var imageUrl = URL.createObjectURL(file);
          fileToBase64(file)
            .then(function(b64) {
              return callAPI("scan_image", {}, { token: userToken, imageBase64: b64, imageType: file.type });
            })
            .then(function(data) {
              totalCost += data.cost || 0;
              accumulateUsage(data && data.usage);
              var parsed = extractJSON(data.text);
              if (parsed && parsed.score) {
                out.push(Object.assign({name:file.name,url:imageUrl}, parsed));
              } else {
                out.push({name:file.name,url:imageUrl,error:"Analysis returned an unexpected format. Try again."});
              }
            })
            .catch(function(e) {
              out.push({name:file.name,url:imageUrl,error:"Could not analyze: "+(e.message||"unknown error")+". Try screenshotting the image first."});
            })
            .then(function() {
              processNext();
            });
        }
      }

      processNext();
    };

    processAll();
  }

  if (!consented) return (
    <div style={{background:B.card,borderRadius:16,padding:"32px 28px",textAlign:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
      <div style={{fontFamily:"'Italiana',serif",fontSize:32,color:B.sky,marginBottom:12}}>{"📷"}</div>
      <div style={{fontFamily:"'Italiana',serif",fontSize:22,color:B.ink,marginBottom:12}}>Before you scan</div>
      <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.muted,lineHeight:1.75,marginBottom:24}}>
        When you upload a photo or video, it is sent to the Anthropic API for analysis and is not stored by VIRL beyond your session. By continuing you consent to this processing.
      </div>
      <button onClick={handleConsent}
        style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"14px 32px",background:B.blue,color:B.white,border:"none",borderRadius:99,cursor:"pointer",boxShadow:"0 4px 14px rgba(37,99,235,0.3)"}}>
        I understand - start scanning
      </button>
    </div>
  );

  return (
    <div>
      <SherpaTip>Drop a photo or video and VIRL scores it out of 10 for viral potential, recommends the best platform, and writes a ready-to-post caption you can edit and save to your Vault.</SherpaTip>
      <div style={{background:B.card,border:"2px dashed "+B.border,borderRadius:20,padding:"32px 24px",textAlign:"center",marginBottom:8,cursor:"pointer"}}
        onClick={function(){inputRef.current&&inputRef.current.click();}}>
        <div style={{fontFamily:"'Italiana',serif",fontSize:32,color:B.sky,marginBottom:8}}>{"📷"}</div>
        <div style={{fontFamily:"'Italiana',serif",fontSize:22,color:B.ink,marginBottom:6}}>Select a photo or video</div>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,fontStyle:"italic",color:B.muted,marginBottom:16}}>VIRL scores it for viral potential, recommends the best platform, and writes a ready-to-post caption.</div>
        <div style={{display:"inline-block",fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"12px 28px",background:B.blue,color:B.white,cursor:"pointer",borderRadius:99}}>
          Choose file
        </div>
        <input ref={inputRef} type="file" accept="image/*,video/*" onChange={handleFiles} style={{display:"none"}}/>
      </div>

      {files.length>0&&!scanning&&!results.length&&(
        <div style={{background:B.card,borderRadius:14,padding:"16px 20px",marginBottom:8}}>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:B.muted,marginBottom:12}}>
            Selected
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
            {files.map(function(f,idx){return (
              <div key={idx} style={{background:B.bg,borderRadius:99,padding:"5px 12px",fontFamily:"'Jost',sans-serif",fontSize:12,color:B.sub}}>
                {(f.type.startsWith("video/")?"🎬 ":"🖼 ")+f.name.slice(0,24)}
              </div>
            );})}
          </div>
          <GenBtn onClick={scan} loading={scanning}>Scan for viral potential</GenBtn>
        </div>
      )}

      {scanning&&(
        <div style={{background:B.card,borderRadius:14,padding:"24px",textAlign:"center",marginBottom:8}}>
          <Spinner/>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.muted,marginTop:12}}>
            {"Analyzing "+(total>1?"file "+current+" of "+total:"your file")+" - about 30-60 seconds..."}
          </div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,marginTop:4,fontStyle:"italic"}}>
            Sit tight while VIRL checks the viral potential.
          </div>
        </div>
      )}

      <ErrBox msg={error}/>

      {results.length>0&&!scanning&&(
        <button onClick={function(){setFiles([]);setResults([]);setError("");}}
          style={{width:"100%",fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",padding:"12px 18px",background:B.bg,color:B.muted,border:"1px solid "+B.border,cursor:"pointer",marginBottom:8,borderRadius:14}}>
          Scan a different file
        </button>
      )}

      {results.map(function(r,idx){return (
        <div key={idx} className="su" style={{background:B.card,borderRadius:14,padding:"22px",marginBottom:8,animationDelay:(idx*0.08)+"s",borderLeft:"3px solid "+(r.error?B.border:B.blue)}}>
          {r.error?(
            <div>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:600,color:B.ink,marginBottom:6}}>{r.name}</div>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,color:B.muted,marginBottom:10}}>{r.error}</div>
              <div style={{background:B.navySoft,borderRadius:10,padding:"8px 12px",fontFamily:"'Jost',sans-serif",fontSize:12,color:B.navy}}>
                Tip: open in Photos, take a screenshot, then scan the screenshot instead.
              </div>
            </div>
          ):(
            <div>
              {r.isVideo&&(
                <div style={{background:B.navySoft,borderRadius:10,padding:"8px 12px",marginBottom:12,fontFamily:"'Jost',sans-serif",fontSize:12,color:B.navy}}>
                  {"🎬 Video analyzed from best frame"+(r.duration?" ("+Math.round(r.duration)+"s)":"")+(r.thumbnailNote?" - "+r.thumbnailNote:"")}
                </div>
              )}
              {r.url&&<img src={r.url} alt={r.name} style={{width:"100%",maxHeight:200,objectFit:"cover",marginBottom:14,borderRadius:10,display:"block"}}/>}
              {r.analysis&&<div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,fontStyle:"italic",color:B.muted,lineHeight:1.7,marginBottom:14,padding:"10px 14px",background:B.bg,borderRadius:10}}>{r.analysis}</div>}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.muted,marginBottom:4}}>Viral potential</div>
                  <div style={{fontFamily:"'Italiana',serif",fontSize:44,color:scoreColor(r.score),lineHeight:1}}>{r.score}</div>
                </div>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,padding:"6px 16px",background:B.navySoft,color:B.navy,borderRadius:99}}>{"→ "+r.platform}</div>
              </div>
              <div style={{background:B.navy,borderRadius:12,padding:"12px 16px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                <div style={{fontFamily:"'Italiana',serif",fontSize:18,color:B.white,flex:1,lineHeight:1.3}}>{"\""+r.hook+"\""}</div>
                <CopyBtn text={r.hook||""} label="Copy hook"/>
              </div>
              <EditableScanCaption captionText={r.caption} platform={r.platform} onSave={onSaveCaption} profile={profile} userToken={userToken} onCreditsUsed={onCreditsUsed}/>
              <HashtagRow hashtags={r.hashtags}/>
              {r.tip&&<div style={{background:B.blueSoft,borderRadius:10,padding:"10px 14px",fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,fontStyle:"italic",color:B.blue,lineHeight:1.6,marginTop:8}}>{"✦ "+r.tip}</div>}
              <ShareScoreCard score={r.score} platform={r.platform} hook={r.hook||""}/>
            </div>
          )}
        </div>
      );})}

      {!files.length&&!results.length&&(
        <div style={{background:B.card,borderRadius:16,padding:"48px 32px",textAlign:"center",marginTop:8}}>
          <div style={{fontFamily:"'Italiana',serif",fontSize:40,color:B.sky,marginBottom:12}}>{"📱"}</div>
          <div style={{fontFamily:"'Italiana',serif",fontSize:20,color:B.ink,marginBottom:8}}>Content waiting in your camera roll</div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,fontStyle:"italic",color:B.muted,lineHeight:1.7}}>VIRL finds the photos and videos worth posting and tells you exactly what to do with them.</div>
        </div>
      )}
    </div>
  );
}


function CreatorProfile({profile,syncState,onSave,onNavigateToPlan}) {
  const [myPlatforms,setMyPlatforms] = useState(profile.myPlatforms||[]);
  const [name,setName] = useState(profile.name||"");
  const [audience,setAudience] = useState(profile.audience||"");
  const [voice,setVoice] = useState(profile.voice||"");
  const [vibes,setVibes] = useState(profile.vibes||[]);
  const [sampleCaption,setSample] = useState(profile.sampleCaption||"");
  const [topics,setTopics] = useState(profile.topics||"");
  const [purpose,setPurpose] = useState(profile.purpose||"");
  const [offLimits,setOffLimits] = useState(profile.offLimits||"");
  const [inspiration,setInspiration] = useState(profile.inspiration||"");
  const [journey,setJourney] = useState(profile.journey||"");
  const [knownFor,setKnownFor] = useState(profile.knownFor||"");
  const [pillars,setPillars] = useState(profile.pillars||[]);
  const [emojiPref,setEmojiPref] = useState(profile.emojiPref||"Sometimes");
  const [handles,setHandles] = useState(profile.handles||{});
  const [platformAudiences,setPlatformAudiences] = useState(profile.platformAudiences||{});
  // [INTEL 2] Per-platform format preferences. Shape: { Instagram: ["feed_post","story"], LinkedIn: ["long_post"] }.
  // Defaults to {} so existing users without this column populated render
  // every platform's format chip group with nothing selected.
  const [platformFormats,setPlatformFormats] = useState(profile.platformFormats||{});
  const [postFreq,setPostFreq] = useState(profile.postFreq||"");
  const [contentLength,setContentLength] = useState(profile.contentLength||"");
  const [workedWell,setWorkedWell] = useState(profile.workedWell||"");
  // [INTEL 1] Personal facts that VIRL must never contradict in any output.
  // Anti-drift: the sons/daughters problem (factual error in 5-15% of plans
  // pre-fix). All three default to empty string so existing users without
  // these columns populated render the textareas unfilled with no errors.
  const [personalFacts,setPersonalFacts] = useState(profile.personalFacts||"");
  const [neverAssume,setNeverAssume] = useState(profile.neverAssume||"");
  const [loveToReference,setLoveToReference] = useState(profile.loveToReference||"");
  const [saved,setSaved] = useState(false);

  // [CHANGE 1] Phase 2 expansion + Phase-1 success state.
  // Auto-expand Phase 2 for returning users who already have any optional
  // data — and for any returning user with a saved Phase 1 (profile.name)
  // even without optional data, so they always have access to the save
  // button at the bottom of Phase 2 once the prominent "Save and start
  // planning" button has been hidden.
  const [showPhase2,setShowPhase2] = useState(function(){
    var hasOptional =
      (profile.vibes && profile.vibes.length) ||
      (profile.pillars && profile.pillars.length) ||
      profile.topics || profile.workedWell || profile.purpose ||
      profile.knownFor || profile.journey || profile.offLimits ||
      profile.inspiration || profile.sampleCaption ||
      profile.postFreq || profile.contentLength ||
      (profile.emojiPref && profile.emojiPref !== "Sometimes") ||
      (profile.handles && Object.keys(profile.handles).length) ||
      (profile.platformAudiences && Object.keys(profile.platformAudiences).length);
    return !!hasOptional || !!(profile && profile.name);
  });
  // Treat a returning user (profile.name already populated from Supabase
  // or localStorage) as having completed Phase 1, so the prominent
  // "Save and start planning" button doesn't keep reappearing on every
  // visit. The separate justSaved flag gates the green "Profile saved"
  // celebration so it only fires immediately after an explicit save —
  // returning users don't see it on every page load.
  const [phase1Saved,setPhase1Saved] = useState(function(){ return !!(profile && profile.name); });
  const [phase1JustSaved,setPhase1JustSaved] = useState(false);

  // [INTEL 2] Toggle a single format on/off for a given platform. Functional
  // setState so concurrent toggles on different platforms don't clobber one
  // another. Empty array entries are kept rather than deleted so the user
  // sees their toggle state immediately reflect (deselect-all = empty list,
  // not "platform key vanished").
  function toggleFormat(platform, format) {
    setPlatformFormats(function(prev){
      var current = prev[platform] || [];
      var updated;
      if (current.includes(format)) {
        updated = current.filter(function(f){ return f !== format; });
      } else {
        updated = current.concat([format]);
      }
      var next = Object.assign({}, prev);
      next[platform] = updated;
      return next;
    });
  }

  function handleSave() {
    // [INTEL 1] Pass the 3 personal-fact fields up to the parent's onSave.
    // [INTEL 2] platformFormats joins the payload so per-platform format
    // preferences persist to Supabase alongside everything else.
    onSave({myPlatforms,name,audience,voice,vibes,sampleCaption,topics,purpose,offLimits,inspiration,journey,knownFor,pillars,emojiPref,handles,platformAudiences,postFreq,contentLength,workedWell,personalFacts,neverAssume,loveToReference,platformFormats});
    setSaved(true);
    setTimeout(function(){setSaved(false);},2000);
  }

  // [CHANGE 1] Phase 1 save persists its success UI (no auto-clear) so the user
  // can choose between "Generate my first plan" and "Make VIRL even sharper".
  function handleSavePhase1() {
    onSave({myPlatforms,name,audience,voice,vibes,sampleCaption,topics,purpose,offLimits,inspiration,journey,knownFor,pillars,emojiPref,handles,platformAudiences,postFreq,contentLength,workedWell});
    setPhase1Saved(true);
    setPhase1JustSaved(true);
  }

  const profileComplete = !!(name&&audience&&voice);
  // [INTEL counter] Counts every optional Phase 2 field, including the four
  // added by INTEL 1 (personalFacts / neverAssume / loveToReference) and
  // INTEL 2 (platformFormats). The first three are plain strings so the
  // Boolean filter handles them like the existing seven; platformFormats is
  // an object keyed by platform, so an empty {} would naively pass Boolean —
  // we need a real "at least one platform has at least one format selected"
  // check before it counts.
  var hasAnyPlatformFormat = !!(platformFormats && Object.keys(platformFormats).some(function(k){
    return Array.isArray(platformFormats[k]) && platformFormats[k].length > 0;
  }));
  const optionalCount = [purpose,offLimits,inspiration,journey,knownFor,workedWell,postFreq,personalFacts,neverAssume,loveToReference].filter(Boolean).length + (hasAnyPlatformFormat ? 1 : 0);

  // [TASK 6] Tier-based completeness meter. The brief spec names "audience" but
  // the current form captures audience per platform via platformAudiences, so
  // the Basic requirement is satisfied by either the legacy audience text OR
  // any non-empty platformAudiences entry.
  var hasAudienceSignal = !!audience || (platformAudiences && Object.keys(platformAudiences).some(function(k){ return !!platformAudiences[k]; }));
  var basicDone  = !!(name && hasAudienceSignal);
  var dialedDone = !!(basicDone && voice && (vibes||[]).length>0 && knownFor);
  var eliteDone  = !!(dialedDone && offLimits && inspiration && sampleCaption);
  var tierInfo;
  if (eliteDone)       tierInfo = {label:"Elite",  percent:100, color:B.green, copy:"Your plans are fully personalized. ✦"};
  else if (dialedDone) tierInfo = {label:"Dialed", percent:66,  color:B.blue,  copy:"Plans will sound like you. Add off-limits to make them precise."};
  else if (basicDone)  tierInfo = {label:"Basic",  percent:33,  color:B.amber, copy:"VIRL has the foundation. Add voice to make plans sound like you."};
  else                 tierInfo = {label:"Getting started", percent:8, color:B.muted, copy:"Share your name and platforms to unlock the Basic tier."};

  // Walk the tier ladder and return the first incomplete field — what
  // the "Make VIRL sharper →" button should jump to. Returns null when
  // the user is at Elite (everything's filled out).
  function nextSharperField() {
    if (!name)                          return { id:"vp-name",          label:"Add your first name",                       tier:"Basic"  };
    if (!hasAudienceSignal)              return { id:"vp-audience",      label:"Tell VIRL who your audience is",             tier:"Basic"  };
    if (!voice)                          return { id:"vp-voice",         label:"Describe your voice in your own words",     tier:"Dialed" };
    if (!(vibes||[]).length)             return { id:"vp-vibes",         label:"Pick the vibes that fit your content",       tier:"Dialed" };
    if (!knownFor)                       return { id:"vp-knownFor",      label:"Name the one thing you want to be known for", tier:"Dialed" };
    if (!offLimits)                      return { id:"vp-offLimits",     label:"List topics you'll never touch",             tier:"Elite"  };
    if (!inspiration)                    return { id:"vp-inspiration",   label:"Add a creator whose style you admire",       tier:"Elite"  };
    if (!sampleCaption)                  return { id:"vp-sampleCaption", label:"Paste one caption that sounds like you",    tier:"Elite"  };
    return null;
  }
  function jumpToNextSharperField() {
    var next = nextSharperField();
    if (!next) return;
    var el = document.getElementById(next.id);
    if (!el) return;
    el.scrollIntoView({ behavior: "smooth", block: "center" });
    // Focus the inner input/textarea after the scroll settles, so the
    // user can start typing immediately. Brief delay lets the smooth
    // scroll finish before focus pulls the viewport again.
    setTimeout(function() {
      var input = el.querySelector("input, textarea");
      if (input) input.focus();
    }, 350);
  }
  var sharperHint = nextSharperField();
  const inputStyle = {width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:10,padding:"10px 12px",fontSize:14,color:B.ink};
  const textareaStyle = {width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:10,color:B.ink,fontSize:14,fontWeight:300,fontStyle:"italic",padding:"11px 14px",resize:"vertical",lineHeight:1.6};
  const sec = {padding:"20px 24px",borderBottom:"1px solid "+B.divider};

  // [CHANGE 1] Phase 2 sub-section header — soft muted eyebrow over each
  // optional field group.
  const subhead = {fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.muted,marginTop:24,marginBottom:14};
  const phase1Title = "Quick Setup — 90 seconds";
  const phase1CTA = "Generate my first plan →";

  return (
    <div>
      {/* [TASK 6] Tier-based completeness meter — replaces the section-count
          progress bar so the user sees exactly what each field unlocks. */}
      <div style={{background:B.card,borderRadius:14,padding:"16px 20px",marginBottom:16,boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:600,color:B.ink}}>Profile tier</div>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:tierInfo.color,border:"1px solid "+tierInfo.color,padding:"2px 9px",borderRadius:99,lineHeight:1.4,whiteSpace:"nowrap"}}>{tierInfo.label}</div>
          </div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:B.muted,flexShrink:0}}>{tierInfo.percent+"%"}</div>
        </div>
        <div style={{background:B.bg,borderRadius:99,height:6,overflow:"hidden"}}>
          <div style={{width:tierInfo.percent+"%",height:"100%",background:tierInfo.color,borderRadius:99,transition:"width .4s ease, background .4s ease"}}/>
        </div>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:eliteDone?B.green:B.muted,marginTop:10,lineHeight:1.55}}>
          {tierInfo.copy}
        </div>
      </div>

      {/* [CHANGE 1] Phase 1 — the four required fields a user needs to generate
          their first plan. No section chrome, just labels + inputs. */}
      <div style={{background:B.card,borderRadius:16,boxShadow:"0 1px 3px rgba(0,0,0,0.05)",marginBottom:12,padding:"24px 24px 22px"}}>
        <Eyebrow>{phase1Title}</Eyebrow>

        <div id="vp-name" style={{marginBottom:18}}>
          <Label>Your first name <TierBadge tier="basic"/></Label>
          <input value={name} onChange={function(e){setName(e.target.value);}} placeholder="What should VIRL call you?" style={inputStyle}/>
        </div>

        <div id="vp-voice" style={{marginBottom:18}}>
          <Label>Describe your voice in your own words <span style={{color:B.coral,fontSize:10,fontWeight:600,letterSpacing:0,textTransform:"none"}}>most important field</span> <TierBadge tier="dialed"/></Label>
          <textarea value={voice} onChange={function(e){setVoice(e.target.value);}}
            placeholder="e.g. Real, a little funny, never preachy. I talk to my audience like they are my group chat."
            style={Object.assign({},textareaStyle,{minHeight:88})}/>
        </div>

        <div id="vp-audience" style={{marginBottom:18}}>
          <Label>Who is your audience? <TierBadge tier="basic"/></Label>
          <textarea value={audience} onChange={function(e){setAudience(e.target.value);}}
            placeholder="e.g. Millennial moms 28-38 who want real talk about parenting and home life"
            style={Object.assign({},textareaStyle,{minHeight:72})}/>
        </div>

        <div style={{marginBottom:phase1Saved?16:4}}>
          <Label>Where do you post?</Label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{PLATFORMS.map(function(p){return <Chip key={p} active={myPlatforms.includes(p)} onClick={function(){setMyPlatforms(tog(myPlatforms,p));}}>{p}</Chip>;})}</div>
        </div>

        {!phase1Saved && (
          <button onClick={handleSavePhase1}
            style={{width:"100%",background:B.navy,color:B.white,border:"none",fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"18px 24px",cursor:"pointer",borderRadius:14,marginTop:12,transition:"all .3s",boxShadow:"0 4px 12px rgba(31,58,138,0.25)"}}>
            Save and start planning
          </button>
        )}

        {/* Celebration block + navigation CTAs only fire right after an
            explicit save in this session — returning users with a saved
            profile see neither the green panel nor the redundant
            "Generate my first plan" / "Make VIRL even sharper" buttons. */}
        {phase1JustSaved && (
          <div>
            <div style={{background:B.green,borderRadius:12,padding:"14px 20px",marginBottom:12,display:"flex",alignItems:"center",gap:12,animation:"slideUp .3s ease"}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:"rgba(255,255,255,0.25)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{color:B.white,fontSize:14,fontWeight:700}}>{"✓"}</span>
              </div>
              <div>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:700,color:B.white,marginBottom:2}}>Profile saved</div>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:"rgba(255,255,255,0.8)"}}>{"You're ready to generate your first plan."}</div>
              </div>
            </div>
            <button onClick={function(){ if (onNavigateToPlan) onNavigateToPlan(); }}
              style={{width:"100%",background:B.white,color:B.navy,border:"1px solid "+B.navy,fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"16px 24px",cursor:"pointer",borderRadius:14,marginBottom:10,transition:"all .15s"}}>
              {phase1CTA}
            </button>
            <button onClick={function(){ setShowPhase2(true); }}
              style={{width:"100%",background:B.blue,color:B.white,border:"none",fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"18px 24px",cursor:"pointer",borderRadius:14,transition:"all .15s",boxShadow:"0 4px 14px rgba(37,99,235,0.3)"}}>
              Make VIRL even sharper
            </button>
          </div>
        )}
      </div>

      {/* [CHANGE 1] Phase 2 — optional depth, collapsed by default for new users.
          Auto-expanded for returning users with any optional data. */}
      {showPhase2 && (
        <div style={{background:B.card,borderRadius:16,boxShadow:"0 1px 3px rgba(0,0,0,0.05)",marginBottom:12,padding:"22px 24px"}}>
          <div style={{marginBottom:6,fontFamily:"'Italiana',serif",fontSize:22,color:B.ink,lineHeight:1.15}}>Make VIRL even sharper (optional)</div>
          {/* [INTEL counter] "of 11" reflects the seven legacy optional
              fields plus four added by INTEL 1 + INTEL 2. Bumping past
              11 is fine to do later – keep this string in sync with the
              optionalCount definition above. */}
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.muted,marginBottom:4}}>{optionalCount+" of 11 optional fields added"}</div>

          {/* [INTEL 1] Personal facts subsection – placed at the top of Phase 2
              because these are foundational identity facts that drive factual
              correctness in every output. Three optional textareas with hint
              copy; all default to empty for existing users with no values. */}
          <div style={subhead}>What VIRL must get right</div>
          <div style={{marginBottom:18}}>
            <Label>Personal facts VIRL should always get right</Label>
            <textarea value={personalFacts} onChange={function(e){setPersonalFacts(e.target.value);}}
              placeholder="e.g. I have three sons (ages 4, 7, 10). I am married to Mike. We live in Indianapolis. I have a golden retriever named Charlie. I run a pilates studio."
              style={Object.assign({},textareaStyle,{minHeight:90})}/>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,marginTop:6,lineHeight:1.5}}>
              VIRL will treat these as canonical facts and never contradict them in any output.
            </div>
          </div>
          <div style={{marginBottom:18}}>
            <Label>Things VIRL should never assume about you</Label>
            <textarea value={neverAssume} onChange={function(e){setNeverAssume(e.target.value);}}
              placeholder="e.g. Don't assume I have daughters. Don't assume I work from home. Don't assume I'm religious. Don't assume my partner is a husband."
              style={Object.assign({},textareaStyle,{minHeight:72})}/>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,marginTop:6,lineHeight:1.5}}>
              If VIRL doesn't know something, it leaves it out – never guesses.
            </div>
          </div>
          <div style={{marginBottom:18}}>
            <Label>Things you'd love VIRL to reference naturally</Label>
            <textarea value={loveToReference} onChange={function(e){setLoveToReference(e.target.value);}}
              placeholder="e.g. My kids' personalities, our dog Charlie, my morning coffee ritual, our family Sunday tradition."
              style={Object.assign({},textareaStyle,{minHeight:72})}/>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,marginTop:6,lineHeight:1.5}}>
              VIRL weaves these in occasionally to make content feel personal – never forced.
            </div>
          </div>

          <div style={subhead}>Your style</div>
          <div id="vp-vibes" style={{marginBottom:18}}>
            <Label>Your content vibe <TierBadge tier="dialed"/></Label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{VIBES.map(function(v){return <Chip key={v} active={vibes.includes(v)} onClick={function(){setVibes(tog(vibes,v));}}>{v}</Chip>;})}</div>
          </div>
          <div style={{marginBottom:18}}>
            <Label>Emoji usage</Label>
            <div style={{display:"flex",gap:8}}>{EMOJI_PREFS.map(function(e){return <Chip key={e} active={emojiPref===e} onClick={function(){setEmojiPref(e);}}>{e}</Chip>;})}</div>
          </div>
          <div style={{marginBottom:18}}>
            <Label>Preferred content length</Label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{CONTENT_LENGTH.map(function(l){return <Chip key={l} active={contentLength===l} onClick={function(){setContentLength(contentLength===l?"":l);}}>{l}</Chip>;})}</div>
          </div>
          <div style={{marginBottom:18}}>
            <Label>How often do you post?</Label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{POST_FREQ.map(function(f){return <Chip key={f} active={postFreq===f} onClick={function(){setPostFreq(postFreq===f?"":f);}}>{f}</Chip>;})}</div>
          </div>
          <div style={{marginBottom:4}}>
            <Label>When you show up, you are...</Label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{PURPOSES.map(function(p){return <Chip key={p} active={purpose===p} onClick={function(){setPurpose(purpose===p?"":p);}}>{p}</Chip>;})}</div>
          </div>

          <div style={subhead}>Your strategy</div>
          <div id="vp-knownFor" style={{marginBottom:18}}>
            <Label>One thing you want to be known for <TierBadge tier="dialed"/></Label>
            <input value={knownFor} onChange={function(e){setKnownFor(e.target.value);}} placeholder="e.g. makes busy moms feel like they have their life together" style={Object.assign({},inputStyle,{fontStyle:"italic"})}/>
          </div>
          <div style={{marginBottom:18}}>
            <Label>Your content pillars</Label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{PILLARS.map(function(p){return <Chip key={p} active={pillars.includes(p)} onClick={function(){setPillars(tog(pillars,p));}}>{p}</Chip>;})}</div>
          </div>
          <div style={{marginBottom:18}}>
            <Label>Topics you love to create about</Label>
            <textarea value={topics} onChange={function(e){setTopics(e.target.value);}} placeholder="e.g. morning routines, productivity hacks, meal prep, workouts, tutorials, personal growth" style={Object.assign({},textareaStyle,{minHeight:66})}/>
          </div>
          <div style={{marginBottom:18}}>
            <Label>What has worked well for you before?</Label>
            <textarea value={workedWell} onChange={function(e){setWorkedWell(e.target.value);}}
              placeholder="e.g. tutorial videos, behind-the-scenes content, hot takes, personal stories..."
              style={Object.assign({},textareaStyle,{minHeight:66})}/>
          </div>
          <div style={{marginBottom:4}}>
            <Label>Where are you in your creator journey?</Label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{JOURNEYS.map(function(j){return <Chip key={j} active={journey===j} onClick={function(){setJourney(journey===j?"":j);}}>{j}</Chip>;})}</div>
          </div>

          {myPlatforms.length>0 && (
            <div>
              <div style={subhead}>Your platforms in detail</div>
              {myPlatforms.map(function(p){
                // [INTEL 2] Per-platform format options drive content shape:
                // selecting "Stories" on Instagram tells the prompt builder to
                // generate Story-optimized content (short, casual, interactive)
                // rather than feed posts.
                var formats = getFormatsForPlatform(p);
                var selectedFormats = platformFormats[p] || [];
                return (
                <div key={p} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid "+B.divider}}>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:B.navy,marginBottom:8}}>{p}</div>
                  {/* [INTEL 2] Format chips for this platform – shapes content output. */}
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,marginBottom:6,lineHeight:1.5}}>How do you primarily post here? Pick one or two.</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                    {formats.map(function(f){return <Chip key={f.value} active={selectedFormats.includes(f.value)} onClick={function(){toggleFormat(p,f.value);}}>{f.label}</Chip>;})}
                  </div>
                  <input value={(handles[p]||"")} onChange={function(e){
                    var h=Object.assign({},handles); h[p]=e.target.value; setHandles(h);
                  }} placeholder={"@your"+p.toLowerCase()+"handle"}
                  style={Object.assign({},inputStyle,{marginBottom:8,fontSize:13})}/>
                  <textarea value={(platformAudiences[p]||"")} onChange={function(e){
                    var a=Object.assign({},platformAudiences); a[p]=e.target.value; setPlatformAudiences(a);
                  }} placeholder={({
  TikTok:"e.g. Gen Z women 18-24 interested in fashion, thrift flips, and self-expression",
  Instagram:"e.g. Millennial moms 28-38 who want real talk about parenting and home life",
  Facebook:"e.g. Local community members 35-55 interested in neighborhood events and small business news",
  YouTube:"e.g. Aspiring entrepreneurs 25-40 who want in-depth tutorials and behind-the-scenes business content",
  LinkedIn:"e.g. Marketing professionals and founders who want data-driven growth strategies",
  X:"e.g. Tech-savvy early adopters and startup founders who follow industry news and hot takes",
  Pinterest:"e.g. Home decor enthusiasts 25-45 planning renovations and looking for DIY inspiration"
})[p]||("Who is your "+p+" audience? Age, interests, what they are looking for")}
                  style={Object.assign({},textareaStyle,{minHeight:56,fontSize:13})}/>
                </div>
              );})}
            </div>
          )}

          <div style={subhead}>Your boundaries</div>
          <div id="vp-offLimits" style={{marginBottom:18}}>
            <Label>What do you never want to talk about? <TierBadge tier="elite"/></Label>
            <input value={offLimits} onChange={function(e){setOffLimits(e.target.value);}} placeholder="e.g. politics, my relationship, diet culture" style={Object.assign({},inputStyle,{fontStyle:"italic"})}/>
          </div>
          <div id="vp-inspiration" style={{marginBottom:18}}>
            <Label>A creator whose style you admire <TierBadge tier="elite"/></Label>
            <input value={inspiration} onChange={function(e){setInspiration(e.target.value);}} placeholder="e.g. @aliabdaal - explains complex ideas in plain language" style={Object.assign({},inputStyle,{fontStyle:"italic"})}/>
          </div>
          <div id="vp-sampleCaption" style={{marginBottom:20}}>
            <Label>Paste a caption you love <TierBadge tier="elite"/></Label>
            <textarea value={sampleCaption} onChange={function(e){setSample(e.target.value);}} placeholder="Paste a caption from one of your posts that felt totally like you..." style={Object.assign({},textareaStyle,{minHeight:88})}/>
          </div>

          {saved && (
            <div style={{background:B.green,borderRadius:12,padding:"14px 20px",marginBottom:12,display:"flex",alignItems:"center",gap:12,animation:"slideUp .3s ease"}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:"rgba(255,255,255,0.25)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{color:B.white,fontSize:14,fontWeight:700}}>{"✓"}</span>
              </div>
              <div>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:700,color:B.white,marginBottom:2}}>Profile saved</div>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:"rgba(255,255,255,0.8)"}}>Every VIRL output will now be built around your voice.</div>
              </div>
            </div>
          )}
          <button onClick={handleSave}
            style={{
              width:"100%",
              background:saved?B.green:B.navy,
              color:B.white,border:"none",fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"18px 24px",cursor:"pointer",borderRadius:14,transition:"all .3s",
              boxShadow:saved?"0 4px 12px rgba(16,185,129,0.3)":"0 4px 12px rgba(31,58,138,0.25)"
            }}>
            {saved?"Profile saved":"Save my profile"}
          </button>

          {/* Make VIRL sharper — permanent secondary that scrolls to the
              next field needed for the next tier. Hidden once everything's
              filled out (Elite), since there's nothing left to sharpen. */}
          {sharperHint && (
            <button onClick={jumpToNextSharperField}
              style={{
                width:"100%",
                background:"transparent",
                color:B.navy,
                border:"1px solid "+B.navy,
                fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",
                padding:"14px 24px",cursor:"pointer",borderRadius:14,marginTop:10,transition:"all .15s",
              }}>
              {"Make VIRL sharper → "}<span style={{fontWeight:400,opacity:0.75,letterSpacing:0,textTransform:"none"}}>{sharperHint.label}</span>
            </button>
          )}
        </div>
      )}

      {/* [TASK 1] Sync indicator — signals Supabase round-trip so users know their data is safe across devices. */}
      {syncState==="syncing"&&(
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:400,color:B.muted,textAlign:"center",marginBottom:8}}>
          Syncing to your account…
        </div>
      )}
      {syncState==="synced"&&(
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:500,color:B.green,textAlign:"center",marginBottom:8}}>
          {"Synced ✓ — safe across your devices"}
        </div>
      )}
      {syncState==="failed"&&(
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:500,color:B.coral,textAlign:"center",marginBottom:8,lineHeight:1.5}}>
          {"Saved locally, but couldn't sync to your account. Open devtools console for the exact error, or try again in a minute."}
        </div>
      )}
      {eliteDone && (
        <div style={{background:B.navy,borderRadius:12,padding:"18px 20px",marginTop:4}}>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.sky,marginBottom:8}}>How VIRL uses your profile</div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:"rgba(255,255,255,0.7)",lineHeight:1.75}}>
            Every plan, caption, script, and scan is shaped by everything you have shared here. Your voice, platforms, purpose, off-limits, and north star all feed into every output.
          </div>
        </div>
      )}
    </div>
  );
}

// Centered modal showing the full saved item — description, why, hashtags,
// post time, optionally a saved script for plan items, full caption text
// for caption items. Items saved before the full-payload migration may not
// have every field; the modal only renders fields that are present.
function VaultItemModal({item, onClose}) {
  useEffect(function(){
    function onKey(e){ if (e.key === "Escape") onClose(); }
    window.addEventListener("keydown", onKey);
    return function(){ window.removeEventListener("keydown", onKey); };
  }, [onClose]);

  const tags = Array.isArray(item.hashtags) ? item.hashtags.map(cleanHashtag).filter(Boolean) : [];

  return (
    <div onClick={onClose}
      style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.85)",zIndex:600,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"20px 16px",overflowY:"auto"}}>
      <div onClick={function(e){ e.stopPropagation(); }}
        style={{background:B.white,width:"100%",maxWidth:680,borderRadius:20,overflow:"hidden",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.4)"}}>
        <div style={{background:B.navy,padding:"18px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:1}}>
          <div style={{minWidth:0,paddingRight:12}}>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.sky,marginBottom:4}}>
              {(item.type==="plan"?"Saved post":"Saved caption")+" · "+(item.savedAt||"")}
            </div>
            <div style={{fontFamily:"'Italiana',serif",fontSize:20,color:B.white,lineHeight:1.2}}>{item.title}</div>
          </div>
          <button onClick={onClose}
            style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.15em",textTransform:"uppercase",padding:"7px 14px",background:"rgba(255,255,255,0.1)",color:B.white,border:"none",borderRadius:99,cursor:"pointer",flexShrink:0}}>
            Close
          </button>
        </div>
        <div style={{padding:"22px 24px"}}>
          {/* Plan-card detail */}
          {item.type==="plan" && (
            <div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
                {item.day      && <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.navySoft,color:B.navy,borderRadius:99}}>{item.day}</span>}
                {item.platform && <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.blueSoft,color:B.blue,borderRadius:99}}>{"📱 "+item.platform}</span>}
                {item.postTime && <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.divider,color:B.muted,borderRadius:99}}>{"🕐 "+item.postTime}</span>}
                {item.format   && <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.divider,color:B.muted,borderRadius:99}}>{item.format}</span>}
              </div>
              {item.description && (
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,fontStyle:"italic",color:B.sub,lineHeight:1.7,marginBottom:14}}>
                  {item.description}
                </div>
              )}
              {/* [PREMIUM 4] Renders the new `insight` field. Falls
                   back to the legacy `why` so items saved pre-PREMIUM-4
                   don't lose their callout. */}
              {(item.insight || item.why) && (
                <div style={{background:B.navySoft,borderRadius:10,padding:"10px 14px",marginBottom:14,borderLeft:"3px solid "+B.blue}}>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.1em",color:B.blue,textTransform:"uppercase",marginBottom:4}}>Why this works</div>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.sub,lineHeight:1.6}}>{item.insight || item.why}</div>
                </div>
              )}
              {item.trend && (
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,color:B.muted,fontStyle:"italic",marginBottom:14}}>{"Trend angle: " + item.trend}</div>
              )}
              {tags.length > 0 && <HashtagRow hashtags={tags}/>}
              {item.savedScript && (
                <div style={{marginTop:12,paddingTop:14,borderTop:"1px solid "+B.divider}}>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.muted,marginBottom:8}}>Saved script</div>
                  {item.savedScript.hook && (
                    <div style={{background:B.navy,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
                      <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.sky,marginBottom:6}}>Hook</div>
                      <div style={{fontFamily:"'Italiana',serif",fontSize:18,color:B.white,lineHeight:1.3}}>{'"'+item.savedScript.hook+'"'}</div>
                    </div>
                  )}
                  {Array.isArray(item.savedScript.sections) && item.savedScript.sections.map(function(s,i){return (
                    <div key={i} style={{marginBottom:8,background:B.bg,borderRadius:10,padding:"10px 12px"}}>
                      <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,color:B.muted,marginBottom:4}}>{"Section "+(i+1)+(s.title?" — "+s.title:"")}</div>
                      <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.ink,lineHeight:1.7}}>{s.script}</div>
                    </div>
                  );})}
                  {item.savedScript.cta && (
                    <div style={{background:B.blueSoft,borderRadius:10,padding:"10px 14px"}}>
                      <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.blue,marginBottom:4}}>CTA</div>
                      <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.sub}}>{item.savedScript.cta}</div>
                    </div>
                  )}
                </div>
              )}
              {!item.description && !item.insight && !item.why && tags.length === 0 && !item.savedScript && (
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,color:B.muted,fontStyle:"italic"}}>This card was saved before VIRL captured full details. Re-save from the plan tab to get the full view.</div>
              )}
            </div>
          )}
          {/* Caption detail */}
          {item.type==="caption" && (
            <div>
              {item.platform && <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.blueSoft,color:B.blue,borderRadius:99,display:"inline-block",marginBottom:14}}>{"📱 "+item.platform}</div>}
              {item.hook && (
                <div style={{background:B.navy,borderRadius:12,padding:"14px 16px",marginBottom:14}}>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.sky,marginBottom:6}}>Hook</div>
                  <div style={{fontFamily:"'Italiana',serif",fontSize:18,color:B.white,lineHeight:1.3}}>{'"'+item.hook+'"'}</div>
                </div>
              )}
              <div style={{background:B.bg,borderRadius:12,padding:"14px 16px",marginBottom:tags.length?14:0}}>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.muted,marginBottom:8}}>Caption</div>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.ink,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{item.text || item.preview || "(no caption text saved)"}</div>
              </div>
              {tags.length > 0 && <HashtagRow hashtags={tags}/>}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// [UX-01] Vault now exposes a "Remix this" action per item that pre-
// fills the Plan generator's context with the saved post or caption as
// a voice reference and navigates to the Plan tab. onRemix is wired
// from App; a missing handler hides the button so the component still
// renders standalone.
function Vault({vault,onDelete,onRemix}) {
  const [openItem, setOpenItem] = useState(null);
  if (!vault.length) return (
    /* [PREMIUM 1] Vault empty state. Premium voice: thoughtful host
       welcoming a guest, not a system reporting "no data found". */
    <div style={{textAlign:"center",padding:"60px 20px"}}>
      <div style={{fontFamily:"'Italiana',serif",fontSize:24,color:B.ink,marginBottom:8}}>Save what resonates with you.</div>
      <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.muted,maxWidth:380,margin:"0 auto",lineHeight:1.65}}>Tap Save on any caption or post you love – VIRL learns from what you keep, and your future plans get sharper.</div>
    </div>
  );
  return (
    <div>
      {vault.map(function(item,i){
        // [UX-01] Click handlers — stopPropagation on inner buttons so
        // the row's "open detail modal" tap target stays exclusive to
        // the card body itself.
        function handleRowClick() { setOpenItem(item); }
        function handleDelete(e)  { e.stopPropagation(); if (onDelete) onDelete(item.id); }
        function handleRemix(e)   { e.stopPropagation(); if (onRemix)  onRemix(item); }
        return (
          <div key={item.id} className="su" onClick={handleRowClick}
            style={{background:B.card,borderRadius:12,boxShadow:"0 1px 2px rgba(0,0,0,0.04)",padding:"18px 20px",marginBottom:8,animationDelay:(i*0.04)+"s",borderLeft:"3px solid "+B.navy,cursor:"pointer",transition:"background .15s"}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:8,gap:10}}>
              <div style={{minWidth:0,flex:1}}>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.muted,marginBottom:4}}>
                  {(item.type==="plan"?"Saved Post":"Caption")+" · "+item.savedAt+" · tap to view"}
                </div>
                <div style={{fontFamily:"'Italiana',serif",fontSize:19,color:B.ink}}>{item.title}</div>
              </div>
              <button onClick={handleDelete}
                style={{fontFamily:"'Jost',sans-serif",fontSize:9,letterSpacing:"0.1em",textTransform:"uppercase",padding:"5px 10px",background:"none",border:"1px solid "+B.border,color:B.muted,cursor:"pointer",borderRadius:99,flexShrink:0}}>
                Remove
              </button>
            </div>
            {item.type==="plan"&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>
                <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:B.muted,padding:"3px 10px",borderRadius:99,background:B.bg}}>{"📱 "+item.platform}</span>
                <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:B.blue,padding:"3px 10px",borderRadius:99,background:B.blueSoft}}>{"🕐 "+item.postTime}</span>
              </div>
            )}
            {item.preview&&<div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,fontStyle:"italic",color:B.muted,marginTop:8,lineHeight:1.6}}>{item.preview+"..."}</div>}
            {/* [UX-01] Remix this — pre-fills the Plan generator with
                 this item's voice and jumps to the Plan tab. Hidden if
                 no onRemix handler was wired (defensive). */}
            {onRemix && (
              <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid "+B.divider,display:"flex",justifyContent:"flex-end"}}>
                <button onClick={handleRemix}
                  style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"7px 14px",background:B.blueSoft,color:B.blue,border:"none",borderRadius:99,cursor:"pointer"}}>
                  Remix this
                </button>
              </div>
            )}
          </div>
        );
      })}
      {openItem && <VaultItemModal item={openItem} onClose={function(){ setOpenItem(null); }}/>}
    </div>
  );
}

// [UX-01] Results now exposes a "Plan next week with these insights"
// CTA that pre-fills the Plan generator's context with a note
// referencing the prior week's top performer and routes to the Plan
// tab. onPlanWithInsights is supplied by App; missing handler hides
// the button so the component renders standalone.
function Results({results,onPlanWithInsights}) {
  if (!results.length) return (
    /* [PREMIUM 1] Results empty state. Premium voice. */
    <div style={{textAlign:"center",padding:"60px 20px"}}>
      <div style={{fontFamily:"'Italiana',serif",fontSize:24,color:B.ink,marginBottom:8}}>Track what's working.</div>
      <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.muted,maxWidth:380,margin:"0 auto",lineHeight:1.65}}>VIRL pays attention to your wins so you can post smarter, not more.</div>
    </div>
  );
  var tv = results.reduce(function(a,r){return a+(parseInt((r.result&&r.result.views))||0);},0);
  var tl = results.reduce(function(a,r){return a+(parseInt((r.result&&r.result.likes))||0);},0);
  var ts = results.reduce(function(a,r){return a+(parseInt((r.result&&r.result.saves))||0);},0);
  var eng = tv>0?((tl+ts)/tv*100).toFixed(1):"0.0";
  var sorted = results.slice().sort(function(a,b){return (parseInt((b.result&&b.result.views))||0)-(parseInt((a.result&&a.result.views))||0);});
  // [UX-01] Top performer = highest-views row. Used as the source for
  // the insights pre-fill so the Plan generator gets a concrete signal.
  var topPerformer = sorted.length ? sorted[0] : null;
  function handlePlanWithInsights() {
    if (onPlanWithInsights && topPerformer) onPlanWithInsights(topPerformer);
  }
  return (
    <div>
      <SherpaTip>These are your real numbers. Log results after every post and VIRL will show you which platforms, formats, and topics are actually working for your specific audience.</SherpaTip>
      {/* [UX-01] Plan-next-week CTA — only mounted once we have a top
           performer to reference. */}
      {onPlanWithInsights && topPerformer && (
        <div style={{background:B.navy,borderRadius:14,padding:"16px 20px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
          <div style={{minWidth:0,flex:1}}>
            <div style={{fontFamily:"'Italiana',serif",fontSize:18,color:B.white,lineHeight:1.2,marginBottom:4}}>Carry this momentum into next week.</div>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:"rgba(255,255,255,0.75)",lineHeight:1.55,overflow:"hidden",textOverflow:"ellipsis"}}>
              {"Top post: " + topPerformer.title}
            </div>
          </div>
          <button onClick={handlePlanWithInsights}
            style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"10px 18px",background:B.white,color:B.navy,border:"none",borderRadius:99,cursor:"pointer",flexShrink:0}}>
            Plan next week with these insights
          </button>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:16}}>
        {[["Views",tv.toLocaleString(),B.navy],["Likes",tl.toLocaleString(),B.blue],["Saves",ts.toLocaleString(),B.navy],["Engagement",eng+"%",B.blue]].map(function(item,i){return (

function GateScreen({onAuth}) {

  });
  const [email,setEmail]     = useState("");
