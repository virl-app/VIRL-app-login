}

function ScriptGenerator({card,onClose,profile,userToken,onCreditsUsed,onSaveScript}) {
  // If a script was previously saved on this card, show it instead of
  // burning credits to regenerate. The user can still hit Regenerate.
  const initialSaved = card && card.savedScript ? card.savedScript : null;
  const [script,setScript] = useState(initialSaved);
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState("");
  // Tracks whether the script currently shown matches what's on the card.
  // Starts true if we opened with a saved script; flips false when the user
  // regenerates and back true when they save the new one.
  const [savedOnCard,setSavedOnCard] = useState(!!initialSaved);

  // [SCRIPT-EDIT] Inline edit mode mirroring PlanCard's draft pattern.
  // `editing` flips the read-only render into a set of textareas; `draftScript`
  // mirrors `script` while editing so cancel can discard changes cleanly.
  // Save commits draft → script AND persists to the card via onSaveScript
  // in one action — matches the "edit and save" flow on plans / captions.
  const [editing,setEditing]       = useState(false);
  const [draftScript,setDraftScript] = useState(null);

  function startEdit() {
    if (!script) return;
    // onScreenText is an array on the script object; convert to newline-
    // separated string for the textarea, then split back on save.
    setDraftScript({
      ...script,
      onScreenText: Array.isArray(script.onScreenText) ? script.onScreenText.join("\n") : "",
      sections: (script.sections || []).map(function(s){ return { ...s }; }),
    });
    setEditing(true);
  }
  function cancelEdit() {
    setDraftScript(null);
    setEditing(false);
  }
  function updateDraft(field, value) {
    setDraftScript(function(d){ return d ? { ...d, [field]: value } : d; });
  }
  function updateDraftSection(i, field, value) {
    setDraftScript(function(d){
      if (!d || !Array.isArray(d.sections)) return d;
      var arr = d.sections.slice();
      if (i < 0 || i >= arr.length) return d;
      arr[i] = { ...arr[i], [field]: value };
      return { ...d, sections: arr };
    });
  }
  function saveEdit() {
    if (!draftScript) { setEditing(false); return; }
    var nextOst = (draftScript.onScreenText || "")
      .split(/\n+/).map(function(t){ return t.trim(); }).filter(Boolean);
    var next = {
      ...draftScript,
      hook:         (draftScript.hook || "").trim(),
      cta:          (draftScript.cta  || "").trim(),
      duration:     (draftScript.duration || "").trim(),
      audioSuggestion: (draftScript.audioSuggestion || "").trim(),
      onScreenText: nextOst,
      sections: (draftScript.sections || []).map(function(s){
        return {
          ...s,
          title:  (s.title || "").trim(),
          script: (s.script || "").trim(),
          tip:    (s.tip || "").trim(),
        };
      }),
    };
    // [LEARNING-CONSENT] Capture the diff of the most voice-bearing
    // script fields (hook + CTA). Deep section-level diffs are skipped
    // in v1 — hook and CTA are where revision patterns surface most
    // visibly, and they keep the events payload small. Also captures
    // the "script" surface so the prompt-side formatter can label it.
    if (script && typeof window !== "undefined" && typeof window.__virlCaptureEdit === "function") {
      try {
        window.__virlCaptureEdit(
          "script",
          { hook: script.hook || "", cta: script.cta || "" },
          { hook: next.hook,          cta: next.cta }
        );
      } catch(e){}
    }
    setScript(next);
    setDraftScript(null);
    setEditing(false);
    // Commit to the parent card immediately — "save changes" is a single
    // action, not edit-then-also-click-save-to-card.
    if (onSaveScript) {
      onSaveScript(next);
      setSavedOnCard(true);
    }
  }

  function generate() {
    // Credit check handled server-side. Prompt + platform guide live in
    // api/_lib/prompts.js — the server picks them up from generationType.
    setLoading(true); setScript(null); setError("");
    // Bail out of edit mode if the user regenerates mid-edit — the new
    // script makes the in-flight draft meaningless.
    setEditing(false); setDraftScript(null);
    callAPI("script", { card: card }, { token: userToken }).then(function(data) {
      const parsed = extractJSON(data.text);
      if (parsed&&parsed.hook) {
        setScript(parsed);
        setSavedOnCard(false);
        if (onCreditsUsed) onCreditsUsed({cost: data.cost});
        // [COST 1] Forward Anthropic usage signal into the same event row.
        try {
          var scriptUsage = (data && data.usage) || {};
          logEvent(window.__virlUserId||null, "script_generated", {
            platform: card.platform || null,
            day:      card.day || null,
            outputTokens:        scriptUsage.outputTokens        || 0,
            cachedInputTokens:   scriptUsage.cachedInputTokens   || 0,
            uncachedInputTokens: scriptUsage.uncachedInputTokens || 0,
            truncated:           !!scriptUsage.truncated,
            model:               scriptUsage.model || null,
          });
        } catch(e){}
      }
      else { setError("Script generation takes a moment - tap Try Again."); }
    }).catch(function(e){ setError(e.message); }).finally(function(){ setLoading(false); });
  }

  function buildFullScript() {
    if (!script) return "";
    const sections = (script.sections||[]).map(function(s,i){
      return "SECTION "+(i+1)+" - "+s.title+":\n"+s.script+(s.tip?"\nTIP: "+s.tip:"");
    }).join("\n\n");
    return "=== "+card.title+" ===\n"
      +card.platform+" - "+(script.duration||"")+"\n"
      +(script.audioSuggestion?"Audio: "+script.audioSuggestion+"\n":"")
      +"\n---\n\n"
      +"HOOK: "+script.hook+"\n\n"
      +sections+"\n\n"
      +"CTA: "+script.cta
      +(script.onScreenText&&script.onScreenText.length?"\n\nON-SCREEN TEXT: "+script.onScreenText.join(" | "):"");
  }

  function copyScript() {
    if (!script) return;
    navigator.clipboard&&navigator.clipboard.writeText(buildFullScript());
  }

  function downloadScript() {
    if (!script) return;
    var text = buildFullScript();
    var blob = new Blob([text], {type:"text/plain;charset=utf-8"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "VIRL-script-"+card.title.replace(/[^a-z0-9]/gi,"-").slice(0,40).toLowerCase()+".txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},100);
  }

  // Only auto-generate on open when there's no saved script for this card.
  useEffect(function(){ if (!initialSaved) generate(); },[]);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.85)",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"20px 16px",overflowY:"auto"}}>
      <div style={{background:B.white,width:"100%",maxWidth:680,borderRadius:20,overflow:"hidden",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{background:B.navy,padding:"18px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0}}>
          <div>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.sky,marginBottom:4}}>Script Generator</div>
            <div style={{fontFamily:"'Italiana',serif",fontSize:18,color:B.white,lineHeight:1.2}}>{card.title}</div>
          </div>
          <button onClick={onClose}
            style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.15em",textTransform:"uppercase",padding:"7px 14px",background:"rgba(255,255,255,0.1)",color:B.white,border:"none",borderRadius:99,cursor:"pointer"}}>
            Close
          </button>
        </div>
        <div style={{padding:"22px"}}>
          {loading&&<Spinner text="Writing your script..."/>}
          <ErrBox msg={error}/>
          {error&&(
            <button onClick={generate}
              style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"10px 20px",background:B.blue,color:B.white,border:"none",borderRadius:99,cursor:"pointer",marginTop:8}}>
              Try Again
            </button>
          )}
          {script&&(
            <div>
              {/* [SCRIPT-EDIT] In edit mode, the readonly view is replaced
                  by a draft form. Buttons swap to Save Changes / Cancel.
                  Outside of edit mode, an Edit button sits next to the
                  copy/download row. */}
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
                {/* Platform stays visible in both modes as a non-editable
                    anchor — the field is determined by the source card,
                    not by the script itself. Duration and audioSuggestion
                    only render here when NOT editing; in edit mode they
                    live inside the hook card's editable form. */}
                {!editing && <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.navySoft,color:B.navy,borderRadius:99}}>{script.duration}</span>}
                <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.blueSoft,color:B.blue,borderRadius:99}}>{card.platform}</span>
                {!editing&&script.audioSuggestion&&<span style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.divider,color:B.muted,borderRadius:99}}>{"Audio: "+script.audioSuggestion}</span>}
                {editing && <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.greenSoft,color:B.green,borderRadius:99,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>Editing</span>}
              </div>
              {!editing ? (
                <div style={{background:B.navy,borderRadius:14,padding:"16px 18px",marginBottom:16}}>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.sky,marginBottom:8}}>Opening Hook</div>

                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.sky,marginBottom:8}}>Opening Hook</div>
                  <textarea value={draftScript?draftScript.hook:""} onChange={function(e){updateDraft("hook",e.target.value);}}
                    style={{width:"100%",fontFamily:"'Italiana',serif",fontSize:20,color:B.white,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"10px 12px",lineHeight:1.3,minHeight:60,resize:"vertical",outline:"none"}}/>

              {!editing
                ? (script.sections||[]).map(function(s,i){return (

                          style={{width:"100%",fontFamily:"'Jost',sans-serif",fontSize:12,fontStyle:"italic",color:B.blue,background:B.blueSoft,border:"1px solid "+B.border,borderRadius:8,padding:"6px 10px",outline:"none"}}/>

              {!editing ? (

              ) : (

                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.blue,marginBottom:6}}>Closing CTA</div>
                  <textarea value={draftScript?draftScript.cta:""} onChange={function(e){updateDraft("cta",e.target.value);}} placeholder="Closing CTA"
                    style={{width:"100%",fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.ink,background:B.white,border:"1px solid "+B.border,borderRadius:8,padding:"8px 10px",minHeight:60,resize:"vertical",outline:"none"}}/>
                </div>
              )}
              {!editing
                ? (script.onScreenText&&script.onScreenText.length>0&&(
                    <div style={{marginBottom:16}}>
                      <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.muted,marginBottom:10}}>On-Screen Text</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {script.onScreenText.map(function(t,i){return (

                      style={{flex:1,fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"14px 18px",background:B.navy,color:B.white,border:"none",cursor:"pointer",borderRadius:14}}>

                      Copy Full

                      style={{flex:1,fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"14px 18px",background:B.blue,color:B.white,border:"none",cursor:"pointer",borderRadius:14}}>
                      Download
                    </button>
                  </div>
                  <button onClick={generate}
                    style={{width:"100%",fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",padding:"12px 18px",background:B.bg,color:B.muted,border:"1px solid "+B.border,cursor:"pointer",borderRadius:14}}>
                    Regenerate Script
                  </button>
                </React.Fragment>
              )}
              {userToken && (
                <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid "+B.divider,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:B.muted,letterSpacing:"0.06em"}}>How's this script?</div>
                  <RatingButtons sessionToken={userToken} generationType="script" targetRef={"script|"+(card.title||"")+"|"+(card.day||"")} size="sm"/>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// [UX-01] PlanCard refactored to progressive disclosure. Collapsed view
// (default) shows day + platform metadata, the hook in Italiana 18px,
// and three primary actions (Tap to expand, Save, Mark as posted). The
// full description, hashtags, "why this works" insight, and secondary
// actions (Log Results, Write Script, Share, Rate) live in the
// expanded view. Status indicators in the header row read from
// localStorage so saved / posted state persists across regenerations.

// [INTEL 4] Format-specific PlanCard rendering. INTEL 3 normalized the
// format vocabulary the model emits (video / single_image / carousel /
// quote_graphic / story / long_form_text); this layer maps any string the
// model ever returned (capitalized "Video", legacy "Talking-head video",
// etc.) onto that vocabulary so the renderer can branch reliably. Anything
// unrecognized falls through to "video" so old plans keep rendering.
function normalizeFormat(raw) {
  if (!raw || typeof raw !== "string") return "video";
  var v = raw.toLowerCase().trim();
  if (v === "single_image" || v === "image" || v === "single image" || v === "photo" || v === "image post" || v === "image_post" || v === "feed_post" || v === "feed post" || v.indexOf("pin") === 0) return "single_image";
  if (v === "carousel" || v === "carousel_pin" || v === "photo_carousel" || v === "document" || v === "document carousel") return "carousel";
  if (v === "quote_graphic" || v === "quote graphic" || v === "quote") return "quote_graphic";
  if (v === "story" || v === "stories" || v === "idea_pin") return "story";
  if (v === "long_form_text" || v === "long-form text" || v === "long form text" || v === "long_post" || v === "long post" || v === "tweet" || v === "thread" || v === "image_tweet" || v === "community_post") return "long_form_text";
  // Everything video-shaped (reels, shorts, vertical videos, talking-head video,
  // aesthetic b-roll, day in my life, etc.) collapses to "video".
  return "video";
}

// Human-readable label for a card's format. The raw snake_case values
// (single_image, long_form_text, quote_graphic) are the contract with the
// model and the renderer; they should never leak into user-facing chips.
function humanizeFormat(raw) {
  var map = {
    video:          "Video",
    single_image:   "Image",
    carousel:       "Carousel",
    quote_graphic:  "Quote graphic",
    story:          "Story",
    long_form_text: "Long-form post",
  };
  var key = normalizeFormat(raw);
  return map[key] || (raw && typeof raw === "string" ? raw : "");
}

// One-line preview shown UNDER the headline on collapsed plan cards so
// the user can scan a stacked week without expanding each one. Picks the
// most representative opening line per format (video/long-form → hook,
// carousel → first slide headline, image → photo direction, quote →
// the quote, story → first frame). Falls back to description for legacy
// cards that have no format-specific fields populated.
function cardPreview(card) {
  if (!card) return "";
  var fmt = normalizeFormat(card.format);
  var preview = "";
  if (fmt === "video" || fmt === "long_form_text") {
    preview = card.hook && card.hook !== card.title ? card.hook : "";
  } else if (fmt === "carousel") {
    var slides = Array.isArray(card.slides) ? card.slides : [];
    preview = slides[0] && slides[0].headline ? slides[0].headline : "";
  } else if (fmt === "single_image") {
    preview = card.photoDirection || "";
  } else if (fmt === "quote_graphic") {
    preview = card.quote ? "“" + card.quote + "”" : "";
  } else if (fmt === "story") {
    var frames = Array.isArray(card.frames) ? card.frames : [];
    preview = frames[0] && frames[0].content ? frames[0].content : "";
  }
  if (!preview && card.description) preview = card.description;
  return preview || "";
}

// [INTEL 4] Format-specific body components rendered inside the PlanCard
// expanded section, ABOVE the existing description paragraph. Each body
// only renders fields it actually has — missing fields are skipped silently
// so old cards (no slides / frames / photoDirection / etc.) render nothing
// extra and fall through to the existing description-based layout.
function FormatBodyEyebrow({children}) {
  return <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:B.muted,marginBottom:6,marginTop:4}}>{children}</div>;
}

function FormatBodyDetail({label,value}) {

    </div>
  );
}

function VideoCardBody({card}) {

  var onScreen = Array.isArray(card.onScreenText) ? card.onScreenText.filter(Boolean) : [];

                    {s.designDirection && <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontStyle:"italic",color:B.muted,lineHeight:1.5}}>{"Design: "+s.designDirection}</div>}

function QuoteCardBody({card}) {
  if (!card.quote && !card.attribution && !card.caption && !card.designDirection) return null;
  return (
    <div style={{marginBottom:14}}>
      {card.quote && (
        <div style={{padding:"14px 18px",background:B.navySoft,borderRadius:12,marginBottom:10}}>
          <div style={{fontFamily:"'Italiana',serif",fontSize:18,lineHeight:1.35,color:B.navy,marginBottom:card.attribution?6:0}}>{"“"+card.quote+"”"}</div>
          {card.attribution && <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,color:B.muted,letterSpacing:"0.05em"}}>{"– "+card.attribution}</div>}
        </div>
      )}
      <FormatBodyDetail label="Caption" value={card.caption}/>
      <FormatBodyDetail label="Design direction" value={card.designDirection}/>

}

function StoryCardBody({card}) {
  var frames = Array.isArray(card.frames) ? card.frames : [];
  if (frames.length === 0) return null;
  return (
    <div style={{marginBottom:14}}>
      <FormatBodyEyebrow>{"Story frames ("+frames.length+")"}</FormatBodyEyebrow>

        {frames.map(function(f,i){

            <div key={i} style={{display:"flex",gap:10,padding:"10px 12px",background:B.bg,borderRadius:10,borderLeft:"3px solid "+B.coral}}>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,color:B.coral,letterSpacing:"0.05em",flexShrink:0,minWidth:18}}>{num}</div>
              <div style={{flex:1,minWidth:0}}>
                {f.content && <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.sub,lineHeight:1.55,marginBottom:f.textOverlay||f.interactiveElement?6:0}}>{f.content}</div>}
                {f.textOverlay && <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:600,color:B.ink,marginBottom:f.interactiveElement?4:0,lineHeight:1.5}}>{"Text overlay: "+f.textOverlay}</div>}
                {f.interactiveElement && <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontStyle:"italic",color:B.coral,lineHeight:1.5}}>{"Interactive: "+f.interactiveElement}</div>}
              </div>
            </div>
          );

}

function LongFormCardBody({card}) {
  // Hook lives in the card title; only render here if distinct.
  var hook = card.hook && card.hook !== card.title ? card.hook : "";
  if (!hook && !card.body && !card.closing) return null;
  return (
    <div style={{marginBottom:14}}>
      <FormatBodyDetail label="Hook" value={hook}/>
      {card.body && (
        <div style={{marginBottom:10}}>
          <FormatBodyEyebrow>Body</FormatBodyEyebrow>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.sub,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{card.body}</div>
        </div>
      )}
      <FormatBodyDetail label="Closing" value={card.closing}/>
    </div>
  );
}

// [INTEL 4] Pick the right format-specific body for a card. Returns null
// when the card has no format-specific fields populated, so backward-compat
// (old plans) renders the existing description-only layout cleanly.
function FormatSpecificBody({card}) {
  var fmt = normalizeFormat(card.format);
  switch (fmt) {
    case "single_image":   return <ImageCardBody card={card}/>;
    case "carousel":       return <CarouselCardBody card={card}/>;
    case "quote_graphic":  return <QuoteCardBody card={card}/>;
    case "story":          return <StoryCardBody card={card}/>;
    case "long_form_text": return <LongFormCardBody card={card}/>;
    case "video":
    default:               return <VideoCardBody card={card}/>;
  }
}

// In-card edit form. VIRL writes the cards but users often need to revise
// a hook, swap a caption, tighten a description before posting. This
// renders editable inputs for every text field the model emits at the
// top level (universal + format-specific). Nested arrays (carousel
// slides, story frames) are intentionally NOT exposed for editing yet
// — each requires its own per-item UI that's a separate pass.
// onScreenText (video) is supported as a newline-separated textarea.
// Hashtags collapse to a comma-separated input and re-split on save.
function EditCardBody({draftCard, format, updateDraft, updateDraftItem, card}) {
  var fmt = normalizeFormat(format);
  // [EDIT-LOCKDOWN] Per-format editable fields. Production-direction
  // fields (audioRecommendation, photoDirection, compositionTip,
  // designDirection, interactiveElement) deliberately omitted — those
  // are VIRL's strategic call about HOW to execute the post, not the
  // copy the user publishes. They render as read-only blocks below the
  // editable fields so users can still see the recommendation but not
  // overwrite it. Same lockdown logic applies to the per-slide
  // designDirection (carousel) and per-frame interactiveElement (story)
  // editors further down.
  var perFormat = {
    video: [
      {key:"hook",         label:"Hook",                multiline:true},
      {key:"caption",      label:"Caption",             multiline:true},
      {key:"onScreenText", label:"On-screen text — one per line",  multiline:true, isList:true},
    ],
    single_image: [
      {key:"caption",      label:"Caption",         multiline:true},
    ],
    carousel: [
      {key:"caption",      label:"Caption",         multiline:true},
    ],
    quote_graphic: [
      {key:"quote",        label:"Quote",            multiline:true},
      {key:"attribution",  label:"Attribution",      multiline:false},
      {key:"caption",      label:"Caption",          multiline:true},
    ],
    story: [],
    long_form_text: [
      {key:"hook",    label:"Hook",    multiline:false},
      {key:"body",    label:"Body",    multiline:true},
      {key:"closing", label:"Closing", multiline:false},
    ],
  };
  // [EDIT-LOCKDOWN] Per-format strategic / direction fields shown as
  // read-only. Keyed by format → list of {key, label} for fields that
  // VIRL produced as part of the card's strategy and should NOT be
  // user-editable.
  var perFormatLocked = {
    video:          [{key:"audioRecommendation", label:"Audio direction"}],
    single_image:   [
      {key:"photoDirection", label:"Photo direction"},
      {key:"compositionTip", label:"Composition tip"},
    ],
    carousel:       [],
    quote_graphic:  [{key:"designDirection", label:"Design direction"}],
    story:          [],
    long_form_text: [],
  };
  // [EDIT-LOCKDOWN] Top-level editable fields. `insight` ("Why this
  // works") was previously editable here — removed because it's the
  // core strategic rationale of the card, not content. It now renders
  // in a locked read-only block below the editor so users can refer
  // to it while editing copy but can't override it.
  var fields = [
    {key:"description", label:"Description", multiline:true},
  ]
    .concat(perFormat[fmt] || [])
    .concat([{key:"hashtags", label:"Hashtags — comma-separated, no #", multiline:false}]);
  var inputBase = {width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:8,padding:"10px 12px",fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.ink,lineHeight:1.6,outline:"none",boxSizing:"border-box"};
  var textareaStyle = Object.assign({}, inputBase, {resize:"vertical",minHeight:60});
  var compactInput    = Object.assign({}, inputBase, {padding:"8px 10px",fontSize:13});
  var compactTextarea = Object.assign({}, compactInput, {resize:"vertical",minHeight:48});
  // [EDIT-LOCKDOWN] Shared styling for read-only strategic fields so
  // they're visibly different from editable inputs but still
  // readable in-context. Muted background, no input border, italic
  // label so the user immediately grasps "this is not a textarea."
  var lockedLabel = {fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:B.muted,marginBottom:6,display:"flex",alignItems:"center",gap:6};
  var lockedBody  = {fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.sub,lineHeight:1.6,padding:"10px 12px",background:B.navySoft,borderRadius:8,whiteSpace:"pre-wrap"};

  // Pull strategic / locked field values from the ORIGINAL card (not
  // the draft) since the draft is meant for user edits — locked fields
  // should always show what VIRL produced.
  var insightLocked = (card && (card.insight || card.why)) || "";
  var lockedForFormat = (perFormatLocked[fmt] || []).map(function(f){
    return { key: f.key, label: f.label, value: (card && card[f.key]) || "" };
  }).filter(function(f){ return f.value && String(f.value).trim(); });
  return (
    <div style={{marginBottom:14}}>
      {fields.map(function(f){
        return (
          <div key={f.key} style={{marginBottom:10}}>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:B.muted,marginBottom:6}}>{f.label}</div>
            {f.multiline ? (
              <textarea value={draftCard[f.key]||""}
                onChange={function(e){ updateDraft(f.key, e.target.value); }}
                style={textareaStyle}/>
            ) : (
              <input value={draftCard[f.key]||""}
                onChange={function(e){ updateDraft(f.key, e.target.value); }}
                style={inputBase}/>
            )}
          </div>
        );
      })}
      {/* Carousel slide editor — mirrors the read view's left-accent
           slide blocks, with each text field swapped for an input. The
           slide number + slide count are immutable in this pass; only
           headline / body / design direction can be edited. */}
      {fmt === "carousel" && Array.isArray(draftCard.slides) && draftCard.slides.length > 0 && (
        <div style={{marginBottom:10}}>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:B.muted,marginBottom:6}}>{"Slides ("+draftCard.slides.length+")"}</div>
          {/* [EDIT-LOCKDOWN] Each slide's `designDirection` is now
              rendered as a read-only line under its editable fields
              instead of as a third input. Headline and body remain
              editable (those are the copy that actually publishes);
              design direction stays as VIRL's strategic call. */}
          {draftCard.slides.map(function(slide, sIdx){
            var num = slide.slideNumber || (sIdx + 1);
            // Pull the original slide's designDirection so the locked
            // line shows VIRL's recommendation even if the user
            // somehow changed it via stale state.
            var origSlide = (card && Array.isArray(card.slides) && card.slides[sIdx]) || slide;
            var lockedDir = (origSlide.designDirection || "").trim();
            return (
              <div key={sIdx} style={{display:"flex",gap:10,padding:"10px 12px",background:B.bg,borderRadius:10,borderLeft:"3px solid "+B.blue,marginBottom:8}}>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,color:B.blue,letterSpacing:"0.05em",flexShrink:0,minWidth:18,paddingTop:8}}>{num}</div>
                <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",gap:6}}>
                  <input value={slide.headline||""}
                    placeholder="Headline"
                    onChange={function(e){ updateDraftItem("slides", sIdx, "headline", e.target.value); }}
                    style={Object.assign({}, compactInput, {fontWeight:600,color:B.ink})}/>
                  <textarea value={slide.body||""}
                    placeholder="Body (1-2 sentences)"
                    onChange={function(e){ updateDraftItem("slides", sIdx, "body", e.target.value); }}
                    style={compactTextarea}/>
                  {lockedDir && (
                    <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontStyle:"italic",color:B.muted,lineHeight:1.5,paddingLeft:4,display:"flex",gap:6}}>
                      <span style={{flexShrink:0}}>{"🔒"}</span>
                      <span><span style={{fontWeight:600}}>Design direction:</span> {lockedDir}</span>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {/* Story frame editor — same shape as the carousel slide editor,
           coral accent instead of blue, and the field set matches the
           Story schema (content / textOverlay / interactiveElement). */}
      {fmt === "story" && Array.isArray(draftCard.frames) && draftCard.frames.length > 0 && (
        <div style={{marginBottom:10}}>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:B.muted,marginBottom:6}}>{"Story frames ("+draftCard.frames.length+")"}</div>
          {/* [EDIT-LOCKDOWN] Each frame's `interactiveElement` is now
              rendered as a read-only line under its editable fields.
              Content and text overlay remain editable (publishable
              copy); the interactive mechanic stays as VIRL's
              strategic call about how the frame engages viewers. */}
          {draftCard.frames.map(function(frame, fIdx){
            var num = frame.frameNumber || (fIdx + 1);
            var origFrame = (card && Array.isArray(card.frames) && card.frames[fIdx]) || frame;
            var lockedInteractive = (origFrame.interactiveElement || "").trim();
            return (
              <div key={fIdx} style={{display:"flex",gap:10,padding:"10px 12px",background:B.bg,borderRadius:10,borderLeft:"3px solid "+B.coral,marginBottom:8}}>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,color:B.coral,letterSpacing:"0.05em",flexShrink:0,minWidth:18,paddingTop:8}}>{num}</div>
                <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",gap:6}}>
                  <textarea value={frame.content||""}
                    placeholder="What the frame shows"
                    onChange={function(e){ updateDraftItem("frames", fIdx, "content", e.target.value); }}
                    style={compactTextarea}/>
                  <input value={frame.textOverlay||""}
                    placeholder="Text overlay"
                    onChange={function(e){ updateDraftItem("frames", fIdx, "textOverlay", e.target.value); }}
                    style={Object.assign({}, compactInput, {fontWeight:600,color:B.ink})}/>
                  {lockedInteractive && (
                    <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontStyle:"italic",color:B.muted,lineHeight:1.5,paddingLeft:4,display:"flex",gap:6}}>
                      <span style={{flexShrink:0}}>{"🔒"}</span>
                      <span><span style={{fontWeight:600}}>Interactive element:</span> {lockedInteractive}</span>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* [EDIT-LOCKDOWN] Strategic / locked block. Renders below all
           editable fields so users can refer to VIRL's strategic
           rationale + execution direction while editing the copy
           above. Includes the "Why this works" insight (always when
           present) plus any per-format production-direction fields
           not folded into the slides/frames editors. Block is hidden
           entirely when there's nothing to show — keeps the edit
           surface clean for cards without strategic copy. */}
      {(insightLocked || lockedForFormat.length > 0) && (
        <div style={{marginTop:16,padding:"12px 14px",background:B.navySoft,borderRadius:10,border:"1px solid "+B.border}}>
          <div style={Object.assign({}, lockedLabel, {marginBottom:10,color:B.navy})}>
            <span>{"🔒"}</span>
            <span>{"VIRL's strategy — preserved"}</span>
          </div>
          {insightLocked && (
            <div style={{marginBottom: lockedForFormat.length > 0 ? 10 : 0}}>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:B.muted,marginBottom:4}}>{"Why this works"}</div>
              <div style={lockedBody}>{insightLocked}</div>
            </div>
          )}
          {lockedForFormat.map(function(f, fi){
            return (
              <div key={f.key} style={{marginBottom: fi === lockedForFormat.length - 1 ? 0 : 10}}>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:B.muted,marginBottom:4}}>{f.label}</div>
                <div style={lockedBody}>{f.value}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// [LINKEDIN-LONG-POST] Modal that expands a long_form_text plan card
// into a full 500-1500 word LinkedIn post. Mirrors ScriptGenerator's
// shape so the user experience is consistent across "Write Script"
// (video) and "Write Full Post" (long-form text) actions.
//
// State lifecycle matches ScriptGenerator: opens with any previously-
// saved long post on the card, lets the user regenerate / edit /
// copy / save to the card. "Save to card" persists the artifact on
// the card so it survives session reloads and shows the saved
// version next time the modal opens (no re-billing).
function LongFormPostGenerator({card,onClose,profile,userToken,onCreditsUsed,onSaveLongPost}) {
  const initialSaved = card && card.savedLongPost ? card.savedLongPost : null;
  const [post,setPost]         = useState(initialSaved);
  const [loading,setLoading]   = useState(false);
  const [error,setError]       = useState("");
  const [length,setLength]     = useState("medium");
  const [savedOnCard,setSavedOnCard] = useState(!!initialSaved);

  // [POST-EDIT] Inline edit, same shape as ScriptGenerator's edit mode.
  const [editing,setEditing]       = useState(false);
  const [draftPost,setDraftPost]   = useState(null);
  function startEdit() {
    if (!post) return;
    setDraftPost({
      hook:     post.hook || "",
      body:     post.body || "",
      closing:  post.closing || "",
      hashtags: Array.isArray(post.hashtags) ? post.hashtags.join(" ") : "",
    });
    setEditing(true);
  }
  function cancelEdit() { setDraftPost(null); setEditing(false); }
  function updateDraft(field, value) {
    setDraftPost(function(d){ return d ? Object.assign({}, d, { [field]: value }) : d; });
  }
  function saveEdit() {
    if (!draftPost) { setEditing(false); return; }
    var nextHashtags = (draftPost.hashtags || "")
      .split(/[\s,]+/)
      .map(function(t){ return t.replace(/^#/, "").trim(); })
      .filter(Boolean);
    var next = {
      hook:     (draftPost.hook || "").trim(),
      body:     (draftPost.body || "").trim(),
      closing:  (draftPost.closing || "").trim(),
      hashtags: nextHashtags,
    };
    if (post && typeof window !== "undefined" && typeof window.__virlCaptureEdit === "function") {
      try {
        window.__virlCaptureEdit(
          "long_post",
          { hook: post.hook || "", body: post.body || "", closing: post.closing || "" },
          { hook: next.hook,        body: next.body,        closing: next.closing },
        );
      } catch(e){}
    }
    setPost(next);
    setDraftPost(null);
    setEditing(false);
    if (onSaveLongPost) {
      onSaveLongPost(next);
      setSavedOnCard(true);
    }
  }

  function generate() {
    setLoading(true); setPost(null); setError("");
    setEditing(false); setDraftPost(null);
    callAPI("long_post", { card: card, length: length }, { token: userToken }).then(function(data) {
      if (!(data && data.text)) {
        setError("VIRL's still warming up - tap Try Again.");
        return;
      }
      // [LONG-POST-PARSE] Use the tolerant extractJSON helper that
      // ScriptGenerator already relies on. Strips ```json``` code fences
      // and locates the outer { ... } block even when the model adds
      // preamble — strict JSON.parse failed in production whenever the
      // model wrapped its reply in markdown despite the prompt-side
      // "no markdown" instruction.
      var parsed = extractJSON(data.text);
      if (!parsed || typeof parsed !== "object" || !parsed.hook) {
        setError("VIRL drafted something but the format came back garbled. Tap Try Again.");
        return;
      }
      setPost(parsed);
      setSavedOnCard(false);
      if (onCreditsUsed) onCreditsUsed({ cost: (data && data.cost) || 2 });
      try {
        var postUsage = (data && data.usage) || {};
        logEvent(session && session.user && session.user.id, "long_post_generated", {
          cardId:   (card.title || "") + (card.day || ""),
          platform: card.platform || "LinkedIn",
          day:      card.day || null,
          length:   length,
          outputTokens:        postUsage.outputTokens        || 0,
          cachedInputTokens:   postUsage.cachedInputTokens   || 0,
          uncachedInputTokens: postUsage.uncachedInputTokens || 0,
          truncated:           !!postUsage.truncated,
          model:               postUsage.model || null,
        });
      } catch(e){}
    }).catch(function(e){ setError(e.message); }).finally(function(){ setLoading(false); });
  }

  function copyPost() {
    if (!post) return;
    var hashtagLine = (post.hashtags && post.hashtags.length)
      ? "\n\n" + post.hashtags.map(function(h){ return "#" + h.replace(/^#/, ""); }).join(" ")
      : "";
    var full = (post.hook || "") + "\n\n"
             + (post.body || "")
             + (post.closing ? "\n\n" + post.closing : "")
             + hashtagLine;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(full).catch(function(){});
    }
  }

  // Modal shell — same overlay treatment as ScriptGenerator so the two
  // generators feel like a pair.
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.55)",zIndex:9999,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"40px 16px",overflowY:"auto"}} onClick={onClose}>
      <div onClick={function(e){ e.stopPropagation(); }}
        style={{background:B.card,borderRadius:18,maxWidth:680,width:"100%",padding:"28px 28px 24px",boxShadow:"0 24px 60px rgba(15,23,42,0.35)",position:"relative"}}>
        <button onClick={onClose} aria-label="Close"
          style={{position:"absolute",top:14,right:14,width:32,height:32,borderRadius:"50%",border:"none",background:"transparent",fontSize:22,color:B.muted,cursor:"pointer",lineHeight:1}}>{"×"}</button>

        <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:B.navy,marginBottom:6}}>{"LinkedIn long-form post"}</div>
        <div style={{fontFamily:"'Italiana',serif",fontSize:24,color:B.ink,lineHeight:1.2,marginBottom:6}}>{card.title || "Long-form post"}</div>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.muted,lineHeight:1.55,marginBottom:18}}>{card.description || ""}</div>

        {/* Length chips */}
        {!post && !loading && (
          <div style={{marginBottom:18}}>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:B.muted,marginBottom:8}}>{"Target length"}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[
                {v:"short",  l:"Short (~350 words)"},
                {v:"medium", l:"Medium (~600 words)"},
                {v:"long",   l:"Long (~1200 words)"},
              ].map(function(opt){
                var active = length === opt.v;
                return (
                  <button key={opt.v} onClick={function(){setLength(opt.v);}}
                    style={{
                      fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",
                      padding:"8px 14px",borderRadius:99,cursor:"pointer",
                      background:active?B.navy:B.bg,color:active?B.white:B.sub,border:"1px solid "+(active?B.navy:B.border),
                    }}>{opt.l}</button>
                );
              })}
            </div>
          </div>
        )}

        {!post && !loading && (
          <button onClick={generate}
            style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"14px 22px",background:B.navy,color:B.white,border:"none",borderRadius:99,cursor:"pointer"}}>
            {"Write the full post"}
          </button>
        )}

        {loading && (
          <div style={{padding:"30px 0",textAlign:"center",fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.muted}}>
            {"Drafting your post…"}
          </div>
        )}

        {error && !loading && (
          <div style={{marginTop:12,padding:"12px 16px",background:B.coralSoft,border:"1px solid "+B.coral,borderRadius:10,fontFamily:"'Jost',sans-serif",fontSize:12,color:B.ink}}>{error}</div>
        )}

        {/* Render the post — edit mode is a parallel set of textareas. */}
        {post && !editing && (
          <div>
            <div style={{padding:"18px 20px",background:B.bg,borderRadius:12,border:"1px solid "+B.border,marginBottom:14}}>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:600,color:B.ink,lineHeight:1.6,marginBottom:12,whiteSpace:"pre-wrap"}}>{post.hook}</div>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.sub,lineHeight:1.75,whiteSpace:"pre-wrap"}}>{post.body}</div>
              {post.closing && <div style={{marginTop:14,fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:500,color:B.ink,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{post.closing}</div>}
              {post.hashtags && post.hashtags.length > 0 && (
                <div style={{marginTop:14,fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:500,color:B.blue}}>
                  {post.hashtags.map(function(h){ return "#" + h.replace(/^#/, ""); }).join(" ")}
                </div>
              )}
              {post.compliance_note && (
                <div style={{marginTop:14,padding:"10px 14px",background:B.coralSoft,borderRadius:8,fontFamily:"'Jost',sans-serif",fontSize:11,color:B.coral,lineHeight:1.5}}>
                  {"Suggested disclosure: " + post.compliance_note}
                </div>
              )}
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button onClick={copyPost}
                style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"10px 18px",background:B.navy,color:B.white,border:"none",borderRadius:99,cursor:"pointer"}}>
                {"Copy"}
              </button>
              {onSaveLongPost && !savedOnCard && (
                <button onClick={function(){ onSaveLongPost(post); setSavedOnCard(true); }}
                  style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"10px 18px",background:B.blueSoft,color:B.blue,border:"none",borderRadius:99,cursor:"pointer"}}>
                  {"Save to card"}
                </button>
              )}
              {onSaveLongPost && savedOnCard && (
                <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"10px 18px",color:B.green}}>
                  {"Saved ✓"}
                </span>
              )}
              <button onClick={startEdit}
                style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"10px 18px",background:B.bg,color:B.sub,border:"1px solid "+B.border,borderRadius:99,cursor:"pointer"}}>
                {"Edit"}
              </button>
              <button onClick={generate}
                style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"10px 18px",background:B.bg,color:B.sub,border:"1px solid "+B.border,borderRadius:99,cursor:"pointer"}}>
                {"Regenerate"}
              </button>
            </div>
          </div>
        )}

        {post && editing && draftPost && (
          <div>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:B.muted,marginBottom:6}}>{"Hook"}</div>
            <textarea value={draftPost.hook} onChange={function(e){updateDraft("hook", e.target.value);}}
              style={{width:"100%",minHeight:60,padding:"10px 12px",border:"1px solid "+B.border,borderRadius:8,fontFamily:"'Jost',sans-serif",fontSize:13,marginBottom:12}}/>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:B.muted,marginBottom:6}}>{"Body"}</div>
            <textarea value={draftPost.body} onChange={function(e){updateDraft("body", e.target.value);}}
              style={{width:"100%",minHeight:200,padding:"10px 12px",border:"1px solid "+B.border,borderRadius:8,fontFamily:"'Jost',sans-serif",fontSize:13,lineHeight:1.6,marginBottom:12}}/>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:B.muted,marginBottom:6}}>{"Closing"}</div>
            <textarea value={draftPost.closing} onChange={function(e){updateDraft("closing", e.target.value);}}
              style={{width:"100%",minHeight:60,padding:"10px 12px",border:"1px solid "+B.border,borderRadius:8,fontFamily:"'Jost',sans-serif",fontSize:13,marginBottom:12}}/>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:B.muted,marginBottom:6}}>{"Hashtags (space-separated, no #)"}</div>
            <input value={draftPost.hashtags} onChange={function(e){updateDraft("hashtags", e.target.value);}}
              style={{width:"100%",padding:"10px 12px",border:"1px solid "+B.border,borderRadius:8,fontFamily:"'Jost',sans-serif",fontSize:13,marginBottom:14}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={saveEdit}
                style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"10px 18px",background:B.navy,color:B.white,border:"none",borderRadius:99,cursor:"pointer"}}>
                {"Save changes"}
              </button>
              <button onClick={cancelEdit}
                style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"10px 18px",background:B.bg,color:B.sub,border:"1px solid "+B.border,borderRadius:99,cursor:"pointer"}}>
                {"Cancel"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function PlanCard({card,idx,onSave,onLog,onSaveScript,onSaveLongPost,onEdit,onRegenerate,regenBusy,saved,result,profile,userToken,onCreditsUsed,editMode,markedReplace,onToggleReplace,replacing,usedFreshTrends,allDayLabels}) {
  // When `replacing` is true, this card slot is awaiting a streaming
  // replacement from /api/chat?generationType=plan_partial. Render a
  // skeleton instead of the real card so the user sees their kept cards
  // stay put while only the selected ones swap.
  if (replacing) {
    return (
      <div className="su" style={{background:B.card,borderRadius:12,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",borderLeft:"3px solid "+B.border,padding:"22px 22px",marginBottom:8,opacity:0.7,animationDelay:(idx*0.04)+"s"}}>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:B.navy,marginBottom:8}}>Regenerating…</div>
        <div style={{height:14,width:"60%",background:B.border,borderRadius:4,marginBottom:8}}/>
        <div style={{height:10,width:"90%",background:B.border,borderRadius:4,marginBottom:6}}/>
        <div style={{height:10,width:"75%",background:B.border,borderRadius:4}}/>
      </div>
    );
  }
  var cardId = buildCardId(card);
  var bl = card.priority==="HIGH"?B.navy:card.priority==="MED"?B.blue:B.border;
  const [expanded,setExpanded] = useState(false);
  const [showLog,setShowLog]   = useState(false);
  const [showScript,setShowScript] = useState(false);
  // [LINKEDIN-LONG-POST] Parallel state to showScript. Independent
  // so a user could conceptually have both modals' actions queued —
  // in practice only one is shown at a time but the state separation
  // keeps the rendering logic predictable.
  const [showLongPost,setShowLongPost] = useState(false);
  // [MOVE-CARD] Inline popover state. Open → list of weekday labels;
  // tap a label → updateCardAt fires with { day: newLabel }, the
  // existing persistence + id-migration path takes over. Replaces
  // the rolled-back drag-and-drop reorder with a more reliable
  // button-driven move.
  const [showMoveMenu,setShowMoveMenu] = useState(false);
  // [EDIT] Inline card editing. Tapping Edit opens an in-place form
  // showing every top-level text field the model emitted for this
  // card's format. Save commits via onEdit prop (parent updates the
  // cards array + persists to localStorage + Supabase + migrates
  // saved/posted/results keys if the title changed). Cancel discards.
  // Edit forces the card open (so the user can see what they're
  // editing) but doesn't change the underlying expanded state on cancel.
  const [editing,setEditing]     = useState(false);
  const [draftCard,setDraftCard] = useState(null);
  function enterEdit() {
    // Deep-clone slides and frames so the form can mutate items
    // without touching the underlying card. Both are intentionally
    // kept structured (not flattened to text) so the per-item UI
    // can render fields the same way the read view does.
    var draftSlides = Array.isArray(card.slides)
      ? card.slides.map(function(s){ return Object.assign({}, s); })
      : null;

            {[["Views",views,setViews],["Likes",likes,setLikes],["Saves",saves2,setSaves2]].map(function(item){
