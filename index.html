async function saveProfileToSupabase(profile, userId) {
  try {
    const { error } = await supabaseClient.from("profiles").upsert({
      id: userId,
      name: profile.name||null,
      audience: profile.audience||null,
      voice: profile.voice||null,

      off_limits: profile.offLimits||null,

      journey: profile.journey||null,
      known_for: profile.knownFor||null,
      pillars: profile.pillars||[],

      platform_audiences: profile.platformAudiences||{},
      post_freq: profile.postFreq||null,
      content_length: profile.contentLength||null,

      // [INTEL 1] Personal-fact columns. NULL on empty so we can later
      // distinguish "user has not yet been prompted" from "explicitly cleared".
      personal_facts: profile.personalFacts||null,
      never_assume: profile.neverAssume||null,
      love_to_reference: profile.loveToReference||null,

      console.error("[VIRL] Profile save failed:", error);

  } catch(e) {

    return { ok: false, error: e.message || String(e) };

}

async function loadCreditsFromSupabase(userId, accessToken) {
  try {
    // Use REST API with the user's own token to bypass RLS issues
    const headers = {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + (accessToken || SUPABASE_ANON_KEY),
      "Content-Type": "application/json",
      // Some browsers (notably private/incognito modes) aggressively cache
      // GETs to the Supabase REST API, so a refetch right after a server-side
      // credit deduction can return the stale pre-deduction row. Force a
      // network round-trip every time.
      "Cache-Control": "no-cache",
      "Pragma": "no-cache",
    };
    const res = await fetch(
      SUPABASE_URL + "/rest/v1/credits?select=credits,plan,reset_at&user_id=eq." + userId + "&limit=1&_=" + Date.now(),
      { headers, cache: "no-store" }
    );
    if (!res.ok) return null;
    const rows = await res.json();
    return (Array.isArray(rows) && rows.length > 0) ? rows[0] : null;
  } catch(e) { return null; }
}

// Per-user cache so a refresh in the same browser paints the last-known
// Supabase credits instantly. Keyed by user id so a different user signing in
// on the same browser never sees the previous user's number. Incognito starts
// with no cache and shows a brief skeleton — by design, since the local cache
// is non-authoritative.
function cachedSbCreditsKey(userId) { return "virl_sb_credits_" + userId; }
function loadCachedSbCredits(userId) {
  try {
    var raw = localStorage.getItem(cachedSbCreditsKey(userId));
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}
function saveCachedSbCredits(userId, row) {
  try { localStorage.setItem(cachedSbCreditsKey(userId), JSON.stringify(row)); } catch(e) {}
}

// Plans table: one row per user. Cards + stats persist for the week so a
// refresh on any device lands the user back on their current plan rather
// than the empty profile screen. Helpers fail open — if the table isn't
// provisioned yet, the app silently falls back to localStorage-only.
// ISO date for the Monday of the calendar week containing `d`. Used as the
// week_start key for plan_history rows so re-generations within the same
// week update one row instead of creating duplicates.
function weekStartISO(d) {
  const date = new Date(d || Date.now());
  const day = date.getDay() || 7; // Sunday=7
  date.setHours(0,0,0,0);
  date.setDate(date.getDate() - (day - 1));
  return date.toISOString().slice(0, 10);
}

async function loadPlanFromSupabase(userId) {
  try {
    const { data, error } = await supabaseClient
      .from("plans").select("cards,stats,strategy,expires_at").eq("user_id", userId).maybeSingle();
    if (error || !data) return null;
    return data;
  } catch(e) { return null; }
}
async function savePlanToSupabase(userId, cards, stats, expiresAt, strategy) {
  // Dual-write: current `plans` row (one per user, replaced on regenerate)
  // PLUS a `plan_history` row keyed by (user_id, week_start) so past weeks
  // accumulate. The history row is what the server reads on the next plan
  // generation to build narratively week-over-week.
  let ok = true;
  try {
    const { error } = await supabaseClient.from("plans").upsert({
      user_id:    userId,
      cards:      cards,
      stats:      stats    || null,
      strategy:   strategy || null,
      expires_at: new Date(expiresAt).toISOString(),
      updated_at: new Date().toISOString(),
    });
    if (error) { console.error("Plan save error:", error.message); ok = false; }
  } catch(e) { ok = false; }
  // History upsert — fail-open so the UI flow still works if plan_history
  // hasn't been provisioned yet.
  try {
    const ws = weekStartISO(Date.now());
    await supabaseClient.from("plan_history").upsert({
      user_id:    userId,
      week_start: ws,
      cards:      cards,
      stats:      stats    || null,
      strategy:   strategy || null,
    }, { onConflict: "user_id,week_start" });
  } catch(e) { /* non-fatal */ }
  return ok;
}
async function deletePlanFromSupabase(userId) {

// Algorithm playbook is now stored in Supabase (`playbook` table) so it's
// editable without a code deploy and so server-side prompt builders can
// inject the same data into every Anthropic call. The Algo tab below
// fetches it on mount via loadPlaybook(); see api/_lib/playbook.js for the
// server-side counterpart used during prompt construction.
async function loadPlaybook() {
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/playbook?select=*", {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + SUPABASE_ANON_KEY },
    });
    if (!res.ok) return {};
    const rows = await res.json();
    const byPlatform = {};
    for (const r of rows) if (r && r.platform) byPlatform[r.platform] = r;
    return byPlatform;
  } catch (e) { return {}; }
}

// Latest trends per platform. Read is public (the trends table is
// transparent — users see what VIRL is conditioning on every week).
async function loadLatestTrends() {
  try {
    // Pull the last ~30 days, then group by platform → most-recent wins.
    const since = new Date(Date.now() - 30 * 86400000).toISOString();
    const url = SUPABASE_URL + "/rest/v1/trends"
      + "?select=platform,summary,items,sources,fetched_at"
      + "&fetched_at=gte." + encodeURIComponent(since)
      + "&order=fetched_at.desc";
    const res = await fetch(url, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + SUPABASE_ANON_KEY },
    });
    if (!res.ok) return {};
    const rows = await res.json();
    const byPlatform = {};
    for (const r of rows) if (r && r.platform && !byPlatform[r.platform]) byPlatform[r.platform] = r;
    return byPlatform;
  } catch (e) { return {}; }
}

// set. Submit POSTs to /api/feedback (auth-required server-side).
// First-plan celebration overlay. Renders once after the very first plan
// generates; the parent persists the seen-flag in localStorage on dismiss
// so a refresh, navigation, or follow-up plan never re-fires it.
function FirstPlanCelebration({onDismiss}) {
  // Close on ESC for keyboard-savvy users.
  useEffect(function() {
    function onKey(e) { if (e.key === "Escape") onDismiss(); }
    window.addEventListener("keydown", onKey);
    return function() { window.removeEventListener("keydown", onKey); };
  }, [onDismiss]);

  return (
    <div onClick={onDismiss}

// Thumbs-up / thumbs-down rating buttons mounted on every generated item
// (plan card, caption option, scan result, script). Sends to /api/rate;
// click toggles between up / down / cleared. Visual state is local —
// we don't fetch existing ratings on mount (most items are short-lived
// per session anyway). The unique-constraint on (user_id, type, ref) in
// Supabase means a second click on the same target just flips the row.
function RatingButtons({sessionToken, generationType, targetRef, size}) {
  const [rating,setRating]   = useState(null);    // "up" | "down" | null
  const [working,setWorking] = useState(false);
  const compact = size === "sm";
  const btnPad  = compact ? "5px 10px" : "7px 12px";
  const btnSize = compact ? 13 : 15;
  const labelSz = compact ? 9  : 10;

  function send(next) {
    if (working || !sessionToken || !targetRef) return;
    setWorking(true);
    const previous = rating;
    setRating(next); // optimistic
    fetch("/api/rate", {
      method:  "POST",
      headers: { "Content-Type":"application/json", "Authorization":"Bearer "+sessionToken },
      body:    JSON.stringify({ generation_type: generationType, target_ref: targetRef, rating: next }),
    })
      .then(function(r){ if (!r.ok) setRating(previous); })
      .catch(function(){ setRating(previous); })
      .finally(function(){ setWorking(false); });
  }

  function onUp()   { send(rating === "up"   ? null : "up");   }
  function onDown() { send(rating === "down" ? null : "down"); }

  return (
    <div style={{display:"inline-flex",alignItems:"center",gap:6}}>
      <button onClick={onUp} disabled={working} aria-label="Thumbs up"
        style={{
          fontFamily:"'Jost',sans-serif",fontSize:btnSize,padding:btnPad,
          background:rating==="up"?B.greenSoft:B.bg,
          color:rating==="up"?B.green:B.muted,
          border:"1px solid "+(rating==="up"?B.green:B.border),
          borderRadius:99,cursor:working?"default":"pointer",lineHeight:1,
        }}>
        {"👍"}
      </button>
      <button onClick={onDown} disabled={working} aria-label="Thumbs down"
        style={{
          fontFamily:"'Jost',sans-serif",fontSize:btnSize,padding:btnPad,
          background:rating==="down"?B.coralSoft:B.bg,
          color:rating==="down"?B.coral:B.muted,
          border:"1px solid "+(rating==="down"?B.coral:B.border),
          borderRadius:99,cursor:working?"default":"pointer",lineHeight:1,
        }}>
        {"👎"}
      </button>
      {rating && (
        <span style={{fontFamily:"'Jost',sans-serif",fontSize:labelSz,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",color:rating==="up"?B.green:B.coral,marginLeft:4}}>
          {rating==="up" ? "Thanks" : "Got it"}
        </span>
      )}
    </div>
  );
}

function FeedbackWidget({sessionToken, activeContext, calendlyUrl}) {
  const [open,setOpen]           = useState(false);
  const [sentiment,setSentiment] = useState(null);
  const [message,setMessage]     = useState("");
  const [submitting,setSubmitting] = useState(false);
  const [thanks,setThanks]       = useState(false);
  const [error,setError]         = useState("");

  function reset() {
    setSentiment(null); setMessage(""); setSubmitting(false); setError(""); setThanks(false);
  }
  function close() { setOpen(false); setTimeout(reset, 200); }

  function submit() {
    if (!message.trim() || submitting) return;
    setSubmitting(true); setError("");
    fetch("/api/feedback", {
      method: "POST",
      headers: {
        "Content-Type":  "application/json",
        "Authorization": "Bearer " + sessionToken,
      },
      body: JSON.stringify({
        sentiment: sentiment,
        message:   message.trim(),
        context:   activeContext || null,
      }),
    }).then(function(r){ return r.json().then(function(j){ return {ok:r.ok, body:j}; }); })
      .then(function(res){
        if (res.ok) {
          setThanks(true);
          setTimeout(close, 2500);
        } else {
          setError((res.body && res.body.error) || "Could not send feedback.");
          setSubmitting(false);
        }
      })
      .catch(function(e){ setError(e.message); setSubmitting(false); });
  }

  // Bottom-right pill. Stays out of the way but always visible.
  return (
    <div>
      <button onClick={function(){ setOpen(true); }}
        aria-label="Send feedback"
        style={{
          position:"fixed", right:18, bottom:18, zIndex:300,
          fontFamily:"'Jost',sans-serif", fontSize:12, fontWeight:700, letterSpacing:"0.06em", textTransform:"uppercase",

          boxShadow:"0 6px 20px rgba(31,58,138,0.35)",

        <div onClick={close}
          style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.7)",zIndex:600,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>

            <div style={{width:40,height:4,background:B.border,borderRadius:99,margin:"0 auto 24px"}}/>

            {!thanks && (
              <div>
                <div style={{fontFamily:"'Italiana',serif",fontSize:26,color:B.navy,marginBottom:8}}>How's VIRL going?</div>

                  Tell me anything — what's working, what's broken, what you wish existed. A real person reads every reply.
                </div>

                {/* Sentiment chips — optional */}
                <div style={{display:"flex",gap:10,marginBottom:18,justifyContent:"center"}}>
                  {[
                    {key:"sad",     emoji:"😞", label:"Frustrated"},
                    {key:"neutral", emoji:"😐", label:"Mixed"},
                    {key:"happy",   emoji:"😊", label:"Loving it"},
                  ].map(function(s){
                    var active = sentiment === s.key;
                    return (
                      <button key={s.key} onClick={function(){ setSentiment(active ? null : s.key); }}
                        style={{
                          flex:1, padding:"12px 8px",
                          background:active ? B.navySoft : B.bg,
                          border:"1px solid "+(active ? B.navy : B.border),
                          borderRadius:14, cursor:"pointer", textAlign:"center",
                          fontFamily:"'Jost',sans-serif", fontSize:11, fontWeight:active?700:400,
                          color:active ? B.navy : B.muted,
                        }}>
                        <div style={{fontSize:22,lineHeight:1,marginBottom:4}}>{s.emoji}</div>
                        {s.label}
                      </button>
                    );
                  })}
                </div>

                <textarea value={message} onChange={function(e){ setMessage(e.target.value); }}
                  placeholder="What's on your mind?"
                  rows={4}
                  style={{
                    width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:12,
                    padding:"12px 14px",fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.ink,
                    resize:"vertical",lineHeight:1.6,marginBottom:14,
                  }}/>

                {error && <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:B.coral,marginBottom:12}}>{error}</div>}

                    padding:"15px 24px",

                  <a href={calendlyUrl} target="_blank" rel="noopener noreferrer"
                    style={{

  );

function PendingPlaybookDraft({draft, token, onResolved}) {
  const [working,setWorking] = useState("");
  const [error,setError]     = useState("");

  function decide(action) {
    if (working) return;
    setWorking(action); setError("");
    fetch("/api/admin/playbook-draft-review", {
      method:  "POST",
      headers: {"Content-Type":"application/json","Authorization":"Bearer "+token},
      body:    JSON.stringify({ draft_id: draft.id, action }),
    }).then(function(r){ return r.json().then(function(j){ return {ok:r.ok,body:j}; }); })
      .then(function(res){
        if (res.ok) {
          if (onResolved) onResolved(draft.id, action);
        } else {
          setError((res.body && res.body.error) || "Action failed");
          setWorking("");
        }
      })
      .catch(function(e){ setError(e.message); setWorking(""); });
  }

  const diff = draft.diff || {};
  const fields = Object.keys(diff);

    <div style={{background:B.card,borderRadius:14,marginBottom:12,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>

      <div style={{padding:"14px 18px"}}>
        {draft.reasoning && (
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,fontStyle:"italic",color:B.sub,lineHeight:1.6,marginBottom:14}}>

          <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,color:B.muted}}>No diff data on this draft.</div>

              <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.muted,marginBottom:6}}>{f}</div>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,color:B.sub,lineHeight:1.55,marginBottom:4}}>
                <span style={{color:B.coral,textDecoration:"line-through"}}>{fmtPlaybookValue(d.old)}</span>
              </div>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,color:B.ink,fontWeight:600,lineHeight:1.55,marginBottom:6}}>
                <span style={{color:B.green}}>{"→ "}</span>{fmtPlaybookValue(d.new)}

                <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:B.muted,lineHeight:1.55,marginBottom:4}}>{d.reason}</div>
              )}

                  style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:B.blue,textDecoration:"none"}}>
                  Source ↗
                </a>
              )}

          );
        })}

            <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.muted,marginBottom:6}}>All cited sources</div>
            {draft.sources.map(function(u, i){
              return <div key={i}>
                <a href={u} target="_blank" rel="noopener noreferrer"
                   style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:B.blue,textDecoration:"none",lineHeight:1.6}}>{u}</a>

      </div>
    </div>
  );

// Admin-only inline editor for one platform's playbook row. Saves through
// /api/admin/playbook-update which whitelist-checks fields and verifies the
// caller's bearer token belongs to the admin email. On success, refreshes
// the parent's playbook map so the rest of the app sees the new values.
function PlaybookEditor({platform, entry, token, onSaved}) {
  const initial = entry || {platform: platform};
  const toForm = function(e){
    return PLAYBOOK_FIELDS.reduce(function(acc, f){
      var v = e[f.key];
      if (f.kind === "list" && Array.isArray(v)) acc[f.key] = v.join(", ");
      else if (v === null || v === undefined) acc[f.key] = "";
      else acc[f.key] = String(v);
      return acc;
    }, {});
  };
  const [form, setForm] = useState(toForm(initial));
  const [saving, setSaving] = useState(false);
  const [status, setStatus] = useState("");

  function update(k, v) { setForm(Object.assign({}, form, {[k]: v})); }

  function save() {
    if (saving) return;
    setSaving(true); setStatus("");
    var payload = {platform: platform};
    for (var i = 0; i < PLAYBOOK_FIELDS.length; i++) {
      var f = PLAYBOOK_FIELDS[i];
      var v = form[f.key];
      if (f.kind === "list") {
        payload[f.key] = (v || "").split(",").map(function(s){return s.trim();}).filter(Boolean);
      } else if (f.kind === "number") {
        var n = parseInt(v, 10);
        payload[f.key] = Number.isNaN(n) ? null : n;
      } else {
        payload[f.key] = v || null;
      }
    }
    fetch("/api/admin/playbook-update", {
      method: "POST",
      headers: {"Content-Type":"application/json", "Authorization":"Bearer "+token},
      body: JSON.stringify(payload),
    }).then(function(r){ return r.json().then(function(j){ return {ok:r.ok, body:j}; }); })
      .then(function(res){
        if (res.ok) { setStatus("Saved."); if (onSaved) onSaved(); }
        else { setStatus("Error: " + (res.body && res.body.error || "save failed")); }
      })
      .catch(function(e){ setStatus("Error: " + e.message); })
      .finally(function(){ setSaving(false); });
  }

  return (
    <div style={{background:B.card,borderRadius:14,marginBottom:12,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
      <div style={{background:B.navy,padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:700,color:B.white}}>{platform}</div>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,color:B.sky}}>edit</div>
      </div>
      <div style={{padding:"14px 18px"}}>
        {PLAYBOOK_FIELDS.map(function(f){
          var multiline = f.key === "notes";
          var commonStyle = {width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:8,padding:"8px 10px",fontFamily:"'Jost',sans-serif",fontSize:12,color:B.ink};
          return (
            <div key={f.key} style={{marginBottom:10}}>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.muted,marginBottom:4}}>
                {f.icon} {f.label}{f.kind === "list" ? " (comma-separated)" : ""}
              </div>
              {multiline
                ? <textarea value={form[f.key]||""} onChange={function(e){update(f.key, e.target.value);}} rows={3} style={Object.assign({}, commonStyle, {resize:"vertical"})}/>
                : <input value={form[f.key]||""} onChange={function(e){update(f.key, e.target.value);}} style={commonStyle}/>}
            </div>
          );
        })}
        <div style={{display:"flex",alignItems:"center",gap:12,marginTop:6}}>
          <button onClick={save} disabled={saving}
            style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"9px 18px",background:saving?B.muted:B.navy,color:B.white,border:"none",borderRadius:99,cursor:saving?"default":"pointer"}}>
            {saving ? "Saving…" : "Save"}
          </button>
          {status && <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,color:status.indexOf("Error") === 0 ? B.coral : B.green}}>{status}</div>}
        </div>
      </div>
    </div>
  );
}

// Render one platform's playbook card. Pure presentation — no edit affordance.
function PlaybookCard({platform, entry, blurred}) {
  const fields = PLAYBOOK_FIELDS.filter(function(f){
    var v = entry && entry[f.key];
    if (Array.isArray(v)) return v.length > 0;

const tog = (arr,v) => arr.includes(v) ? arr.filter(x=>x!==v) : [...arr,v];

function extractJSON(text) {
  if (!text) return null;
  // Try fenced code block first
  const fence = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) { try { return JSON.parse(fence[1].trim()); } catch(e) {} }
  // Pick the outer shape by whichever structural char appears first. The
  // previous order ran the array regex before the object regex, which
  // greedily returned a nested array whenever the response was an object
  // containing an array field — Scan's {score, hashtags:[...]} shape hit
  // this and surfaced as "Analysis returned an unexpected format" in the UI.
  const firstObj = text.indexOf("{");
  const firstArr = text.indexOf("[");
  const outerIsObj = firstObj >= 0 && (firstArr < 0 || firstObj < firstArr);
  if (outerIsObj) {
    const lastBrace = text.lastIndexOf("}");
    if (lastBrace > firstObj) {
      try { return JSON.parse(text.substring(firstObj, lastBrace + 1)); } catch(e) {}
    }
  } else if (firstArr >= 0) {
    const lastBracket = text.lastIndexOf("]");
    if (lastBracket > firstArr) {
      try { return JSON.parse(text.substring(firstArr, lastBracket + 1)); } catch(e) {}
    }
  }
  // Recovery: response may have been truncated mid-array.
  // Try to find the last complete object inside an opening [
  var openIdx = text.indexOf("[");
  if (openIdx >= 0) {
    var depth = 0, lastValidEnd = -1, inString = false, escape = false;
    for (var i = openIdx; i < text.length; i++) {
      var ch = text[i];
      if (escape) { escape = false; continue; }
      if (ch === "\\") { escape = true; continue; }
      if (ch === '"' && !escape) { inString = !inString; continue; }
      if (inString) continue;
      if (ch === "{") depth++;
      else if (ch === "}") {
        depth--;
        if (depth === 0) lastValidEnd = i;
      }
    }
    if (lastValidEnd > openIdx) {
      var candidate = text.substring(openIdx, lastValidEnd + 1) + "]";
      try { return JSON.parse(candidate); } catch(e) {}
    }
  }
  return null;
}

// [TASK 1] Wipe all per-user localStorage on sign-out so the next user signing in
// on the same browser doesn't inherit profile/credits/onboarding flags. Browser-level
// keys (beta access) are preserved so the gate stays unlocked for that browser.
function clearLocalUserData() {
  try {
    const keep = ["virl_beta_access"];
    const toRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.indexOf("virl_") === 0 && keep.indexOf(k) === -1) toRemove.push(k);
    }

  } catch(e) {}
}

// Resolves when the current plan should expire. Aligned with the user's
// per-user credit reset cadence (sbCredits.reset_at), so plan + credits
// tick together — the plan ends when fresh credits arrive. Falls back to
// "now + 7 days" if the credits row hasn't loaded yet, which still gives
// a per-user rolling 7-day window. Note: getNextMonday() (below) is kept
// only for legacy callers; new code should use computePlanExpiry.
function computePlanExpiry(sbCredits) {
  if (sbCredits && sbCredits.reset_at) {
    var ms = Date.parse(sbCredits.reset_at);
    if (!Number.isNaN(ms) && ms > Date.now()) return ms;
  }
  return Date.now() + 7 * 86400000;
}

function getNextMonday() {
  const d = new Date();
  const diff = d.getDay()===0 ? 1 : 8-d.getDay();
  d.setDate(d.getDate()+diff);
  d.setHours(0,0,0,0);
  return d.getTime();
}


function fileToBase64(file) {
  return new Promise(function(res,rej) {
    const r = new FileReader();
    r.onload = function() { res(r.result.split(",")[1]); };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function extractVideoFrame(file, atSeconds) {
  return new Promise(function(res,rej) {
    const url = URL.createObjectURL(file);
    const vid = document.createElement("video");
    vid.preload = "metadata";
    vid.muted = true;
    vid.onloadedmetadata = function() {
      vid.currentTime = Math.min(atSeconds||1, vid.duration*0.3);
    };
    vid.onseeked = function() {
      const c = document.createElement("canvas");
      c.width = vid.videoWidth; c.height = vid.videoHeight;
      c.getContext("2d").drawImage(vid,0,0);
      c.toBlob(function(blob) {
        const fr = new FileReader();
        fr.onload = function() { res({b64:fr.result.split(",")[1], dur:vid.duration}); };
        fr.onerror = rej;
        fr.readAsDataURL(blob);
      }, "image/jpeg", 0.85);
      URL.revokeObjectURL(url);
    };
    vid.onerror = function() { rej(new Error("Could not load video")); };
    vid.src = url;
  });
}

// [PERF 3] Walk index `start` in `s` (which must point at '{') forward,
// counting brace depth with quote/escape awareness, and return the index of
// the matching closing brace. Returns -1 if the object isn't complete yet,
// which is how the streaming plan parser knows to wait for more data.
function matchObjectEnd(s, start) {
  var depth = 0, inStr = false, escape = false;
  for (var i = start; i < s.length; i++) {
    var ch = s[i];
    if (escape) { escape = false; continue; }
    if (ch === "\\") { escape = true; continue; }
    if (ch === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (ch === "{") depth++;
    else if (ch === "}") { depth--; if (depth === 0) return i; }
  }
  return -1;
}

// [PERF 3] Streaming JSON parser for the plan response shape
// `{ strategy: {...}, cards: [{...},...], stats: {...} }`. Hand-rolled
// brace-counting works fine here because the shape is fixed and small. As
// chunks arrive, push them; callbacks fire exactly once for strategy and
// stats, and once per fully-formed card object. The order of fields in the
// response is whatever the model picks, but the schema example puts strategy
// first, cards next, stats last — that's what we render against.
function createStreamingPlanParser(opts) {
  opts = opts || {};
  // "full"    — emits strategy + cards + stats (default; matches buildPlan output)
  // "partial" — emits only cards (matches buildPlanPartial output: {"cards":[...]})
  var mode = opts.mode === "partial" ? "partial" : "full";
  var buf = "";
  var strategyEmitted = false;
  var statsEmitted    = false;
  var cardsStart      = -1; // index of '[' for the cards array, or -1
  var cardsScan       = -1; // next scan position inside cards[]
  var cardsClosed     = false;
  return {
    push: function (chunk, callbacks) {
      buf += chunk;
      // strategy (skipped in partial mode — server does not emit it)
      if (mode === "full" && !strategyEmitted) {
        var sm = buf.match(/"strategy"\s*:\s*\{/);
        if (sm) {
          var sStart = sm.index + sm[0].length - 1;
          var sEnd   = matchObjectEnd(buf, sStart);
          if (sEnd >= 0) {
            try {
              var obj = JSON.parse(buf.substring(sStart, sEnd + 1));
              if (callbacks.onStrategy) callbacks.onStrategy(obj);
              strategyEmitted = true;
            } catch (e) { /* incomplete despite balanced braces — wait */ }
          }
        }
      }
      // cards array — find the opening once, then scan forward for objects.
      if (cardsStart < 0) {
        var cm = buf.match(/"cards"\s*:\s*\[/);
        if (cm) {
          cardsStart = cm.index + cm[0].length - 1; // points at '['
          cardsScan  = cardsStart + 1;
        }
      }
      if (cardsStart >= 0 && !cardsClosed) {
        while (cardsScan < buf.length) {
          var ch = buf[cardsScan];
          if (ch === " " || ch === "\n" || ch === "\t" || ch === "\r" || ch === ",") { cardsScan++; continue; }
          if (ch === "]") { cardsClosed = true; cardsScan++; break; }
          if (ch !== "{") { break; }
          var end = matchObjectEnd(buf, cardsScan);
          if (end < 0) break; // wait for more
          try {
            var card = JSON.parse(buf.substring(cardsScan, end + 1));
            if (callbacks.onCard) callbacks.onCard(card);
          } catch (e) { /* skip malformed object */ }
          cardsScan = end + 1;
        }
      }
      // stats (skipped in partial mode — server does not emit it)
      if (mode === "full" && !statsEmitted) {
        var tm = buf.match(/"stats"\s*:\s*\{/);
        if (tm) {
          var tStart = tm.index + tm[0].length - 1;
          var tEnd   = matchObjectEnd(buf, tStart);
          if (tEnd >= 0) {
            try {
              var stats = JSON.parse(buf.substring(tStart, tEnd + 1));
              if (callbacks.onStats) callbacks.onStats(stats);
              statsEmitted = true;
            } catch (e) { /* wait */ }
          }
        }
      }
    },
    // After the stream ends, fall back to extractJSON on the whole buffer
    // to catch anything the streaming pass missed (e.g. cards that arrived
    // in a different order, or a final stats object emitted before cards).
    finalize: function () {
      return { fullText: buf, parsed: extractJSON(buf) };
    },
  };
}

// [PERF 3] SSE-stream consumer for the plan endpoint. Reads the chunked
// response, parses out our wire events ("text", "meta", "error", "reset"),
// and fires callbacks. Wire format (see api/chat.js handleStreamingPlan):
//   event: text\n data: {"delta":"..."}\n\n
//   event: meta\n data: {"cost":N,"usage":{...}}\n\n
//   event: error\n data: {"error":"..."}\n\n
//   event: reset\n data: {}\n\n   (server retrying after max_tokens truncation)
// Resolves with { meta } once the upstream stream completes; rejects on
// transport errors or upstream `error` events.
async function consumePlanStream(generationType, params, opts, callbacks) {
  opts = opts || {};
  var body = { generationType: generationType, params: params || {} };
  var headers = { "Content-Type": "application/json", "Accept": "text/event-stream" };
  if (opts.token) headers["Authorization"] = "Bearer " + opts.token;
  var res;
  try {
    res = await fetch("/api/chat", { method: "POST", headers: headers, body: JSON.stringify(body) });
  } catch (e) { throw new Error("Connection issue - check your internet and try again."); }
  if (res.status === 402) {
    var data402 = await res.json().catch(function(){ return {}; });
    throw new Error(data402.error || "Not enough credits this week.");
  }
  if (res.status === 401) throw new Error("Session expired - please sign out and sign in again.");
  if (res.status === 429) {
    var data429 = await res.json().catch(function(){ return {}; });
    throw new Error(data429.error || "Slow down - too many requests. Try again in a moment.");
  }
  if (!res.ok) {
    var dataErr = await res.json().catch(function(){ return {}; });
    throw new Error(dataErr.error || ("Server error " + res.status));
  }
  if (!res.body || !res.body.getReader) {
    throw new Error("Streaming not supported in this browser - please update or try a different one.");
  }

  var reader  = res.body.getReader();
  var decoder = new TextDecoder("utf-8");
  var sseBuf  = "";
  var meta    = null;
  var upstreamErr = null;

  function processEvent(rawEvent) {
    var lines = rawEvent.split("\n");
    var eventName = "message";
    var dataStr = "";
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (line.indexOf("event:") === 0) eventName = line.slice(6).trim();
      else if (line.indexOf("data:") === 0) dataStr += line.slice(5).replace(/^ /, "");
    }
    if (!dataStr) return;
    var payload;
    try { payload = JSON.parse(dataStr); } catch (e) { return; }
    if (eventName === "text" && callbacks.onText) callbacks.onText(payload.delta || "");
    else if (eventName === "meta") meta = payload;
    else if (eventName === "error") upstreamErr = payload.error || "AI error";
    // Server retries on max_tokens truncation. Caller resets its progressive
    // parser + UI so subsequent text deltas are treated as a fresh response.
    else if (eventName === "reset" && callbacks.onReset) callbacks.onReset();
  }

  while (true) {
    var step;
    try { step = await reader.read(); }
    catch (e) { throw new Error("Stream interrupted - tap Generate again."); }
    if (step.done) break;
    sseBuf += decoder.decode(step.value, { stream: true });
    var idx;
    while ((idx = sseBuf.indexOf("\n\n")) >= 0) {
      var raw = sseBuf.slice(0, idx);
      sseBuf = sseBuf.slice(idx + 2);
      if (raw.trim()) processEvent(raw);
    }
  }
  if (sseBuf.trim()) processEvent(sseBuf);

  if (upstreamErr) throw new Error(upstreamErr);
  return { meta: meta };
}

// Calls the unified /api/chat endpoint. Server owns prompt construction,
// model selection, max-token limits, and credit cost — the client only
// names the generation type and supplies its parameters.
//
// Returns { text, cost } — `cost` is what the server actually deducted, so
// callers use it for optimistic credit-counter ticks instead of duplicating
// the cost table client-side.
async function callAPI(generationType, params, opts) {
  opts = opts || {};
  const body = { generationType, params: params || {} };
  if (opts.imageBase64) { body.imageBase64 = opts.imageBase64; body.imageType = opts.imageType; }
  const headers = { "Content-Type": "application/json" };
  if (opts.token) headers["Authorization"] = "Bearer " + opts.token;
  let res;
  try {
    res = await fetch("/api/chat", { method: "POST", headers, body: JSON.stringify(body) });
  } catch(e) { throw new Error("Connection issue - check your internet and try again."); }
  let data;
  try {
    data = await res.json();
  } catch(e) {
    throw new Error("Server error "+res.status+" - check your API configuration and try again.");
  }
  if (res.status===402) throw new Error(data.error||"Not enough credits this week.");
  if (res.status===401) throw new Error("Session expired - please sign out and sign in again.");
  if (res.status===400) throw new Error(data.error||"Bad request.");
  if (res.status===429) throw new Error(data.error||"Slow down — too many requests. Try again in a moment.");
  if (res.status===500) throw new Error(data.error||"Server error - check your Vercel function logs.");
  if (!res.ok) throw new Error(data.error || "Server error "+res.status+" - please try again.");
  if (!data.text) throw new Error("Empty response from AI - please try again.");
  return data;
}

// [UX-01] Per-card status indicator helpers. Saved + posted state is

// regenerations. Keys are intentionally per-card so they survive

function buildCardId(card) {

}

}
// [UX-01] Returns count of cards posted between 7 and 14 days ago that
// don't yet have results logged. Used by the Plan-tab banner.
function countPostedLastWeekUnlogged(results) {
  var now = Date.now();
  var weekMs = 7 * 86400000;
  var loggedIds = {};
  if (Array.isArray(results)) {
    for (var i = 0; i < results.length; i++) {
      var r = results[i];
      if (r && r.id) loggedIds[r.id] = true;
    }
  }
  var count = 0;
  try {
    for (var k = 0; k < localStorage.length; k++) {
      var key = localStorage.key(k);
      if (!key || key.indexOf("virl_posted_") !== 0) continue;
      var raw = localStorage.getItem(key);
      var ts  = raw ? parseInt(raw, 10) : 0;
      if (!Number.isFinite(ts) || ts <= 0) continue;
      var age = now - ts;
      if (age < weekMs || age >= 2 * weekMs) continue;
      var id = key.slice("virl_posted_".length);
      if (loggedIds[id]) continue;
      count++;
    }
  } catch (e) { return 0; }
  return count;
}

// [PREMIUM 3] Loops event helper. Fire-and-forget — never blocks the
// caller, never throws. Built initially for the tenPlansMilestone
// celebration; PREMIUM 7 will reuse this for the rest of the
// lifecycle email triggers (welcome, profile-incomplete, trial-end,
// etc). Auth header is required so the proxy can verify the caller
// owns the user_id it sends to Loops.
async function fireLoopsEvent(eventName, properties) {
  if (typeof window === "undefined") return;
  var token = window.__virlUserToken || null;
  if (!token) return;
  try {
    await fetch("/api/loops-event", {
      method:  "POST",
      headers: {
        "Content-Type":  "application/json",
        "Authorization": "Bearer " + token,
      },
      body: JSON.stringify({
        eventName:  eventName,
        properties: properties || {},
      }),
    });
  } catch (e) { /* non-critical — never block UI on lifecycle events */ }
}

async function logEvent(userId, eventName, properties, token) {
  // Fall back to the globals the App-level useEffect mirrors from the
  // active session. Lets event-firing components stay simple — they don't
  // need to thread userId / token through props just to record telemetry.
  var uid = userId || (typeof window !== "undefined" ? window.__virlUserId    : null);
  var tok = token  || (typeof window !== "undefined" ? window.__virlUserToken : null);
  if (!uid) return;
  try {
    await fetch(SUPABASE_URL+"/rest/v1/events", {
      method: "POST",
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        // RLS on `events` checks auth.uid() === user_id, so the user's
        // bearer token is required — anon key alone gets rejected.
        "Authorization": "Bearer "+(tok||SUPABASE_ANON_KEY),
        "Content-Type": "application/json",
        "Prefer": "return=minimal",
      },
      body: JSON.stringify({
        user_id: uid,
        event_name: eventName,
        properties: properties||{},
      }),
    });
  } catch(e) { /* non-critical — never block UI on analytics */ }
}

// [TASK 10] Extract platform/format patterns from the Vault so VIRL can weight
// similar styles in future plans. Only counts plan-type saves (captions have
// no platform/format metadata). Format is optional on legacy items, so the
// helper falls back to platform when format data isn't available.
function getVaultPatterns(vault) {
  if (!vault || !vault.length) return {count:0, topPlatform:null, topFormat:null};
  var planItems = vault.filter(function(v){ return v.type === "plan"; });
  if (!planItems.length) return {count:0, topPlatform:null, topFormat:null};
  var platformCounts = {};
  var formatCounts = {};
  planItems.forEach(function(v) {
    if (v.platform) platformCounts[v.platform] = (platformCounts[v.platform]||0) + 1;
    if (v.format)   formatCounts[v.format]     = (formatCounts[v.format]||0)     + 1;
  });
  function top(counts) {
    var best = null, max = 0;
    Object.keys(counts).forEach(function(k){ if (counts[k] > max) { max = counts[k]; best = k; } });
    return best;
  }
  return {count:planItems.length, topPlatform:top(platformCounts), topFormat:top(formatCounts)};
}

function ScriptGenerator({card,onClose,profile,userToken,onCreditsUsed,onSaveScript}) {
  // If a script was previously saved on this card, show it instead of
  // burning credits to regenerate. The user can still hit Regenerate.
  const initialSaved = card && card.savedScript ? card.savedScript : null;
  const [script,setScript] = useState(initialSaved);
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState("");
  // Tracks whether the script currently shown matches what's on the card.
  // Starts true if we opened with a saved script; flips false when the user
  // regenerates and back true when they save the new one.
  const [savedOnCard,setSavedOnCard] = useState(!!initialSaved);

  function generate() {
    // Credit check handled server-side. Prompt + platform guide live in
    // api/_lib/prompts.js — the server picks them up from generationType.
    setLoading(true); setScript(null); setError("");
    callAPI("script", { card: card }, { token: userToken }).then(function(data) {
      const parsed = extractJSON(data.text);
      if (parsed&&parsed.hook) {
        setScript(parsed);
        setSavedOnCard(false);
        if (onCreditsUsed) onCreditsUsed({cost: data.cost});
        // [COST 1] Forward Anthropic usage signal into the same event row.
        try {
          var scriptUsage = (data && data.usage) || {};
          logEvent(window.__virlUserId||null, "script_generated", {
            platform: card.platform || null,
            day:      card.day || null,
            outputTokens:        scriptUsage.outputTokens        || 0,
            cachedInputTokens:   scriptUsage.cachedInputTokens   || 0,
            uncachedInputTokens: scriptUsage.uncachedInputTokens || 0,
            truncated:           !!scriptUsage.truncated,
            model:               scriptUsage.model || null,
          });
        } catch(e){}
      }
      else { setError("Script generation takes a moment - tap Try Again."); }
    }).catch(function(e){ setError(e.message); }).finally(function(){ setLoading(false); });
  }

  function buildFullScript() {
    if (!script) return "";
    const sections = (script.sections||[]).map(function(s,i){
      return "SECTION "+(i+1)+" - "+s.title+":\n"+s.script+(s.tip?"\nTIP: "+s.tip:"");
    }).join("\n\n");
    return "=== "+card.title+" ===\n"
      +card.platform+" - "+(script.duration||"")+"\n"
      +(script.audioSuggestion?"Audio: "+script.audioSuggestion+"\n":"")
      +"\n---\n\n"
      +"HOOK: "+script.hook+"\n\n"
      +sections+"\n\n"
      +"CTA: "+script.cta
      +(script.onScreenText&&script.onScreenText.length?"\n\nON-SCREEN TEXT: "+script.onScreenText.join(" | "):"");
  }

  function copyScript() {
    if (!script) return;
    navigator.clipboard&&navigator.clipboard.writeText(buildFullScript());
  }

  function downloadScript() {
    if (!script) return;
    var text = buildFullScript();
    var blob = new Blob([text], {type:"text/plain;charset=utf-8"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "VIRL-script-"+card.title.replace(/[^a-z0-9]/gi,"-").slice(0,40).toLowerCase()+".txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},100);
  }

  // Only auto-generate on open when there's no saved script for this card.
  useEffect(function(){ if (!initialSaved) generate(); },[]);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.85)",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"20px 16px",overflowY:"auto"}}>
      <div style={{background:B.white,width:"100%",maxWidth:680,borderRadius:20,overflow:"hidden",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{background:B.navy,padding:"18px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0}}>
          <div>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.sky,marginBottom:4}}>Script Generator</div>
            <div style={{fontFamily:"'Italiana',serif",fontSize:18,color:B.white,lineHeight:1.2}}>{card.title}</div>
          </div>
          <button onClick={onClose}
            style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.15em",textTransform:"uppercase",padding:"7px 14px",background:"rgba(255,255,255,0.1)",color:B.white,border:"none",borderRadius:99,cursor:"pointer"}}>
            Close
          </button>
        </div>
        <div style={{padding:"22px"}}>
          {loading&&<Spinner text="Writing your script..."/>}
          <ErrBox msg={error}/>
          {error&&(
            <button onClick={generate}
              style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"10px 20px",background:B.blue,color:B.white,border:"none",borderRadius:99,cursor:"pointer",marginTop:8}}>
              Try Again
            </button>
          )}
          {script&&(
            <div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
                <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.navySoft,color:B.navy,borderRadius:99}}>{script.duration}</span>
                <span style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.blueSoft,color:B.blue,borderRadius:99}}>{card.platform}</span>
                {script.audioSuggestion&&<span style={{fontFamily:"'Jost',sans-serif",fontSize:11,padding:"4px 12px",background:B.divider,color:B.muted,borderRadius:99}}>{"Audio: "+script.audioSuggestion}</span>}
              </div>
              <div style={{background:B.navy,borderRadius:14,padding:"16px 18px",marginBottom:16}}>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.sky,marginBottom:8}}>Opening Hook</div>
                <div style={{fontFamily:"'Italiana',serif",fontSize:20,color:B.white,lineHeight:1.3}}>{'"'+script.hook+'"'}</div>
                <div style={{marginTop:10}}><CopyBtn text={script.hook} label="Copy hook"/></div>
              </div>
              {(script.sections||[]).map(function(s,i){return (
                <div key={i} style={{marginBottom:10,background:B.bg,borderRadius:12,overflow:"hidden"}}>
                  <div style={{background:i===0?B.navySoft:B.divider,padding:"8px 14px"}}>
                    <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,color:i===0?B.navy:B.muted}}>{"Section "+(i+1)+" - "+s.title}</div>
                  </div>

                    {s.tip&&<div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontStyle:"italic",color:B.blue}}>{"Tip: "+s.tip}</div>}
                  </div>
                </div>
              );})}
              <div style={{background:B.blueSoft,borderRadius:12,padding:"12px 14px",marginBottom:16}}>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.blue,marginBottom:6}}>Closing CTA</div>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,color:B.sub}}>{script.cta}</div>
              </div>
              {script.onScreenText&&script.onScreenText.length>0&&(
                <div style={{marginBottom:16}}>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.muted,marginBottom:10}}>On-Screen Text</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {script.onScreenText.map(function(t,i){return (
                      <span key={i} style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:600,padding:"6px 14px",background:B.ink,color:B.white,borderRadius:99}}>{'"'+t+'"'}</span>

                  style={{width:"100%",fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"14px 18px",background:savedOnCard?B.greenSoft:B.green,color:savedOnCard?B.green:B.white,border:"none",cursor:savedOnCard?"default":"pointer",borderRadius:14,marginBottom:8}}>

                  style={{flex:1,fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"14px 18px",background:B.ink,color:B.white,border:"none",cursor:"pointer",borderRadius:14}}>
                  Copy Full

                <button onClick={downloadScript}
                  style={{flex:1,fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"14px 18px",background:B.navy,color:B.white,border:"none",cursor:"pointer",borderRadius:14}}>

        </div>

    </div>
  );

// [UX-01] PlanCard refactored to progressive disclosure. Collapsed view
// (default) shows day + platform metadata, the hook in Italiana 18px,
// and three primary actions (Tap to expand, Save, Mark as posted). The
// full description, hashtags, "why this works" insight, and secondary
// actions (Log Results, Write Script, Share, Rate) live in the
// expanded view. Status indicators in the header row read from
// localStorage so saved / posted state persists across regenerations.

// [INTEL 4] Format-specific PlanCard rendering. INTEL 3 normalized the
// format vocabulary the model emits (video / single_image / carousel /
// quote_graphic / story / long_form_text); this layer maps any string the
// model ever returned (capitalized "Video", legacy "Talking-head video",
// etc.) onto that vocabulary so the renderer can branch reliably. Anything
// unrecognized falls through to "video" so old plans keep rendering.
function normalizeFormat(raw) {
  if (!raw || typeof raw !== "string") return "video";
  var v = raw.toLowerCase().trim();
  if (v === "single_image" || v === "image" || v === "single image" || v === "photo" || v === "image post" || v === "image_post" || v === "feed_post" || v === "feed post" || v.indexOf("pin") === 0) return "single_image";
  if (v === "carousel" || v === "carousel_pin" || v === "photo_carousel" || v === "document" || v === "document carousel") return "carousel";
  if (v === "quote_graphic" || v === "quote graphic" || v === "quote") return "quote_graphic";
  if (v === "story" || v === "stories" || v === "idea_pin") return "story";
  if (v === "long_form_text" || v === "long-form text" || v === "long form text" || v === "long_post" || v === "long post" || v === "tweet" || v === "thread" || v === "image_tweet" || v === "community_post") return "long_form_text";
  // Everything video-shaped (reels, shorts, vertical videos, talking-head video,
  // aesthetic b-roll, day in my life, etc.) collapses to "video".
  return "video";
}

// [INTEL 4] Format-specific body components rendered inside the PlanCard
// expanded section, ABOVE the existing description paragraph. Each body
// only renders fields it actually has — missing fields are skipped silently
// so old cards (no slides / frames / photoDirection / etc.) render nothing

      <FormatBodyDetail label="Design direction" value={card.designDirection}/>
    </div>
  );
}

function StoryCardBody({card}) {
  var frames = Array.isArray(card.frames) ? card.frames : [];
  if (frames.length === 0) return null;
  return (
    <div style={{marginBottom:14}}>
      <FormatBodyEyebrow>{"Story frames ("+frames.length+")"}</FormatBodyEyebrow>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {frames.map(function(f,i){
          var num = f.frameNumber || i + 1;
          return (
            <div key={i} style={{display:"flex",gap:10,padding:"10px 12px",background:B.bg,borderRadius:10,borderLeft:"3px solid "+B.coral}}>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,color:B.coral,letterSpacing:"0.05em",flexShrink:0,minWidth:18}}>{num}</div>
              <div style={{flex:1,minWidth:0}}>
                {f.content && <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.sub,lineHeight:1.55,marginBottom:f.textOverlay||f.interactiveElement?6:0}}>{f.content}</div>}
                {f.textOverlay && <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:600,color:B.ink,marginBottom:f.interactiveElement?4:0,lineHeight:1.5}}>{"Text overlay: "+f.textOverlay}</div>}
                {f.interactiveElement && <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontStyle:"italic",color:B.coral,lineHeight:1.5}}>{"Interactive: "+f.interactiveElement}</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function LongFormCardBody({card}) {
  // Hook lives in the card title; only render here if distinct.
  var hook = card.hook && card.hook !== card.title ? card.hook : "";
  if (!hook && !card.body && !card.closing) return null;
  return (
    <div style={{marginBottom:14}}>
      <FormatBodyDetail label="Hook" value={hook}/>
      {card.body && (
        <div style={{marginBottom:10}}>
          <FormatBodyEyebrow>Body</FormatBodyEyebrow>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.sub,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{card.body}</div>
        </div>
      )}
      <FormatBodyDetail label="Closing" value={card.closing}/>
    </div>
  );
}

// [INTEL 4] Pick the right format-specific body for a card. Returns null
// when the card has no format-specific fields populated, so backward-compat
// (old plans) renders the existing description-only layout cleanly.
function FormatSpecificBody({card}) {
  var fmt = normalizeFormat(card.format);
  switch (fmt) {
    case "single_image":   return <ImageCardBody card={card}/>;
    case "carousel":       return <CarouselCardBody card={card}/>;
    case "quote_graphic":  return <QuoteCardBody card={card}/>;
    case "story":          return <StoryCardBody card={card}/>;
    case "long_form_text": return <LongFormCardBody card={card}/>;
    case "video":
    default:               return <VideoCardBody card={card}/>;
  }
}

function PlanCard({card,idx,onSave,onLog,onSaveScript,saved,result,profile,userToken,onCreditsUsed,editMode,markedReplace,onToggleReplace,replacing}) {
  // When `replacing` is true, this card slot is awaiting a streaming
  // replacement from /api/chat?generationType=plan_partial. Render a
  // skeleton instead of the real card so the user sees their kept cards
  // stay put while only the selected ones swap.
  if (replacing) {
    return (
      <div className="su" style={{background:B.card,borderRadius:12,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",borderLeft:"3px solid "+B.border,padding:"22px 22px",marginBottom:8,opacity:0.7,animationDelay:(idx*0.04)+"s"}}>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:B.navy,marginBottom:8}}>Regenerating…</div>
        <div style={{height:14,width:"60%",background:B.border,borderRadius:4,marginBottom:8}}/>
        <div style={{height:10,width:"90%",background:B.border,borderRadius:4,marginBottom:6}}/>
        <div style={{height:10,width:"75%",background:B.border,borderRadius:4}}/>
      </div>
    );
  }
  var cardId = buildCardId(card);
  var bl = card.priority==="HIGH"?B.navy:card.priority==="MED"?B.blue:B.border;
  const [expanded,setExpanded] = useState(false);
  const [showLog,setShowLog]   = useState(false);
  const [showScript,setShowScript] = useState(false);
  const [views,setViews]       = useState((result&&result.views)||"");
  const [likes,setLikes]       = useState((result&&result.likes)||"");
  const [saves2,setSaves2]     = useState((result&&result.saves)||"");
  // [UX-01] Posted state mirrored to local React state so the checkmark
  // re-renders immediately after a click without forcing a parent
  // re-render. Initialized from localStorage on mount.
  const [posted,setPosted]     = useState(function(){ return isCardPosted(cardId); });
  var reminder = "VIRL "+card.day+": "+card.title+" - Post at "+card.postTime+" on "+card.platform;
  var hasSavedScript = !!card.savedScript;
  var dayPlatformLabel = card.day + " | " + card.platform + " | " + card.postTime;

  function saveResults() { onLog(card,{views:views,likes:likes,saves:saves2}); setShowLog(false); }
  // [UX-01] Save handler — also writes the localStorage status flag so
  // the navy dot persists in the header after the parent re-renders.
  function handleSave() {
    setCardSaved(cardId);
    if (onSave) onSave(card);
  }
  // [UX-01] Mark-as-posted toggle — flips the localStorage flag and
  // mirrors the change locally so the coral checkmark updates instantly.
  // [PREMIUM 10] Also fires a `post_marked` event on toggle-on (not on
  // un-toggle) so the Sunday Review feature in month 4-5 can read which
  // cards the creator actually posted, paired with their hook + day +
  // platform metadata. Silent — never blocks the UI.
  function handleTogglePosted() {
    if (posted) {
      clearCardPosted(cardId);
      setPosted(false);
    } else {
      setCardPosted(cardId);
      setPosted(true);
      try {
        logEvent(window.__virlUserId || null, "post_marked", {
          cardId:   cardId,
          title:    card.title || "",
          platform: card.platform || null,
          day:      card.day || null,
        });
      } catch (e) {}
    }
  }
  function toggleExpanded() { setExpanded(function(v){ return !v; }); }

  // Edit-mode visuals: when the card is marked for replacement, swap the
  // left border to a dashed coral to make the state obvious at a glance.
  var cardBorderLeft = (editMode && markedReplace) ? ("3px dashed " + B.coral) : ("3px solid " + bl);
  var cardOpacity    = (editMode && markedReplace) ? 0.65 : 1;

    <div className="su" style={{background:B.card,borderRadius:12,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",borderLeft:cardBorderLeft,padding:"18px 22px",marginBottom:8,animationDelay:(idx*0.04)+"s",opacity:cardOpacity}}>
      {showScript&&<ScriptGenerator card={card} onClose={function(){setShowScript(false);}} profile={profile} userToken={userToken} onCreditsUsed={onCreditsUsed} onSaveScript={onSaveScript ? function(s){ onSaveScript(idx, s); } : null}/>}

      {/* [UX-01] Header row: day | platform | postTime metadata plus

          {saved && (

          )}
          {posted && (
            <span aria-label="Marked as posted" title="Posted"
              style={{fontSize:13,color:B.coral,fontWeight:700,lineHeight:1,flexShrink:0}}>{"✓"}</span>
          )}
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
          {hasSavedScript && <MTag type="result">Script saved</MTag>}
          {result && <MTag type="result">Logged</MTag>}
          {editMode ? (
            <button
              onClick={function(e){ e.stopPropagation(); if (onToggleReplace) onToggleReplace(idx); }}
              aria-pressed={!!markedReplace}
              style={{
                fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.12em",
                textTransform:"uppercase",padding:"4px 9px",borderRadius:99,cursor:"pointer",
                border:"1px solid "+(markedReplace ? B.coral : B.border),
                background:markedReplace ? B.coral : "transparent",
                color:markedReplace ? B.white : B.muted,
              }}>
              {markedReplace ? "Replace ✕" : "Keep"}
            </button>
          ) : (
            <PBadge p={card.priority}/>
          )}

      </div>

      {/* [UX-01] Hook in Italiana 18px. Always visible, both states. */}
      <div style={{fontFamily:"'Italiana',serif",fontSize:18,lineHeight:1.2,color:B.ink,marginBottom:expanded?10:14}}>{card.title}</div>

      {/* [UX-01] Expanded section: full description, why-this-works,
           tag chips, hashtags, copy-reminder strip. Mounted only when
           expanded so collapsed cards stay scannable. */}
      {expanded && (
        <div>
          {/* [PREMIUM 4] Insight callout — only on cards that earned
               one (LLM emits the field on roughly 1 in 3 posts). The

          {/* [INTEL 4] Format-specific structured body. Renders only the

              etc.). Returns null for old plans / cards with no format-specific
              fields, so the existing description-only layout below stays

          <FormatSpecificBody card={card}/>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:300,fontStyle:"italic",color:B.sub,lineHeight:1.7,marginBottom:(card.insight||card.why)?10:14}}>{card.description}</div>
          {(card.insight || card.why) && (
            <div style={{background:B.navySoft,borderRadius:10,padding:"10px 14px",marginBottom:14,borderLeft:"3px solid "+B.blue}}>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,letterSpacing:"0.1em",color:B.blue,textTransform:"uppercase",marginBottom:4}}>Why this works</div>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.sub,lineHeight:1.6}}>{card.insight || card.why}</div>
            </div>
          )}
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
            <MTag type="time">{"🕐 "+card.postTime}</MTag>
            <MTag>{"📱 "+card.platform}</MTag>
            {card.trend && <MTag>{"✦ "+card.trend}</MTag>}
            {card.format && <MTag>{card.format}</MTag>}
          </div>
          <HashtagRow hashtags={card.hashtags}/>
          <div style={{background:B.navySoft,borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontStyle:"italic",color:B.navy,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              {"🌙 "+card.day+" · "+card.postTime+" · "+card.platform}
            </div>
            <CopyBtn text={reminder} label="Copy reminder"/>
          </div>
        </div>
      )}

      {/* [UX-01] Action row. Collapsed: Tap to expand + Save + Mark as
           posted only. Expanded: full action set including Log Results,
           Write Script, Share, and Rate. */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <button onClick={toggleExpanded}
          style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"8px 16px",background:expanded?B.bg:B.navySoft,color:expanded?B.sub:B.navy,border:"none",borderRadius:99,cursor:"pointer",transition:"all .15s"}}>
          {expanded?"Collapse":"Tap to expand"}

        <button onClick={handleSave}
          style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"8px 16px",background:saved?B.navy:B.divider,color:saved?B.white:B.sub,border:"none",borderRadius:99,cursor:"pointer",transition:"all .15s"}}>
          {saved?"Saved":"Save"}
        </button>
        <button onClick={handleTogglePosted}
          style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",padding:"8px 16px",background:posted?B.coralSoft:B.bg,color:posted?B.coral:B.sub,border:"1px solid "+(posted?B.coral:B.border),borderRadius:99,cursor:"pointer",transition:"all .15s"}}>

          <button onClick={function(){setShowLog(function(v){return !v;});}}

      {showLog && expanded && (
        <div style={{marginTop:12,padding:16,background:B.bg,borderRadius:12}}>
          <Label>Log your actual results</Label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
            {[["Views",views,setViews],["Likes",likes,setLikes],["Saves",saves2,setSaves2]].map(function(item){

                </div>

          <button onClick={saveResults}
            style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"9px 20px",background:B.blue,color:B.white,border:"none",cursor:"pointer",borderRadius:99}}>
            Save Results
          </button>
        </div>
      )}
    </div>
  );
}

function RemixCaption({text,onSelect,profile,userToken,onCreditsUsed}) {
  const [open,setOpen] = useState(false);
  const [loading,setLoading] = useState(false);
  const [variants,setVariants] = useState(null);
  const [error,setError] = useState("");

  function generate() {
    // Credit check handled server-side; prompt lives in api/_lib/prompts.js.
    setLoading(true); setVariants(null); setError("");
    callAPI("caption_remix", { text: text }, { token: userToken }).then(function(data) {
      const parsed = extractJSON(data.text);
      if (parsed&&parsed.shorter) {
        setVariants(parsed);
        // [COST 1] Forward Anthropic usage signal so cache-hit + output-size
        // trends are visible per generation type, not just for plans.
        try {
          var remixUsage = (data && data.usage) || {};
          logEvent(window.__virlUserId||null,"caption_remixed",{
            outputTokens:        remixUsage.outputTokens        || 0,
            cachedInputTokens:   remixUsage.cachedInputTokens   || 0,
            uncachedInputTokens: remixUsage.uncachedInputTokens || 0,
            truncated:           !!remixUsage.truncated,
            model:               remixUsage.model || null,
          });
        } catch(e){}
        if (onCreditsUsed) onCreditsUsed({cost: data.cost});
      }
      else { setError("Try again in a moment."); }
    }).catch(function(){ setError("Connection issue - try again."); }).finally(function(){ setLoading(false); });
  }

  function openAndGenerate() { setOpen(true); generate(); }

  if (!open) return (
    <button onClick={openAndGenerate}
      style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",marginTop:10,padding:"6px 14px",background:B.blueSoft,color:B.blue,border:"none",borderRadius:99,cursor:"pointer"}}>
      Remix this caption
    </button>
  );

  return (
    <div style={{marginTop:12,background:B.bg,borderRadius:12,padding:"14px 16px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,color:B.blue}}>3 variations - tap to use</div>
        <button onClick={function(){setOpen(false);}}
          style={{background:"none",border:"none",color:B.muted,cursor:"pointer",fontSize:16,padding:0}}>{"×"}</button>
      </div>
      {loading&&<Spinner text="Writing variations..."/>}
      <ErrBox msg={error}/>
      {variants&&Object.values(variants).map(function(v,i){return (
        <div key={i} style={{background:B.card,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer"}}
          onClick={function(){onSelect(v.text);setOpen(false);}}>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:B.blue,marginBottom:6}}>{v.label}</div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.sub,lineHeight:1.7}}>{v.text}</div>
        </div>
      );})}
    </div>
  );
}

function EditableCaption({caption,idx,topic,onSave,profile,userToken,onCreditsUsed}) {
  const [editing,setEditing] = useState(false);
  const [text,setText] = useState(caption.text);
  const [saved,setSaved] = useState(false);

  function handleSave() {
    onSave({
      title:    caption.label+": "+topic.slice(0,40),
      preview:  text.slice(0,100),
      text:     text,
    });
    setEditing(false); setSaved(true);
    setTimeout(function(){setSaved(false);},2000);
