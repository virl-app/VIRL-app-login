                  return (
                    <div style={{marginBottom:20}}>
                      <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.muted,marginBottom:10}}>
                        Launch monitoring
                      </div>

                      {/* Projection + this-week counts */}
                      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
                        <div style={{background:B.card,borderRadius:14,padding:"14px 14px",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
                          <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:B.muted,marginBottom:6}}>FC fill rate</div>
                          <div style={{fontFamily:"'Italiana',serif",fontSize:22,color:B.navy,lineHeight:1.1,marginBottom:4}}>
                            {fcSlotsLeft}/50
                          </div>
                          <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:300,color:B.muted,lineHeight:1.4}}>
                            slots left
                          </div>
                        </div>
                        <div style={{background:B.card,borderRadius:14,padding:"14px 14px",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
                          <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:B.muted,marginBottom:6}}>FC signups (7d)</div>
                          <div style={{fontFamily:"'Italiana',serif",fontSize:22,color:B.navy,lineHeight:1.1,marginBottom:4}}>
                            {fcSignupsThisWeek}
                          </div>
                          <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:300,color:B.muted,lineHeight:1.4}}>
                            this week
                          </div>
                        </div>
                        <div style={{background:B.card,borderRadius:14,padding:"14px 14px",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
                          <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:B.muted,marginBottom:6}}>Projection</div>
                          <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:600,color:B.navy,lineHeight:1.4,marginTop:8}}>
                            {projectionLabel}
                          </div>
                        </div>
                      </div>

                      {/* Recent signups list */}
                      <div style={{background:B.card,borderRadius:14,boxShadow:"0 1px 3px rgba(0,0,0,0.05)",overflow:"hidden",marginBottom:12}}>
                        <div style={{
                          padding:"10px 16px",background:B.bg,
                          fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,
                          letterSpacing:"0.12em",textTransform:"uppercase",color:B.muted,
                          display:"flex",justifyContent:"space-between",alignItems:"center"
                        }}>
                          <div>Recent signups (7d)</div>
                          <div style={{color:B.navy,fontWeight:600}}>{recentSignups.length} total</div>
                        </div>
                        {recentSignups.length === 0 ? (
                          <div style={{
                            padding:"24px 16px",textAlign:"center",
                            fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,
                            color:B.muted,fontStyle:"italic"
                          }}>
                            No new subscribers in the last 7 days.
                          </div>
                        ) : (
                          recentSignups.slice(0, 10).map(function(s){
                            var when = (function(){
                              try {
                                return new Date(s.subscription_started_at).toLocaleDateString("en-US", {
                                  month: "short", day: "numeric"
                                });
                              } catch(e){ return ""; }
                            })();
                            var isFC = s.founding_tier === "founder_circle";
                            return (
                              <div key={s.user_id} style={{
                                display:"grid",gridTemplateColumns:"1fr 110px 90px",
                                gap:8,padding:"10px 16px",borderTop:"1px solid "+B.divider,
                                alignItems:"center"
                              }}>
                                <div style={{minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:500,color:B.ink}}>
                                    {s.email || s.name || "—"}
                                  </div>
                                </div>
                                <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.sub}}>
                                  {when}
                                </div>
                                <div style={{textAlign:"right"}}>
                                  <span style={{
                                    fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,
                                    letterSpacing:"0.08em",textTransform:"uppercase",
                                    padding:"3px 8px",borderRadius:99,
                                    background:isFC?B.navySoft:B.bg,
                                    color:isFC?B.navy:B.muted
                                  }}>
                                    {isFC?"Founder #" + (s.founding_position||"?"):"Standard"}
                                  </span>
                                </div>
                              </div>
                            );
                          })
                        )}
                      </div>

                      {/* Webhook health — link out to Stripe rather than
                          duplicating their delivery log here. */}
                      <div style={{
                        background:B.bg,border:"1px dashed "+B.border,borderRadius:14,
                        padding:"14px 18px",display:"flex",alignItems:"center",
                        justifyContent:"space-between",gap:12,flexWrap:"wrap"
                      }}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,color:B.navy,marginBottom:2}}>
                            Stripe webhook health
                          </div>
                          <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,lineHeight:1.4}}>
                            Watch delivery attempts + 4xx/5xx failures in Stripe's webhook log. Investigate any non-200 in the last 24h.
                          </div>
                        </div>
                        <a href="https://dashboard.stripe.com/webhooks" target="_blank" rel="noopener noreferrer"
                          style={{
                            fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,
                            letterSpacing:"0.08em",textTransform:"uppercase",
                            padding:"8px 14px",background:B.navy,color:B.white,
                            borderRadius:99,textDecoration:"none",flexShrink:0
                          }}>
                          Open in Stripe →
                        </a>
                      </div>
                    </div>
                  );
                })()}

                {/* ── Feature usage ── */}
                {adminData.eventStats&&(
                  <div style={{marginBottom:20}}>
                    <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.muted,marginBottom:10}}>Feature usage</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:12}}>
                      {[
                        {label:"Plans generated",   value:adminData.eventStats.plans,       sub:adminData.eventStats.plansUsers+" users"},
                        {label:"Captions generated", value:adminData.eventStats.captions,    sub:adminData.eventStats.remixes+" remixed"},
                        {label:"Scans completed",    value:adminData.eventStats.scans,       sub:"avg score "+adminData.eventStats.avgScanScore},
                        {label:"Scripts generated",  value:adminData.eventStats.scripts,     sub:""},
                        {label:"Vault saves",        value:adminData.eventStats.vaultSaves,  sub:""},
                        {label:"Results logged",     value:adminData.eventStats.results,     sub:""},
                      ].map(function(m,i){return (
                        <div key={i} style={{background:B.card,borderRadius:12,padding:"14px 14px",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
                          <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.muted,marginBottom:4}}>{m.label}</div>
                          <div style={{fontFamily:"'Italiana',serif",fontSize:28,color:B.navy,lineHeight:1}}>{m.value}</div>
                          {m.sub&&<div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:300,color:B.muted,marginTop:3}}>{m.sub}</div>}
                        </div>
                      );})}
                    </div>
                    {adminData.eventStats.topPlatforms.length>0&&(
                      <div style={{background:B.navySoft,borderRadius:12,padding:"14px 16px"}}>
                        <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:B.navy,marginBottom:8}}>Top platforms in plans</div>
                        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                          {adminData.eventStats.topPlatforms.map(function(p,i){return (
                            <div key={i} style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:600,color:B.navy,background:B.white,borderRadius:99,padding:"4px 12px"}}>
                              {p[0]+" ("+p[1]+")"}
                            </div>
                          );})}
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* ── User table ── */}
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:B.muted,marginBottom:10}}>
                  {"All users ("+adminData.credits.length+")"}
                </div>
                <div style={{background:B.card,borderRadius:14,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
                  {/* Header */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 80px 80px",background:B.navy,padding:"10px 16px",gap:8}}>
                    {["User","Plan","Credits"].map(function(h){return (
                      <div key={h} style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:"rgba(255,255,255,0.6)"}}>{h}</div>
                    );})}
                  </div>
                  {/* Rows. row.name + row.email come from the admin-stats
                       endpoint enriching credits via the user directory.
                       Falls back to the truncated id when both are missing. */}
                  {adminData.credits.map(function(row,i){
                    var label = row.name || (row.email ? row.email.split("@")[0] : null) || ("user-" + (row.user_id||"").slice(0,6));
                    return (
                      <div key={row.user_id} style={{display:"grid",gridTemplateColumns:"1fr 80px 80px",padding:"10px 16px",gap:8,borderBottom:i<adminData.credits.length-1?"1px solid "+B.divider:"none",background:i%2===0?B.card:B.bg,alignItems:"center"}}>
                        <div style={{minWidth:0}}>
                          <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:600,color:B.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</div>
                          {row.email && row.name && (
                            <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:300,color:B.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.email}</div>
                          )}
                        </div>
                        <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,color:row.plan==="standard"||row.plan==="founding"?B.green:B.muted,textTransform:"capitalize"}}>{row.plan}</div>
                        <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,color:B.ink}}>{row.credits}</div>
                      </div>
                    );
                  })}
                </div>

                <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,marginTop:12,textAlign:"center"}}>
                  {"Est. MRR assumes $25/mo per Standard user, $20/mo per Founder Circle member (locked for life). Data from Supabase credits table only."}
                </div>
              </div>
            )}

            {/* Pending playbook drafts — staged by the monthly refresh
                cron. One card per draft with diff + sources + Approve /
                Reject. Hidden when there's nothing to review. */}
            {pendingPlaybookDrafts.length > 0 && (
              <div style={{marginTop:32,paddingTop:24,borderTop:"1px solid "+B.divider}}>
                <Eyebrow>Pending Playbook Updates</Eyebrow>
                <div style={{fontFamily:"'Italiana',serif",fontSize:24,color:B.ink,marginBottom:8,lineHeight:1.2}}>{pendingPlaybookDrafts.length} draft{pendingPlaybookDrafts.length===1?"":"s"} need review.</div>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.muted,lineHeight:1.6,marginBottom:18}}>
                  The monthly research cron found updates from trusted sources. Approve to commit a change to the live playbook (instantly affects every generation). Reject to archive.
                </div>
                {pendingPlaybookDrafts.map(function(draft){
                  return <PendingPlaybookDraft key={draft.id} draft={draft} token={session ? session.access_token : ""}
                    onResolved={function(id, action){
                      // Optimistically remove from the list, then refresh
                      // both lists so the live playbook editor below shows
                      // the new values when an approve commits.
                      setPendingPlaybookDrafts(function(prev){ return prev.filter(function(d){ return d.id !== id; }); });
                      if (action === "approve") loadPlaybook().then(function(map){ setPlaybook(map); });
                    }}/>;
                })}
              </div>
            )}

            {/* Playbook editor — admin-only inline form for each platform.
                Saves through /api/admin/playbook-update. Edits propagate
                everywhere (Algo tab + every Anthropic prompt). */}
            <div style={{marginTop:32,paddingTop:24,borderTop:"1px solid "+B.divider}}>
              <Eyebrow>Platform Playbook</Eyebrow>
              <div style={{fontFamily:"'Italiana',serif",fontSize:24,color:B.ink,marginBottom:8,lineHeight:1.2}}>The rules VIRL follows.</div>
              <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.muted,lineHeight:1.6,marginBottom:18}}>
                Edits save instantly to Supabase and reach the LLM on the next generation. Lists are comma-separated.
              </div>
              {PLATFORMS.map(function(p){
                return <PlaybookEditor key={p} platform={p} entry={playbook[p]} token={session ? session.access_token : ""}
                         onSaved={function(){
                           // Re-fetch the playbook so the rest of the app
                           // (Algo tab card preview) sees the new values.
                           loadPlaybook().then(function(map){ setPlaybook(map); });
                         }}/>;
              })}
            </div>
          </div>
        )}

      </div>

      <footer style={{borderTop:"1px solid "+B.divider,padding:"28px 16px 40px",maxWidth:760,margin:"40px auto 0"}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
          <div style={{fontFamily:"'Italiana',serif",fontSize:22,color:B.navy,letterSpacing:"0.06em",position:"relative",display:"inline-block"}}>
            {"VIRL"}
            <sup style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,color:B.muted,verticalAlign:"super",marginLeft:2,letterSpacing:0}}>{"TM"}</sup>
            <div style={{position:"absolute",bottom:-4,left:0,width:"100%",height:2,background:B.blue,borderRadius:99}}/>
          </div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,fontStyle:"italic",color:B.muted}}>
            Finally, a strategy that sounds like you.
          </div>
          <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:4,alignItems:"center"}}>
            {[
              {label:"Privacy Policy",      href:"https://app.termly.io/policy-viewer/policy.html?policyUUID=bc2fc2c6-2e38-40d0-9d73-de9941f510d0",      isBtn:false},
              {label:"Terms of Service",    href:"https://app.termly.io/policy-viewer/policy.html?policyUUID=45628bcc-78b6-4904-9408-c872a26558cf",         isBtn:false},
              {label:"Cookie Policy",       href:"https://app.termly.io/policy-viewer/policy.html?policyUUID=b300ada6-f4b7-4b62-bbe6-053da497d2c6",       isBtn:false},
              {label:"Consent Preferences", href:"#",                               termly:true},
              {label:"Contact Us",          href:"mailto:hello@govirl.ai",          isBtn:false},
            ].map(function(link,i){return (
              <React.Fragment key={i}>
                {i>0&&<span style={{color:B.border,fontSize:11,padding:"0 2px"}}>{"·"}</span>}
                {link.termly?(
                  <a href="#"
                    className="termly-display-preferences"
                    style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:400,color:B.muted,textDecoration:"none",padding:"4px 6px",borderRadius:6,transition:"color .15s",cursor:"pointer"}}
                    onMouseOver={function(e){e.currentTarget.style.color=B.navy;}}
                    onMouseOut={function(e){e.currentTarget.style.color=B.muted;}}>
                    {link.label}
                  </a>
                ):(
                  <a href={link.href}
                    target={link.href.startsWith("mailto")?"_self":"_blank"}
                    rel="noreferrer"
                    style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:400,color:B.muted,textDecoration:"none",padding:"4px 6px",borderRadius:6,transition:"color .15s"}}
                    onMouseOver={function(e){e.currentTarget.style.color=B.navy;}}
                    onMouseOut={function(e){e.currentTarget.style.color=B.muted;}}>
                    {link.label}
                  </a>
                )}
              </React.Fragment>
            );})}
          </div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:300,color:B.muted,lineHeight:1.65,maxWidth:480,textAlign:"center",marginTop:4}}>
            {"Content generated by VIRL is offered as a suggestion only. You are responsible for reviewing every piece of content before publishing and for ensuring it complies with platform terms, applicable law, and any professional license or employer obligations. Nothing VIRL produces is legal, medical, financial, or real-estate advice. VIRL is not affiliated with or endorsed by TikTok, Instagram, Facebook, YouTube, LinkedIn, X, or Pinterest."}
          </div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:300,color:B.muted,lineHeight:1.6,maxWidth:400,textAlign:"center",marginTop:4}}>
            {"* Generation time is approximate and varies based on profile completeness, number of platforms selected, and network conditions. Most users experience plan generation in under 90 seconds."}
          </div>
          <div style={{display:"flex",gap:16,justifyContent:"center",alignItems:"center",marginTop:4}}>
            <a href="https://www.instagram.com/virl_app?igsh=MTg2d2xtYjRrOGl6cA%3D%3D&utm_source=qr" target="_blank" rel="noreferrer"
              style={{color:B.muted,textDecoration:"none",transition:"color .15s",lineHeight:1}}
              onMouseOver={function(e){e.currentTarget.style.color=B.navy;}}
              onMouseOut={function(e){e.currentTarget.style.color=B.muted;}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            </a>
            <a href="https://www.tiktok.com/@virlapp?_r=1&_t=ZT-95i36Hj5sFB" target="_blank" rel="noreferrer"
              style={{color:B.muted,textDecoration:"none",transition:"color .15s",lineHeight:1}}
              onMouseOver={function(e){e.currentTarget.style.color=B.navy;}}
              onMouseOut={function(e){e.currentTarget.style.color=B.muted;}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.77a4.85 4.85 0 01-1.01-.08z"/></svg>
            </a>
            <a href="https://x.com/virlapp?s=21" target="_blank" rel="noreferrer"
              style={{color:B.muted,textDecoration:"none",transition:"color .15s",lineHeight:1}}
              onMouseOver={function(e){e.currentTarget.style.color=B.navy;}}
              onMouseOut={function(e){e.currentTarget.style.color=B.muted;}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.431-8.51-7.845-10.99h6.55l4.26 5.632 5.106-5.632zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
          </div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:300,color:B.border,letterSpacing:"0.05em"}}>
            {"© "+new Date().getFullYear()+" VIRL™ · govirl.ai · All rights reserved."}
          </div>
        </div>
      </footer>

    </div></div>
  );

}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
