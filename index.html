  // proceed. Stamped onto auth.users.user_metadata so the consent
  // record is durable.
  const [tosAccepted,setTosAccepted] = useState(false);
  // Optional: marketing opt-in. Defaults unchecked (opt-out is the
  // GDPR-safe default). Drives email_preferences.marketing_opt_out
  // for this user — checked = opted IN, unchecked = opted OUT.
  const [marketingOptIn,setMarketingOptIn] = useState(false);
  // Bumped whenever the ToS / Privacy materially change. Stored alongside
  // tos_accepted_at so we can re-prompt if needed in the future.
  const TOS_VERSION = "2026-04";
  const [emailSent,setEmailSent] = useState(false);
  const [resetMode,setResetMode] = useState(false);
  const [resetSent,setResetSent] = useState(false);

  // Read UTM / referrer once so we can stamp acquisition source onto
  // user_metadata at signup. sessionStorage so a user who lands via a
  // campaign link, navigates around, then signs up still gets credited
  // to the original source. Capped sizes are deliberate — defense
  // against someone passing a giant string in the query.
  const attribution = useMemo(function(){
    try {
      var qs = new URLSearchParams(window.location.search || "");
      var picked = {
        utm_source:   (qs.get("utm_source")   || "").slice(0, 60),
        utm_medium:   (qs.get("utm_medium")   || "").slice(0, 60),
        utm_campaign: (qs.get("utm_campaign") || "").slice(0, 60),
        ref:          (qs.get("ref")          || "").slice(0, 60),
        referrer:     (document.referrer       || "").slice(0, 200),
      };
      var hasNew = picked.utm_source || picked.utm_medium || picked.utm_campaign || picked.ref || picked.referrer;
      var stored = sessionStorage.getItem("virl_attr");
      if (!stored && hasNew) {
        sessionStorage.setItem("virl_attr", JSON.stringify(picked));
        return picked;
      }
      return stored ? JSON.parse(stored) : picked;
    } catch (e) { return {}; }

    var p = mode==="signup"
      ? supabaseClient.auth.signUp({
          email: email.trim(),

      if (mode==="signup") {
        // Mirror the marketing choice into email_preferences so the cron

// white CTAs with navy text, Italiana headlines, green-dot feature pills, and a
// sample-plan section using the landing page's "VIRL Plan" card style.
// Auto-deactivates once Date.now() >= LAUNCH_TIMESTAMP — no manual step needed.
function PreLaunchGate() {
  const [now,setNow]           = useState(Date.now());

  const [codeError,setCodeError] = useState("");

  useEffect(function(){
    var t = setInterval(function(){ setNow(Date.now()); }, 1000);
    return function(){ clearInterval(t); };
  }, []);

  var remaining = Math.max(0, LAUNCH_TIMESTAMP - now);
  var days  = Math.floor(remaining / 86400000);
  var hours = Math.floor((remaining % 86400000) / 3600000);
  var mins  = Math.floor((remaining % 3600000) / 60000);
  var secs  = Math.floor((remaining % 60000) / 1000);
  function pad(n) { return (n<10?"0":"") + n; }

  function submitCode() {
    if (submitting) return;
    setSubmitting(true);
    var entered = (code||"").trim().toUpperCase();

      try { localStorage.setItem("virl_beta_access", "1"); } catch(e) {}
      window.location.reload();

    setCodeError("That code didn't work. Double-check with whoever invited you.");

// [TASK 13] Sunday batch-log modal — shows a compact list of unlogged plan
// cards with quick-entry inputs so the user can log the whole week in one
// sitting instead of per-post. Only fires from the Sunday nudge banner.
function SundayLogModal({unloggedCards, onLog, onClose}) {
  const [values,setValues] = useState({});

  function cardId(c) { return c.title + c.day; }
  function updateField(id, field, value) {
    setValues(function(v){
      var row = Object.assign({}, v[id] || {});
      row[field] = value;
      var next = Object.assign({}, v);
      next[id] = row;
      return next;
    });
  }
  function saveAll() {
    unloggedCards.forEach(function(c){
      var id = cardId(c);
      var row = values[id];
      if (!row) return;
      // Only log rows where the user typed at least one number.
      if (row.views || row.likes || row.saves) {
        onLog(c, {views:row.views||"", likes:row.likes||"", saves:row.saves||""});
      }
    });
    onClose();
  }

  var inputStyle = {width:"100%",background:B.bg,border:"1px solid "+B.border,borderRadius:8,padding:"8px 10px",fontSize:13,color:B.ink,fontFamily:"'Jost',sans-serif"};
  var labelStyle = {fontFamily:"'Jost',sans-serif",fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",color:B.muted,marginBottom:4};

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.88)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={onClose}>
      <div onClick={function(e){ e.stopPropagation(); }}
        style={{background:B.white,width:"100%",maxWidth:520,maxHeight:"88vh",display:"flex",flexDirection:"column",borderRadius:"24px 24px 0 0",boxShadow:"0 -8px 40px rgba(0,0,0,0.25)"}}>
        <div style={{padding:"28px 26px 16px",flexShrink:0}}>
          <div style={{width:40,height:4,background:B.border,borderRadius:99,margin:"0 auto 20px"}}/>
          <div style={{textAlign:"center",marginBottom:4}}>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:700,letterSpacing:"0.26em",textTransform:"uppercase",color:B.navy,marginBottom:6}}>Week in review</div>
            <div style={{fontFamily:"'Italiana',serif",fontSize:26,color:B.navy,lineHeight:1.15}}>Log this week's results.</div>
          </div>
          <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.muted,lineHeight:1.6,textAlign:"center",marginTop:6}}>
            Fill in what you remember – VIRL will use this to get sharper each week.
          </div>
        </div>

        <div style={{flex:1,minHeight:0,overflowY:"auto",padding:"0 22px 8px"}}>
          {unloggedCards.map(function(c,i){
            var id = cardId(c);
            var row = values[id] || {};
            return (
              <div key={id} style={{background:B.bg,borderRadius:12,padding:"14px 16px",marginBottom:10,borderLeft:"3px solid "+B.navy}}>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:B.muted,marginBottom:4}}>
                  {c.day+" · "+c.platform}
                </div>
                <div style={{fontFamily:"'Italiana',serif",fontSize:16,color:B.ink,lineHeight:1.2,marginBottom:10}}>{c.title}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  <div>
                    <div style={labelStyle}>Views</div>
                    <input type="number" value={row.views||""} placeholder="0"
                      onChange={function(e){ updateField(id, "views", e.target.value); }}
                      style={inputStyle}/>
                  </div>
                  <div>
                    <div style={labelStyle}>Likes</div>
                    <input type="number" value={row.likes||""} placeholder="0"
                      onChange={function(e){ updateField(id, "likes", e.target.value); }}
                      style={inputStyle}/>
                  </div>
                  <div>
                    <div style={labelStyle}>Saves</div>
                    <input type="number" value={row.saves||""} placeholder="0"
                      onChange={function(e){ updateField(id, "saves", e.target.value); }}
                      style={inputStyle}/>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        <div style={{padding:"14px 22px 22px",flexShrink:0,borderTop:"1px solid "+B.divider,display:"flex",gap:10}}>
          <button onClick={onClose}
            style={{flex:1,fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,color:B.muted,background:B.bg,border:"1px solid "+B.border,borderRadius:12,padding:"12px",cursor:"pointer"}}>
            Cancel
          </button>
          <button onClick={saveAll}
            style={{flex:2,fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:B.white,background:B.navy,border:"none",borderRadius:12,padding:"12px",cursor:"pointer"}}>
            Save all results
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {

  // [TASK 2] Pre-launch gate disabled — the standard sign-in screen is now
  // the only entry point. Beta testers reach the app via the gated landing
  // on govirl.ai; that unlock lives in a different origin's localStorage and
  // doesn't carry across, so a second gate here was blocking them. Re-enable
  // by uncommenting the two lines below; checkAccess() and PreLaunchGate are
  // still defined for that purpose.
  // const [hasAccess] = useState(checkAccess);
  // if (!hasAccess) return <PreLaunchGate/>;

// ── Supabase session state ──────────────────────────────────────────────
  const [session,setSession]         = useState(null);
  const [authLoading,setAuthLoading] = useState(true);
  const [appError,setAppError]       = useState(null);

  useEffect(function() {
    // Check for existing session on load (handles OAuth redirects too)
    supabaseClient.auth.getSession().then(function(result) {
      setSession(result.data.session);
      setAuthLoading(false);
    });
    // Listen for auth state changes
    var listener = supabaseClient.auth.onAuthStateChange(function(event, s) {
      setSession(s);
      // [TASK 1] Clear cached profile on sign-out so the next user on this browser starts clean.
      if (event === "SIGNED_OUT") {
        try {
          var current = JSON.parse(localStorage.getItem(KEY) || "{}");
          delete current.profile;
          localStorage.setItem(KEY, JSON.stringify(current));
        } catch(e) {}
        try { sessionStorage.removeItem("virl_active_tab"); } catch(e) {}
        setProfile({});
        setVault([]);
        setResults([]);
        setUserDataHydrated(false);
      }
    });
    return function() { listener.data.subscription.unsubscribe(); };
  }, []);

  // Mirror the signed-in user's id + access token onto window globals so
  // logEvent() (and any other "fire-and-forget" telemetry called from
  // deeply-nested components) can find them without prop-drilling. Cleared
  // on sign-out so a logged-out session doesn't accidentally inherit the
  // previous user's identity. This was previously missing — every logEvent
  // call was silently no-oping because window.__virlUserId was never set.
  useEffect(function(){
    if (session && session.user && session.user.id) {
      window.__virlUserId    = session.user.id;
      window.__virlUserToken = session.access_token || null;
    } else {
      window.__virlUserId    = null;
      window.__virlUserToken = null;
    }
  }, [session]);

  // [PREMIUM 7] Fire userSignedUp into Loops on the user's first
  // authenticated session. Gated by virl_signup_event_fired so each
  // user only fires once, and by a 7-day window on auth.users.created_at
  // so existing users from before this PR don't get a phantom welcome
  // email when they next log in.
  useEffect(function(){
    if (!session || !session.user) return;
    try {
      if (localStorage.getItem("virl_signup_event_fired") === "1") return;
      var createdMs = Date.parse(session.user.created_at);

    // incognito browsers a stale-cache or read-replica lag means the GET

    var cost = opts && typeof opts.cost === "number" ? opts.cost : 0;

        if (!prev) return prev;

        var next = Object.assign({}, prev, { credits: Math.max(0, (prev.credits||0) - cost) });
        if (session) saveCachedSbCredits(session.user.id, next);

      if (!res.ok) return;
      const body = await res.json();
      setFeedbackInbox(Array.isArray(body.items) ? body.items : []);
    } catch (e) { /* non-fatal */ }
  }

  // ── Admin dashboard data fetch ────────────────────────────────────────
  async function loadAdminData() {
    if (!isAdmin) return;
    setAdminLoading(true);
    // Kick off the cost/usage + business panels in parallel — independent
    // of the admin-stats fetch, so a failure on any side leaves the other
    // panels showing.
    loadUsageStats();
    loadFeedbackInbox();
    loadBizStats();
    try {
      // Call our server-side admin endpoint — uses service_role key
      // to bypass RLS and read all user data. Passes the user's access
      // token so the server can verify they are the admin email.
      const res = await fetch("/api/admin-stats", {
        headers: {
          "Authorization": "Bearer "+(session ? session.access_token : ""),
        },
      });
      if (!res.ok) {
        const err = await res.json().catch(function(){return{};});
        console.error("Admin fetch failed:", res.status, err);
        setAdminLoading(false);
        return;
      }
      const {credits:creditsRaw, events:eventsRaw} = await res.json();
      const credits = Array.isArray(creditsRaw) ? creditsRaw : [];
      const events = Array.isArray(eventsRaw) ? eventsRaw : [];

      // Aggregate user stats
      const total = credits.length;
      const paid = credits.filter(function(r){return r.plan==="standard"||r.plan==="founding";}).length;
      const free = credits.filter(function(r){return r.plan==="free";}).length;
      const mrr = paid * 25;

      // Aggregate event stats
      const evArr = events; // already guarded above
      function countEv(name) { return evArr.filter(function(e){return e.event_name===name;}).length; }
      function uniqueUsers(name) { return new Set(evArr.filter(function(e){return e.event_name===name;}).map(function(e){return e.user_id;})).size; }

      const planEvents = evArr.filter(function(e){return e.event_name==="plan_generated";});
      const scanEvents = evArr.filter(function(e){return e.event_name==="scan_completed";});
      const avgScore = scanEvents.length ? (scanEvents.reduce(function(sum,e){
        return sum + (e.properties&&e.properties.avg_score ? e.properties.avg_score : 0);
      },0) / scanEvents.length).toFixed(1) : "—";

      // Platform frequency from plans
      const platCounts = {};
      planEvents.forEach(function(e){
        if (e.properties&&Array.isArray(e.properties.platforms)) {
          e.properties.platforms.forEach(function(p){ platCounts[p]=(platCounts[p]||0)+1; });
        }
      });
      const topPlatforms = Object.entries(platCounts).sort(function(a,b){return b[1]-a[1];}).slice(0,3);

      const eventStats = {
        plans: countEv("plan_generated"),
        plansUsers: uniqueUsers("plan_generated"),
        captions: countEv("caption_generated"),
        remixes: countEv("caption_remixed"),
        scans: countEv("scan_completed"),
        scripts: countEv("script_generated"),
        vaultSaves: countEv("vault_saved"),
        results: countEv("result_logged"),
        avgScanScore: avgScore,
        topPlatforms: topPlatforms,
      };

      setAdminData({credits, total, paid, free, mrr, eventStats});
    } catch(e) {
      console.error("Admin load error:", e);
    }
    setAdminLoading(false);
  }

  // Calculate trial status only after Supabase credits have loaded — until
  // then `isFoundingOrPro` defaults to false and would briefly fire trial
  // expiry on real Pro users. If created_at is missing or unparseable we
  // fail open client-side (treat as in-trial); the API still enforces the
  // cap when it can read the auth row.
  var trialExpired = false;
  var daysIntoTrial = 0;
  if (session && creditsLoaded && !isFoundingOrPro) {
    var signupMs = Date.parse(session.user.created_at);
    if (!isNaN(signupMs)) {
      daysIntoTrial = Math.floor((Date.now() - signupMs) / 86400000);
      trialExpired = daysIntoTrial >= TRIAL_DAYS;

    }

  // urgency rises as the user nears the end of the free window.
  var upgradeCtaText = daysIntoTrial <= 7
    ? "Upgrade anytime — 150 credits/week"
    : daysIntoTrial <= 11
      ? (TRIAL_DAYS - daysIntoTrial) + " days left — don't lose your plans"
      : "Last chance — lock in founding rate";

  // [TASK 13] Sunday nudge — when it's Sunday and the current plan still has
  // unlogged cards, surface a batch-log banner so users can close out the week
  // in one sitting. "Unlogged" = no matching entry in results[] by title+day.
  var isSunday = new Date().getDay() === 0;

    return !results.some(function(r){ return r.id === id; });

  var showSundayNudge = isSunday && cards && cards.length>0 && unloggedCards.length>0 && !sundayNudgeDismissed;

      setUpgradeReason("trial");
      setShowUpgrade(true);
    }
  }, [trialExpired, isFoundingOrPro]);

  // [CHANGE 2b] Mark sessionStorage when the post-plan nudge becomes visible

      try { sessionStorage.setItem("virl_plan_nudge_shown","1"); } catch(e) {}

  useEffect(function(){

  // Persist vault + results to Supabase whenever they change. Gated on

  // can't overwrite a fresh user's remote data during the load window.
  useEffect(function() {
    if (!session || !userDataHydrated) return;
    saveUserDataToSupabase(session.user.id, vault, results);
    saveCachedUserData(session.user.id, vault, results);
  }, [vault, results, session, userDataHydrated]);

  const isAdmin = session&&session.user&&session.user.email==="laurenannedoty@gmail.com";
  const TABS = [
    {key:"profile", label:"My Profile"},
    {key:"plan",    label:"VIRL Plan"},
    {key:"caption", label:"VIRL Captions"},
    {key:"scan",    label:"VIRL Scan"},
    // Algorithm tab removed — strategic insights moving inline. Keep
    // this commented for easy restoration:
    // {key:"algo",    label:"Algorithm"},
    {key:"vault",   label:"Vault ("+vault.length+")"},
    {key:"results", label:"Results"},
    ...(isAdmin?[{key:"admin", label:"Dashboard"}]:[]),
  ];

  // Vault patterns drive a small UI ("Based on your N saved posts...") and
  // are mirrored server-side from the user_data row to ground the plan
  // prompt — see api/_lib/prompts.js. The variable stays here for the UI
  // only; nothing in the prompt construction lives client-side anymore.
  var vaultPatterns = getVaultPatterns(vault);

  // Toggle a card index in/out of the replace-set (used by per-card
  // Keep/Replace pills when editMode is on). Uses a fresh Set instance
  // so React re-renders the affected cards.
  function toggleReplaceAt(i) {
    setReplaceSet(function (prev) {
      var next = new Set(prev);
      if (next.has(i)) next.delete(i); else next.add(i);
      return next;
    });
  }

  function enterEditMode() {
    setReplaceSet(new Set());
    setEditMode(true);
  }
  function cancelEditMode() {
    setEditMode(false);
    setReplaceSet(new Set());
  }

  // Partial regeneration: rewrite only the cards the user marked for
  // replacement, keeping the rest (and the strategy) intact. Streams via
  // the same SSE pipeline as full plan generation; the parser is started
  // in partial mode so it only emits cards (no strategy/stats). As each
  // new card arrives we splice it into the cards array at the next
  // pending replacement index. When the user has selected ALL cards we
  // fall through to a full regen instead — same cost, plus the user gets
  // a fresh strategy and stats out of it.
  function runPartialRegen() {
    if (!cards || !cards.length) return;
    if (!replaceSet.size) return;

    // Selecting every card → just do a full regen; user gets strategy +
    // stats refreshed too, and the cost matches their intent.
    if (replaceSet.size === cards.length) {
      cancelEditMode();
      generate();
      return;
    }

    if (!isFoundingOrPro && trialExpired) {
      setUpgradeReason("trial"); setShowUpgrade(true); return;
    }

    var sorted = Array.from(replaceSet).sort(function (a, b) { return a - b; });
    var replaceDayLabels = sorted.map(function (i) { return cards[i] && cards[i].day; }).filter(Boolean);
    var keptCards = cards
      .map(function (c, i) { return { c: c, i: i }; })
      .filter(function (x) { return !replaceSet.has(x.i) && x.c; })
      .map(function (x) {
        return {
          day:      x.c.day      || null,
          platform: x.c.platform || null,
          format:   x.c.format   || null,
          title:    x.c.title    || "",
        };
      });

    setPartialLoading(true);
    setPartialReplacing(new Set(sorted));
    setError("");
    refreshCredits();

    var parser = createStreamingPlanParser({ mode: "partial" });
    // Working copy of the cards array; we splice replacements in by
    // index order as they stream and snapshot via setCards so React
    // re-renders one card at a time.
    var working = cards.slice();
    var nextSlot = 0;

    consumePlanStream("plan_partial", {
      platforms:    platforms,
      niche:        niche,
      goal:         goal,
      formats:      formats,
      followers:    followers,
      context:      context || "",
      weekContext:  weekContext || "",
      strategy:     strategy || null,
      keptCards:    keptCards,
      replaceDayLabels: replaceDayLabels,
      // Skip plan_history's prior-week lookup — this is a same-week
      // edit, not a new week.
      currentWeekStart: weekStartISO(Date.now()),
    }, { token: userToken }, {
      onText: function (delta) {
        parser.push(delta, {
          onCard: function (card) {
            if (nextSlot >= sorted.length) return; // server emitted extra — ignore
            var targetIdx = sorted[nextSlot];
            working = working.slice();
            working[targetIdx] = card;
            setCards(working);
            // Reveal this slot's new card by removing it from the
            // replacing-set so the skeleton clears.
            setPartialReplacing(function (prev) {
              var next = new Set(prev);
              next.delete(targetIdx);
              return next;
            });
            nextSlot++;
          },
        });
      },
      onReset: function () {
        // Streaming retry kicked in (server hit max_tokens). Restart the
        // partial-merge state so the second pass's cards land in the
        // right slots from scratch.
        parser = createStreamingPlanParser({ mode: "partial" });
        working = cards.slice();
        nextSlot = 0;
        setPartialReplacing(new Set(sorted));
      },
    }).then(function (result) {
      var finalized = parser.finalize();
      var parsed = finalized.parsed;
      var parsedCards = (parsed && Array.isArray(parsed.cards)) ? parsed.cards : null;
      // Final reconciliation: if the streaming pass missed cards (or got
      // them in a different order), trust the finalized parse over the
      // progressive splice.
      if (parsedCards && parsedCards.length === sorted.length) {
        var finalWorking = cards.slice();
        for (var k = 0; k < sorted.length; k++) finalWorking[sorted[k]] = parsedCards[k];
        setCards(finalWorking);
        working = finalWorking;
      } else if (!parsedCards || parsedCards.length === 0) {
        // Stream finished with no usable cards (truncation past the retry,
        // or upstream error already shown via the error callback).
        // Roll back the skeletons so the user sees the original plan.
        setCards(cards);
        setError("VIRL got cut off mid-thought. Tap Regenerate selected to try again.");
        return;
      }

      // Persist the merged plan. plan_history upserts by week_start so
      // the same week's row is updated with the new card mix.
      var planExpiresAt = computePlanExpiry(sbCredits);
      try {
        var current = JSON.parse(localStorage.getItem(KEY) || "{}");
        current.plan = working;
        current.planStats = stats;
        current.planStrategy = strategy;
        current.planExpiresAt = planExpiresAt;
        localStorage.setItem(KEY, JSON.stringify(current));
      } catch (e) {}
      if (session) savePlanToSupabase(session.user.id, working, stats, planExpiresAt, strategy);

      try {
        var meta = (result && result.meta) || {};
        var planUsage = meta.usage || {};
        logEvent(session && session.user && session.user.id, "plan_partial_regen", {
          weekStart:           weekStartISO(Date.now()),
          replacedCount:       sorted.length,
          totalCards:          cards.length,
          replacedDayLabels:   replaceDayLabels,
          outputTokens:        planUsage.outputTokens        || 0,
          cachedInputTokens:   planUsage.cachedInputTokens   || 0,
          uncachedInputTokens: planUsage.uncachedInputTokens || 0,
          truncated:           !!planUsage.truncated,
          retried:             !!planUsage.retried,
          model:               planUsage.model || null,
        });
      } catch (e) {}

      cancelEditMode();
      // [PREMIUM 10] Optimistic credit tick — server already deducted
      // CREDIT_COSTS.plan_partial (1). The refresh below reconciles.
      refreshCredits({ cost: 1 });
    }).catch(function (err) {
      setError((err && err.message) || "Couldn't regenerate the selected cards. Try again in a moment.");
      // Clear skeletons on failure so the user sees their unchanged plan.
      setCards(cards);
    }).then(function () {
      setPartialLoading(false);
      setPartialReplacing(new Set());
    });
  }

  // Re-frame the current week with a different strategic angle. Cards
  // stay; only thesis / optimizing_for / audience_read / success_metric /
  // the_bet rewrite. Non-streaming because the output is ~5 short fields.
  function regenerateStrategy() {
    if (!cards || !cards.length || !strategy) return;
    if (!isFoundingOrPro && trialExpired) {
      setUpgradeReason("trial"); setShowUpgrade(true); return;
    }
    setStrategyRegenLoading(true);
    setError("");
    // Send only the per-card summary the server needs — no hashtags,
    // descriptions, or format-specific bodies. The condensed shape
    // keeps the input small even on a 14-card plan.
    var condensedCards = (cards || []).map(function (c) {
      return {
        day:      c && c.day      ? c.day      : null,
        platform: c && c.platform ? c.platform : null,
        format:   c && c.format   ? c.format   : null,
        title:    c && c.title    ? c.title    : "",
      };
    });
    callAPI("plan_strategy", {
      cards:    condensedCards,
      strategy: strategy,
    }, { token: userToken }).then(function (data) {
      var parsed = extractJSON(data && data.text);
      var hasFields = parsed && (parsed.thesis || parsed.the_bet || parsed.optimizing_for || parsed.audience_read || parsed.success_metric);
      if (!hasFields) {
        setError("VIRL couldn't find a different angle this time. Try again in a moment.");
        return;
      }
      var nextStrategy = {
        thesis:         parsed.thesis         || strategy.thesis         || "",
        optimizing_for: parsed.optimizing_for || strategy.optimizing_for || "",
        audience_read:  parsed.audience_read  || strategy.audience_read  || "",
        success_metric: parsed.success_metric || strategy.success_metric || "",
        the_bet:        parsed.the_bet        || strategy.the_bet        || "",
      };
      setStrategy(nextStrategy);

      var planExpiresAt = computePlanExpiry(sbCredits);
      try {
        var current = JSON.parse(localStorage.getItem(KEY) || "{}");
        current.planStrategy = nextStrategy;
        current.planExpiresAt = planExpiresAt;
        localStorage.setItem(KEY, JSON.stringify(current));
      } catch (e) {}
      if (session) savePlanToSupabase(session.user.id, cards, stats, planExpiresAt, nextStrategy);

      try {
        var usage = (data && data.usage) || {};
        logEvent(session && session.user && session.user.id, "plan_strategy_regen", {
          weekStart:           weekStartISO(Date.now()),
          outputTokens:        usage.outputTokens        || 0,
          cachedInputTokens:   usage.cachedInputTokens   || 0,
          uncachedInputTokens: usage.uncachedInputTokens || 0,
          truncated:           !!usage.truncated,
          model:               usage.model || null,
        });
      } catch (e) {}

      refreshCredits({ cost: (data && data.cost) || 1 });
    }).catch(function (err) {
      setError((err && err.message) || "Couldn't regenerate the strategy. Try again in a moment.");
    }).then(function () {
      setStrategyRegenLoading(false);
    });
  }

  function generate() {
    if (!platforms.length||!formats.length) return;
    // Block generation if trial expired or out of credits
    if (!isFoundingOrPro && trialExpired) {
      setUpgradeReason("trial"); setShowUpgrade(true); return;
    }
    refreshCredits();
    // [PERF 3] Clear strategy too so a previous week's strategy banner
    // doesn't linger above the spinner while the new one is in flight.
    // Spinner is gated on (loading && !cards), so the first streamed card
    // hides it naturally; loading stays true until the stream completes
    // so the Generate button can't be double-clicked mid-stream.
    setLoading(true); setError(""); setCards(null); setStats(null); setStrategy(null);
    // Clear edit-mode state — selections were against the old cards
    // array, so they'd point at the wrong slots once the new plan
    // streams in.
    setEditMode(false); setReplaceSet(new Set()); setPartialReplacing(new Set());
    var appliedCost = 0;
    var parser = createStreamingPlanParser();
    var progressiveCards = [];
    consumePlanStream("plan", {
      platforms:    platforms,
      niche:        niche,
      goal:         goal,
      formats:      formats,
      followers:    followers,
      context:      context || "",
      // [AUDIENCE 1] Week-of business context. Server-side prompt
      // builder appends a dedicated section so the LLM treats this as
      // a hard constraint, not generic flavour.
      weekContext:  weekContext || "",
      isRegen:      !!cards,
      // Same Monday-of-this-week key the client uses when upserting
      // plan_history. The server uses it to exclude this row from the
      // history it loads, so a same-week regenerate is treated as
      // "still week N" instead of bumping to week N+1.
      currentWeekStart: weekStartISO(Date.now()),
    }, { token: userToken }, {
      onText: function (delta) {
        parser.push(delta, {
          onStrategy: function (s) { setStrategy(s); },
          onCard:     function (card) {
            progressiveCards.push(card);
            // New array reference so React re-renders the list.
            setCards(progressiveCards.slice());
          },
          onStats:    function (s) { setStats(s); },
        });
      },
      // Server hit max_tokens on the first attempt and is retrying with a
      // larger budget. Discard the partial plan rendered so far so the
      // retry stream renders against a clean slate.
      onReset: function () {
        parser = createStreamingPlanParser();
        progressiveCards = [];
        setCards(null); setStrategy(null); setStats(null);
      },
    }).then(function (result) {
      var meta = (result && result.meta) || {};
      appliedCost = meta.cost || 0;
      // Final parse on the full accumulated buffer is the canonical source
      // of truth — overrides anything the streaming parser may have missed.
      // Any persistence / logging downstream uses these values, not the
      // progressive state, so the saved plan can never diverge from what
      // the model actually produced.
      const finalized = parser.finalize();
      const data = { text: finalized.fullText, cost: meta.cost, usage: meta.usage };
      const parsed = finalized.parsed;
      const parsedCards    = parsed && Array.isArray(parsed.cards) ? parsed.cards : null;
      const parsedStrategy = parsed && parsed.strategy && typeof parsed.strategy === "object" ? parsed.strategy : null;
      const parsedStats    = parsed && parsed.stats    && typeof parsed.stats    === "object" ? parsed.stats    : null;
      if (parsedCards && parsedCards.length > 0) {
        setCards(parsedCards);
        if (parsedStats)    setStats(parsedStats);
        if (parsedStrategy) setStrategy(parsedStrategy);
        // [AUDIENCE 1] Persist this week's context so next week's
        // generation can offer it as a one-tap suggestion. Trimmed +
        // length-capped before write so a malformed paste doesn't
        // bloat localStorage.
        try {
          var trimmed = (weekContext || "").trim().slice(0, 1200);
          if (trimmed) {
            localStorage.setItem("virl_last_week_context", trimmed);
            setLastWeekContext(trimmed);
          }
        } catch (e) {}
        // [TASK 5] Bump lifetime plan counter and fire the referral modal the
        // first time the user hits 3, 7, or 15 plans. Only when signed in —
        // anonymous sessions have no user.id to build a referral link from.
        try {
          var prevCount = parseInt(localStorage.getItem("virl_plans_completed") || "0", 10);
          var newCount  = (isNaN(prevCount) ? 0 : prevCount) + 1;
          localStorage.setItem("virl_plans_completed", String(newCount));
          if (session && (newCount === 3 || newCount === 7 || newCount === 15)) {
            if (localStorage.getItem("virl_referral_shown_" + newCount) !== "1") {
              setReferralMilestone(newCount);
            }
          }
          // First plan ever — surface the celebration overlay on top of
          // the plan render. Per-browser one-shot so a re-install or a
          // different device doesn't re-fire it gratuitously.
          if (newCount === 1 && localStorage.getItem("virl_first_plan_celebrated") !== "1") {
            setShowFirstPlanCelebration(true);
          }
          // [PREMIUM 7] First plan ever — fire firstPlanGenerated so
          // Loops can drop the day-1 followup email. Idempotent flag
          // matches the celebration overlay so the two share lifecycle.
          if (newCount === 1 && localStorage.getItem("virl_first_plan_event_fired") !== "1") {
            try { localStorage.setItem("virl_first_plan_event_fired", "1"); } catch(e2) {}
            fireLoopsEvent("firstPlanGenerated", {
              firstName: (profile && profile.name) || "",
              planCount: 1,
            });
          }
          // [PREMIUM 3] Plan #5 — surface the in-app celebration card.
          // Card persists at the top of the Plan tab until the user
          // dismisses it (virl_milestone_5_seen flag).
          if (newCount === 5 && localStorage.getItem("virl_milestone_5_seen") !== "1") {
            setShowMilestone5(true);
          }
          // [PREMIUM 7] Plan #5 — fire the Loops event alongside the
          // in-app card so Lauren can layer an email if she wants.
          // Separate idempotent flag from the in-app dismissal so the
          // email doesn't refire if the card is dismissed and re-shown.
          if (newCount === 5 && localStorage.getItem("virl_milestone_5_fired") !== "1") {
            try { localStorage.setItem("virl_milestone_5_fired", "1"); } catch(e2) {}
            fireLoopsEvent("fivePlansMilestone", {
              firstName: (profile && profile.name) || "",
              planCount: 5,
            });
          }
          // [PREMIUM 3] Plan #10 — fire the Loops event so the
          // tenPlansMilestone email goes out. Email content + delay
          // live in Loops; here we just trigger. Idempotent flag
          // prevents re-firing if a counter ever rolls back.
          if (newCount === 10 && localStorage.getItem("virl_milestone_10_fired") !== "1") {
            try { localStorage.setItem("virl_milestone_10_fired", "1"); } catch(e2) {}
            fireLoopsEvent("tenPlansMilestone", {
              firstName: (profile && profile.name) || "",
              planCount: 10,
            });
          }
        } catch(e) {}
        var planExpiresAt = computePlanExpiry(sbCredits);
        try {
          var current = JSON.parse(localStorage.getItem(KEY)||"{}");
          current.plan = parsedCards;
          current.planStats = parsedStats;
          current.planStrategy = parsedStrategy;
          current.planExpiresAt = planExpiresAt;
          localStorage.setItem(KEY, JSON.stringify(current));
        } catch(e){}
        if (session) savePlanToSupabase(session.user.id, parsedCards, parsedStats, planExpiresAt, parsedStrategy);
        try {
          // [PREMIUM 10] weekStart anchors the plan to a specific week
          // so the Sunday Review can group events by plan cycle. Use
          // the local YYYY-MM-DD of generation; week boundary handling
          // happens at query time.
          var weekStart = (function(){
            try { return new Date().toISOString().slice(0, 10); }
            catch(e){ return null; }
          })();
          // [COST 1] Forward Anthropic usage signal into the same event row
          // we already log per plan. data.usage is shaped by api/chat.js and
          // may be missing on older deployments — spread defensively so a
          // null usage object falls back to the pre-INTEL payload.
          var planUsage = (data && data.usage) || {};
          logEvent(session && session.user && session.user.id, "plan_generated", {
            weekStart: weekStart,
            platforms: platforms,
            niche:     niche,
            goal:      goal,
            formats:   formats,
            isRegen:   !!cards,
            cardCount: parsedCards.length,
            outputTokens:        planUsage.outputTokens        || 0,
            cachedInputTokens:   planUsage.cachedInputTokens   || 0,
            uncachedInputTokens: planUsage.uncachedInputTokens || 0,
            truncated:           !!planUsage.truncated,
            model:               planUsage.model || null,
          });
          // [PREMIUM 10] If this plan was seeded from a prior post
          // (Vault remix or Results "plan next week"), fire a second
          // event tagging the source. The Sunday Review can join this
          // back to the original card to surface "you doubled down on
          // last Tuesday's hook" style insights.
          if (remixSource) {
            logEvent(session && session.user && session.user.id, "plan_remixed_from_prior", {
              source:    remixSource.kind,
              sourceId:  remixSource.sourceId || null,
              platform:  remixSource.platform || null,
              weekStart: weekStart,
            });
            setRemixSource(null);
          }
        } catch(e){}
      } else {
        // [PERF 3] Truncated / unparseable final payload. Clear any cards
        // the streaming parser had already pushed so the user sees the
        // error message alone, not a half-rendered plan next to it.
        setCards(null); setStats(null); setStrategy(null);
        setError("VIRL got cut off mid-thought. Tap Generate again - it usually works on the second try. If this keeps happening, try fewer platforms or shorter answers.");
      }
    }).then(function(){
      // Refresh credits from Supabase after successful generation. Pass the
      // cost so the displayed counter ticks down immediately rather than
      // waiting on the Supabase round-trip (which can be slow or stale-cached
      // in private/incognito browsers). The follow-up GET reconciles to the
      // canonical server value.
      refreshCredits({cost: appliedCost});
    }).catch(function(e){
      // [PERF 3] Mid-stream failure (network drop, upstream error). Wipe
      // anything that may have streamed in so the error toast isn't
      // sitting on top of a half-rendered plan.
      setCards(null); setStats(null); setStrategy(null);
      if (e.message&&e.message.includes("credits")) {
        setUpgradeReason("credits"); setShowUpgrade(true);
      } else {
        setError(e.message||"Something went wrong. Give it another shot.");
      }
    })
    .finally(function(){ setLoading(false); });
  }

  function saveToVault(card) {
    const id = card.title+card.day;
    if (vault.some(function(v){return v.id===id;})) return;
    // [PREMIUM 10] Vault saves are first-class signal for the Sunday
    // Review — record cardId + title so we can join back to the
    // original generation. Truncated to keep the events table light.
    try {
      logEvent(session && session.user && session.user.id, "vault_saved", {
        type:     "plan",
        cardId:   id,
        title:    (card.title || "").slice(0, 120),
        platform: card.platform || null,
        format:   card.format   || null,
        day:      card.day      || null,
      });
    } catch(e){}
    // [TASK 10] Persist card.format alongside platform so getVaultPatterns()
    // can weight similar styles in future plan generations.
    // Capture the full card payload so the vault detail modal can render
    // description / insight / hashtags / saved script — not just the headline.
    setVault(function(v){
      return [{
        id,
        type:        "plan",
        title:       card.title,
        platform:    card.platform,
        format:      card.format||null,
        postTime:    card.postTime,
        day:         card.day||null,
        priority:    card.priority||null,
        description: card.description||null,
        // [PREMIUM 4] Vault save now stores insight; falls back to the
        // legacy `why` so a card generated under the old prompt still
        // gets its callout captured. Keep `why` mirrored too so older
        // app builds reading from Supabase still render the field.
        insight:     card.insight || card.why || null,
        why:         card.why || card.insight || null,
        trend:       card.trend||null,
        hashtags:    Array.isArray(card.hashtags) ? card.hashtags.slice() : [],
        savedScript: card.savedScript||null,
        savedAt:     fmtDate(),
        result:      null,
      }].concat(v);
    });
  }
  function saveCaption(cap) {
    // [PREMIUM 10] Capture the saved hook + a 160-char caption preview
    // so the Sunday Review can answer "what kinds of captions did you
    // save this week?" without re-fetching from Supabase. Full text
    // still lives on the vault item itself.
    try {
      logEvent(session && session.user && session.user.id, "vault_saved", {
        type:     "caption",
        title:    (cap.title || "").slice(0, 120),
        hook:     (cap.hook  || "").slice(0, 200),
        preview:  (cap.text  || cap.preview || "").slice(0, 160),
        platform: cap.platform || null,
      });
    } catch(e){}
    // Capture the full caption (text + hook + hashtags) so the vault detail
    // modal can show what the user actually saved, not just the preview.
    setVault(function(v){return [{
      id:       "cap_"+Date.now(),
      type:     "caption",
      title:    cap.title,
      preview:  cap.preview,
      text:     cap.text     || cap.preview || null,
      hook:     cap.hook     || null,
      hashtags: Array.isArray(cap.hashtags) ? cap.hashtags.slice() : [],
      platform: cap.platform || null,
      savedAt:  fmtDate(),
    }].concat(v);});

  }
  function deleteFromVault(id) {
    setVault(function(v){return v.filter(function(x){return x.id!==id;});});
  }
  function logResult(card,result) {
    const id = card.title+card.day;
    try { logEvent(session && session.user && session.user.id, "result_logged", { result: result, platform: card.platform || null }); } catch(e){}
    setVault(function(v){return v.map(function(x){return x.id===id?Object.assign({},x,{result}):x;});});
    setResults(function(r){
      const idx = r.findIndex(function(x){return x.id===id;});
      const entry = {id,title:card.title,platform:card.platform,postTime:card.postTime,result};
      if (idx>=0) { const n=r.slice(); n[idx]=entry; return n; }
      return r.concat([entry]);
    });

  }

  // Attach a generated script to its plan card so it stays tagged across
  // refreshes and devices. Pass `null` to clear. Persists alongside the plan
  // (Supabase + localStorage) using the existing weekly expiry.
  function saveScriptForCard(cardIdx, script) {
    setCards(function(prev) {
      if (!prev || !Array.isArray(prev) || cardIdx < 0 || cardIdx >= prev.length) return prev;
      var next = prev.slice();
      next[cardIdx] = Object.assign({}, prev[cardIdx], { savedScript: script });
      var expiresAt;
      try {
        var current = JSON.parse(localStorage.getItem(KEY)||"{}");
        expiresAt = (current.planExpiresAt && Date.now() < current.planExpiresAt)
          ? current.planExpiresAt : computePlanExpiry(sbCredits);
        current.plan = next;
        current.planExpiresAt = expiresAt;
        localStorage.setItem(KEY, JSON.stringify(current));
      } catch(e) { expiresAt = computePlanExpiry(sbCredits); }
      if (session) savePlanToSupabase(session.user.id, next, stats, expiresAt, strategy);
      return next;
    });
  }
  function dismissExplainer() {
    setHasSeenExplainer(true);
    try { localStorage.setItem("virl_seen_explainer","1"); } catch(e) {}
  }

  const profileComplete = !!(profile.name&&profile.audience&&profile.voice);

  // [UX-01] Count of cards posted in the prior week that haven't been
  // logged yet. Recomputed on every render so localStorage edits
  // (Mark as posted / Log Results) are reflected without a manual
  // refresh signal. Cheap — single linear scan of localStorage keys.
  var postedLastWeekCount = countPostedLastWeekUnlogged(results);

  // [UX-01] Vault remix handler — pulls the saved item's caption /
  // description into the Plan generator's context state and routes to
  // the Plan tab. Voice reference framing keeps the prompt instruction
  // explicit so the LLM treats it as style guidance, not source material.
  function handleVaultRemix(item) {
    if (!item) return;
    var voice = item.text || item.preview || item.description || item.title || "";
    voice = String(voice).slice(0, 600);
    var label = item.platform ? (item.platform + " " + (item.type==="caption"?"caption":"post")) : (item.type==="caption"?"caption":"post");
    var note  = "Voice reference (from saved " + label + '): "' + voice + '". Use a similar voice and rhythm for the new plan.';
    setContext(note);
    // [PREMIUM 10] Stamp the source so the next plan_generated event
    // can also fire plan_remixed_from_prior with this reference id.
    setRemixSource({ kind: "vault", sourceId: item.id, platform: item.platform || null });
    setTab("plan");
  }

  // [UX-01] Results "plan with insights" handler — pre-fills context
  // with a concrete reference to the prior week's top performer so
  // the next plan can lean into what worked.
  function handlePlanWithInsights(top) {
    if (!top) return;
    var v = (top.result && top.result.views) || 0;
    var l = (top.result && top.result.likes) || 0;
    var s = (top.result && top.result.saves) || 0;
    var note = "Last week's top performer: \"" + (top.title || "") + "\" (" + v + " views, " + l + " likes, " + s + " saves)"
             + (top.platform ? " on " + top.platform : "")
             + ". Lean into the same format and topic for next week.";
    setContext(note);
    // [PREMIUM 10] Stamp source so plan_generated also fires
    // plan_remixed_from_prior with this top-performer reference.
    setRemixSource({ kind: "results_top", sourceId: top.id, platform: top.platform || null });
    setTab("plan");
  }

  // [PREMIUM 2] Demo plan handler. Calls /api/chat with demo:true and
  // canned defaults; server gates eligibility (only first-ever plan)
  // and skips credit deduction. Result lands in demoCards / strategy
  // / stats, which the demo UI renders with a banner above. Failures
  // surface inline and offer the user a path to skip.
  function handleGenerateDemoPlan() {
    if (generatingDemo) return;
    setDemoError("");
    setGeneratingDemo(true);
    var demoParams = {
      platforms: ["TikTok", "Instagram"],
      niche:     "Lifestyle",
      goal:      "Grow my audience",
      formats:   ["Photo + caption", "Short video"],
      followers: "0-1K",
      context:   "",
    };
    fetch("/api/chat", {
      method:  "POST",
      headers: {
        "Content-Type":  "application/json",
        "Authorization": "Bearer " + (session ? session.access_token : ""),
      },
      body: JSON.stringify({
        generationType: "plan",
        params:         demoParams,
        demo:           true,
      }),
    }).then(function(r){
      return r.json().then(function(j){ return { ok: r.ok, status: r.status, body: j }; });
    }).then(function(out){
      if (!out.ok) {
        setGeneratingDemo(false);
        setDemoError(out.body && out.body.error ? out.body.error : "Could not generate the sample plan. Try again or skip ahead to your profile.");
        return;
      }
      var parsed = extractJSON(out.body.text || "");
      var cards    = parsed && Array.isArray(parsed.cards) ? parsed.cards : null;
      var strategy = parsed && parsed.strategy && typeof parsed.strategy === "object" ? parsed.strategy : null;
      var stats    = parsed && parsed.stats    && typeof parsed.stats    === "object" ? parsed.stats    : null;
      if (!cards || !cards.length) {
        setGeneratingDemo(false);
        setDemoError("VIRL got cut off mid-thought. Tap Try again, or skip ahead to your profile.");
        return;
      }
      setDemoCards(cards);
      setDemoStrategy(strategy);
      setDemoStats(stats);
      setGeneratingDemo(false);
    }).catch(function(){
      setGeneratingDemo(false);
      setDemoError("Connection issue. Try again, or skip ahead to your profile.");
    });
  }

  // [PREMIUM 2] Marks the demo seen and routes the user to profile
  // setup. Used by the post-demo banner CTA AND the "skip" link in the
  // pre-generate state so a flaky API doesn't strand the user.
  function handleDemoComplete() {
    try { localStorage.setItem("virl_demo_seen", "1"); } catch (e) {}
    setShowDemoIntro(false);
    setDemoCards(null);
    setDemoStrategy(null);
    setDemoStats(null);
    setDemoError("");
    setTab("profile");
  }

  // [PREMIUM 2] Suppress the legacy "virl_welcomed" first-paint modal
  // during the demo flow so the two screens don't compete for the
  // signup moment. The legacy modal will be replaced entirely by the
  // belief-statement modal in PREMIUM 6 (post-profile-complete).
  var demoActive = showDemoIntro && !profile.name;

  // ── Auth gate - show loading, then auth screen, then app ────────────────
  if (appError) return (
    <div style={{minHeight:"100vh",background:B.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:"40px 24px",fontFamily:"'Jost',sans-serif"}}>
      <div style={{textAlign:"center",maxWidth:360}}>
        <div style={{fontFamily:"'Italiana',serif",fontSize:48,color:B.navy,marginBottom:8}}>VIRL</div>
        <div style={{fontSize:15,fontWeight:600,color:B.ink,marginBottom:8}}>Something went wrong.</div>
        <div style={{fontSize:13,fontWeight:300,color:B.muted,marginBottom:8,lineHeight:1.6}}>{"Error: "+String(appError)}</div>
        <div style={{fontSize:13,fontWeight:300,color:B.muted,marginBottom:24,lineHeight:1.6}}>Try clearing your browser data for this site, then reload.</div>
        <button onClick={function(){
          try{localStorage.clear();}catch(e){}
          window.location.reload();
        }}
          style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"14px 28px",background:B.navy,color:B.white,border:"none",borderRadius:99,cursor:"pointer",marginRight:8}}>
          Clear cache &amp; reload
        </button>
      </div>
    </div>
  );
  if (authLoading) return (
    <div style={{minHeight:"100vh",background:B.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"'Italiana',serif",fontSize:52,color:B.navy,letterSpacing:"0.08em",marginBottom:12}}>VIRL</div>
        <svg style={{animation:"spin .75s linear infinite"}} width={20} height={20} viewBox="0 0 24 24" fill="none" stroke={B.sky} strokeWidth={2}>
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
      </div>
    </div>
  );

  if (!session) return (
    <GateScreen onAuth={function(s){setSession(s);}}/>
  );

return (
    <div id="virl-shell" style={{minHeight:"100vh",background:B.bg,fontFamily:"'Jost',sans-serif",fontWeight:300,color:B.ink}}>

      {/* [PREMIUM 2] Demo takeover. Mounted as a fixed full-viewport
           overlay so we don't have to rewrap the entire main-content
           tree. Two states: (1) intro card with the "Show me a sample
           plan" CTA, (2) post-generation banner + the actual demo
           cards. Tapping "Set up your profile" dismisses the overlay,
           sets the localStorage flag, and routes to the profile tab. */}
      {demoActive && (
        <div style={{position:"fixed",inset:0,background:B.bg,zIndex:250,overflowY:"auto",padding:"32px 16px 80px"}}>
          <div style={{maxWidth:680,margin:"0 auto"}}>
            <div style={{textAlign:"center",fontFamily:"'Italiana',serif",fontSize:36,letterSpacing:"0.06em",color:B.navy,marginBottom:28}}>VIRL</div>

            {/* State 1: pre-generation intro */}
            {!demoCards && (
              <div style={{background:B.card,borderRadius:18,border:"1px solid "+B.border,padding:"32px 28px",boxShadow:"0 4px 18px rgba(15,23,42,0.06)"}}>
                <div style={{fontFamily:"'Italiana',serif",fontSize:32,color:B.ink,lineHeight:1.1,marginBottom:14}}>Before you do anything else,<br/>let me show you what VIRL can do.</div>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:15,fontWeight:300,color:B.sub,lineHeight:1.7,marginBottom:24}}>
                  I'll generate a sample plan with no information about you yet, just to show what 60 seconds of generation looks like. Then we'll set up your profile so VIRL actually sounds like you.
                </div>
                {!!demoError && (
                  <div style={{background:B.coralSoft,border:"1px solid "+B.coral,borderRadius:10,padding:"10px 14px",marginBottom:14,fontFamily:"'Jost',sans-serif",fontSize:13,color:B.coral,lineHeight:1.55}}>{demoError}</div>
                )}
                <button onClick={handleGenerateDemoPlan} disabled={generatingDemo}
                  style={{padding:"14px 28px",background:generatingDemo?B.muted:B.coral,color:B.white,border:"none",borderRadius:99,fontFamily:"'Jost',sans-serif",fontSize:14,fontWeight:600,cursor:generatingDemo?"default":"pointer"}}>
                  {generatingDemo?"Generating your sample plan...":"Show me a sample plan →"}
                </button>
                <button onClick={handleDemoComplete}
                  style={{display:"block",marginTop:18,background:"transparent",border:"none",color:B.muted,fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,textDecoration:"underline",cursor:"pointer"}}>
                  Skip and set up my profile
                </button>
              </div>
            )}

            {/* State 2: post-generation banner + demo cards */}
            {demoCards && (
              <div>
                <div style={{background:B.coralSoft,borderLeft:"4px solid "+B.coral,borderRadius:12,padding:"16px 20px",marginBottom:20}}>
                  <div style={{fontFamily:"'Italiana',serif",fontSize:18,color:B.coral,marginBottom:6}}>This is what VIRL writes with no information about you.</div>
                  <div style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:300,color:B.sub,lineHeight:1.65,marginBottom:14}}>
                    Imagine what it can do once it knows your voice, your audience, and what you'd never say.
                  </div>
                  <button onClick={handleDemoComplete}
                    style={{padding:"10px 20px",background:B.navy,color:B.white,border:"none",borderRadius:99,fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:600,cursor:"pointer"}}>

                  </button>
                </div>
                {demoCards.reduce(function(acc, card, i){
                  if (i === 0 || demoCards[i-1].day !== card.day) {
                    acc.push(
                      <div key={"demoday-"+i} style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",color:B.navy,padding:"4px 0",marginTop:i>0?16:0,marginBottom:4,borderBottom:"2px solid "+B.navySoft}}>
                        {card.day}
                      </div>
                    );
                  }
                  acc.push(
                    <PlanCard key={"demo-"+i} card={card} idx={i}
                      onSave={function(){ /* demo cards are not savable */ }}
                      onLog={function(){}}
                      onSaveScript={null}
                      saved={false}
                      result={null}
                      profile={profile}
                      userToken={null}
                      onCreditsUsed={function(){}}/>
                  );
                  return acc;
                }, [])}
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Belief modal ─────────────────────────────────────────────────── */}
      {/* [PREMIUM 6] Replaces the legacy first-paint "welcome to VIRL"
           modal. Now triggers on the moment a user reaches the main
           app for the first time after completing profile setup, so
           it lands as a "before you start" pause rather than another
           setup task. Demo flow (PREMIUM 2) handles the signup-moment
           slot. Reuses the virl_welcomed flag so existing users who
           already saw the old modal don't get re-prompted. */}
      {showWelcome&&profileComplete&&!demoActive&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.7)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}>
          <div style={{background:B.white,borderRadius:24,padding:"40px 32px",maxWidth:520,width:"100%",boxShadow:"0 24px 64px rgba(0,0,0,0.2)"}}>
            <div style={{fontFamily:"'Italiana',serif",fontSize:36,color:B.navy,letterSpacing:"0.06em",marginBottom:20,textAlign:"center"}}>VIRL</div>
            <div style={{fontFamily:"'Italiana',serif",fontSize:28,color:B.ink,lineHeight:1.15,marginBottom:14}}>Before you start –</div>
            <div style={{fontFamily:"'Jost',sans-serif",fontSize:15,fontWeight:300,color:B.sub,lineHeight:1.75,marginBottom:24}}>
              VIRL won't promise to make you go viral. We don't write clickbait, and we don't suggest engagement hacks that treat your audience like dopamine slot machines.<br/><br/>
              What we'll do: help you sound like you, consistently. Posting consistently matters more than going viral. The work is the work.<br/><br/>

            </div>
            <button onClick={function(){
                try { localStorage.setItem("virl_welcomed","1"); } catch(e) {}
                setShowWelcome(false);
              }}
              style={{width:"100%",background:B.navy,color:B.white,border:"none",fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"16px 24px",cursor:"pointer",borderRadius:14,boxShadow:"0 4px 14px rgba(31,58,138,0.3)"}}>
              I'm in
            </button>
          </div>
        </div>
      )}

      {/* [TASK 5] Referral modal — only renders when a milestone fires and the
          user is signed in. Dismissing sets the per-milestone shown flag. */}
      {referralMilestone>0&&session&&(
        <ReferralModal milestone={referralMilestone} userId={session.user.id}
          onDismiss={function(){ setReferralMilestone(0); }}/>
      )}

      {/* First-plan celebration. Single-shot per browser; the dismiss

      {showFirstPlanCelebration && (
        <FirstPlanCelebration onDismiss={function(){
          try { localStorage.setItem("virl_first_plan_celebrated", "1"); } catch(e) {}

      {/* [TASK 13] Sunday batch-log modal — opened from the Sunday nudge banner. */}
      {sundayLogModalOpen&&(

      {/* Floating feedback widget — bottom-right pill, visible on every

          so admin sees what surface the user was on when they wrote in. */}
      {session && (
        <FeedbackWidget
          sessionToken={session.access_token}
          activeContext={tab}
          calendlyUrl={appConfig.founder_calendly_url}/>

      {showUpgrade&&(() => {
        // [PREMIUM 5] Modal copy now sells transformation, not features.
        // One Italiana headline that holds across every state; a small
        // contextual eyebrow chip above keeps trial-ended / out-of-
        // credits users oriented without competing with the headline.
        // Dismiss text stays state-driven because the call to "Wait
        // for tomorrow's reset" is genuinely useful, not feature-list
        // marketing.
        var modalState = trialExpired
          ? "trial"
          : (credits <= 0 ? "noCredits" : (credits <= 5 ? "lowCredits" : "hasCredits"));
        var eyebrow, eyebrowColor, dismiss;
        if (modalState === "trial") {
          eyebrow      = "Your free trial has ended";
          eyebrowColor = B.coral;
          dismiss      = "Browse my vault instead";
        } else if (modalState === "noCredits") {
          eyebrow      = daysUntilReset === 1 ? "Out of credits — reset in 1 day" : ("Out of credits — reset in " + daysUntilReset + " days");
          eyebrowColor = B.coral;
          dismiss      = daysUntilReset === 1 ? "Wait for tomorrow's reset" : ("Wait " + daysUntilReset + " days for reset");
        } else if (modalState === "lowCredits") {
          eyebrow      = "Running low — " + credits + " credit" + (credits === 1 ? "" : "s") + " left this week";
          eyebrowColor = B.amber;
          dismiss      = "Maybe later";
        } else {
          eyebrow      = "";
          eyebrowColor = B.muted;
          dismiss      = "Maybe later";
        }
        return (
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.88)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"0 0 0 0"}}>
          <div style={{background:B.white,width:"100%",maxWidth:480,borderRadius:"24px 24px 0 0",padding:"36px 28px 48px",boxShadow:"0 -8px 40px rgba(0,0,0,0.25)"}}>

                  <div style={{display:"grid",gridTemplateColumns:"1fr 80px 80px",background:B.navy,padding:"10px 16px",gap:8}}>

                    );})}
                  </div>
                  {/* Rows. row.name + row.email come from the admin-stats
                       endpoint enriching credits via the user directory.
                       Falls back to the truncated id when both are missing. */}
                  {adminData.credits.map(function(row,i){
                    var label = row.name || (row.email ? row.email.split("@")[0] : null) || ("user-" + (row.user_id||"").slice(0,6));
                    return (
                      <div key={row.user_id} style={{display:"grid",gridTemplateColumns:"1fr 80px 80px",padding:"10px 16px",gap:8,borderBottom:i<adminData.credits.length-1?"1px solid "+B.divider:"none",background:i%2===0?B.card:B.bg,alignItems:"center"}}>
                        <div style={{minWidth:0}}>
                          <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:600,color:B.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</div>
                          {row.email && row.name && (
                            <div style={{fontFamily:"'Jost',sans-serif",fontSize:10,fontWeight:300,color:B.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.email}</div>
                          )}
                        </div>
                        <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:700,color:row.plan==="standard"||row.plan==="founding"?B.green:B.muted,textTransform:"capitalize"}}>{row.plan}</div>
                        <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:600,color:B.ink}}>{row.credits}</div>
                      </div>
                    );
                  })}
                </div>

                <div style={{fontFamily:"'Jost',sans-serif",fontSize:11,fontWeight:300,color:B.muted,marginTop:12,textAlign:"center"}}>
                  {"Est. MRR assumes $25/mo per paid user. Founding members counted at $20 equivalent for first year. Data from Supabase credits table only."}
                </div>
              </div>
            )}

            {/* Pending playbook drafts — staged by the monthly refresh
                cron. One card per draft with diff + sources + Approve /
                Reject. Hidden when there's nothing to review. */}
            {pendingPlaybookDrafts.length > 0 && (
              <div style={{marginTop:32,paddingTop:24,borderTop:"1px solid "+B.divider}}>
                <Eyebrow>Pending Playbook Updates</Eyebrow>
                <div style={{fontFamily:"'Italiana',serif",fontSize:24,color:B.ink,marginBottom:8,lineHeight:1.2}}>{pendingPlaybookDrafts.length} draft{pendingPlaybookDrafts.length===1?"":"s"} need review.</div>
                <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:300,color:B.muted,lineHeight:1.6,marginBottom:18}}>
                  The monthly research cron found updates from trusted sources. Approve to commit a change to the live playbook (instantly affects every generation). Reject to archive.
                </div>
                {pendingPlaybookDrafts.map(function(draft){
                  return <PendingPlaybookDraft key={draft.id} draft={draft} token={session ? session.access_token : ""}
                    onResolved={function(id, action){
                      // Optimistically remove from the list, then refresh
                      // both lists so the live playbook editor below shows
                      // the new values when an approve commits.
                      setPendingPlaybookDrafts(function(prev){ return prev.filter(function(d){ return d.id !== id; }); });
                      if (action === "approve") loadPlaybook().then(function(map){ setPlaybook(map); });
                    }}/>;
                })}
              </div>
            )}

            {/* Playbook editor — admin-only inline form for each platform.
                Saves through /api/admin/playbook-update. Edits propagate
                everywhere (Algo tab + every Anthropic prompt). */}
            <div style={{marginTop:32,paddingTop:24,borderTop:"1px solid "+B.divider}}>

              </div>
              {PLATFORMS.map(function(p){

                         onSaved={function(){
                           // Re-fetch the playbook so the rest of the app
                           // (Algo tab card preview) sees the new values.
                           loadPlaybook().then(function(map){ setPlaybook(map); });
                         }}/>;
              })}
            </div>
          </div>
